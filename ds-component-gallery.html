/* 評分星列：實星（PCD_IC_STAR_FILL・warn 黃）+ 空星（IC_STAR regular・faint），後綴分數與評論數 */
function pcdStars(val,count){
  const full=Math.floor(val);                                   // 4.5 → 4 顆實星 + 1 顆空星
  const box=ce('span','pcd-rating');
  const stars=ce('span','pcd-stars');
  for(let i=0;i<5;i++){
    const s=ce('span',i<full?'pcd-star-full':'pcd-star-empty');
    s.innerHTML=i<full?PCD_IC_STAR_FILL:IC_STAR;
    stars.appendChild(s);
  }
  box.appendChild(stars);
  box.insertAdjacentHTML('beforeend',`<span class="pcd-rate-val">${val}</span><span class="pcd-rate-cnt">(${count})</span>`);
  box.setAttribute('aria-label',`評分 ${val} 分，共 ${count} 則評論`);
  return box;
}

/* 商品卡本體：variant=vertical|horizontal|minimal；state=default|hover|soldout
   o={live, badge, badgeText, badgeIntent, rating, wishlist, wished, discount, price, name, src, onWish} */
function pcdCard(variant,state,o){
  o=o||{};
  const soldout=state==='soldout';
  const card=ce('div','pcd-card pcd-v-'+variant
    +(state==='hover'?' is-hover':'')                            // 矩陣格用靜態 class 模擬 hover
    +(soldout?' is-soldout':'')
    +(o.live?' live':'')                                       // Live/showcase 才吃真實 :hover
    +(o.size==='s'?' pcd-sz-s':''));

  /* 收藏愛心：.btn v-text icon-only 原子；已收藏換 fill 版 + is-on 轉紅 */
  function mkWish(){
    const w=ce('button','btn v-text i-secondary sz-s icon-only pcd-wish'+(o.live?' live':'')+(o.wished?' is-on':''));
    w.innerHTML=o.wished?PCD_IC_HEART_FILL:IC_HEART;
    w.setAttribute('aria-label',o.wished?'移除收藏':'加入收藏');
    w.setAttribute('aria-pressed',o.wished?'true':'false');
    if(soldout)w.disabled=true;
    if(o.onWish&&!soldout)w.onclick=o.onWish;
    return w;
  }
  /* 角標：.tg 原子（新品=i-brand／熱門=i-danger） */
  function mkBadge(inline){ // inline=true（精簡版無圖）：不絕對定位、不玻璃，正常排進 toprow
    const t=ce('div','tg v-soft c-round i-'+(o.badgeIntent||'brand')+' st-default'+(inline?'':' pcd-badge tg-glass'));
    t.innerHTML='<span>'+(o.badgeText||'新品')+'</span>';
    return t;
  }

  /* 縮圖區（minimal 無圖）：imEl 原子 1:1，角標左上、收藏右上，售完加灰階覆蓋標 */
  if(variant!=='minimal'){
    const th=ce('div','pcd-thumb');
    th.appendChild(imEl('rectangular','default','l',{ratio:'1:1',alt:o.name||'商品圖',src:o.src||PCD_IMG.bag}));
    if(o.badge!==false)th.appendChild(mkBadge());
    if(o.wishlist!==false)th.appendChild(mkWish());
    if(soldout){
      const ov=ce('div','pcd-soldout-ov');
      const t=ce('div','tg v-solid c-round i-neutral st-default');t.innerHTML='<span>售完</span>';
      ov.appendChild(t);th.appendChild(ov);
    }
    card.appendChild(th);
  }

  /* 資訊區：品名 + 評分星列 + 價格(prEl) + 加入購物車(.btn) */
  const info=ce('div','pcd-info');
  if(variant==='minimal'&&(o.badge!==false||o.wishlist!==false||soldout)){
    const top=ce('div','pcd-toprow');                            // minimal 無圖：角標／售完標與收藏改放同一列
    const lf=ce('span','');
    if(soldout){const t=ce('div','tg v-solid c-round i-neutral st-default');t.innerHTML='<span>售完</span>';lf.appendChild(t);}
    else if(o.badge!==false)lf.appendChild(mkBadge(true));
    top.appendChild(lf);
    if(o.wishlist!==false)top.appendChild(mkWish());
    info.appendChild(top);
  }
  const nm=ce('div','pcd-name');nm.textContent=o.name||'經典帆布托特包・大容量通勤款';
  info.appendChild(nm);
  if(o.rating!==false)info.appendChild(pcdStars(o.rating||4.5,o.count||128));

  const buy=ce('div','pcd-buy');
  buy.appendChild(prEl(o.price||(o.discount?'discount':'normal'),'md'));   // 價格原子：normal／discount／sale
  const b=ce('button','btn v-solid i-primary sz-s'+(o.live?' live':''));
  b.innerHTML=IC_CART+'<span>'+(soldout?'已售完':'加入購物車')+'</span>';
  if(soldout)b.disabled=true;
  buy.appendChild(b);
  info.appendChild(buy);
  card.appendChild(info);
  return card;
}

/* category-tile icons */
/* category-tile 未新增自訂 icon：leading 重用既有 IC_PHONE／IC_BAG／IC_HOUSE／IC_FOOD／IC_AIRPLANE／IC_MUSIC，右側箭頭重用 ICON_ARROW */

/* category-tile build */
/* ==================== category-tile 分類磚 ==================== */
  /* 分類示意資料池：zh／en／count／desc／icon（既有 Phosphor const）／img（IM_POOL 索引） */
  const CAT_DATA=[
    {zh:'電子產品',en:'electronics',count:'128 件',desc:'手機、平板與週邊配件',ic:IC_PHONE,img:0},
    {zh:'服飾配件',en:'fashion',count:'86 件',desc:'男女裝、鞋包與飾品',ic:IC_BAG,img:1},
    {zh:'居家生活',en:'home',count:'54 件',desc:'家具、寢具與收納',ic:IC_HOUSE,img:2},
    {zh:'美食餐飲',en:'food',count:'212 件',desc:'生鮮、零食與飲品',ic:IC_FOOD,img:3,imgId:'photo-1504674900247-0877df9cc836'},
    {zh:'旅遊行程',en:'travel',count:'37 件',desc:'國內外行程與票券',ic:IC_AIRPLANE,img:4},
    {zh:'音樂唱片',en:'music',count:'65 件',desc:'黑膠、CD 與周邊',ic:IC_MUSIC,img:5}
  ];
  /* 矩陣／Live 每個 variant 綁定的固定示意資料（icon=電子產品、image=美食、gradient=音樂） */
  const CAT_MDATA={icon:3,image:3,gradient:3}; // 三 variant 統一用「美食餐飲」，只差樣式
  /* 單顆分類磚：variant=icon|image|gradient；state=default|hover|active
     o={data:CAT_DATA 項, count:顯示數量(預設 true), desc:顯示描述(預設 false), arrow:顯示箭頭(預設 true), live:真實 hover} */
  function catTile(variant,state,o){o=o||{};
    const d=o.data||CAT_DATA[0];
    const t=ce('div','cat-tile cat-'+variant+(o.size==='s'?' cat-sz-s':''));
    if(state==='hover')t.classList.add('is-hover');      // 矩陣用靜態 class 模擬滑過
    if(state==='active')t.classList.add('is-active');    // 選中（目前所在分類）
    if(o.live)t.classList.add('live');                   // Live／showcase 才吃真實 :hover
    t.setAttribute('role','link');t.setAttribute('tabindex','0');
    if(state==='active')t.setAttribute('aria-current','true');
    if(variant==='image'){
      const m=ce('div','cat-media');                     // 重用 Image 原子（imEl），CSS 攤平成滿版背景
      m.appendChild(imEl('rectangular','default','m',{src:d.imgId||IM_POOL[d.img],alt:''}));
      t.appendChild(m);
      t.appendChild(ce('div','cat-scrim'));              // 底部暗色漸層遮罩，確保疊字可讀
    } else {
      const c=ce('div','cat-circle');c.innerHTML=d.ic;c.setAttribute('aria-hidden','true');
      t.appendChild(c);                                  // icon 磚＝主色淡底圓圈；gradient 磚＝半透明白圓圈（CSS 控色）
    }
    const body=ce('div','cat-body');
    const nm=ce('div','cat-name');nm.textContent=d.zh;body.appendChild(nm);
    if(o.desc){const ds=ce('div','cat-desc');ds.textContent=d.desc;body.appendChild(ds);}
    if(o.count!==false){const meta=ce('div','cat-meta');
      const tg=ce('div','tg v-soft c-round i-neutral st-default');   // 重用 Tag 原子顯示數量
      tg.innerHTML='<span>'+d.count+'</span>';
      meta.appendChild(tg);body.appendChild(meta);}
    t.appendChild(body);
    if(o.arrow!==false){const a=ce('span','cat-arrow');a.innerHTML=ICON_ARROW;a.setAttribute('aria-hidden','true');t.appendChild(a);}
    return t;
  }
  /* 矩陣格：count＋arrow、無描述，資料依 variant 固定 */
  function catCell(v,s,size){return catTile(v,s,{data:CAT_DATA[CAT_MDATA[v]],count:true,desc:false,arrow:true,size});}

  function buildCategoryTile(view){
    const body=viewScaffold(view,{eyebrow:'L3 Component · Category Tile',title:'Category Tile 分類磚',
      lede:'分類導覽磚：點擊進入某分類的入口元件，圖示／圖片＋分類名＋數量。<b>variant × state</b>：icon 圖示磚（主色淡底圓圈＋Phosphor icon）／image 圖片磚（Image 原子滿版背景＋暗色遮罩疊白字）／gradient 漸層磚（accent 漸層底＋白字）× default／hover／active（選中）。leading 重用 <b>Icon</b>、背景重用 <b>Image（imEl）</b>、數量重用 <b>Tag（.tg）</b>，箭頭用既有 ICON_ARROW。',
      specRows:[['axes','<code>variant × state</code>'],['formula','<code>3 × 3 = 9</code>'],
        ['token-policy','<code>semantic.surface.* / semantic.accent.* / --primary-on</code>'],
        ['slots','leading（icon 圓圈／image／gradient 白圈）/ name / count / desc? / arrow?'],
        ['a11y','role="link" tabindex=0；選中 aria-current="true"；媒體圖 alt=""（裝飾性）']]});
    const axes=DIAL_SPECS['category-tile'].axes, zh=DIAL_SPECS['category-tile'].zh, active=CHOICE['category-tile'].active; // 接中央 store
    const VN={icon:['圖示磚','icon'],image:['圖片磚','image'],gradient:['漸層磚','gradient']};
    const STN={default:['預設','default'],hover:['滑過','hover'],active:['選中','active']};
    let p;
    function renderM(){ if(!p)return; p.innerHTML='';
      const vs=axes.variant.filter(v=>active.variant.has(v));
      const ss=axes.state.filter(s=>active.state.has(s));
      const csz=axes.size.filter(z=>active.size.has(z))[0]||'m';
      p.appendChild(matrixPanel({badge:'category-tile',name:'Variant × State',rows:vs,cols:ss,
        rowLab:v=>labHTML(VN[v][0],VN[v][1]),
        colLab:s=>labHTML(STN[s][0],STN[s][1]),
        cell:(v,s)=>catCell(v,s,csz),mincol:240})); }
    mountDial(body,{axes,zh,active,onRender:renderM});
    const sec=section(body,'Variant × State 矩陣','列＝三種磚型、欄＝三種狀態。hover 浮起＋底色／遮罩加深、active 出現 accent 邊框（icon 磚圓圈變實心 accent；gradient 磚以 panel 間隙＋外圈表達）。');
    p=panelsIn(sec);renderM();
    /* Showcase：三磚型並排（含描述、真實 hover） */
    const sc=section(body,'三種磚型 Showcase','同一顆元件的三種外觀：icon 適合密集導覽清單、image 適合視覺主導的分類入口、gradient 適合強調主打分類；此區皆為真實 hover。');
    const row=ce('div','cat-row');
    [['icon',3],['image',3],['gradient',3]].forEach(pair=>{
      row.appendChild(catTile(pair[0],'default',{data:CAT_DATA[pair[1]],count:true,desc:true,arrow:true,live:true}));});
    sc.appendChild(row);
    /* Grid 示意：4~6 磚自適應網格 */
    const gs=section(body,'分類磚 Grid 示意','六個分類排成自適應網格（auto-fill／minmax 220px），其中「美食餐飲」為選中態（aria-current）；真實 hover。');
    const grid=ce('div','cat-grid');
    CAT_DATA.forEach((d,i)=>{grid.appendChild(catTile('icon',i===3?'active':'default',{data:d,count:true,desc:false,arrow:true,live:true}));});
    gs.appendChild(grid);
    /* Live */
    const sl=section(body,'實際互動 Live','切磚型、勾數量／描述／箭頭／選中即時預覽；hover 為真實互動、可與選中疊加。');
    mountLive(sl,{
      initial:{variant:'icon',size:'m',count:true,description:false,arrow:true,active:false},
      segs:[{key:'variant',label:'Variant',options:['icon','image','gradient'],labels:['圖示磚','圖片磚','漸層磚']},{key:'size',label:'Size',options:['m','s']}],
      bools:[{key:'count',label:'count 數量'},{key:'description',label:'description 描述'},{key:'arrow',label:'arrow 箭頭'},{key:'active',label:'active 選中'}],
      boolLabel:'內容／狀態',
      render:st=>{
        const wrap=ce('div','cat-live');
        wrap.appendChild(catTile(st.variant,st.active?'active':'default',
          {data:CAT_DATA[CAT_MDATA[st.variant]],count:st.count,desc:st.description,arrow:st.arrow,size:st.size,live:true}));
        return wrap;},
      note:'active 為「目前所在分類」的持續選中態（<code>aria-current="true"</code>）；image 磚白字靠暗色漸層遮罩保可讀、gradient 磚文字一律 <code>--primary-on</code>。'});

/* 三個 variant 各自的示意內容（封面取自主檔 IM_POOL 已驗證圖池） */
const ART_DATA={
  vertical:{cat:'設計',title:'設計系統如何撐起跨平台的一致體驗',
    excerpt:'從 token、元件到文件化流程，拆解設計系統在多產品線團隊中的實際運作方式，以及導入時最常踩的三個坑。',

    author:'王小明',date:'2026/07/01',read:'6 分鐘',srcId:'photo-1526378722484-bd91ca387e72'}
};

/* 文章卡本體：variant=vertical|horizontal|overlay；state=default|hover（矩陣靜態用 is-hover）
   opts={live:真實 hover, more:顯示「閱讀更多」, category/excerpt/author/meta:內容開關（預設全開）} */
function artCard(variant,state,opts){opts=opts||{};
  const on=k=>opts[k]!==false; // 未指定視為開啟
  const d=ART_DATA[variant]||ART_DATA.vertical;
  const card=ce('article','art-card v-'+variant+(state==='hover'?' is-hover':'')+(opts.live?' live':'')+(opts.size==='s'?' art-sz-s':''));
  // 封面：重用 Image 原子 imEl（16:9；橫式/疊字由 CSS 覆寫成填滿）
  const cover=ce('div','art-cover');
  cover.appendChild(imEl('rectangular','default','l',{src:d.srcId,alt:d.title,ratio:'16:9'}));
  // 內容區
  const body=ce('div','art-body');
  if(on('category')){ // 分類標：重用 Tag 原子 .tg（疊字版改 v-solid 保對比）
    const c=ce('div','art-cat');
    const t=ce('div','tg '+(variant==='overlay'?'v-solid':'v-soft')+' c-round i-brand st-default');
    t.innerHTML='<span>'+d.cat+'</span>';c.appendChild(t);body.appendChild(c);}
  const ti=ce('h3','art-title');ti.textContent=d.title;body.appendChild(ti);
  if(on('excerpt')){const ex=ce('p','art-excerpt');ex.textContent=d.excerpt;body.appendChild(ex);}
  if(on('author')||on('meta')){ // 作者列：圓形頭像（imEl circular）＋名字＋「·」＋日期＋閱讀時間
    const row=ce('div','art-foot');
    if(on('author')){const a=ce('div','art-author');
      a.appendChild(imEl('circular','default','s',{alt:d.author})); // 頭像重用 Image 原子
      const nm=ce('span','art-author-name');nm.textContent=d.author;a.appendChild(nm);row.appendChild(a);}
    if(on('meta')){const m=ce('span','art-meta');
      m.innerHTML=(on('author')?'<span class="art-dot">·</span>':'')+'<span>'+d.date+'</span><span class="art-dot">·</span><span>'+d.read+'</span>';
      row.appendChild(m);}
    body.appendChild(row);}
  if(opts.more){ // 閱讀更多：重用 Button 原子（v-text）＋既有 ICON_ARROW
    const mr=ce('div','art-more');
    const b=document.createElement('button');b.className='btn v-text i-primary sz-s live';
    b.innerHTML='<span>閱讀更多</span>'+ICON_ARROW;mr.appendChild(b);body.appendChild(mr);}
  card.append(cover,body); // 疊字版 cover 由 CSS 轉 absolute 鋪底，DOM 順序不變
  return card;
}
/* 矩陣格：靜態呈現一張對應 variant × state 的卡 */

  /* ===== Table&Chart group build: table ===== */
/* ===================== Table 資料表格（tbl-） =====================

   新增 icon：TBL_IC_SORT（Phosphor caret-up-down；表頭「未排序」中性指示） */

/* ---- 新增 icon：caret-up-down（未排序中性雙箭頭） ---- */
  const TBL_IC_SORT='<svg viewBox="0 0 256 256" fill="currentColor"><path d="M181.66,170.34a8,8,0,0,1,0,11.32l-48,48a8,8,0,0,1-11.32,0l-48-48a8,8,0,0,1,11.32-11.32L128,212.69l42.34-42.35A8,8,0,0,1,181.66,170.34ZM85.66,85.66,128,43.31l42.34,42.35a8,8,0,0,0,11.32-11.32l-48-48a8,8,0,0,0-11.32,0l-48,48A8,8,0,0,0,85.66,85.66Z"/></svg>';

/* ---- 狀態欄標籤對照（重用 .tg 原子：完成 i-brand／進行中 i-neutral／逾期 i-danger） ---- */
  const TBL_STATUS={done:['完成','i-brand'],doing:['進行中','i-neutral'],late:['逾期','i-danger']};

/* ---- 示意資料池（每張表都取深拷貝，排序／選取互不污染） ---- */
  const TBL_DATA=[
    {name:'王小明',status:'done', amount:12800,date:'2026-07-02'},
    {name:'陳美華',status:'doing',amount:4600, date:'2026-07-05'},

/* ---- 小工具 ---- */
  function tblFmt(n){return 'NT$ '+n.toLocaleString('en-US');}                     // 金額格式化
  function tblTagEl(status){                                                       // 狀態標籤：重用 .tg
    const s=TBL_STATUS[status];

    t.innerHTML='<span>'+s[0]+'</span>';return t;}
  function tblCbxEl(density,checked){                                              // 勾選框：重用 .cbx（緊湊縮 sz-s）
    const c=ce('div','cbx '+(density==='compact'?'sz-s':'sz-m')+' '+(checked?'st-checked':'st-default'));
    if(checked)c.innerHTML=ICON_CHECK;return c;}

/* ---- 分頁列（showcase 示意；直接重用 library Pagination 元件 pgBar，非自畫按鈕） ---- */
  function tblPagerEl(){
    const bar=ce('div','tbl-pgbar');
    const info=ce('div','tbl-pginfo');bar.appendChild(info);
    let cur=1;const total=3,per=5,all=13;                                          // 3 頁示意
    const nav=ce('div','tbl-pgnav');
    function draw(){
      const from=(cur-1)*per+1,to=Math.min(cur*per,all);
      info.textContent='共 '+all+' 筆 · 第 '+from+'-'+to+' 筆';
      nav.innerHTML='';
      nav.appendChild(pgBar('numbered','s',{total,current:cur,onNav:n=>{cur=Math.max(1,Math.min(total,n));draw();}})); // 用 Pagination 元件（pg-btn＋pgArrow）
    }
    draw();bar.appendChild(nav);
    return bar;}

/* ---- 欄位型別儲存格：文字按鈕（重用 Button v-text）／Dropdown（重用 Dropdown 元件） ---- */
  function tblActionEl(){                                                          // 文字按鈕儲存格

  function tblOwnerEl(){                                                           // Dropdown 儲存格（可展開選單）
    const w=ddField('outline');w.classList.add('tbl-dd');return w;}

/* ---- 主要工廠：tblTable(variant,density,opts) → .tbl-wrap ----
   opts：checkbox 勾選欄／sortable 可排序表頭／zebra 額外斑馬紋／footer 總計列／pager 分頁列
         selected:[idx] 預選列／live 真實 hover／interactive 點列切選取／mini 矩陣小表（去日期欄、3 列）／simHover 靜態 hover 列 */
  function tblTable(variant,density,o){
    o=o||{};
    const rows=(o.data||(o.mini?TBL_DATA.slice(0,3):TBL_DATA)).map(d=>Object.assign({},d)); // 資料副本
    (o.selected||[]).forEach(i=>{if(rows[i])rows[i]._sel=true;});
    const zebra=variant==='striped'||!!o.zebra;                                    // v-striped 或 stripe 開關都算斑馬紋
    const wrap=ce('div','tbl-wrap tbl-v-'+variant+' tbl-dn-'+density+(zebra?' tbl-zebra':'')+(o.live?' live':'')+(o.cellTypes?' tbl-celltypes':'')+(o.mini?' tbl-mini':''));
    const table=ce('table','tbl');wrap.appendChild(table);
    const cols=o.cellTypes?[                                                       // 欄位型別展示表：文字／Tag／數字／Dropdown／文字按鈕
      {key:'name',  lab:'姓名',  sortable:false,cls:'tbl-name'},
      {key:'status',lab:'狀態',  sortable:false,cls:''},
      {key:'amount',lab:'金額',  sortable:false,cls:'tbl-num'},
      {key:'owner', lab:'負責人',sortable:false,cls:'tbl-owner'},
      {key:'action',lab:'操作',  sortable:false,cls:'tbl-action'},
    ]:[
      {key:'name',  lab:'姓名',sortable:true, cls:'tbl-name'},
      {key:'status',lab:'狀態',sortable:false,cls:''},
      {key:'amount',lab:'金額',sortable:true, cls:'tbl-num'},
      {key:'date',  lab:'日期',sortable:true, cls:'tbl-mut'},
    ].filter(c=>!(o.mini&&c.key==='date'));                                        // 矩陣小表拿掉日期欄
    let sortKey=null,sortAsc=true;                                                 // 排序狀態（每張表獨立）
    const interactive=!!o.live&&o.interactive!==false;

    const thead=ce('thead'),htr=ce('tr');thead.appendChild(htr);table.appendChild(thead);
    const tbody=ce('tbody');table.appendChild(tbody);
    let headCbx=null;

    function syncHead(){                                                           // 全選框三態同步（重用 .cbx st-indeterminate＋.dash）
      if(!headCbx)return;
      const n=rows.filter(r=>r._sel).length;
      headCbx.classList.remove('st-checked','st-indeterminate','st-default');
      if(n===rows.length&&n>0){headCbx.classList.add('st-checked');headCbx.innerHTML=ICON_CHECK;}
      else if(n>0){headCbx.classList.add('st-indeterminate');headCbx.innerHTML='<span class="dash"></span>';}
      else{headCbx.classList.add('st-default');headCbx.innerHTML='';}}

    function renderHead(){                                                         // 表頭（排序鈕重用 .btn v-text）
      htr.innerHTML='';
      if(o.checkbox){
        const th=ce('th','tbl-th tbl-col-cbx');
        headCbx=tblCbxEl(density,false);
        if(interactive)headCbx.addEventListener('click',()=>{                      // 點全選框：全選 ↔ 全不選
          const all=rows.every(r=>r._sel);
          rows.forEach(r=>{r._sel=!all;});renderBody();syncHead();});
        th.appendChild(headCbx);htr.appendChild(th);syncHead();}
      cols.forEach(c=>{
        const th=ce('th','tbl-th'+(c.key==='amount'?' tbl-num':''));
        if(o.sortable&&c.sortable){
          const cur=sortKey===c.key;
          const b=ce('button','btn v-text i-secondary sz-s live tbl-sortbtn'+(cur?' is-active':''));
          b.innerHTML='<span>'+c.lab+'</span><span class="tbl-sortic'+(cur&&sortAsc?' tbl-asc':'')+'">'
            +(cur?ICON_CARET:TBL_IC_SORT)+'</span>';                               // 排序中：caret 升／降；未排序：中性雙箭頭
          b.addEventListener('click',()=>{
            if(sortKey===c.key)sortAsc=!sortAsc;else{sortKey=c.key;sortAsc=true;}
            renderHead();renderBody();});
          th.appendChild(b);
        }else{th.textContent=c.lab;}
        htr.appendChild(th);});}

    function renderBody(){                                                         // 資料列
      tbody.innerHTML='';
      const rs=rows.slice();
      if(sortKey){const k=sortKey;rs.sort((a,b)=>{
        let r;
        if(k==='amount')r=a.amount-b.amount;
        else if(k==='name')r=a.name.localeCompare(b.name,'zh-Hant');
        else r=a.date<b.date?-1:a.date>b.date?1:0;
        return sortAsc?r:-r;});}
      rs.forEach((d,i)=>{
        const tr=ce('tr','tbl-row'+(d._sel?' is-selected':'')+(o.simHover===i?' is-hover':''));
        if(o.checkbox){const td=ce('td','tbl-td tbl-col-cbx');td.appendChild(tblCbxEl(density,!!d._sel));tr.appendChild(td);}
        cols.forEach(c=>{
          const td=ce('td','tbl-td'+(c.cls?' '+c.cls:''));
          if(c.key==='status')td.appendChild(tblTagEl(d.status));
          else if(c.key==='amount')td.textContent=tblFmt(d.amount);
          else if(c.key==='owner')td.appendChild(tblOwnerEl());                     // Dropdown 儲存格
          else if(c.key==='action')td.appendChild(tblActionEl());                   // 文字按鈕儲存格
          else td.textContent=d[c.key];
          tr.appendChild(td);});
        if(interactive){                                                           // 點列切換選取，勾選框／全選框連動
          tr.style.cursor='pointer';
          tr.addEventListener('click',()=>{d._sel=!d._sel;renderBody();syncHead();});}
        tbody.appendChild(tr);});}

    renderHead();renderBody();

    if(o.footer){                                                                  // 表尾總計列（金額右對齊 tabular-nums）
      const tfoot=ce('tfoot'),ftr=ce('tr');
      const lab=ce('td','tbl-td tbl-ft tbl-ft-lab');lab.colSpan=(o.checkbox?1:0)+2;lab.textContent='總計';
      const amt=ce('td','tbl-td tbl-ft tbl-num');amt.textContent=tblFmt(rows.reduce((s,d)=>s+d.amount,0));
      ftr.append(lab,amt);
      if(cols.some(c=>c.key==='date'))ftr.appendChild(ce('td','tbl-td tbl-ft'));
      tfoot.appendChild(ftr);table.appendChild(tfoot);}

    if(o.pager)wrap.appendChild(tblPagerEl());                                     // 分頁列（重用 .btn）
    return wrap;}

/* ---- 矩陣格：tblCell(variant,density) → 小表（表頭＋3 列，呈現該組合外觀） ---- */

     variant：stat／line／bar／donut × size：m 標準／s 精簡（精簡＝sparkline 式簡配：折線收掉格線端點、長條單系列、甜甜圈收圖例）。
     重用原子：stat 卡直接用 prMetricEl（含標題＋趨勢 delta，icon 走 IC_TRENDING）；圖例／delta 用 .tg；
     系列色一律綁 token：--accent／--ok／--warn／--i-danger；格線 --line、軸線 --line-strong；數字 tabular-nums。 */

  /* --- 示意資料池（固定不隨機，方便明暗／尺寸對照） --- */
  const CHT_LINE_DATA=[42,54,48,66,60,78,72,92,86,108];      // 折線：近 10 期上升趨勢
  const CHT_BAR_A=[64,92,78,110,88,120,72];                  // 長條系列 A（本週，--accent）
  const CHT_BAR_B=[48,70,90,84,64,96,58];                    // 長條系列 B（上週，--ok）
  const CHT_DONUT_SEGS=[                                     // 甜甜圈四段，各綁一個 intent 色 token
    {k:'已完成',v:46,c:'--accent',dot:'c-accent'},
    {k:'進行中',v:26,c:'--ok',dot:'c-ok'},
    {k:'待處理',v:18,c:'--warn',dot:'c-warn'},
    {k:'逾期',v:10,c:'--i-danger',dot:'c-danger'}
  ];
  const CHT_XCATS=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月']; // 折線 x 類別
  const CHT_BAR_CATS=['週一','週二','週三','週四','週五','週六','週日'];        // 長條 x 類別
  const SVGNS='http://www.w3.org/2000/svg';
  let chtUID=0; // 漸層填充 <linearGradient> 唯一 id 計數

  /* --- 座標軸留白：yaxis 開→左側留數值刻度、xaxis 開→底部留類別 --- */
  function chtPad(o){return {L:o.yaxis?26:6, R:6, T:6, B:o.xaxis?15:6};}
  /* 把資料映射到 plot 內座標（box 為扣掉留白後的繪圖區） */
  function chtPtsBox(data,box){
    const mx=Math.max.apply(null,data),mn=Math.min.apply(null,data),span=(mx-mn)||1;
    return data.map((v,i)=>[
      box.x+(data.length>1?i*box.w/(data.length-1):box.w/2),
      box.y+box.h-((v-mn)/span)*box.h
    ]);
  }
  /* y 軸刻度 text（top→bottom 由大到小）＋x 軸類別 text */
  function chtAxisSVG(o,box,ticks,cats,catXs){
    let s='';
    if(o.yaxis)for(let i=0;i<ticks.length;i++){ // 左側數值刻度，右對齊貼近繪圖區
      const y=(box.y+i*box.h/(ticks.length-1)).toFixed(1);
      s+='<text x="'+(box.x-4)+'" y="'+(+y+3).toFixed(1)+'" class="cht-axis" text-anchor="end">'+ticks[i]+'</text>';
    }
    if(o.xaxis)cats.forEach((c,i)=>{ // 底部類別，置中對齊各資料點
      s+='<text x="'+catXs[i].toFixed(1)+'" y="'+(o.h-4)+'" class="cht-axis" text-anchor="middle">'+c+'</text>';
    });
    return s;
  }

  /* Catmull-Rom → cubic bezier 平滑路徑（曲線圖 curve 用；端點以自身當虛擬控制點）*/
  function chtSmoothPath(pts){
    if(pts.length<2)return '';
    let d='M'+pts[0][0].toFixed(1)+' '+pts[0][1].toFixed(1);
    for(let i=0;i<pts.length-1;i++){
      const p0=pts[i-1]||pts[i],p1=pts[i],p2=pts[i+1],p3=pts[i+2]||pts[i+1];
      const c1x=p1[0]+(p2[0]-p0[0])/6,c1y=p1[1]+(p2[1]-p0[1])/6;
      const c2x=p2[0]-(p3[0]-p1[0])/6,c2y=p2[1]-(p3[1]-p1[1])/6;
      d+=' C'+c1x.toFixed(1)+' '+c1y.toFixed(1)+' '+c2x.toFixed(1)+' '+c2y.toFixed(1)+' '+p2[0].toFixed(1)+' '+p2[1].toFixed(1);
    }
    return d;
  }
  /* 折線圖：回傳 {svg, pts, box}；不再永遠畫端點（dots 改由 hover 顯示）；o.smooth→平滑曲線 */
  function chtLineSVG(o){
    const w=o.w,h=o.h,data=o.data||CHT_LINE_DATA,p=chtPad(o);
    const box={x:p.L,y:p.T,w:w-p.L-p.R,h:h-p.T-p.B};
    const pts=chtPtsBox(data,box);
    const mx=Math.max.apply(null,data),mn=Math.min.apply(null,data);
    const d=o.smooth?chtSmoothPath(pts):pts.map((pt,i)=>(i?'L':'M')+pt[0].toFixed(1)+' '+pt[1].toFixed(1)).join(' ');
    const gid=o.grad?('chtGrad'+(++chtUID)):null; // 漸層填充唯一 id
    let s='<svg viewBox="0 0 '+w+' '+h+'" role="img" aria-label="折線圖：近 '+data.length+' 期呈上升趨勢">';
    if(gid)s+='<defs><linearGradient id="'+gid+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--accent)" stop-opacity=".32"/><stop offset="1" stop-color="var(--accent)" stop-opacity="0"/></linearGradient></defs>';
    if(o.grid)for(let i=0;i<4;i++){ // 4 條水平淡格線（--line）
      const y=(box.y+i*box.h/3).toFixed(1);
      s+='<line x1="'+box.x+'" y1="'+y+'" x2="'+(box.x+box.w)+'" y2="'+y+'" stroke="var(--line)" stroke-width="1"/>';
    }
    if(o.area) // 面積填充：折線閉合到底邊，accent 半透明
      s+='<path d="'+d+' L'+pts[pts.length-1][0].toFixed(1)+' '+(box.y+box.h)+' L'+pts[0][0].toFixed(1)+' '+(box.y+box.h)+' Z" '+(gid?'fill="url(#'+gid+')"':'fill="var(--accent)" fill-opacity=".14"')+' stroke="none"/>';
    s+='<path d="'+d+'" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
    const ticks=[mx,Math.round(mx-(mx-mn)/3),Math.round(mn+(mx-mn)/3),mn]; // y 刻度由大到小
    s+=chtAxisSVG(o,box,ticks,CHT_XCATS.slice(0,data.length),pts.map(pt=>pt[0]));
    return {svg:s+'</svg>',pts,box};
  }
  /* 折線圖 DOM 節點：interactive→掛 hover（顯示端點＋垂直導引＋tooltip） */
  function chtLineNode(o){
    const wrap=ce('div','cht-plot');const g=chtLineSVG(o);wrap.innerHTML=g.svg;
    if(o.interactive)chtHoverLine(wrap,o,g.pts,g.box,o.data||CHT_LINE_DATA);
    return wrap;
  }
  /* 折線 hover：dot＋垂直線只在滑到節點時出現（不再永遠顯示每個節點） */
  function chtHoverLine(wrap,o,pts,box,data){
    const svg=wrap.querySelector('svg'),vw=o.w,vh=o.h;
    const guide=document.createElementNS(SVGNS,'line');guide.setAttribute('class','cht-guide');guide.setAttribute('y1',box.y);guide.setAttribute('y2',box.y+box.h);guide.style.opacity='0';svg.appendChild(guide);
    const dot=document.createElementNS(SVGNS,'circle');dot.setAttribute('r','3.6');dot.setAttribute('class','cht-hdot');dot.style.opacity='0';svg.appendChild(dot);
    const tip=ce('div','cht-tip');wrap.appendChild(tip);
    function move(e){
      const r=svg.getBoundingClientRect();const relx=(e.clientX-r.left)/r.width*vw;
      let bi=0,bd=1e9;pts.forEach((pt,i)=>{const dd=Math.abs(pt[0]-relx);if(dd<bd){bd=dd;bi=i;}});
      const pt=pts[bi];
      dot.setAttribute('cx',pt[0]);dot.setAttribute('cy',pt[1]);dot.style.opacity='1';
      guide.setAttribute('x1',pt[0]);guide.setAttribute('x2',pt[0]);guide.style.opacity='1';
      tip.innerHTML='<b>'+data[bi]+'</b><span>'+CHT_XCATS[bi]+'</span>';
      tip.style.left=(pt[0]/vw*r.width)+'px';tip.style.top=(pt[1]/vh*r.height)+'px';tip.classList.add('on');
    }
    svg.addEventListener('mousemove',move);
    svg.addEventListener('mouseleave',()=>{dot.style.opacity='0';guide.style.opacity='0';tip.classList.remove('on');});
  }

  /* 長條圖：回傳 {svg, centers, box}；centers 供 hover 定位 */
  function chtBarSVG(o){
    const w=o.w,h=o.h,A=CHT_BAR_A,B=CHT_BAR_B,n=A.length,p=chtPad(o);
    const top=Math.max(p.T,o.vals?14:p.T);
    const box={x:p.L,y:top,w:w-p.L-p.R,h:h-top-p.B};
    const mx=Math.max.apply(null,o.series2?A.concat(B):A);
    const gw=box.w/n,centers=[];
    let s='<svg viewBox="0 0 '+w+' '+h+'" role="img" aria-label="長條圖：近 '+n+' 期'+(o.series2?'雙系列對照':'數值')+'">';
    if(o.grid)for(let i=0;i<4;i++){const y=(box.y+i*box.h/3).toFixed(1);
      s+='<line x1="'+box.x+'" y1="'+y+'" x2="'+(box.x+box.w)+'" y2="'+y+'" stroke="var(--line)" stroke-width="1"/>';}
    for(let i=0;i<n;i++){
      const cx=box.x+gw*i+gw/2;const bh=(A[i]/mx)*box.h;
      centers.push({cx,gw,a:A[i],b:B[i]});
      if(o.series2){
        const bw=Math.min(gw*0.30,10),bh2=(B[i]/mx)*box.h;
        s+='<rect x="'+(cx-bw-1).toFixed(1)+'" y="'+(box.y+box.h-bh).toFixed(1)+'" width="'+bw.toFixed(1)+'" height="'+bh.toFixed(1)+'" rx="0" fill="var(--accent)"/>';
        s+='<rect x="'+(cx+1).toFixed(1)+'" y="'+(box.y+box.h-bh2).toFixed(1)+'" width="'+bw.toFixed(1)+'" height="'+bh2.toFixed(1)+'" rx="0" fill="var(--ok)"/>';
        if(o.vals){
          s+='<text x="'+(cx-bw/2-1).toFixed(1)+'" y="'+(box.y+box.h-bh-3).toFixed(1)+'" class="cht-val" text-anchor="middle">'+A[i]+'</text>';
          s+='<text x="'+(cx+bw/2+1).toFixed(1)+'" y="'+(box.y+box.h-bh2-3).toFixed(1)+'" class="cht-val" text-anchor="middle">'+B[i]+'</text>';
        }
      }else{
        const bw=Math.min(gw*0.52,16);
        s+='<rect x="'+(cx-bw/2).toFixed(1)+'" y="'+(box.y+box.h-bh).toFixed(1)+'" width="'+bw.toFixed(1)+'" height="'+bh.toFixed(1)+'" rx="0" fill="var(--accent)"/>';
        if(o.vals)s+='<text x="'+cx.toFixed(1)+'" y="'+(box.y+box.h-bh-3).toFixed(1)+'" class="cht-val" text-anchor="middle">'+A[i]+'</text>';
      }
    }
    s+='<line x1="'+box.x+'" y1="'+(box.y+box.h)+'" x2="'+(box.x+box.w)+'" y2="'+(box.y+box.h)+'" stroke="var(--line-strong)" stroke-width="1"/>';
    const ticks=[mx,Math.round(mx*2/3),Math.round(mx/3),0];
    s+=chtAxisSVG(o,box,ticks,CHT_BAR_CATS,centers.map(c=>c.cx));
    return {svg:s+'</svg>',centers,box};
  }
  /* 長條圖 DOM 節點：interactive→掛 hover（highlight 該組＋tooltip） */
  function chtBarNode(o){
    const wrap=ce('div','cht-plot');const g=chtBarSVG(o);wrap.innerHTML=g.svg;
    if(o.interactive)chtHoverBar(wrap,o,g.centers,g.box);
    return wrap;
  }
  function chtHoverBar(wrap,o,centers,box){
    const svg=wrap.querySelector('svg'),vw=o.w,vh=o.h;
    const hl=document.createElementNS(SVGNS,'rect');hl.setAttribute('class','cht-bhl');hl.setAttribute('rx','3');hl.setAttribute('fill-opacity','.12');hl.setAttribute('y',box.y);hl.setAttribute('height',box.h);hl.style.opacity='0';svg.insertBefore(hl,svg.firstChild);
    const tip=ce('div','cht-tip');wrap.appendChild(tip);
    function move(e){
      const r=svg.getBoundingClientRect();const relx=(e.clientX-r.left)/r.width*vw;
      let bi=0,bd=1e9;centers.forEach((c,i)=>{const dd=Math.abs(c.cx-relx);if(dd<bd){bd=dd;bi=i;}});
      const c=centers[bi];
      hl.setAttribute('x',c.cx-c.gw/2);hl.setAttribute('width',c.gw);hl.style.opacity='1';
      tip.innerHTML='<b>'+c.a+(o.series2?' · '+c.b:'')+'</b><span>'+CHT_BAR_CATS[bi]+'</span>';
      tip.style.left=(c.cx/vw*r.width)+'px';tip.style.top=(box.y/vh*r.height)+'px';tip.classList.add('on');
    }
    svg.addEventListener('mousemove',move);
    svg.addEventListener('mouseleave',()=>{hl.style.opacity='0';tip.classList.remove('on');});
  }
  /* 甜甜圈 SVG：pathLength=100 ＋ stroke-dasharray 分段畫環（各段綁 intent 色 token），o.center 顯示中央百分比 */
  function chtDonutSVG(o){
    let off=0,s='<svg viewBox="0 0 120 120" role="img" aria-label="甜甜圈圖：任務狀態分布，已完成 46%、進行中 26%、待處理 18%、逾期 10%">';
    s+='<g transform="rotate(-90 60 60)">'; // 轉 -90 度讓第一段從 12 點鐘開始
    CHT_DONUT_SEGS.forEach((g,gi)=>{
      s+='<circle class="cht-seg" data-i="'+gi+'" cx="60" cy="60" r="46" fill="none" stroke="var('+g.c+')" stroke-width="15" pathLength="100" stroke-dasharray="'+g.v+' '+(100-g.v)+'" stroke-dashoffset="'+(-off)+'"/>';
      off+=g.v;
    });
    s+='</g>';
    if(o.center)s+='<text x="60" y="58" class="cht-donut-num" text-anchor="middle">46%</text><text x="60" y="75" class="cht-donut-sub" text-anchor="middle">完成率</text>';
    return s+'</svg>';
  }
  /* 甜甜圈 hover：跟折線／長條一樣浮 .cht-tip tooltip（label＋%），不動中央數字、不 focus 段 */
  function chtDonutHover(box){
    const segs=[...box.querySelectorAll('.cht-seg')];if(!segs.length)return;
    box.style.position='relative';
    const tip=ce('div','cht-tip');box.appendChild(tip);
    segs.forEach((c,i)=>{
      const g=CHT_DONUT_SEGS[i];
      const move=(e)=>{const r=box.getBoundingClientRect();
        tip.innerHTML='<b>'+g.v+'%</b><span>'+g.k+'</span>';
        tip.style.left=(e.clientX-r.left)+'px';tip.style.top=(e.clientY-r.top)+'px';tip.classList.add('on');};
      c.addEventListener('mouseenter',move);
      c.addEventListener('mousemove',move);
      c.addEventListener('mouseleave',()=>tip.classList.remove('on'));
    });
  }
  /* 圖例：重用 .tg 原子（v-soft i-neutral），前置 .cht-dot 色點綁各系列色 token */
  function chtLegend(items){
    const lg=ce('div','cht-legend');
    (items||CHT_DONUT_SEGS).forEach(g=>{
      const t=ce('div','tg v-soft c-round i-neutral st-default');
      t.innerHTML='<span class="cht-dot '+g.dot+'"></span><span>'+g.k+(g.v!=null?' '+g.v+'%':'')+'</span>';
      lg.appendChild(t);
    });
    return lg;
  }

  /* --- 圖表工廠：chtChart(variant,size,o) → .cht-box ---
     size 決定預設配置（m 標準＝完整配置、s 精簡＝sparkline 式簡配），o 可逐項覆寫（Live 用）：
     stat {title,trend,unit}／line {area,grid,xaxis,yaxis,interactive}／bar {series2,vals,xaxis,yaxis,interactive}／donut {center,legend}
     圖表加寬（m 340／s 170）；o.interactive 開 hover tooltip＋端點；o.xaxis/o.yaxis 控座標軸類別／數值 */
  function chtChart(variant,size,o){
    o=o||{};
    const s=size==='s';
    const box=ce('div','cht-box cht-'+variant+' cht-sz-'+size+(o.wide?' cht-wide':''));
    if(variant==='stat'){ // 統計數字卡：直接重用 Number 頁的 prMetricEl 原子（含趨勢 delta）
      box.appendChild(prMetricEl(s?'sm':'md',{
        title:o.title!==false,
        trend:o.trend===undefined?'up':o.trend,
        unit:o.unit
      }));
    }else if(variant==='line'){
      box.appendChild(chtLineNode({w:s?170:340,h:s?76:150,
        area:o.area===undefined?true:o.area,
        grid:o.grid===undefined?!s:o.grid,
        grad:!!o.grad,
        xaxis:!!o.xaxis,yaxis:!!o.yaxis,interactive:!!o.interactive}));
    }else if(variant==='curve'){ // 曲線＝折線的平滑版（Catmull-Rom），選項沿用 line
      box.appendChild(chtLineNode({w:s?170:340,h:s?76:150,smooth:true,
        area:o.area===undefined?true:o.area,
        grid:o.grid===undefined?!s:o.grid,
        grad:!!o.grad,
        xaxis:!!o.xaxis,yaxis:!!o.yaxis,interactive:!!o.interactive}));
    }else if(variant==='bar'){
      box.appendChild(chtBarNode({w:s?170:340,h:s?76:150,
        series2:o.series2===undefined?!s:o.series2,
        vals:!!o.vals,xaxis:!!o.xaxis,yaxis:!!o.yaxis,interactive:!!o.interactive}));
    }else{ // donut
      const center=o.center===undefined?true:o.center;
      box.innerHTML=chtDonutSVG({center});
      chtDonutHover(box); // 滑段浮 tooltip（同折線／長條）
      if(o.legend===undefined?!s:o.legend)box.appendChild(chtLegend());
    }
    return box;
  }
  /* 矩陣格：dashboard tile（panel 底＋細邊）包一顆對應 variant × size 的小圖 */
  function chtCell(variant,size){
    const t=ce('div','cht-tile');
    t.appendChild(chtChart(variant,size,{}));
    return t;
  }

  /* --- Live 勾選項 scoped 控制：bools 依 variant 顯示對應選項，避免空轉 ---
     mountLive 控制列只建一次，故在 render 時依 label 文字比對、隱藏非當前 variant 的勾選項 */
  const CHT_BOOL_SCOPE={
    '趨勢 trend':'stat','單位 unit':'stat',
    '面積填充 area':['line','curve'],'漸層填充 gradient':['line','curve'],'格線 grid':['line','curve'],'X 軸月份':['line','curve'],'Y 軸數值':['line','curve'],
    '第二系列 series2':'bar','數值標 values':'bar','X 軸星期':'bar','Y 軸數量':'bar',
    '中央數字 center':'donut','圖例 legend':'donut'
  };
  function chtScopeBools(host,variant){
    requestAnimationFrame(()=>{ // render 回傳後控制列才在 DOM，延一拍再掃
      host.querySelectorAll('.livewrap label.chk').forEach(l=>{
        const key=l.textContent.trim();
        const sc=CHT_BOOL_SCOPE[key];if(sc)l.style.display=((Array.isArray(sc)?sc.includes(variant):sc===variant))?'':'none';
      });
    });
  }

  function buildChart(view){
    const body=viewScaffold(view,{eyebrow:'L3 Component · Chart',title:'Chart 圖表',
      lede:'儀表板圖表五型態：<b>stat 統計數字</b>（直接重用 Number 頁的 <b>prMetricEl</b> 原子，含標題＋趨勢 delta）、<b>line 折線</b>（淡格線＋accent 面積填充＋端點圓點）、<b>curve 曲線</b>（折線的平滑版，Catmull-Rom 內插）、<b>bar 長條</b>（可雙系列並排對照）、<b>donut 甜甜圈</b>（<code>stroke-dasharray</code> 分段環＋中央百分比）。× 兩尺寸：<b>m 標準</b>＝完整配置、<b>s 精簡</b>＝sparkline 式簡配（收格線端點／單系列／收圖例）。全部 <b>inline SVG 手刻</b>、無外部 lib；系列色綁 <code>--accent／--ok／--warn／--i-danger</code>，圖例與 delta 重用 <b>.tg</b>，數字一律 <code>tabular-nums</code>。',
      specRows:[['axes','<code>variant × size</code>'],['formula','<code>5 × 2 = 10</code>'],['token-policy','<code>--accent / --ok / --warn / --i-danger / --line</code>'],['tech','<code>inline SVG 手刻 · pathLength 環 · tabular-nums</code>']]});
    const axes=DIAL_SPECS.chart.axes, zh=DIAL_SPECS.chart.zh, active=CHOICE.chart.active; // 接中央 store
    const VN={stat:['統計數字','stat'],line:['折線','line'],curve:['曲線','curve'],bar:['長條','bar'],donut:['甜甜圈','donut']};
    const SZN={m:['標準','m'],s:['精簡','s']};
    let p;

        rows:vs,cols:ss,

    }
    mountDial(body,{axes,zh,active,onRender:renderM});
    const sec=section(body,'Variant × Size 矩陣','m 標準＝完整配置（折線含格線＋端點、長條雙系列、甜甜圈含圖例）；s 精簡＝sparkline 式簡配，適合塞進表格列或緊湊卡片。stat 直接沿用 prMetricEl 的 sm／md 兩級。');
    p=panelsIn(sec);renderM();

    /* showcase：一組 dashboard 並排（stat ×2 ＋ line ＋ bar ＋ donut），示意真實儀表板 */
    const cs=section(body,'Dashboard 組合示意','五張卡組成的迷你儀表板：兩張統計數字卡（prMetricEl 上升／下降）＋近期走勢折線＋雙週對照長條＋任務狀態甜甜圈。卡標題旁的 delta 與圖例都重用 .tg 原子；示意數據為固定值，方便明暗模式對照。');
    const dash=ce('div','cht-dash');
    /* dashboard 卡工廠：標題列（muted 小字＋可選 .tg delta）＋圖表本體 */
    function dashCard(title,delta,node,span){
      const c=ce('div','cht-card'+(span?' cht-span-'+span:''));
      const h=ce('div','cht-card-h');
      const t=ce('div','cht-card-t');t.textContent=title;h.appendChild(t);
      if(delta){ // delta 重用 .tg：上升 i-brand／下降 i-danger
        const tg=ce('div','tg v-soft c-round '+(delta.up?'i-brand':'i-danger')+' st-default');

    dash.appendChild(dashCard('本月營收',null,chtChart('stat','m',{title:false,trend:'up',unit:true})));
    dash.appendChild(dashCard('客訴案件',null,chtChart('stat','m',{title:false,trend:'down'})));
    dash.appendChild(dashCard('任務狀態分布',null,chtChart('donut','m',{center:true,legend:true})));
    dash.appendChild(dashCard('近 10 期營收走勢',{up:true,txt:'+12.5%'},chtChart('line','m',{grid:true,area:true,xaxis:true,yaxis:true,interactive:true,wide:true}),3));
    const barCard=dashCard('每日訂單 本週 vs 上週',null,chtChart('bar','m',{series2:true,xaxis:true,yaxis:true,interactive:true,wide:true}),3);
    barCard.appendChild(chtLegend([{k:'本週',dot:'c-accent'},{k:'上週',dot:'c-ok'}])); // 雙系列圖例（.tg＋色點）
    dash.appendChild(barCard);
    cs.appendChild(dash);

    /* Live：seg 切 variant／size；bools 依 variant scoped 顯示（隱藏非當前圖型的選項，避免空轉開關） */
    const sl=section(body,'實際互動 Live','切圖型與尺寸；勾選項會隨圖型切換只留對應選項——折線控面積填充／格線／<b>X 軸月份</b>／<b>Y 軸數值</b>，長條控第二系列／數值標／<b>X 軸星期</b>／<b>Y 軸數量</b>，甜甜圈控中央數字／圖例，統計數字控趨勢／單位。<b>滑鼠移到折線／長條上</b>會顯示該點 tooltip 數值，折線端點只在 hover 時出現。');
    mountLive(sl,{
      initial:{variant:'line',size:'m',
        statTrend:true,statUnit:false,
        lineArea:true,lineGrid:true,lineXcat:true,lineYval:true,lineGrad:false,

  /* ===== Table&Chart group build: tree-view ===== */
/* ==================== Tree View 樹狀（trv-）==================== */
/* 重用原子：ICON_CARET（展開箭頭・旋轉）、.cbx + ICON_CHECK（勾選樹）、IC_FOLDER / IC_FILE（分支/葉子 icon）
   無新增 icon const——需要的資料夾/檔案 icon 主檔都已存在 */

/* 單一節點（遞迴建 li）：d={name, ic:'folder'|'file', count, open, children, hover, sel, checked}
   o={variant:'lines'|'plain'|'checkbox', live, showIcon(預設true), showCount(預設true), onPick(row,d)} */
function trvNode(d,o){
  o=o||{};
  const hasKids=Array.isArray(d.children)&&d.children.length>0;
  const li=ce('li','trv-item'+((hasKids&&d.open)?' is-open':''));
  li.setAttribute('role','treeitem');
  if(hasKids)li.setAttribute('aria-expanded',d.open?'true':'false');

  const row=ce('div','trv-row'
    +(d.hover?' is-hover':'')                       // 矩陣格：靜態模擬 hover
    +(d.sel?' is-selected':'')
    +(o.live?' live':''));                          // Live/showcase 才吃真實 :hover

  /* 展開箭頭：有子節點才有；葉子放同寬 spacer 讓縮排對齊 */
  const car=ce('span','trv-caret'+(hasKids?'':' trv-blank'));
  if(hasKids)car.innerHTML=ICON_CARET;
  row.appendChild(car);

  /* checkbox variant：列內重用 .cbx 原子（sz-s） */
  if(o.variant==='checkbox'){
    const cb=ce('span','cbx sz-s '+(d.checked?'st-checked':'st-default'));
    if(d.checked)cb.innerHTML=ICON_CHECK;
    cb.setAttribute('role','checkbox');
    cb.setAttribute('aria-checked',d.checked?'true':'false');
    row.appendChild(cb);
  }

  /* 分支/葉子 icon：IC_FOLDER / IC_FILE（showIcon 可關） */
  if(o.showIcon!==false){
    const ic=ce('span','trv-ic');
    ic.innerHTML=(d.ic==='file'?IC_FILE:IC_FOLDER);
    row.appendChild(ic);
  }

  const nm=ce('span','trv-name');nm.textContent=d.name;row.appendChild(nm);

  /* 右側 count／檔案大小（showCount 可關） */
  if(o.showCount!==false&&d.count!=null){
    const ct=ce('span','trv-count');ct.textContent=d.count;row.appendChild(ct);
  }
  li.appendChild(row);

  if(hasKids){
    const ul=ce('ul','trv-children');
    ul.setAttribute('role','group');
    d.children.forEach(c=>ul.appendChild(trvNode(c,o)));
    li.appendChild(ul);
  }

  /* Live 真實互動：點箭頭展開/收合（不觸發選取）、點列選取、點 cbx 只切換勾選 */
  if(o.live){
    if(hasKids)car.addEventListener('click',e=>{
      e.stopPropagation();
      const open=li.classList.toggle('is-open');
      li.setAttribute('aria-expanded',open?'true':'false');
    });
    row.addEventListener('click',e=>{
      const cb=e.target.closest?e.target.closest('.cbx'):null;
      if(cb){                                        // 勾選框：只切換勾選、不選取列
        e.stopPropagation();
        const on=cb.classList.toggle('st-checked');
        cb.classList.toggle('st-default',!on);
        cb.innerHTML=on?ICON_CHECK:'';
        cb.setAttribute('aria-checked',on?'true':'false');
        return;
      }
      if(o.onPick)o.onPick(row,d);
    });
  }
  return li;
}

/* 一棵樹：data=節點陣列；o 同 trvNode。live 時內建單選互斥（點列清掉其他 is-selected） */
function trvTree(data,o){
  o=o||{};
  const ul=ce('ul','trv-tree trv-v-'+(o.variant||'plain'));
  ul.setAttribute('role','tree');
  if(o.live&&!o.onPick){
    o.onPick=row=>{
      ul.querySelectorAll('.trv-row.is-selected').forEach(r=>r.classList.remove('is-selected'));
      row.classList.add('is-selected');
    };
  }
  data.forEach(d=>ul.appendChild(trvNode(d,o)));
  return ul;
}

/* ==================== Schedule Chart 排程圖（gnt-）==================== */
/* 重用原子：.tg（任務／節點狀態：進行中 i-brand／完成 i-neutral／延遲 i-danger／待開始 outline）、
   IC_CLOCK（timeline 時間列，既有 icon）。無新增 icon const。
   三 variant：gantt 甘特圖／week 週排程／timeline 垂直時間軸 × size m 標準／s 精簡。
   橫條／事件塊系列色一律綁 token（--accent/--ok/--warn/--i-danger），格線 --line、字 --muted/--faint。 */

/* 狀態 → .tg 標籤（重用 Tag 原子，不重畫） */
function gntTag(st){
  const map={active:['進行中','i-brand','v-soft'],done:['完成','i-neutral','v-soft'],
             delay:['延遲','i-danger','v-soft'],todo:['待開始','i-neutral','v-outline']};
  const m=map[st]||map.active;
  const t=ce('div','tg '+m[2]+' c-round '+m[1]+' st-default');
  t.innerHTML='<span>'+m[0]+'</span>';
  return t;
}

/* 週末判定：示意月份 7/01 為週一 → 7/05、7/06（index 4、5）與 7/12、7/13（11、12）為週末 */
function gntIsWkend(i){const w=i%7;return w===4||w===5;}

/* ---- variant 1：gantt 甘特圖 ----
   o={live, prog(進度填色,預設開), wkend(週末標記,預設開), today(今日線,預設開), tasks, days, todayIx, compact} */
function gntGantt(size,o){
  o=o||{};
  const tasks=o.tasks||GNT_TASKS, days=o.days||14, todayIx=o.todayIx==null?9:o.todayIx;
  const box=ce('div','gnt-box gnt-gantt gnt-sz-'+size
    +(o.live?' live':'')+(o.prog===false?' no-prog':'')+(o.compact?' gnt-g-compact':''));
  /* 左：任務名欄（名稱 + .tg 狀態標） */
  const side=ce('div','gnt-g-side');
  const sh=ce('div','gnt-g-side-head');sh.textContent='任務';side.appendChild(sh);
  tasks.forEach(t=>{
    const r=ce('div','gnt-g-task');
    const n=ce('span','gnt-g-name');n.textContent=t.name;r.appendChild(n);
    r.appendChild(gntTag(t.st));
    side.appendChild(r);
  });
  /* 右：日期表頭 + 格線背景 + 橫條列（過寬容器內捲動） */
  const scroll=ce('div','gnt-g-scroll');
  const main=ce('div','gnt-g-main');
  const head=ce('div','gnt-g-head');
  for(let i=0;i<days;i++){
    const h=ce('div','gnt-g-hcell'
      +(o.wkend!==false&&gntIsWkend(i)?' is-wkend':'')
      +(o.today!==false&&i===todayIx?' is-today':''));
    h.textContent='7/'+String(i+1).padStart(2,'0');
    head.appendChild(h);
  }
  main.appendChild(head);
  const rows=ce('div','gnt-g-rows');
  tasks.forEach(t=>{
    const row=ce('div','gnt-g-row');
    for(let i=0;i<days;i++)row.appendChild(ce('div','gnt-g-cell'+(o.wkend!==false&&gntIsWkend(i)?' is-wkend':''))); /* 每列 in-flow 格線 cell（含週末底），取代原絕對定位背景層 */
    const bar=ce('div','gnt-bar c-'+t.c);
    bar.style.left=(t.s/days*100)+'%';                           /* 依起訖日以 % 定位／設寬 */
    bar.style.width=((t.e-t.s)/days*100)+'%';
    const fill=ce('div','gnt-bar-fill');fill.style.width=t.prog+'%';bar.appendChild(fill);
    const lab=ce('span','gnt-bar-lab');lab.textContent=t.prog+'%';bar.appendChild(lab);
    bar.title=t.name+'（'+t.prog+'%）';
    row.appendChild(bar);rows.appendChild(row);
  });
  if(o.today!==false){                                           /* 今日線：accent 直線 + 頂端小籤 */
    const tl=ce('div','gnt-today');tl.style.left=((todayIx+0.5)/days*100)+'%';
    const pin=ce('span','gnt-today-pin');pin.textContent='今日';tl.appendChild(pin);
    rows.appendChild(tl);
  }
  main.appendChild(rows);scroll.appendChild(main);
  box.append(side,scroll);
  return box;
}

/* ---- variant 2：week 週排程 ----
   o={live, times(時段標籤,預設開), detail(事件細節,預設開), events, slots, compact} */
function gntWeek(size,o){
  o=o||{};
  const evts=o.events||GNT_WEVENTS, slots=o.slots||8, hasT=o.times!==false;
  const box=ce('div','gnt-box gnt-week gnt-sz-'+size+(o.live?' live':'')+(o.compact?' gnt-w-compact':''));
  const g=ce('div','gnt-w-grid');
  /* 欄列模板依「有無時段欄」與時段數計算（版面數學，非樣式 token） */
  g.style.gridTemplateColumns=(hasT?'var(--gnt-timew) ':'')+'repeat(7,minmax(0,1fr))';
  g.style.gridTemplateRows='auto repeat('+slots+',var(--gnt-slot))';
  const off=hasT?2:1;                                            /* 天欄的 grid column 起點 */
  if(hasT)g.appendChild(ce('div','gnt-w-corner'));
  ['一','二','三','四','五','六','日'].forEach((d,i)=>{
    const h=ce('div','gnt-w-dhead'+(i===0&&!hasT?' first':'')+(i>=5?' is-wkend':''));
    h.textContent='週'+d;g.appendChild(h);
  });
  for(let s=0;s<slots;s++){
    if(hasT){
      const t=ce('div','gnt-w-time');t.textContent=String(9+s).padStart(2,'0')+':00';
      t.style.gridRow=String(s+2);t.style.gridColumn='1';g.appendChild(t);
    }
    for(let d=0;d<7;d++){
      const c=ce('div','gnt-w-cell'+(s===0?' firstrow':'')+(d===0&&!hasT?' firstcol':'')+(d>=5?' is-wkend':''));
      c.style.gridRow=String(s+2);c.style.gridColumn=String(d+off);
      g.appendChild(c);
    }
  }
  evts.forEach(e=>{
    const b=ce('div','gnt-evt c-'+e.c);
    b.style.gridColumn=String(e.d+off);
    b.style.gridRow=(e.s+2)+' / span '+e.du;                     /* 事件跨時段＝grid-row span */
    b.innerHTML='<span class="t">'+e.t+'</span>'
      +(o.detail!==false?'<span class="tm">'+e.tm+'–'+String(9+e.s+e.du).padStart(2,'0')+':00</span>':'');
    b.title=e.t;
    g.appendChild(b);
  });
  box.appendChild(g);
  return box;
}

/* ---- variant 3：timeline 垂直時間軸 ----
   o={live, tags(狀態 tag,預設開), line(連接線,預設開), nodes, compact} */
function gntTimeline(size,o){
  o=o||{};
  const nodes=o.nodes||GNT_TLNODES;
  const box=ce('div','gnt-box gnt-tl gnt-sz-'+size+(o.live?' live':'')+(o.line===false?' no-line':''));
  nodes.forEach((n,i)=>{
    const it=ce('div','gnt-tl-item');
    const rail=ce('div','gnt-tl-rail');                          /* 左軌：圓點 + 連接線 */
    rail.appendChild(ce('span','gnt-tl-dot st-'+n.st));
    if(i<nodes.length-1)rail.appendChild(ce('span','gnt-tl-cord'));
    it.appendChild(rail);
    const card=ce('div','gnt-tl-card');                          /* 事件卡：時間 + tag + 標題 + 描述 */
    const top=ce('div','gnt-tl-top');
    const tm=ce('span','gnt-tl-time');tm.innerHTML=IC_CLOCK+'<span>'+n.tm+'</span>';
    top.appendChild(tm);
    if(o.tags!==false)top.appendChild(gntTag(n.st));
    card.appendChild(top);
    const tt=ce('div','gnt-tl-title');tt.textContent=n.t;card.appendChild(tt);
    if(n.d&&!o.compact){const de=ce('div','gnt-tl-desc');de.textContent=n.d;card.appendChild(de);}
    it.appendChild(card);
    box.appendChild(it);
  });
  return box;
}

/* ---- 矩陣格：該 variant × size 的縮小示意（靜態呈現） ---- */

}

  /* ===== Table&Chart group build: calendar ===== */
  /* ==================== Calendar 日曆時間（cal-）==================== */
  /* 日期時間選擇：month 月曆／range 日期區間／time 時間清單 × size m／s。
     表頭上下月鈕重用 .btn v-text i-secondary icon-only 原子；time 表頭重用既有 IC_CLOCK。
     ‼️ 勿用 Date.now / new Date（環境不穩）：示意日期全部寫死——「今日」＝2026 年 7 月 16、
     選取＝18、區間＝12–16、事件日＝3/10/16/21/24、停用日＝5/26；月份切換用純數學（Zeller）推算。 */

  /* 新增 icon：既有只有 ICON_CARET（朝下）與 LST_IC_CHEVRON（lst- 專用），故補左右 caret（Phosphor regular） */
  const CAL_IC_CARET_L='<svg viewBox="0 0 256 256" fill="currentColor"><path d="M165.66,202.34a8,8,0,0,1-11.32,11.32l-80-80a8,8,0,0,1,0-11.32l80-80a8,8,0,0,1,11.32,11.32L91.31,128Z"/></svg>';
  const CAL_IC_CARET_R='<svg viewBox="0 0 256 256" fill="currentColor"><path d="M181.66,133.66l-80,80a8,8,0,0,1-11.32-11.32L164.69,128,90.34,53.66a8,8,0,0,1,11.32-11.32l80,80A8,8,0,0,1,181.66,133.66Z"/></svg>';

  /* ---- 純數學日曆工具（不碰 Date）---- */
  function calLeap(y){return (y%4===0&&y%100!==0)||y%400===0;} // 閏年判斷
  function calDim(y,m){return [31,calLeap(y)?29:28,31,30,31,30,31,31,30,31,30,31][m-1];} // 該月天數
  function calDow(y,m,d){ // Zeller 公式：回傳星期 0=日 … 6=六
    if(m<3){m+=12;y--;}
    const K=y%100,J=Math.floor(y/100);
    const h=(d+Math.floor(13*(m+1)/5)+K+Math.floor(K/4)+Math.floor(J/4)+5*J)%7; // 0=六
    return (h+6)%7;
  }
  function calDoy(y,m,d){let n=d;for(let i=1;i<m;i++)n+=calDim(y,i);return n;} // 年內第幾天
  function calWeekNo(y,m,d){ // 該列（週日起算）的第幾週示意：取該週「週四」的年內天數 / 7 進位（近似 ISO）
    let dd=d+4,mm=m,yy=y;
    while(dd>calDim(yy,mm)){dd-=calDim(yy,mm);mm++;if(mm>12){mm=1;yy++;}}
    return Math.ceil(calDoy(yy,mm,dd)/7);
  }
  function calGridDays(y,m){ // 回傳 6×7=42 格 {y,m,d,out}：前後補上／下月的日
    const first=calDow(y,m,1), dim=calDim(y,m);
    const pm=m===1?12:m-1, py=m===1?y-1:y, pdim=calDim(py,pm);
    const nm=m===12?1:m+1, ny=m===12?y+1:y;
    const cells=[];
    for(let i=0;i<42;i++){
      const n=i-first+1;
      if(n<1)cells.push({y:py,m:pm,d:pdim+n,out:true});
      else if(n>dim)cells.push({y:ny,m:nm,d:n-dim,out:true});
      else cells.push({y:y,m:m,d:n,out:false});
    }
    return cells;
  }

  /* ---- 月曆／區間工廠：calMonthEl(size,o) ----
     o={range, y, m, today, selected, rs, re, events, disabled, weeknum, rangeText, live, interactive}
     today=null 可關今日標記；events 傳 [] 可關事件圓點；interactive=true 點日可選、上下月鈕可切月 */
  function calMonthEl(size,o){
    o=o||{};
    const range=!!o.range;
    const TY=2026,TM=7; // 「今日」寫死落在 2026 年 7 月
    const todayD=(o.today!==undefined)?o.today:16;
    const events=(o.events!==undefined)?o.events:[3,10,16,21,24];
    const dis=(o.disabled!==undefined)?o.disabled:[5,26]; // 每月 5、26 示意停用（公休日）
    let y=o.y||2026,m=o.m||7;
    let selY=2026,selM=7,sel=(o.selected!==undefined)?o.selected:18; // 單日選取（month 用）
    let rY=2026,rM=7,rs=(o.rs!==undefined)?o.rs:12,re=(o.re!==undefined)?o.re:16,picking=false; // 區間起訖（range 用）

    const root=ce('div','cal cal-v-'+(range?'range':'month')+' cal-sz-'+size
      +(o.weeknum?' cal-has-wk':'')+(o.live?' live':''));

    /* 表頭：上下月鈕＝Button 原子（v-text icon-only） */
    const head=ce('div','cal-head');
    const prev=ce('button','btn v-text i-secondary sz-s icon-only'+(o.live?' live':''));
    prev.type='button';prev.setAttribute('aria-label','上一月');prev.innerHTML=CAL_IC_CARET_L;
    const title=ce('div','cal-head-title');
    const next=ce('button','btn v-text i-secondary sz-s icon-only'+(o.live?' live':''));
    next.type='button';next.setAttribute('aria-label','下一月');next.innerHTML=CAL_IC_CARET_R;
    head.append(prev,title,next);root.appendChild(head);

    const dow=ce('div','cal-dow');root.appendChild(dow);
    const grid=ce('div','cal-grid');grid.setAttribute('role','grid');root.appendChild(grid);
    let foot=null;
    if(range&&o.rangeText){foot=ce('div','cal-foot');root.appendChild(foot);}

    function ftxt(){ // 區間文字：已選 7/12 – 7/16（5 天）
      if(!foot)return;
      if(rs==null){foot.innerHTML='請點選起始日';}
      else if(re==null){foot.innerHTML='起 <b>'+rM+'/'+rs+'</b>，請再點選結束日';}
      else{foot.innerHTML='已選 <b>'+rM+'/'+rs+' – '+rM+'/'+re+'</b>（'+(re-rs+1)+' 天）';}
    }
    function draw(){
      title.textContent=y+' 年 '+m+' 月';
      dow.innerHTML='';
      if(o.weeknum){const w=ce('span','cal-dow-c cal-wk-head');w.textContent='週';dow.appendChild(w);}
      ['日','一','二','三','四','五','六'].forEach(t=>{const s=ce('span','cal-dow-c');s.textContent=t;dow.appendChild(s);});
      grid.innerHTML='';
      const cells=calGridDays(y,m);
      cells.forEach((c,i)=>{
        if(o.weeknum&&i%7===0){ // 每列開頭補週數
          const wk=ce('span','cal-wk');wk.textContent=calWeekNo(c.y,c.m,c.d);grid.appendChild(wk);
        }
        const b=ce('button','cal-day');b.type='button';b.textContent=c.d;
        const cur=!c.out;
        if(c.out)b.classList.add('is-out');
        if(cur&&dis.indexOf(c.d)>=0){b.classList.add('is-disabled');b.disabled=true;}
        if(cur&&y===TY&&m===TM&&todayD===c.d)b.classList.add('is-today');
        if(!range){
          if(cur&&y===selY&&m===selM&&sel===c.d){b.classList.add('is-selected');b.setAttribute('aria-selected','true');}
          if(cur&&events.indexOf(c.d)>=0)b.classList.add('has-event');
        }else if(cur&&y===rY&&m===rM&&rs!=null){
          if(c.d===rs)b.classList.add('is-range-start');
          if(re!=null&&c.d===re)b.classList.add('is-range-end');
          if(re!=null&&c.d>rs&&c.d<re)b.classList.add('is-in-range');
        }
        if(o.interactive&&cur&&!b.disabled){
          b.onclick=()=>{
            if(!range){selY=y;selM=m;sel=c.d;} // 單日：點誰選誰
            else if(!picking){rY=y;rM=m;rs=c.d;re=null;picking=true;} // 區間：第一下＝起點
            else if(y===rY&&m===rM&&c.d>=rs){re=c.d;picking=false;}   // 第二下（不早於起點）＝終點
            else{rY=y;rM=m;rs=c.d;re=null;}                            // 點得比起點早＝重新起算
            draw();
          };
        }
        grid.appendChild(b);
      });
      ftxt();
    }
    if(o.interactive){ // 上下月鈕切月（純數學推算，不碰 Date）
      prev.onclick=()=>{m--;if(m<1){m=12;y--;}draw();};
      next.onclick=()=>{m++;if(m>12){m=1;y++;}draw();};
    }
    draw();
    return root;
  }

  /* ---- 時間清單工廠：calTimeEl(size,o) ----
     o={selected(分鐘制), h24, step, live, interactive}；選項寫死 09:00–18:00，預設選中 09:30 */
  function calTimeEl(size,o){
    o=o||{};
    const step=o.step||30;
    const h24=(o.h24!==undefined)?o.h24:true;
    let sel=(o.selected!==undefined)?o.selected:570; // 570 分＝09:30（寫死示意）
    sel=Math.round(sel/step)*step; // 換 step 時貼齊最近選項
    const root=ce('div','cal cal-v-time cal-sz-'+size+(o.live?' live':''));
    const head=ce('div','cal-time-head'); // 表頭重用既有 IC_CLOCK
    head.innerHTML='<span class="cal-time-ic">'+IC_CLOCK+'</span><span>選擇時間</span>';
    root.appendChild(head);
    const list=ce('div','cal-time-list');
    const pad=n=>(n<10?'0':'')+n;
    function fmt(t){const h=Math.floor(t/60),mm=t%60;
      return h24?pad(h)+':'+pad(mm):(h<12?'上午':'下午')+' '+(((h+11)%12)+1)+':'+pad(mm);}
    for(let t=9*60;t<=18*60;t+=step){
      const it=ce('button','cal-time-item'+(t===sel?' is-selected':''));
      it.type='button';it.textContent=fmt(t);
      it.setAttribute('aria-selected',t===sel?'true':'false');
      if(o.interactive){
        it.onclick=()=>{sel=t;
          [...list.children].forEach(x=>{x.classList.remove('is-selected');x.setAttribute('aria-selected','false');});
          it.classList.add('is-selected');it.setAttribute('aria-selected','true');};
      }
      list.appendChild(it);
    }
    root.appendChild(list);
    return root;
  }

  /* 矩陣格：該 variant×size 的靜態縮影（不互動、示意值寫死） */
  function calCell(variant,size){
    if(variant==='time')return calTimeEl(size,{});
    return calMonthEl(size,{range:variant==='range'});
  }

  /* 日格狀態一覽用：單顆裸日格 */
  function calStateChip(cls,txt,event){
    const shell=ce('div','cal cal-sz-m cal-bare');
    const g=ce('div','cal-grid');

  }

  function buildCalendar(view){
    const body=viewScaffold(view,{eyebrow:'L3 Component · Calendar',title:'Calendar 日曆時間',
      lede:'日期時間選擇：<b>month 月曆</b>（單日選取）／<b>range 區間</b>（起訖實心＋中間淡 accent 連續帶）／<b>time 時間清單</b>（可捲動時段），各有 <b>m 標準／s 精簡</b> 兩尺寸。表頭上下月鈕重用 <b>Button</b> 原子（v-text icon-only）；日格狀態含一般／今日（accent 圈）／選取（accent 實心）／非本月（淡）／停用（劃掉）／有事件（下方圓點）。示意日期寫死在 <b>2026 年 7 月</b>（今日＝16、選取＝18、區間＝12–16），不依賴系統時間。',
      specRows:[['axes','<code>variant × size</code>'],['formula','<code>3 × 2 = 6</code>'],['token-policy','<code>--accent / --i-primary-tint / --line</code>'],['a11y','<code>role=grid・aria-selected・aria-label 上/下月</code>']]});
    const axes=DIAL_SPECS.calendar.axes, zh=DIAL_SPECS.calendar.zh, active=CHOICE.calendar.active; // 接中央 store
    const VN={month:['月曆','month'],range:['區間','range'],time:['時間','time']};
    const SZN={m:['標準','m'],s:['精簡','s']};
    let p;
    function renderM(){ if(!p)return; p.innerHTML='';

            const tx=document.createElement('input');tx.type='text';tx.className='tok-hex';tx.value=cur;
            tx.onchange=()=>{OV.root[name]=tx.value.trim();apply();};ctl.appendChild(tx);}
          row.append(nm,ctl);rows.appendChild(row);
        });
        box.appendChild(rows);
        if(gr.sample){const fr=ce('div','tok-fontrow');
          fr.innerHTML=`<div class="fp" style="font-family:var(--font-sans)">Geist Sans · 果思設計 Goons 0123456789</div>
            <div class="fp" style="font-family:var(--font-mono);font-size:var(--fs-h6)">Geist Mono · NT$ 12,800 · 786</div>`;
          box.appendChild(fr);}
        bodyEl.appendChild(box);
      });
    }else if(layer==='ref'){ // 框架索引：值表牌卡由左至右排列（同 L1 版型）
      bodyEl.className='tok-cardgrid';
      const isHex=v=>/^#([0-9a-f]{3,8})$/i.test(String(v).trim());
      const intro=ce('p','tref-note');intro.innerHTML='<b>DS Framework <code>_base.theme.yaml</code></b> 完整原始定義（唯讀對照）。⚠ 標記＝框架原值與本專案 v0 種子<b>刻意不同</b>；空值＝框架留白由專案 delta 填。';
      bodyEl.appendChild(intro);
      FRAMEWORK_REF.forEach(sec=>{
        const box=ce('div','tok-group');
        const gh=ce('div','tok-gh');gh.innerHTML=`<span class="t">${sec.t}</span>${sec.note?`<span class="d">${sec.note}</span>`:''}`;box.appendChild(gh);
        const rows=ce('div','tok-rows');
        sec.rows.forEach(([k,v,r])=>{
          const row=ce('div','tref-row');
          const kk=ce('div','tref-k');kk.textContent=k;
          const vv=ce('div','tref-v');
          if(isHex(v)){const sw=ce('span','tref-sw');sw.style.background=v;vv.appendChild(sw);}
          const vt=document.createElement('span');vt.textContent=v+(r?'  · '+r:'');vv.appendChild(vt);
          row.append(kk,vv);rows.appendChild(row);
        });
        box.appendChild(rows);bodyEl.appendChild(box);
      });
    }else{ // L2 semantic：每列 light / dark 兩模式
      TOK_L2.forEach(gr=>{
        const box=ce('div','tok-group');
        const gh=ce('div','tok-gh');
        gh.innerHTML=`<span class="t">${gr.g}</span>`;
        box.appendChild(gh);
        const head=ce('div','tok-modehead');head.innerHTML=`<span>Token</span><span>◐ Light</span><span>◑ Dark</span>`;box.appendChild(head);
        const rows=ce('div','tok-rows');
        gr.rows.forEach(([name,lab,lv,dv])=>{
          const curL=OV.root[name]||lv, curD=OV.dark[name]||dv;
          const row=ce('div','tok-row l2');
          const nm=ce('div','tok-name');nm.innerHTML=`${name}${lab?`<span class="lab">${lab}</span>`:''}<span class="map">${tokShort(lv)} → ${tokShort(dv)}</span>`;
          const mkMode=(cur,store)=>{const cell=ce('div','tok-mode');
            const cp=document.createElement('input');cp.type='color';cp.className='tok-sw-btn';cp.style.width='30px';cp.style.height='26px';
            const rc=tokResolve(cur);cp.value=/^#([0-9a-f]{6})$/i.test(rc)?rc:'#000000';
            const vl=ce('div','m-val');vl.textContent=tokShort(cur);
            cp.oninput=()=>{store[name]=cp.value;apply();vl.textContent=cp.value;};
            cell.append(cp,vl);return cell;};
          row.append(nm,mkMode(curL,OV.root),mkMode(curD,OV.dark));rows.appendChild(row);
        });
        box.appendChild(rows);
        bodyEl.appendChild(box);
      });
    }
    // 匯出：完整 token CSS（L1 primitive base=desktop＋L2 light｜dark｜tablet media｜mobile media）
    function buildCSS(){
      let base='';TOK_L1.forEach(gr=>{if(gr.kind==='ref')return;
        if(gr.kind==='typo'){gr.rows.forEach(lv=>{const d=gr.def[lv];
          base+='  --fs-'+lv+':'+(OV.desktop['--fs-'+lv]||gr.sz[lv][0])+';\n  --fw-'+lv+':'+(OV.root['--fw-'+lv]||d[0])+';\n  --lh-'+lv+':'+(OV.root['--lh-'+lv]||d[1])+';\n  --lh-en-'+lv+':'+(OV.root['--lh-en-'+lv]||d[2])+';\n';});return;}
        if(gr.kind==='ls2'){gr.rows.forEach(lv=>{const d=gr.def[lv];base+='  --ls-'+lv+':'+(OV.root['--ls-'+lv]||d[0])+';\n  --ls-en-'+lv+':'+(OV.root['--ls-en-'+lv]||d[1])+';\n';});return;}
        gr.rows.forEach(([n])=>{
        base+='  '+n+':'+(gr.resp?(OV.desktop[n]||gr.def[n][0]):(OV.root[n]||gr.def[n]))+';\n';});});
      let l='',d='';TOK_L2.forEach(gr=>gr.rows.forEach(([n,lab,lv,dv])=>{l+='  '+n+':'+(OV.root[n]||lv)+';\n';d+='  '+n+':'+(OV.dark[n]||dv)+';\n';}));
      let tab='',mob='';TOK_L1.forEach(gr=>{
        if(gr.kind==='typo'){gr.rows.forEach(lv=>{tab+='  --fs-'+lv+':'+(OV.tablet['--fs-'+lv]||gr.sz[lv][1])+';\n';mob+='  --fs-'+lv+':'+(OV.mobile['--fs-'+lv]||gr.sz[lv][2])+';\n';});return;}
        if(!gr.resp)return;gr.rows.forEach(([n])=>{
        tab+='  '+n+':'+(OV.tablet[n]||gr.def[n][1])+';\n';mob+='  '+n+':'+(OV.mobile[n]||gr.def[n][2])+';\n';});});
      return '/* Design Token（v0 種子；含 light/dark 與響應式 device mode）*/\n:root{\n'+base+l+'}\n'+
        ':root[data-theme="dark"]{\n'+d+'}\n@media(max-width:1023px){:root{\n'+tab+'}}\n@media(max-width:767px){:root{\n'+mob+'}}\n';
    }
    document.getElementById('tokCopy').onclick=()=>{navigator.clipboard.writeText(buildCSS()).then(()=>{const b=document.getElementById('tokCopy');b.textContent='已複製 ✓';setTimeout(()=>b.textContent='複製 Token CSS',1500);});};
    document.getElementById('tokReset').onclick=()=>{window.__tokOverrides={root:{},dark:{},desktop:{},tablet:{},mobile:{}};renderTokens(view);};
  }

  function renderSummary(view){
    const rep=choiceReport();
    view.innerHTML=`<div class="sum-top"><div class="sum-head"><p class="eyebrow">Overview · 需求匯總</p><h1>需求匯總</h1></div>
        <button class="copybtn" id="copyBtn">複製並匯出JSON</button></div>
      <p class="lede">每個元件<b>最後選定的複雜度</b>——先依<b>四大分類</b>展開，再展開牌卡看該元件的<b>實際操作</b>，牌卡前的勾選框決定<b>要不要產出</b>。回各元件用「變數篩選器」調整組合，這頁即時彙整。</p>
      <div class="head-rule"></div>
      <div class="sum-actions">
        <button class="aitoggle" id="aiBtn">${ICON_SPARK}<span>AI 建議產出</span><span class="sw"></span></button>
        <div class="spacer"></div>
        <div class="sumtotal" id="sumTotal"></div>
      </div>
      <div id="sumBody"></div>
      <div class="block"><h2>其餘元件</h2><p class="sub" id="sumRest"></p></div>`;
    const allKeys=Object.keys(DIAL_SPECS);
    function syncTotal(){let comp=0,vari=0;allKeys.forEach(id=>{if(SUMSEL.has(id)){comp++;vari+=rep[id].count;}});
      document.getElementById('sumTotal').innerHTML=`已選 <b>${comp}</b>/${allKeys.length} 個元件 · 共 <b>${vari}</b> 個變體將建立`;}
    const pageOf=id=>DIAL_PAGE[id]||id;
    // 依側邊欄四大群分組（DIAL_SPECS id 依對應頁面歸群，如 checkbox/radio→selector 併入 Basic）
    const GROUPS=NAV.map(g=>{const order=g.items.map(it=>it.id);
      const ids=allKeys.filter(id=>order.includes(pageOf(id))).sort((a,b)=>order.indexOf(pageOf(a))-order.indexOf(pageOf(b)));
      return {name:g.group,emoji:g.emoji,ids};}).filter(g=>g.ids.length);
    const body=document.getElementById('sumBody');
    function onManual(){if(aiOn){aiOn=false;aiSnapshot=null;const b=document.getElementById('aiBtn');if(b)b.classList.remove('on');}} // 手動改動即脫離 AI 建議
    const setSel=(id,on)=>{on?SUMSEL.add(id):SUMSEL.delete(id);};
    function updateCatCounts(){body.querySelectorAll('.sumcat').forEach((sec,i)=>{const g=GROUPS[i];if(!g)return;
      const selN=g.ids.filter(id=>SUMSEL.has(id)).length;const n=sec.querySelector('.sumcat-n');if(n)n.textContent=selN+' / '+g.ids.length;});}

    /* 單顆可展開牌卡（accordion 版型；沿用原本 sumcard＋lazy Live） */
    function makeCard(id){const spec=DIAL_SPECS[id],rec=rep[id];
      const card=ce('div','sumcard collapsed');card.dataset.id=id;
      let axesHTML='';
      spec.order.forEach(k=>{const all=spec.axes[k];const sel=new Set(rec[k]);
        const chips=all.map(v=>`<span class="sum-chip ${sel.has(v)?'on':'off'}">${(spec.zh[k]&&spec.zh[k][v])||v}·${v}</span>`).join('');
        axesHTML+=`<div class="sum-axis"><span class="sa-name">${spec.zh.axisName[k]}</span><span class="sa-chips">${chips}</span><span class="sa-n">${rec[k].length}/${all.length}</span></div>`;});
      card.innerHTML=`<div class="sc-head">
          <label class="sc-check"><input type="checkbox" ${SUMSEL.has(id)?'checked':''}></label>
          <span class="sc-name">${spec.label}</span>
          <span class="sc-count">${spec.order.map(k=>rec[k].length).join(' × ')} = <b>${rec.count}</b> <span class="full">/ ${rec.full}</span></span>
          <span class="sc-chevron">${ICON_CARET}</span>
        </div>
        <div class="sc-body">${axesHTML}<div class="sc-sub">實際操作 Live</div><div class="sc-live"></div>
          <div class="sc-foot"><button class="adjustbtn">${ICON_PENCIL}<span>我要調整</span></button></div></div>`;
      card.classList.toggle('unpicked',!SUMSEL.has(id));
      const chk=card.querySelector('.sc-check input');
      card.querySelector('.sc-check').onclick=e=>e.stopPropagation();
      chk.onchange=()=>{setSel(id,chk.checked);card.classList.toggle('unpicked',!chk.checked);onManual();syncTotal();updateCatCounts();};
      const head=card.querySelector('.sc-head'),liveHost=card.querySelector('.sc-live');
      head.onclick=()=>{const willOpen=card.classList.contains('collapsed');card.classList.toggle('collapsed');
        if(willOpen && !liveHost.dataset.mounted && LIVE[id]){LIVE[id](liveHost);liveHost.dataset.mounted='1';}};
      card.querySelector('.adjustbtn').onclick=()=>renderView(pageOf(id));
      return card;}

    /* 緊湊清單列（list 版型：一列一元件，點列跳頁、右側箭頭調整） */
    function makeRow(id){const spec=DIAL_SPECS[id],rec=rep[id];
      const row=ce('div','sumrow'+(SUMSEL.has(id)?'':' unpicked'));row.dataset.id=id;
      const cb=ce('label','sr-check');cb.innerHTML=`<input type="checkbox" ${SUMSEL.has(id)?'checked':''}>`;
      cb.onclick=e=>e.stopPropagation();
      cb.querySelector('input').onchange=e=>{setSel(id,e.target.checked);row.classList.toggle('unpicked',!e.target.checked);onManual();syncTotal();updateCatCounts();};
      const nm=ce('span','sr-name');nm.textContent=spec.label;
      const cnt=ce('span','sr-count');cnt.innerHTML=`${spec.order.map(k=>rec[k].length).join('×')} = <b>${rec.count}</b>`;
      const go=ce('button','sr-go');go.innerHTML=IC_ARROW_RIGHT;go.setAttribute('aria-label','調整');
      go.onclick=e=>{e.stopPropagation();renderView(pageOf(id));};
      row.append(cb,nm,cnt,go);row.onclick=()=>renderView(pageOf(id));
      return row;}

    /* 網格磚（grid 版型：小卡＋勾選＋變體數，點磚跳頁） */
    function makeTile(id){const spec=DIAL_SPECS[id],rec=rep[id];
      const tile=ce('div','sumtile'+(SUMSEL.has(id)?'':' unpicked'));tile.dataset.id=id;
      tile.innerHTML=`<label class="st-check"><input type="checkbox" ${SUMSEL.has(id)?'checked':''}></label>
        <span class="st-name">${spec.label}</span>
        <span class="st-count"><b>${rec.count}</b> 變體</span>
        <button class="st-go" aria-label="調整">${ICON_PENCIL}</button>`;
      const inp=tile.querySelector('input');
      tile.querySelector('.st-check').onclick=e=>e.stopPropagation();
      inp.onchange=()=>{setSel(id,inp.checked);tile.classList.toggle('unpicked',!inp.checked);onManual();syncTotal();updateCatCounts();};
      tile.querySelector('.st-go').onclick=e=>{e.stopPropagation();renderView(pageOf(id));};
      tile.onclick=()=>renderView(pageOf(id));
      return tile;}

    /* 分類外殼（可折疊；三版型共用，預設收合＝先看分類再展開） */
    function catShell(g,inner){const sec=ce('div','sumcat collapsed');
      const selN=g.ids.filter(id=>SUMSEL.has(id)).length;
      const head=ce('button','sumcat-h');
      head.innerHTML=`<span class="sumcat-t">${g.emoji?g.emoji+' ':''}${g.name}</span>
        <span class="sumcat-n">${selN} / ${g.ids.length}</span><span class="sumcat-caret">${ICON_CARET}</span>`;
      head.onclick=()=>sec.classList.toggle('collapsed');
      const bw=ce('div','sumcat-body');bw.appendChild(inner);
      sec.append(head,bw);return sec;}

    function renderBody(){body.innerHTML='';body.className='sum-body sum-'+sumLayout;
      GROUPS.forEach(g=>{let inner;
        if(sumLayout==='accordion'){inner=ce('div','sumcat-cards');g.ids.forEach(id=>inner.appendChild(makeCard(id)));}
        else if(sumLayout==='list'){inner=ce('div','sumlist');g.ids.forEach(id=>inner.appendChild(makeRow(id)));}
        else{inner=ce('div','sumgrid');g.ids.forEach(id=>inner.appendChild(makeTile(id)));}
        body.appendChild(catShell(g,inner));});}

    renderBody();syncTotal();
    const todo=NAV.flatMap(g=>g.items).filter(it=>!DIAL_SPECS[it.id]&&it.id!=='input'&&!it.st).length;
    document.getElementById('sumRest').innerHTML=`input 家族的 <code>search / password / textarea / file</code> 以完整狀態建立（無轉盤）。其餘 <b>${todo}</b> 個項目為待建，之後定案後會一併納入此總覽。`;
    const aiBtn=document.getElementById('aiBtn');
    aiBtn.classList.toggle('on',aiOn);
    aiBtn.onclick=()=>{ // AI 建議 toggle：開→套用建議並存快照；關→還原點擊前選擇
      if(!aiOn){aiSnapshot=[...SUMSEL];SUMSEL.clear();RECOMMEND.forEach(x=>SUMSEL.add(x));aiOn=true;}
      else{if(aiSnapshot){SUMSEL.clear();aiSnapshot.forEach(x=>SUMSEL.add(x));}aiSnapshot=null;aiOn=false;}
      aiBtn.classList.toggle('on',aiOn);renderBody();syncTotal();
    };
    document.getElementById('copyBtn').onclick=()=>{
      const json={};allKeys.forEach(id=>{if(!SUMSEL.has(id))return;json[id]={};DIAL_SPECS[id].order.forEach(k=>json[id][k]=rep[id][k]);json[id].count=rep[id].count;});
      json._selected=[...SUMSEL];json._total=[...SUMSEL].reduce((a,id)=>a+rep[id].count,0);
      navigator.clipboard.writeText(JSON.stringify(json,null,2)).then(()=>{const b=document.getElementById('copyBtn');b.textContent='已複製 ✓';setTimeout(()=>b.textContent='複製並匯出JSON',1600);});
    };
  }

    const ids=NAV.flatMap(g=>g.items).map(x=>x.id);return ids.includes(h)?h:null;}

    function set(t){document.documentElement.setAttribute('data-theme',t);knob.innerHTML=t==='dark'?MOON:SUN;}
    set('light');btn.onclick=()=>set(cur()==='dark'?'light':'dark');})();

  /* ===== 右緣本頁目錄（滑到右緣浮出 → 點擊 scroll 到段落；含當前段落高亮）===== */
  const tocDock=document.getElementById('tocDock'), tocPanel=document.getElementById('tocPanel');
  let tocT, tocItems=[];
  function tocShow(){clearTimeout(tocT);tocPanel.classList.add('on');tocDock.classList.add('peek');}
  function tocHide(){clearTimeout(tocT);tocT=setTimeout(()=>{tocPanel.classList.remove('on');tocDock.classList.remove('peek');},180);}
  function buildTOC(){
    const view=document.getElementById('view');
    tocItems=[];
    view.querySelectorAll('.block > h2, .famhead').forEach(el=>{ // .block>h2＝主段落（lv1）、.famhead＝家族子元件小標（lv2）
      if(el.classList.contains('famhead')){const t=el.querySelector('.fz');if(t)tocItems.push({el,lv:2,txt:t.textContent.trim()});}
      else tocItems.push({el,lv:1,txt:el.textContent.trim()});
    });
    if(tocItems.length<2){tocDock.style.display='none';tocPanel.classList.remove('on');tocPanel.innerHTML='';return;} // 段落太少不顯示
    tocDock.style.display='';
    tocPanel.innerHTML='<p class="toc-head">本頁目錄</p>';
    const main=document.querySelector('.main');
    tocItems.forEach(it=>{
      const b=document.createElement('button');b.className='toc-item'+(it.lv===2?' lv2':'');b.textContent=it.txt;
      b.onclick=()=>{const r=it.el.getBoundingClientRect(),mr=main.getBoundingClientRect();main.scrollTo({top:r.top-mr.top+main.scrollTop-72,behavior:'smooth'});};
      it.btn=b;tocPanel.appendChild(b);
    });
    if(main._tocScroll)main.removeEventListener('scroll',main._tocScroll); // 舊 listener 先移除避免累積
    main._tocScroll=()=>{const mr=main.getBoundingClientRect();let cur=0;
      tocItems.forEach((it,i)=>{if(it.el.getBoundingClientRect().top-mr.top<120)cur=i;});
      tocItems.forEach((it,i)=>it.btn.classList.toggle('active',i===cur));};
    main.addEventListener('scroll',main._tocScroll);main._tocScroll();
  }
  // 用 mousemove 偵測右緣（不放實體 overlay，避免擋到 .main 捲軸拖曳）
  document.addEventListener('mousemove',e=>{
    if(getComputedStyle(tocDock).display==='none')return;
    const dist=window.innerWidth-e.clientX, belowBar=e.clientY>64;
    tocDock.classList.toggle('hint',dist<130&&belowBar); // 靠近右緣先露出把手提示
    const pr=tocPanel.getBoundingClientRect();
    const overPanel=tocPanel.classList.contains('on')&&e.clientX>=pr.left-10&&e.clientX<=pr.right+6&&e.clientY>=pr.top-10&&e.clientY<=pr.bottom+10;
    if((dist<22&&belowBar)||overPanel)tocShow();
    else if(tocPanel.classList.contains('on'))tocHide();
  });

  /* 重整／深連結：從 hash 還原檢視（無效或無 hash → summary），並讓側邊欄展開對應群組 */
  current=hashId()||'summary';
  renderNav();renderView(current);
  window.addEventListener('hashchange',()=>{const id=hashId()||'summary';if(id!==current){current=id;renderNav();renderView(id);}});

  /* ===== 側邊欄拖曳調寬 ===== */
  (function(){
    const shell=document.getElementById('shell');
    const handle=document.getElementById('sidebarResize');
    if(!shell||!handle)return;
    const KEY='ds-sidebar-w', MIN=180, MAX=480;
    const clamp=x=>Math.max(MIN,Math.min(MAX,Math.min(window.innerWidth*0.42,x))); // 夾在 180 ~ min(480, 42vw)
    const saved=parseInt(localStorage.getItem(KEY),10);
    if(saved) shell.style.setProperty('--sb',clamp(saved)+'px'); // 還原上次寬度
    let dragging=false;
    handle.addEventListener('pointerdown',e=>{
      if(window.innerWidth<=900)return; // 行動/收合模式不啟用
      dragging=true; handle.classList.add('is-drag'); document.body.classList.add('is-resizing');
      try{handle.setPointerCapture(e.pointerId);}catch(_){} e.preventDefault();
    });
    handle.addEventListener('pointermove',e=>{ if(dragging) shell.style.setProperty('--sb',clamp(e.clientX)+'px'); }); // sidebar 左緣＝0，故 clientX≈寬度
    function end(){ if(!dragging)return; dragging=false; handle.classList.remove('is-drag'); document.body.classList.remove('is-resizing');
      const px=parseInt(shell.style.getPropertyValue('--sb'),10); if(px) localStorage.setItem(KEY,px); }
    handle.addEventListener('pointerup',end);
    handle.addEventListener('pointercancel',end);
    handle.addEventListener('dblclick',()=>{ shell.style.removeProperty('--sb'); localStorage.removeItem(KEY); }); // 雙擊還原預設 20vw
  })();
</script>
