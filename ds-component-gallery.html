  .cps-panel.st-expanded .cps-caret,.cps-panel.is-open .cps-caret{transform:rotate(180deg);}
  /* 加減指示模式：icon 直接換成＋／−，不做旋轉 */
  .cps-panel.ind-pm .cps-caret{transform:none;}
  /* body 外層：grid 0fr→1fr 做「往下展開」動畫，收合時整塊裁切隱藏 */
  .cps-body-wrap{display:grid;grid-template-rows:0fr;overflow:hidden;transition:grid-template-rows .24s ease;}
  .cps-panel.is-open .cps-body-wrap,.cps-panel.st-expanded .cps-body-wrap{grid-template-rows:1fr;}
  /* body 內容：段落文字；opacity 搭配外層展開動畫做淡入淡出 */
  .cps-body{padding:0 16px;color:var(--muted);font-size:14px;line-height:1.6;min-height:0;overflow:hidden;opacity:0;transition:opacity .24s ease;}
  /* 底部留白改由 ::after 提供：padding-bottom 直接寫在 grid item 上會在收合（0fr）時殘留 16px 高度 */
  .cps-body::after{content:'';display:block;height:16px;}
  .cps-panel.is-open .cps-body,.cps-panel.st-expanded .cps-body{opacity:1;}

  /* ---- variant 風格 ---- */
  /* bordered 外框：有外框 + 圓角 */
  .cps-panel.v-bordered{border:1px solid var(--line);border-radius:var(--radius);}
  /* filled 填色：整張 panel 填 --panel-2 底（head + body 同一塊色卡，展開後 body 維持填色） */
  .cps-panel.v-filled{border:1px solid var(--line);border-radius:var(--radius);background:var(--panel-2);}
  /* plain 極簡：只有底部分隔線、無框無圓角 */
  .cps-panel.v-plain{border-bottom:1px solid var(--line);border-radius:0;background:none;}

  /* ---- state 狀態 ---- */
  /* hover 滑過（矩陣示意狀態）：header 底色變化；filled 整張再深一階 */
  .cps-panel.st-hover .cps-head{background:var(--panel-2);}
  .cps-panel.v-filled.st-hover{background:var(--panel-3);}
  .cps-panel.v-filled.st-hover .cps-head{background:none;}
  /* disabled 停用：降透明、不可互動 */
  .cps-panel.st-disabled{opacity:.45;pointer-events:none;}

  /* 互動手風琴的可點 header 不加 hover 底色，僅保留 cursor:pointer（矩陣 .st-hover 為靜態示意） */

  /* ---- accordion 手風琴容器 ---- */
  .cps-acc{display:flex;flex-direction:column;width:100%;}
  .cps-acc.v-bordered,.cps-acc.v-filled{gap:10px;}
  .cps-acc.v-plain{gap:0;border-top:1px solid var(--line);}

  /* accordion section 三欄並排 */
  .cps-acc-row{display:flex;flex-wrap:wrap;gap:24px;align-items:flex-start;}
  .cps-acc-col{flex:1 1 260px;min-width:240px;display:flex;flex-direction:column;gap:10px;}
  .cps-acc-cap{font-family:var(--font-mono);font-size:11px;letter-spacing:.05em;color:var(--faint);}
  .cps-acc-cap b{color:var(--muted);font-weight:600;}

  /* Live 預覽容器 */
  .cps-live-box{width:100%;max-width:520px;}

/* ===== modal (Complex) ===== */
/* ==================== modal 對話框 ==================== */
  /* 對話框卡片：兩種 kind（popup 小彈窗／modal 大視窗）共用浮層外框（矩陣為靜態縮小示意、Live 為真浮層） */
  .mdl-card{position:relative;display:flex;flex-direction:column;
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:0 12px 34px rgba(0,0,0,.20);overflow:hidden;}

  /* ---- kind=popup：置中小卡（置中標題＋說明＋可選 icon／備註／記住帳號） ---- */
  .mdl-kind-popup{width:100%;max-width:360px;}
  .mdl-pop-body{display:flex;flex-direction:column;align-items:center;gap:10px;padding:20px 20px 0;}
  .mdl-illus{flex:0 0 auto;width:46px;height:46px;color:var(--i-primary);}  /* 頂部圓 icon：一般語意＝主色 */
  .mdl-illus.is-danger{color:var(--i-danger);}                              /* 警示語意＝紅，差異只在顏色 */
  .mdl-illus svg{width:100%;height:100%;}
  .mdl-pop-title{font-family:var(--font-sans);font-weight:600;font-size:15.5px;color:var(--ink);line-height:1.35;text-align:center;}
  .mdl-desc{margin:0;font-family:var(--font-sans);font-size:13.5px;color:var(--muted);line-height:1.55;}
  .mdl-pop-body .mdl-desc{width:100%;text-align:left;}                      /* 說明文字齊左 */
  .mdl-note{width:100%;font-family:var(--font-sans);font-size:12px;color:var(--faint);line-height:1.5;}
  .mdl-remember{width:100%;display:flex;align-items:center;gap:8px;font-family:var(--font-sans);font-size:13px;color:var(--ink);cursor:pointer;user-select:none;}
  /* popup footer：桌機＝次＋主並排等寬；行動版＝主／次／文字 全寬堆疊 */
  /* popup footer 排列為獨立旗標、不綁裝置：預設並排（次→主等寬）、.stack 垂直堆疊（主→次全寬） */
  .mdl-pop-foot{display:flex;flex-wrap:wrap;gap:10px;padding:16px 20px 20px;}
  .mdl-pop-foot .btn{flex:1 1 0;justify-content:center;}
  .mdl-pop-foot .btn.v-text{flex:1 1 100%;}           /* 文字按鈕（第三動作）：獨占一列全寬 */
  .mdl-pop-foot.stack{flex-direction:column;gap:8px;}
  .mdl-pop-foot.stack .btn{flex:0 0 auto;width:100%;}

  /* ---- kind=modal：寬版視窗（header 標題＋副標題＋× ＋ 可捲動 content ＋ footer 靠右） ---- */
  .mdl-kind-modal{width:100%;max-width:800px;}    /* regular：桌機標準寬 800px */
  .mdl-kind-modal.mdl-larger{max-width:1224px;}   /* larger：寬高 auto、上限 1224px */
  .mdl-mhead{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:16px 20px 0;}
  .mdl-mhead-txt{display:flex;flex-direction:column;gap:3px;min-width:0;}
  .mdl-title{font-family:var(--font-sans);font-weight:600;font-size:15.5px;color:var(--ink);line-height:1.35;}
  .mdl-sub{font-family:var(--font-sans);font-size:12.5px;color:var(--muted);line-height:1.4;}
  .mdl-close{flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;
    width:28px;height:28px;margin:-3px -3px 0 0;padding:0;border:none;background:transparent;
    color:var(--muted);cursor:pointer;border-radius:7px;transition:background .13s,color .13s;}
  .mdl-close svg{width:18px;height:18px;}
  .mdl-close:hover{background:var(--panel-2);color:var(--ink);}
  .mdl-close.mdl-abs{position:absolute;top:14px;right:14px;margin:0;}
  /* content 可捲動：真實規格 max-height 80vh／min-height 30vh、內容溢出出現卷軸；陳列頁舞台有限，改以容器高度／.mdl-clip 示意 */
  .mdl-content{display:flex;flex-direction:column;gap:10px;padding:12px 20px 4px;overflow-y:auto;min-height:0;}
  .mdl-clip{max-height:130px;}                    /* 矩陣「內容溢出」示意：固定高度讓卷軸現身 */
  .mdl-fields{display:flex;flex-direction:column;gap:10px;}
  .mdl-fields .field{width:100%;min-width:0;}

  /* footer：動作按鈕靠右（modal 用） */
  .mdl-foot{display:flex;justify-content:flex-end;gap:8px;padding:16px 20px 18px;}

  /* 矩陣內縮小示意：字級／內距略收，讀起來像迷你卡 */
  .mdl-compact{box-shadow:0 6px 18px rgba(0,0,0,.15);}
  .mdl-compact .mdl-pop-title,.mdl-compact .mdl-title{font-size:13.5px;}
  .mdl-compact .mdl-desc{font-size:12px;line-height:1.5;}
  .mdl-compact .mdl-note{font-size:11px;}
  .mdl-compact .mdl-pop-body{padding:14px 14px 0;gap:8px;}
  .mdl-compact .mdl-illus{width:36px;height:36px;}
  .mdl-compact .mdl-pop-foot{padding:12px 14px 14px;gap:8px;}
  .mdl-compact .mdl-mhead{padding:12px 14px 0;}
  .mdl-compact .mdl-content{padding:8px 14px 4px;gap:8px;}
  .mdl-compact .mdl-foot{padding:12px 14px 14px;}

  /* ---- 浮層結構示意：backdrop 遮罩 + 置中卡片 的層次 ---- */
  .mdl-layer-wrap{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:24px;
    display:flex;flex-wrap:wrap;gap:26px;align-items:center;}
  .mdl-viewport{position:relative;flex:1 1 300px;max-width:440px;height:250px;
    border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:var(--panel-2);}
  /* 底層：頁面內容骨架 */
  .mdl-vp-page{position:absolute;inset:0;padding:16px;display:flex;flex-direction:column;gap:10px;}
  .mdl-skel{height:10px;border-radius:5px;background:var(--panel-3);}
  .mdl-skel.w70{width:70%;} .mdl-skel.w90{width:90%;} .mdl-skel.w50{width:50%;} .mdl-skel.w80{width:80%;}
  /* 中層：backdrop 遮罩 */
  .mdl-vp-scrim{position:absolute;inset:0;background:rgba(0,0,0,.34);
    display:flex;align-items:center;justify-content:center;}
  /* 上層：置中對話框卡 */
  .mdl-vp-card{width:74%;max-width:250px;background:var(--panel);border:1px solid var(--line);
    border-radius:12px;box-shadow:0 14px 34px rgba(0,0,0,.28);padding:14px;
    display:flex;flex-direction:column;gap:8px;}
  .mdl-vp-card .mdl-title{font-size:13px;}
  .mdl-vp-card .mdl-desc{font-size:11.5px;}
  .mdl-vp-cardfoot{display:flex;justify-content:flex-end;gap:6px;margin-top:2px;}
  /* 層次圖例 */
  .mdl-legend{flex:1 1 200px;display:flex;flex-direction:column;gap:14px;}
  .mdl-leg-item{display:flex;gap:11px;align-items:flex-start;}
  .mdl-leg-dot{flex:0 0 auto;width:15px;height:15px;border-radius:5px;margin-top:1px;border:1px solid var(--line-strong);}
  .mdl-leg-dot.l-page{background:var(--panel-3);}
  .mdl-leg-dot.l-scrim{background:rgba(0,0,0,.34);border-color:transparent;}
  .mdl-leg-dot.l-card{background:var(--panel);box-shadow:0 3px 8px rgba(0,0,0,.22);}
  .mdl-leg-t{font-family:var(--font-sans);font-size:13px;font-weight:600;color:var(--ink);}
  .mdl-leg-d{font-family:var(--font-sans);font-size:12.5px;color:var(--muted);line-height:1.5;margin-top:2px;}

  /* ---- 實際互動 Live：overlay 限縮在 stage 內、不遮全頁，且預設就開啟 ---- */
  .mdl-live-root{position:relative;width:100%;min-height:380px;border-radius:12px;
    display:flex;align-items:center;justify-content:center;}
  /* 關閉對話框後才出現的「重新開啟」按鈕 */
  .mdl-live-root .mdl-reopen{display:none;}
  .mdl-live-root .mdl-reopen.show{display:inline-flex;}
  /* backdrop 只蓋住 root（inset:0 absolute），不是 fixed 全頁 */
  .mdl-overlay{position:absolute;inset:0;z-index:2;background:rgba(0,0,0,.34);
    display:flex;align-items:center;justify-content:center;padding:20px;border-radius:12px;
    animation:mdl-fade .14s ease-out;}
  .mdl-overlay .mdl-card{animation:mdl-pop .16s ease-out;max-height:100%;}
  @keyframes mdl-fade{from{opacity:0;}to{opacity:1;}}
  @keyframes mdl-pop{from{opacity:0;transform:translateY(6px) scale(.98);}to{opacity:1;transform:none;}}
  /* ---- 行動版 bottom sheet：貼齊舞台底部、全寬、上緣圓角（下緣不圓）、最高 95%（示意 95vh）、由下往上滑入 ---- */
  .mdl-overlay.mdl-sheet-ov{align-items:flex-end;padding:20px 0 0;overflow:hidden;}
  .mdl-overlay .mdl-card.mdl-sheet{max-width:none;width:100%;max-height:95%;
    border-radius:14px 14px 0 0;border-bottom:none;animation:mdl-slideup .22s ease-out;}
  @keyframes mdl-slideup{from{opacity:0;transform:translateY(100%);}to{opacity:1;transform:none;}}
  /* 行動版舞台：縮成手機視口寬度置中，讓 Device 軸有可見差異 */
  .mdl-live-root.vp-mobile{max-width:400px;margin:0 auto;min-height:460px;}
  /* Live 兩段分區（popup／modal 各一段，控制項不共用） */
  .mdl-live-block{margin-bottom:22px;}
  .mdl-live-block:last-child{margin-bottom:0;}
  .mdl-live-cap{font-family:var(--font-mono);font-size:11px;letter-spacing:.04em;color:var(--muted);margin:0 0 10px;}
  .mdl-live-cap b{font-weight:600;}

/* ===== drawer (Complex) ===== */
/* ==================== drawer 抽屜 ==================== */
  /* ---- 矩陣：小型裝置框示意（16:10 視窗 + 假內容 + 半透明 backdrop + 側邊抽屜）---- */
  .drw-frame{position:relative;width:100%;aspect-ratio:16/10;background:var(--canvas);
    border:1px solid var(--line-strong);border-radius:10px;overflow:hidden;}
  .drw-fake{position:absolute;inset:0;padding:14px;display:flex;flex-direction:column;gap:9px;}
  .drw-fbar{height:8px;border-radius:4px;background:var(--panel-3);}
  .drw-fbar.lead{height:11px;width:38%;background:var(--line-strong);opacity:.55;}
  /* backdrop 遮罩：由 --ink 混出半透明，深淺色都能區隔背景 */
  .drw-backdrop{position:absolute;inset:0;background:color-mix(in srgb,var(--ink) 42%,transparent);}
  /* 抽屜面板：與 Live 浮動樣式一致、縮放到小框（四邊內縮 9px、圓角＋陰影、高度＝框高 − 18px），
     面板 overflow:hidden 讓圓角正確裁切內容，寬度依 size */
  .drw-panel{position:absolute;top:9px;bottom:9px;height:calc(100% - 18px);background:var(--panel);
    display:flex;flex-direction:column;overflow:hidden;border:1px solid var(--line);border-radius:9px;
    box-shadow:0 5px 16px color-mix(in srgb,var(--ink) 26%,transparent);}
  .drw-panel.side-left{left:9px;} .drw-panel.side-right{right:9px;}
  .drw-panel.sz-s{width:42%;} .drw-panel.sz-m{width:54%;} .drw-panel.sz-l{width:68%;}
  .drw-phead{display:flex;align-items:center;justify-content:space-between;gap:6px;
    padding:8px 8px 8px 11px;border-bottom:1px solid var(--line);}
  .drw-ptitle{font-size:11px;font-weight:640;color:var(--ink);}
  .drw-pclose{display:inline-flex;width:14px;height:14px;color:var(--faint);flex:0 0 auto;}
  .drw-pnav{display:flex;flex-direction:column;gap:2px;padding:6px;flex:1;overflow:hidden;}
  .drw-pitem{display:flex;align-items:center;gap:6px;padding:5px 7px;border-radius:6px;
    font-size:10px;color:var(--muted);white-space:nowrap;}
  .drw-pitem.is-active{background:var(--i-primary-tint);color:var(--i-primary);font-weight:600;}
  .drw-pico{display:inline-flex;width:12px;height:12px;flex:0 0 auto;}

  /* ---- 內容結構示意（真實比例抽屜 + 三段圖例）---- */
  .drw-struct-wrap{display:flex;flex-wrap:wrap;gap:32px;align-items:stretch;
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:28px;}
  .drw-struct{width:300px;max-width:100%;flex:0 0 auto;border:1px solid var(--line);border-radius:12px;
    overflow:hidden;background:var(--panel);display:flex;flex-direction:column;
    box-shadow:0 10px 28px color-mix(in srgb,var(--ink) 9%,transparent);}
  .drw-legend{display:flex;flex-direction:column;justify-content:center;gap:18px;flex:1;min-width:220px;}
  .drw-legrow{display:flex;align-items:flex-start;gap:12px;}
  .drw-legtx{display:flex;flex-direction:column;gap:3px;}
  .drw-legtx b{font-size:13.5px;color:var(--ink);font-weight:600;}
  .drw-legtx span{font-size:12.5px;color:var(--faint);line-height:1.5;}

  /* ---- 真實比例抽屜共用（結構示意 + Live）---- */
  .drw-head{display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:16px 16px 16px 18px;border-bottom:1px solid var(--line);}
  .drw-title{font-size:15px;font-weight:640;color:var(--ink);}
  .drw-close{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;padding:0;
    border:1px solid var(--line);border-radius:8px;background:transparent;color:var(--muted);cursor:pointer;transition:.14s;}
  .drw-close:hover{background:var(--panel-2);color:var(--ink);border-color:var(--line-strong);}
  .drw-close svg{width:16px;height:16px;}
  .drw-nav{flex:1;display:flex;flex-direction:column;gap:4px;padding:12px 10px;overflow:auto;}
  .drw-navrow{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:9px;
    color:var(--muted);font-size:14px;cursor:pointer;transition:.14s;}
  .drw-navrow:hover{background:var(--panel-2);color:var(--ink);}
  .drw-navrow.is-active{background:var(--i-primary-tint);color:var(--i-primary);font-weight:600;}
  .drw-navico{display:inline-flex;width:20px;height:20px;flex:0 0 auto;}
  .drw-foot{display:flex;justify-content:flex-end;gap:10px;padding:14px 16px;border-top:1px solid var(--line);}

  /* ---- 實際互動 Live：overlay 限縮在 stage 內、不遮全頁 ---- */
  .drw-live-stage{position:relative;width:100%;min-height:320px;border-radius:12px;overflow:hidden;
    background:var(--panel-2);display:flex;align-items:center;justify-content:center;}
  .drw-live-backdrop{position:absolute;inset:0;background:color-mix(in srgb,var(--ink) 42%,transparent);
    opacity:0;transition:opacity .28s ease;pointer-events:none;}
  .drw-live-backdrop.is-open{opacity:1;pointer-events:auto;}
  /* 浮動式面板：距舞台四邊內縮 24px（top/bottom 撐出高度＝舞台高−48px），
     圓角＋陰影呈漂浮感；面板本體 overflow:hidden 讓圓角裁切，內容溢出由 .drw-nav 內部捲動 */
  .drw-live-panel{position:absolute;top:24px;bottom:24px;height:calc(100% - 48px);max-width:calc(82% - 24px);background:var(--panel);
    display:flex;flex-direction:column;overflow:hidden;border:1px solid var(--line);border-radius:14px;
    box-shadow:0 12px 40px color-mix(in srgb,var(--ink) 30%,transparent);
    transition:transform .3s cubic-bezier(.4,0,.2,1);}
  .drw-live-panel.sz-s{width:220px;} .drw-live-panel.sz-m{width:300px;} .drw-live-panel.sz-l{width:380px;}
  /* 內縮 24px 後，滑出位移要多推 24px 才能完全離開舞台可視範圍 */
  .drw-live-panel.side-left{left:24px;transform:translateX(calc(-100% - 24px));}
  .drw-live-panel.side-right{right:24px;transform:translateX(calc(100% + 24px));}
  .drw-live-panel.is-open{transform:translateX(0);}

/* ===== floating-line (Complex) ===== */
/* ==================== floating-line 浮動列 ==================== */
  /* 假內容舞台：浮動列漂浮其上的相對定位容器 */
  .flo-stage{position:relative;min-height:150px;background:var(--panel-2);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;padding:16px;}
  .flo-fake{display:flex;flex-direction:column;gap:11px;pointer-events:none;}
  .flo-line{height:9px;border-radius:5px;background:var(--line);}
  .flo-fake .flo-blk{height:34px;border-radius:8px;background:var(--line);opacity:.6;}

  /* 浮動列共用定位：絕對疊在舞台底部 */
  .flo-float{position:absolute;z-index:2;display:flex;align-items:center;}
  .flo-float.flo-pos-bottom-center{left:50%;transform:translateX(-50%);bottom:14px;}
  .flo-float.flo-pos-bottom-right{right:14px;bottom:14px;}

  /* 1) 選取列：深色 pill，計數 + 動作鈕 */
  .flo-select{gap:14px;background:var(--ink);color:var(--canvas);padding:7px 8px 7px 18px;border-radius:999px;
    box-shadow:0 10px 28px rgba(0,0,0,.30);}
  .flo-select .flo-count{font-size:13px;font-weight:600;white-space:nowrap;letter-spacing:.01em;}
  .flo-select .flo-count b{font-weight:700;}
  .flo-select .flo-actions{display:flex;align-items:center;gap:6px;}
  /* 深底上的取消文字鈕：文字改用反相色（走 token） */
  .flo-select .btn.v-text.i-secondary{color:var(--canvas);}
  .flo-select .btn.v-text.i-secondary:hover{background:rgba(255,255,255,.14);}

  /* 2) 工具列：白底圓角陰影，icon-only 工具鈕 + 分隔線分組 */
  .flo-toolbar{gap:2px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:5px 6px;
    box-shadow:0 8px 24px rgba(0,0,0,.14);}
  .flo-tdiv{width:1px;align-self:stretch;margin:5px 5px;background:var(--line);}

  /* 3) FAB 浮動主鈕：圓形（沿用 .btn v-solid i-primary，僅改圓角＋尺寸） */
  .flo-fabwrap{flex-direction:column;align-items:flex-end;gap:12px;}
  .flo-fab.btn{border-radius:999px;width:52px;height:52px;padding:0;box-shadow:0 10px 26px rgba(0,0,0,.24);}
  .flo-fab.btn svg{width:24px;height:24px;}
  /* FAB 展開的子項：小圓鈕 + 文字標籤膠囊 */
  .flo-fab-child{display:flex;align-items:center;gap:10px;justify-content:flex-end;}
  .flo-fab-lb{font-size:12px;font-weight:600;color:var(--ink);background:var(--panel);border:1px solid var(--line);
    padding:4px 10px;border-radius:8px;box-shadow:0 3px 10px rgba(0,0,0,.12);white-space:nowrap;}
  .flo-fab-mini.btn{border-radius:999px;width:40px;height:40px;padding:0;box-shadow:0 6px 16px rgba(0,0,0,.16);}
  .flo-fab-mini.btn svg{width:20px;height:20px;}

  /* 型態細節區塊：三型態並排說明 */
  .flo-detail{display:flex;flex-wrap:wrap;gap:22px;}
  .flo-dcol{flex:1 1 260px;min-width:260px;display:flex;flex-direction:column;gap:12px;}
  .flo-dcap{font-family:var(--font-mono);font-size:11px;color:var(--faint);letter-spacing:.05em;}
  .flo-dcap b{color:var(--muted);font-weight:600;}
  .flo-dbox{background:var(--panel-2);border:1px solid var(--line);border-radius:var(--radius);
    padding:22px 18px;display:flex;justify-content:center;align-items:flex-end;min-height:96px;}
  /* 細節區裡把浮動列改成靜態置中呈現 */
  .flo-dbox .flo-float{position:static;transform:none;}
  .flo-dbox.flo-tall{min-height:190px;align-items:flex-end;}

/* ===== step (Complex) ===== */
/* ==================== STEP 步驟指示器 ==================== */
  /* 節點圓圈：編號 / 圖示 variant 用 32px，dotted 用 16px 小圓點 */
  .stp-node{flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;
    width:32px;height:32px;border-radius:999px;box-sizing:border-box;
    font-family:var(--font-mono);font-size:13px;font-weight:600;line-height:1;transition:all .15s;}
  .stp-node svg{width:18px;height:18px;}
  /* 五種節點狀態（顏色全綁 token） */
  .stp-node.stp-done{background:var(--accent);border:2px solid var(--accent);color:var(--primary-on);}
  .stp-node.stp-current{background:var(--panel);border:2px solid var(--accent);color:var(--accent);box-shadow:0 0 0 4px var(--i-primary-tint);}
  .stp-node.stp-todo{background:var(--panel);border:2px solid var(--line);color:var(--faint);}
  .stp-node.stp-error{background:var(--i-danger);border:2px solid var(--i-danger);color:var(--danger-on);}
  .stp-node.stp-disabled{background:var(--panel-2);border:2px solid var(--line);color:var(--faint);opacity:.55;}
  /* dotted：小圓點，無內容物 */
  .stp-dot .stp-node{width:16px;height:16px;}
  .stp-dot .stp-node svg{display:none;}

  /* 標題／副標 */
  .stp-labels{display:flex;flex-direction:column;gap:2px;min-width:0;}
  .stp-title{font-family:var(--font-sans);font-size:13px;line-height:1.35;color:var(--muted);}
  .stp-desc{font-family:var(--font-sans);font-size:11px;line-height:1.35;color:var(--faint);}
  .stp-is-done .stp-title,.stp-is-current .stp-title{color:var(--ink);}
  .stp-is-current .stp-title{font-weight:600;}
  .stp-is-error .stp-title{color:var(--i-danger);}
  .stp-is-disabled .stp-title{color:var(--faint);}

  /* ---- 水平 horizontal ---- */
  .stp-horizontal{display:flex;align-items:flex-start;width:100%;}
  .stp-horizontal .stp-step{display:flex;flex-direction:column;align-items:center;text-align:center;gap:8px;flex:0 0 auto;}
  .stp-horizontal .stp-labels{align-items:center;text-align:center;max-width:76px;}
  .stp-horizontal .stp-conn{flex:1 1 auto;height:2px;min-width:16px;margin-top:15px;
    background:var(--line);border-radius:2px;}
  .stp-horizontal .stp-conn.stp-conn-done{background:var(--accent);}
  .stp-horizontal.stp-dot .stp-conn{margin-top:7px;}

  /* ---- 垂直 vertical ---- */
  .stp-vertical{display:flex;flex-direction:column;}
  .stp-vstep{display:flex;gap:12px;}
  .stp-vrail{display:flex;flex-direction:column;align-items:center;flex:0 0 auto;}
  .stp-vconn{width:2px;flex:1 1 auto;min-height:22px;margin:4px 0;background:var(--line);border-radius:2px;}
  .stp-vconn.stp-conn-done{background:var(--accent);}
  .stp-vertical .stp-labels{padding-top:6px;padding-bottom:20px;}
  .stp-vstep:last-child .stp-labels{padding-bottom:0;}
  .stp-vertical.stp-dot .stp-labels{padding-top:0;}

  /* ---- 實際互動 Live ---- */
  .stp-live-wrap{display:flex;flex-direction:column;gap:20px;width:100%;}
  .stp-live-stage{display:flex;}
  .stp-live-ctl{display:flex;gap:10px;flex-wrap:wrap;}
</style>

  lines.appendChild(skelEl('text','m',anim)); // 標題行

}

}

function skelMedia(anim){

  m.appendChild(skelEl('text','m',anim));
  m.appendChild(skelEl('text','s',anim));
  return m;
}

      core=ce('div','ld-bar '+iCls+' ld-sz-'+size);

      if(opts.progress){fill.style.left='0';fill.style.width=(opts.pct||65)+'%';}

  const MN_ICONS=[ICON_HOUSE,ICON_LIST,ICON_GEAR,ICON_PENCIL];
  function mnItem(state,size,o){

    const ind=ce('span','mn-ind');it.appendChild(ind);
    return it;
  }
  function mnBar(variant,size,o){
    o=o||{};
    const items=o.items||[];
    const bar=ce('div','mn-bar mn-bar--'+variant);
    bar.setAttribute('role','navigation');
    let cur=(o.activeIndex==null?0:o.activeIndex);
    const nodes=[];
    items.forEach((label,i)=>{
      const it=mnItem(i===cur?'active':'default',size,{label:label,icon:o.icon?MN_ICONS[i%MN_ICONS.length]:false});
      if(i===cur)it.setAttribute('aria-current','page');
      if(o.clickable!==false){it.onclick=()=>{cur=i;nodes.forEach((n,j)=>{const on=(j===i);n.classList.toggle('mn-item--active',on);if(on)n.setAttribute('aria-current','page');else n.removeAttribute('aria-current');});};}
      nodes.push(it);bar.appendChild(it);
    });
    return bar;
  }

  const pgArrowL='<svg viewBox="0 0 256 256" fill="currentColor"><path d="M165.66,202.34a8,8,0,0,1-11.32,11.32l-80-80a8,8,0,0,1,0-11.32l80-80a8,8,0,0,1,11.32,11.32L91.31,128Z"/></svg>';

  // 單顆頁碼／箭頭方鈕：state 控外觀、size 控邊長、current=當前頁高亮、arrow=left/right 放箭頭
  function pgBtn(state,size,o){
    const opt=o||{};
    const b=document.createElement('button');
    b.className='pg-btn pg-sz-'+size+' pg-st-'+state+(opt.current?' pg-cur':'')+(opt.arrow?' pg-arw':'');
    if(state==='disabled')b.disabled=true;
    if(opt.arrow==='left')b.innerHTML=pgArrowL;
    else if(opt.arrow==='right')b.innerHTML=pgArrowR;
    else b.textContent=opt.label;
    return b;
  }
  // 完整分頁器：numbered=數字頁碼＋雙邊箭頭（gap>1 才插省略號）；prev-next=前後翻頁＋頁次資訊
  function pgBar(variant,size,o){
    const opt=o||{},total=opt.total,current=opt.current;
    const bar=ce('div','pg-bar pg-bar-'+size);
    if(variant==='prev-next'){
      const prev=pgBtn(current<=1?'disabled':'default',size,{arrow:'left'});
      const info=ce('span','pg-info');info.textContent='第 '+current+' / '+total+' 頁';
      const next=pgBtn(current>=total?'disabled':'default',size,{arrow:'right'});
      if(opt.onNav){if(current>1)prev.onclick=()=>opt.onNav(current-1);if(current<total)next.onclick=()=>opt.onNav(current+1);}
      bar.append(prev,info,next);return bar;
    }
    // numbered：‹ 1 … (c-1)[c](c+1) … total ›
    const prev=pgBtn(current<=1?'disabled':'default',size,{arrow:'left'});
    if(opt.onNav&&current>1)prev.onclick=()=>opt.onNav(current-1);
    bar.appendChild(prev);
    const set=[]; [1,total,current-1,current,current+1].forEach(n=>{if(n>=1&&n<=total&&set.indexOf(n)<0)set.push(n);});
    set.sort((a,b)=>a-b);
    let last=0;
    set.forEach(n=>{
      if(last&&n-last>1){const e=ce('span','pg-ellip');e.textContent='…';bar.appendChild(e);}
      const nb=pgBtn(n===current?'active':'default',size,{label:n,current:n===current});
      if(opt.onNav&&n!==current)nb.onclick=()=>opt.onNav(n);
      bar.appendChild(nb);last=n;
    });
    const next=pgBtn(current>=total?'disabled':'default',size,{arrow:'right'});
    if(opt.onNav&&current<total)next.onclick=()=>opt.onNav(current+1);
    bar.appendChild(next);return bar;
  }

  function prEl(variant,size){
    const el=ce('span',`pr-price pr-sz-${size} pr-v-${variant}`);
    if(variant==='normal'){
      el.innerHTML='<span class="pr-cur">NT$</span><span class="pr-amt">1,280</span>';
    }else if(variant==='discount'){
      el.setAttribute('aria-label','原價 NT$ 1,680，優惠價 NT$ 1,280');
      el.innerHTML='<s class="pr-orig" aria-hidden="true">NT$ 1,680</s><span class="pr-now"><span class="pr-cur">NT$</span><span class="pr-amt">1,280</span></span>';
    }else if(variant==='sale'){
      el.innerHTML='<span class="pr-cur">NT$</span><span class="pr-amt">990</span><span class="tg v-solid c-round i-danger st-default"><span>SALE</span></span>';
    }else if(variant==='free'){
      el.setAttribute('aria-label','免費');
      el.innerHTML='<s class="pr-orig" aria-hidden="true">NT$ 480</s><span class="pr-free">免費</span>';
    }
    return el;
  }
  /* metric 數值（dashboard KPI）：plain 純數字／delta 數字＋趨勢／unit 數字＋單位／label 標題＋數字
     opts.trend='up'|'down'（僅 delta 用；up 綁 --ok 正向綠、down 綁 --i-danger，icon 重用 IC_TRENDING） */
  function prMetricEl(mvariant,size,opts){opts=opts||{};
    const el=ce('span','pr-metric pr-m-sz-'+size+' pr-m-'+mvariant);
    if(mvariant==='plain'){
      el.innerHTML='<span class="pr-numrow"><span class="pr-num">8,542</span></span>';
    }else if(mvariant==='delta'){
      const up=(opts.trend||'up')==='up';
      el.setAttribute('aria-label',up?'8,542，較上期上升 12.5%':'8,542，較上期下降 3.2%'); // a11y：容器報讀升降語意，內部視覺元素 aria-hidden
      el.innerHTML='<span class="pr-numrow"><span class="pr-num" aria-hidden="true">8,542</span><span class="pr-delta '+(up?'d-up':'d-down')+'" aria-hidden="true">'+IC_TRENDING+'<span>'+(up?'+12.5%':'-3.2%')+'</span></span></span>';
    }else if(mvariant==='unit'){
      el.innerHTML='<span class="pr-numrow"><span class="pr-num">82</span><span class="pr-unit">%</span></span>';
    }else{ // label：上方小標題 + 下方大數字（幣別當 unit 前綴）
      el.innerHTML='<span class="pr-mlabel">本月營收</span><span class="pr-numrow"><span class="pr-unit">NT$</span><span class="pr-num">4.3M</span></span>';
    }
    return el;
  }

  const IM_BROKEN='<svg viewBox="0 0 256 256" fill="currentColor"><path d="M216,40H40A16,16,0,0,0,24,56V200a16,16,0,0,0,16,16H216a16,16,0,0,0,16-16V56A16,16,0,0,0,216,40Zm0,16V158.75l-26.07-26.06a16,16,0,0,0-22.63,0l-20,20-44-44a16,16,0,0,0-22.62,0L40,149.37V56ZM40,172l52-52,80,80H40Zm176,28H194.63l-36-36,20-20L216,181.38V200ZM144,100a12,12,0,1,1,12,12A12,12,0,0,1,144,100Z"/></svg>';
  const IM_POOL=['photo-1506905925346-21bda4d32df4','photo-1470071459604-3b5ec3a7fe05','photo-1501785888041-af3ef285b470','photo-1426604966848-d7adac402bff','photo-1470770841072-f978cf4d019e','photo-1447752875215-b2761acb3c5d','photo-1472214103451-9374bd1c798e','photo-1433086966358-54859d0ed716']; // 已驗證 200 的 Unsplash 自然風景池（山湖／森林／瀑布／綠丘）
  const IM_CIRCLE='photo-1501785888041-af3ef285b470'; // circular 用構圖置中的風景（湖光山色）
  const IM_SIZE={s:40,m:64,l:120,xl:240}; // size → 高度（px）；寬度由 aspect-ratio 依比例算
  /* 組出固定方形的 Unsplash URL；一律帶 &h 強制正方，配 object-fit:cover 填滿 */
  function imUrl(id,w){return `https://images.unsplash.com/${id}?w=${w}&q=80&auto=format&fit=crop`;} // 不鎖比例，裁切交給盒子 aspect-ratio + object-fit:cover
  /* Image atom：variant=rectangular|rounded|circular；state=default|loading|error；size=s|m|l|xl
     opts={src:Unsplash 圖片 ID, alt:替代文字}。circular 為正方，rectangular/rounded 亦統一用正方最簡單 */
  function imEl(variant,state,size,opts){opts=opts||{};
    size=size||'m';
    const box=ce('div',`im-box im-${variant} im-sz-${size} im-st-${state}`);
    if(opts.ratio && variant!=='circular'){box.classList.add('im-r-'+opts.ratio.replace(':','x'));} // circular 恆正方，其餘依比例改盒子 aspect-ratio
    if(state==='loading'){
      box.classList.add('im-loading'); // 骨架佔位：--panel-2 底 + shimmer 掃過，不放真圖
    } else if(state==='error'){
      box.classList.add('im-error'); // 破圖 fallback：置中破圖 icon + 「載入失敗」小字
      const ic=ce('div','im-broken');ic.innerHTML=IM_BROKEN;
      const tx=ce('div','im-errtxt');tx.textContent='載入失敗';
      box.append(ic,tx);
    } else {
      const img=document.createElement('img');img.className='im-img';
      img.src=imUrl(opts.src||IM_POOL[0],600); // W 用 400，實際顯示尺寸由 CSS 控制
      img.alt=(opts.alt!=null)?opts.alt:''; // a11y：必填 alt；裝飾性傳 '' 即可
      img.loading='lazy';
      box.appendChild(img);
    }
    return box;
  }

  /* logo：複用檔內既有 Goons 官方字標 svg */
  function hdrLogo(){const l=ce('div','hdr-logo');l.innerHTML=HDR_LOGO;l.setAttribute('aria-label','Goons');return l;}
  /* 導覽：複用 Menu 元件 mnBar（水平），維持原子建構 */
  function hdrNav(){const slot=ce('div','hdr-nav-slot');
    slot.appendChild(mnBar('horizontal','m',{items:['首頁','產品','定價','關於'],activeIndex:0,clickable:true}));
    return slot;}
  /* 搜尋框：複用 Search／Input 元件（.field v-outline + ICON_SEARCH + .bare）*/
  function hdrSearch(){
    const w=ce('div','hdr-search');
    const f=ce('div','field v-outline');
    f.innerHTML=`<span style="display:inline-flex;width:17px;height:17px;color:var(--muted)">${ICON_SEARCH}</span>`;
    const inp=document.createElement('input');inp.className='bare';inp.placeholder='搜尋產品、文件…';
    f.appendChild(inp);w.appendChild(f);return w;}
  /* 漢堡鈕：複用 Button 元件（無底色無外框 icon btn＝v-text icon-only；.live 才吃真實 hover）*/
  function hdrBurger(){const b=document.createElement('button');b.className='btn v-text i-secondary sz-s icon-only live';
    b.setAttribute('aria-label','選單');b.innerHTML=HDR_IC_LIST;return b;}
  /* 鈴鐺鈕：複用 Button 元件（v-text icon-only live）+ 未讀紅點 */
  function hdrBell(badge){const wrap=ce('div','hdr-bell');
    const b=document.createElement('button');b.className='btn v-text i-secondary sz-s icon-only live';
    b.setAttribute('aria-label','通知');b.innerHTML=HDR_IC_BELL;wrap.appendChild(b);
    if(badge)wrap.appendChild(ce('span','hdr-badge'));return wrap;}
  /* 圓形頭像 */
  function hdrAvatar(){const b=document.createElement('button');b.className='btn v-soft i-primary sz-s icon-only live hdr-avatar';b.textContent='楊';b.setAttribute('aria-label','帳號');return b;}
  /* 右側 actions：鈴鐺 → 頭像 → 登入（登入鈕在頭像右側）*/
  function hdrActions(o){o=o||{};
    const a=ce('div','hdr-actions');
    if(o.bell!==false)a.appendChild(hdrBell(o.badge!==false));
    if(o.avatar!==false)a.appendChild(hdrAvatar());
    if(o.login!==false){const b=document.createElement('button');b.className='btn v-solid i-primary sz-s live';b.textContent='登入';a.appendChild(b);}
    return a;}
  /* 完整頁首 bar：device 決定電腦／行動版；nav 與 search 可同時存在 */
  function hdrBar(device,o){o=o||{};
    const bar=ce('div','hdr-bar');
    if(device==='mobile'){
      if(o.nav!==false)bar.appendChild(hdrBurger());       // 行動版導覽收進漢堡
      bar.appendChild(hdrLogo());
      bar.appendChild(ce('div','hdr-spacer'));
      bar.appendChild(hdrActions({bell:o.bell,avatar:o.avatar,login:o.login,badge:o.badge}));
      const frame=ce('div','hdr-phone');frame.appendChild(bar);return frame; // 行動版以 375px 手機框示意
    }
    bar.appendChild(hdrLogo());
    if(o.nav!==false)bar.appendChild(hdrNav());
    bar.appendChild(ce('div','hdr-spacer'));
    if(o.search)bar.appendChild(hdrSearch());               // 搜尋與導覽並存
    bar.appendChild(hdrActions({bell:o.bell,avatar:o.avatar,login:o.login,badge:o.badge}));
    return bar;
  }

  function buildHeader(view){
    const body=viewScaffold(view,{
      eyebrow:'L3 Component · Header',
      title:'Header 頁首',
      lede:'應用／網站最上緣的<b>全域導覽列</b>：左側 Goons 品牌字標、<b>導覽（Menu 元件）與搜尋框（Search 元件）可同時並存</b>、右側依序為通知鈴鐺、帳號頭像與登入鈕。以 <b>裝置（電腦版／行動版）</b> 為軸，行動版導覽收進漢堡鈕。內部 btn／icon btn／menu／search 全部取自本 library、維持原子建構。',
      specRows:[['axes','<code>device</code>'],['variants','<code>desktop · mobile</code>'],['atoms','Button · Icon Button · Menu · Search'],['content','logo / nav + search / actions']]
    });
    const axes=DIAL_SPECS.header.axes, zh=DIAL_SPECS.header.zh, active=CHOICE.header.active; // 接中央 store
    let p;
    function renderM(){ if(!p)return; p.innerHTML='';
      const devs=axes.device.filter(v=>active.device.has(v));
      const stack=ce('div','hdr-stack');
      devs.forEach(dv=>{
        const row=ce('div','hdr-row');
        const cap=ce('div','hdr-cap');cap.innerHTML=`<b>${zh.device[dv]}</b>　<span style="opacity:.65">${dv}</span>`;
        row.appendChild(cap);
        row.appendChild(hdrBar(dv,{nav:true,search:true,bell:true,avatar:true,login:true,badge:true}));
        stack.appendChild(row);
      });
      p.appendChild(stack);
    }
    mountDial(body,{axes,zh,active,onRender:renderM});
    const sec=section(body,'Device 陳列','整條頁首 bar 上下堆疊呈現（不擠壓）。每條同時含導覽（Menu）與搜尋（Search）；行動版導覽收進漢堡鈕。');
    const holder=ce('div');sec.appendChild(holder);p=holder;renderM();

    // 實際互動 Live
    const sl=section(body,'實際互動 Live','切換<b>電腦版／行動版</b>，勾選各內容元素即時預覽；導覽與搜尋可同時勾選並存。按鈕／圖示鈕滑過即見 hover。');
    mountLive(sl,{
      initial:{device:'desktop',nav:true,search:true,bell:true,avatar:true,login:true},
      segs:[{key:'device',label:'Device',options:['desktop','mobile'],labels:['電腦版','行動版']}],
      bools:[{key:'nav',label:'nav 導覽'},{key:'search',label:'search 搜尋'},{key:'bell',label:'bell 鈴鐺'},{key:'avatar',label:'avatar 頭像'},{key:'login',label:'login 登入鈕'}],
      boolLabel:'Content',
      render:st=>{const box=ce('div','hdr-live-box');
        box.appendChild(hdrBar(st.device,{nav:st.nav,search:st.search,bell:st.bell,avatar:st.avatar,login:st.login,badge:st.bell}));return box;},
      note:'<b>導覽與搜尋可同時並存</b>；行動版（mobile）導覽收進漢堡鈕。內部按鈕／圖示鈕／選單／搜尋框皆為本 library 元件實例（皆掛 .live 吃真實 hover）。'
    });
  }

/* ==================== footer 頁尾 ==================== */
  /* ---- FOOTER 頁尾（builders 提升頂層，頁面與 Live 共用同一組零件）---- */

  /* 連結欄群資料 */

    {title:'產品 Product',links:['元件庫','設計 Token','頁面模板','更新日誌']},
    {title:'公司 Company',links:['關於我們','人才招募','設計部落格','聯絡我們']},

  const FTR_SOCIALS=[['Twitter',FTR_IC_TWITTER],['GitHub',FTR_IC_GITHUB],['LinkedIn',FTR_IC_LINKEDIN],['Instagram',FTR_IC_INSTAGRAM]];

  /* 品牌 logo：複用 header 的 Goons 官方字標 svg */
  function ftrLogo(){const w=ce('div','ftr-logo');w.innerHTML=HDR_LOGO;w.setAttribute('aria-label','Goons Design');return w;}
  /* 聯絡資訊：地址／信箱／電話（重用 library icon）*/
  function ftrContact(){
    const c=ce('div','ftr-contact');
    [[IC_LOCATION,'台北市信義區設計路 100 號 8 樓'],[IC_MAIL,'hello@goonsdesign.co'],[IC_PHONE,'+886 2 2345 6789']].forEach(([ic,txt])=>{
      const r=ce('div','ftr-contact-row');
      const i=ce('span','ftr-contact-ic');i.innerHTML=ic;
      const t=document.createElement('span');t.textContent=txt;
      r.append(i,t);c.appendChild(r);
    });
    return c;
  }
  /* 品牌區：logo + 簡介 + 聯絡 */
  function ftrBrand(){
    const b=ce('div','ftr-brand');
    b.appendChild(ftrLogo());
    b.appendChild(ftrContact());
    return b;
  }
  /* 單一連結欄 */
  function ftrLinkCol(col){
    const c=ce('div','ftr-col');
    const t=ce('div','ftr-coltitle');t.textContent=col.title;
    const ls=ce('div','ftr-links');
    col.links.forEach(lb=>{const a=ce('a','ftr-link');a.textContent=lb;ls.appendChild(a);});
    c.append(t,ls);return c;
  }
  /* 社群 icon 列：複用 library Button（v-text icon-only）*/
  function ftrSocial(){
    const w=ce('div','ftr-social');
    FTR_SOCIALS.forEach(([name,ic])=>{
      const b=document.createElement('button');b.className='btn v-text i-secondary sz-s icon-only live';
      b.setAttribute('aria-label',name);b.title=name;b.innerHTML=ic;
      w.appendChild(b);
    });
    return w;
  }
  /* 回到頂部：複用 library Button（v-outline）+ 上箭頭 */
  function ftrBackTop(){
    const b=document.createElement('button');b.className='btn v-outline i-secondary sz-s live';
    const ic=ce('span','ftr-uparrow');ic.innerHTML=ICON_CARET;
    b.appendChild(ic);b.appendChild(document.createTextNode('回到頂部'));
    b.setAttribute('aria-label','回到頂部');return b;
  }
  /* 語言選擇 pill */
  function ftrLang(){
    const b=document.createElement('button');b.className='btn v-outline i-secondary sz-s live';
    b.innerHTML=`${FTR_IC_GLOBE}<span>繁體中文</span>${ICON_CARET}`;
    b.setAttribute('aria-label','切換語言');return b;
  }
  /* 內嵌連結列（simple / minimal）*/
  function ftrNav(cls,labels){
    const w=ce('div',cls);
    labels.forEach(lb=>{const a=ce('a','ftr-link');a.textContent=lb;w.appendChild(a);});
    return w;
  }
  /* 底列：分隔線撐滿寬 + 版權左、按鈕右（社群／語言／回到頂部）*/
  function ftrBottom(o){
    o=o||{};
    const b=ce('div','ftr-bottom');
    const c=ce('div','ftr-copy');c.textContent='© 2026 果思設計 Goons Design. 版權所有。';
    b.appendChild(c);
    b.appendChild(ce('div','ftr-botspacer'));
    const acts=ce('div','ftr-actions');
    if(o.social)acts.appendChild(ftrSocial());
    if(o.language)acts.appendChild(ftrLang());
    if(o.backTop)acts.appendChild(ftrBackTop());
    if(acts.children.length)b.appendChild(acts);
    return b;
  }

  /* 整條頁尾 */
  function ftrFooter(variant,o){
    o=o||{};
    const mobile=o.device==='mobile';
    const foot=ce('footer','ftr-foot ftr-v-'+variant+(mobile?' ftr-mobile':''));
    if(variant==='rich'){
      const main=ce('div','ftr-main');
      main.appendChild(ftrBrand());
      const cols=ce('div','ftr-cols');
      FTR_COLS.forEach(col=>cols.appendChild(ftrLinkCol(col)));
      main.appendChild(cols);
      foot.appendChild(main);
      foot.appendChild(ftrBottom({social:o.social,language:o.language,backTop:o.backTop}));
    }else if(variant==='simple'){
      const row=ce('div','ftr-simplerow');
      row.appendChild(ftrLogo());
      row.appendChild(ftrNav('ftr-nav',['產品','資源','定價','關於','聯絡我們']));
      foot.appendChild(row);
      foot.appendChild(ftrBottom({social:o.social,language:o.language,backTop:o.backTop}));
    }else{ // minimal
      const row=ce('div','ftr-minirow');
      const c=ce('div','ftr-copy');c.textContent='© 2026 果思設計 Goons Design.';
      row.appendChild(c);
      row.appendChild(ftrNav('ftr-mininav',['服務條款','隱私政策','聯絡我們']));
      const acts=ce('div','ftr-actions');
      if(o.social)acts.appendChild(ftrSocial());
      if(o.language)acts.appendChild(ftrLang());
      if(o.backTop)acts.appendChild(ftrBackTop());
      if(acts.children.length){row.appendChild(ce('div','ftr-botspacer'));row.appendChild(acts);}
      foot.appendChild(row);
    }
    if(mobile){const frame=ce('div','ftr-phone');frame.appendChild(foot);return frame;}
    return foot;
  }

  function buildFooter(view){
    const body=viewScaffold(view,{eyebrow:'L3 Component · Footer',title:'Footer 頁尾',
      lede:'網站／應用最底部的<b>整條寬版</b>導航與資訊區塊：<b>rich 多欄</b>含品牌 logo、地址／信箱／電話聯絡資訊、連結欄群（靠右對齊）與底部版權；<b>simple 單列</b>把 logo 與連結左右撐滿；<b>minimal 極簡</b>只留一行版權與少數連結。底列分隔線撐滿寬度、版權（左）與按鈕（右）左右對齊。因頁尾為整條寬版，另含 <b>device（電腦版／行動版）</b> 軸——行動版收進限寬手機框、內容改單欄堆疊。這裡以「每個勾選的 variant × device 一段完整頁尾」呈現，不走矩陣。',
      specRows:[['axes','<code>variant × device</code>'],['formula','<code>(rich · simple · minimal) × (電腦 · 行動)</code>'],['atoms','Button · Icon Button · Search'],['features','social / language / back-to-top']]});
    const axes=DIAL_SPECS.footer.axes, zh=DIAL_SPECS.footer.zh, active=CHOICE.footer.active;
    const VSUB={
      rich:'左品牌（logo＋地址／信箱／電話）＋ 右側連結欄群（產品／資源／公司／法務，靠右對齊）；底列一條撐滿寬度的分隔線接版權（左）與社群／語言／回到頂部按鈕（右）。',
      simple:'單一橫列：左 logo、右連結列（左右撐滿）；下方分隔線＋版權與按鈕列。',
      minimal:'一行搞定：© 版權 + 幾個必要連結（＋選配社群／語言／回到頂部）。'
    };
    let holder;
    function renderM(){ if(!holder)return; holder.innerHTML='';
      const vs=axes.variant.filter(v=>active.variant.has(v));
      const ds=axes.device.filter(d=>active.device.has(d));
      vs.forEach(v=>ds.forEach(d=>{
        const label=zh.variant[v]+'　·　'+v+(d==='mobile'?'　·　行動版 mobile':'　·　電腦版 desktop');
        const sec=section(holder,label,VSUB[v]);
        sec.appendChild(ftrFooter(v,{social:true,language:true,backTop:true,device:d}));
      }));
    }
    mountDial(body,{axes,zh,active,onRender:renderM});
    holder=ce('div','ftr-holder');body.appendChild(holder);renderM();

    const sl=section(body,'實際互動 Live','切 variant（多欄／單列／極簡）與 device（電腦版／行動版），勾選社群 icon、語言與回到頂部按鈕，下面即時預覽整條頁尾。');
    mountLive(sl,{
      initial:{variant:'rich',device:'desktop',social:true,language:true,backTop:true},
      segs:[{key:'variant',label:'Variant',options:['rich','simple','minimal'],labels:['多欄 rich','單列 simple','極簡 minimal']},
            {key:'device',label:'Device',options:['desktop','mobile'],labels:['電腦版','行動版']}],
      bools:[{key:'social',label:'social 社群'},{key:'language',label:'language 語言'},{key:'backTop',label:'back-to-top 回到頂部'}],
      boolLabel:'Content',
      render:st=>ftrFooter(st.variant,{social:st.social,language:st.language,backTop:st.backTop,device:st.device}),
      note:'<b>社群 icon 與回到頂部皆為 library Button 元件實例</b>；社群 icon 已收進 Icon Library「品牌社群」分類。內部無自製按鈕。'
    });
  }

/* ==================== section-head 區段標題 ==================== */
  /* 單一區段標題列 builder：矩陣 / 內容示範 / Live 共用同一顆 */
  /* o = {align,size,eyebrow:false|'tag'|'breadcrumb',eyebrowText,title,sub:false|undefined,subText,action,filters,count:false|字串,divider} */
  function schHead(o){
    o=o||{};
    const head=ce('div','sch-head sch-a-'+(o.align||'left')+' sch-sz-'+(o.size||'m')+(o.divider?' sch-divider':''));
    const main=ce('div','sch-main');
    /* eyebrow：tag 標籤 or 麵包屑式 */
    if(o.eyebrow==='tag'){
      const eb=ce('div','sch-eyebrow');
      eb.innerHTML='<div class="tg v-soft c-rect i-brand st-default"><span>'+(o.eyebrowText||'本月焦點')+'</span></div>';
      main.appendChild(eb);
    }else if(o.eyebrow==='breadcrumb'){
      const eb=ce('div','sch-eyebrow sch-crumb');
      eb.innerHTML='訂單管理 <span class="sch-crumb-sep">›</span> 出貨明細';
      main.appendChild(eb);
    }
    /* 主標題（可選帶計數 badge） */
    const tr=ce('div','sch-titlerow');
    const h=ce('h3','sch-title');h.textContent=o.title||'近期訂單';
    tr.appendChild(h);
    if(o.count){
      const cb=ce('div','sch-count');
      cb.innerHTML='<div class="tg v-soft c-round i-neutral st-default"><span>'+o.count+'</span></div>';
      tr.appendChild(cb);
    }
    main.appendChild(tr);
    /* 副標（sub===false 才隱藏） */
    if(o.sub!==false){
      const s=ce('p','sch-sub');s.textContent=o.subText||'顯示最近 30 天內建立的訂單資料';
      main.appendChild(s);
    }
    head.appendChild(main);
    /* 右側動作：filter 按鈕群 or 單顆「查看全部」文字鈕 */
    if(o.filters){
      const act=ce('div','sch-actions');
      act.innerHTML=
        '<button class="btn v-solid i-primary sz-s">待處理</button>'+
        '<button class="btn v-outline i-secondary sz-s">已完成</button>'+
        '<button class="btn v-text i-secondary sz-s">全部</button>';
      head.appendChild(act);
    }else if(o.action){
      const act=ce('div','sch-actions');
      const b=document.createElement('button');b.className='btn v-text i-primary sz-s';
      b.innerHTML='<span>查看全部</span><span class="sch-arw">'+ICON_ARROW+'</span>';
      act.appendChild(b);head.appendChild(act);
    }
    return head;
  }

  function buildSectionHead(view){

      specRows:[['axes','<code>align × size</code>'],['formula','<code>2 × 2 = 4</code>'],['token-policy','<code>semantic.text.* / surface.line.*</code>'],['content','eyebrow / title / subtitle / action / count / divider']]});

/* list icons */
/* ---- list 家族自訂 icon ---- */
  /* caret-right（Phosphor regular）：列尾指向箭頭，比下拉 caret 更符合「可進入」語意 */
  const LST_IC_CHEVRON='<svg viewBox="0 0 256 256" fill="currentColor"><path d="M181.66,133.66l-80,80a8,8,0,0,1-11.32-11.32L164.69,128,90.34,53.66a8,8,0,0,1,11.32-11.32l80,80A8,8,0,0,1,181.66,133.66Z"/></svg>';

/* list build */
/* ==================== list 列表（資料列 ＋ 選項卡完整體系） ==================== */
  /* leading icon 池（示意用，重用既有 Phosphor const） */
  const LST_LEAD_ICONS=[ICON_HOUSE,ICON_LIST,ICON_GEAR];

  /* 狀態 → 靜態 class 字串（矩陣展示用） */
  function lstStCls(state){return state==='hover'?' is-hover':state==='selected'?' is-selected':state==='disabled'?' is-disabled':'';}
  /* 列內勾選框（重用既有 .cbx 原子） */
  function lstCbx(checked,state){
    const cb=ce('div','cbx sz-s'+(checked?' st-checked':'')+(state==='disabled'?' st-disabled':''));
    if(checked)cb.innerHTML=ICON_CHECK;
    return cb;
  }

  /* ---- 基本列 basic：左 leading（checkbox／icon 可省）＋ 中 title ＋ 右 trailing 組合 ----
     trailing 標準化：tag（重用 .tg）／info（重用 NT_IC_INFO）／meta 文字／動作鈕／caret，可組合
     o：{title,desc,leadIcon,checkbox,checked,tag,info,meta,action,caret} */
  function lstRowBasic(state,o){
    o=o||{};
    const it=ce('div','lst-item'+lstStCls(state));
    if(o.checkbox)it.appendChild(lstCbx(o.checked,state));
    if(o.leadIcon){const ld=ce('span','lst-lead');const ic=ce('span','lst-icon');ic.innerHTML=o.leadIcon;ld.appendChild(ic);it.appendChild(ld);}
    const bd=ce('div','lst-body');
    const tt=ce('div','lst-title');tt.textContent=o.title||'';bd.appendChild(tt);
    if(o.desc){const ds=ce('div','lst-desc');ds.textContent=o.desc;bd.appendChild(ds);}
    it.appendChild(bd);
    const tr=ce('div','lst-trail');let has=false;
    if(o.tag){const t=ce('div','tg v-soft c-round i-brand st-default');t.innerHTML='<span>'+o.tag+'</span>';tr.appendChild(t);has=true;} // 重用 Tag 原子
    if(o.info){const ic=ce('span','lst-info');ic.innerHTML=NT_IC_INFO;tr.appendChild(ic);has=true;} // 重用 notification info 圓標
    if(o.meta){const m=ce('span','lst-meta');m.textContent=o.meta;tr.appendChild(m);has=true;}
    if(o.amount){const p=ce('span','pr-price pr-sz-sm lst-amount');p.innerHTML='<span class="pr-cur">NT$</span><span class="pr-amt">'+o.amount+'</span>';tr.appendChild(p);has=true;} // 重用 Price 原子顯示金額
    if(o.action){const b=ce('button','btn v-text i-primary sz-s');b.innerHTML='<span>'+(typeof o.action==='string'?o.action:'動作')+'</span>';tr.appendChild(b);has=true;} // 文字按鈕（重用 Button 原子）
    if(o.caret){const c=ce('span','lst-caret');c.innerHTML=LST_IC_CHEVRON;tr.appendChild(c);has=true;}
    if(o.selCheck){tr.appendChild(lstCbx(true,state));has=true;} // 已選指示：右側補已勾選 checkbox（非 checkbox-leading 時）
    if(has)it.appendChild(tr);
    return it;
  }

  /* ---- 雙欄列 two-column：左 title、右 value（小標題）＋ caret ---- */
  function lstRowTwoCol(state,o){
    o=o||{};
    const it=ce('div','lst-item'+lstStCls(state));
    const bd=ce('div','lst-body');
    const tt=ce('div','lst-title');tt.textContent=o.title||'';bd.appendChild(tt);
    it.appendChild(bd);
    const tr=ce('div','lst-trail');
    const v=ce('span','lst-value');v.textContent=o.value||'';tr.appendChild(v);
    if(o.caret!==false){const c=ce('span','lst-caret');c.innerHTML=LST_IC_CHEVRON;tr.appendChild(c);}
    it.appendChild(tr);
    return it;
  }

  /* ---- 明細/摘要列 summary：右對齊 label（＋說明／caret）、＋按鈕新增列、NT$ 總計列 ----
     o：{label,desc,strong,caret} ／ {add:true} ／ {total:'200,000'} */
  function lstSumRow(o){
    o=o||{};
    const it=ce('div','lst-item lst-sum');
    if(o.add){ // 新增列：重用 Button 原子（text / primary）＋ IC_PLUS
      it.classList.add('is-add');
      const b=ce('button','btn v-text i-primary sz-s');b.innerHTML=IC_PLUS+'<span>按鈕</span>';it.appendChild(b);
      return it;
    }
    if(o.total){ // 總計列：重用 Price 原子（.pr-price）
      it.classList.add('is-total');
      const p=ce('span','pr-price pr-sz-md');
      p.innerHTML='<span class="pr-cur">NT$</span><span class="pr-amt">'+o.total+'</span>';
      it.appendChild(p);
      return it;
    }
    const bd=ce('div','lst-body');
    const tt=ce('div','lst-title'+(o.strong?' w-strong':''));tt.textContent=o.label||'';bd.appendChild(tt);
    if(o.desc){const ds=ce('div','lst-desc');ds.textContent=o.desc;bd.appendChild(ds);}
    it.appendChild(bd);
    if(o.caret){const tr=ce('div','lst-trail');const c=ce('span','lst-caret');c.innerHTML=LST_IC_CHEVRON;tr.appendChild(c);it.appendChild(tr);}
    return it;
  }

  /* ---- 巢狀可展開列 nested：checkbox 母列 ＋ 內縮子列，點列展開收合 ----
     o：{title,meta,checked,open,children:[{title,meta}]} */
  function lstNested(o){
    o=o||{};
    const box=ce('div','lst-nest');
    const parent=lstRowBasic('default',{title:o.title,checkbox:true,checked:o.checked,meta:o.meta});
    const sub=ce('div','lst-subwrap');
    (o.children||[]).forEach(c=>sub.appendChild(lstRowBasic('default',{title:c.title,meta:c.meta,caret:true})));
    sub.style.display=o.open?'block':'none';
    parent.addEventListener('click',e=>{
      const cb=e.target.closest('.cbx');
      if(cb){ // 點勾選框只切換勾選，不觸發展開
        const on=cb.classList.toggle('st-checked');cb.innerHTML=on?ICON_CHECK:'';return;
      }
      sub.style.display=(sub.style.display==='none')?'block':'none';
    });
    box.append(parent,sub);
    return box;
  }

  /* ---- 選項卡 selection card：整列一張有框卡（icon＋主標題＋敘述＋checkbox/radio）----
     kind：checkbox／radio；state：default/hover/selected/error/disabled
     o：{title,desc,icon,error 錯誤訊息文字,expand 展開帶 inline 下拉} */
  function lstSelCard(kind,state,o){
    o=o||{};
    const wrap=ce('div','lst-sel-wrap');
    const card=ce('div','lst-sel'+lstStCls(state)+(state==='error'?' is-error':'')+(o.expand?' is-expanded':''));
    // leading icon（預設 globe，沿用 .lst-lead / .lst-icon 尺寸樣式）
    const ld=ce('span','lst-lead');const ic=ce('span','lst-icon');ic.innerHTML=o.icon||IC_GLOBE;ld.appendChild(ic);card.appendChild(ld);
    const main=ce('div','lst-sel-main');
    const tt=ce('div','lst-sel-title');tt.textContent=o.title||'主標題';main.appendChild(tt);
    const ds=ce('div','lst-sel-desc');ds.textContent=o.desc||'相關的敘述說明';main.appendChild(ds);
    card.appendChild(main);
    // 右側選擇控制：checkbox 重用 .cbx、radio 重用 .rdo 原子
    const on=state==='selected';
    let ctl;
    if(kind==='radio'){
      ctl=ce('div','rdo sz-m'+(on?' st-checked':state==='disabled'?' st-disabled':' st-default'));
      ctl.innerHTML='<span class="dot"></span>';
    }else{
      ctl=ce('div','cbx sz-m'+(on?' st-checked':state==='disabled'?' st-disabled':' st-default'));
      if(on)ctl.innerHTML=ICON_CHECK;
    }
    card.appendChild(ctl);
    // 展開帶 inline 下拉的進階版（重用 .field 靜態外觀）
    if(o.expand){
      const ex=ce('div','lst-sel-extra');
      ex.appendChild(lstMiniField());
      const dash=ce('span','lst-sel-dash');dash.textContent='–';ex.appendChild(dash);
      ex.appendChild(lstMiniField());
      card.appendChild(ex);
    }
    wrap.appendChild(card);
    if(state==='error'){const e=ce('div','lst-sel-err');e.textContent=o.error||'錯誤訊息';wrap.appendChild(e);}
    return wrap;
  }
  /* 選項卡展開版 inline 下拉（重用 .field / .ph / .ddcaret 樣式，靜態示意） */
  function lstMiniField(){
    const f=ce('div','field dd v-outline lst-sel-field');
    f.innerHTML='<span class="dd-body"><span class="ph">請選擇</span></span><span class="ddcaret">'+ICON_CARET+'</span>';
    return f;
  }

  /* 依 variant × state 給矩陣單格內容；error 為選項卡專屬 → 其餘顯示不適用
     雙欄／巢狀：母列（checkbox＋標題＋右側小標題）＋ 一條內縮子列示意上下兩層；已選 → 母列勾選框打勾 */
  function lstMatrixCell(variant,state){
    if(state==='error'&&variant!=='selection'){const na=ce('div','lst-na');na.textContent='—（selection 專屬）';return na;}
    if(variant==='selection')return lstSelCard('checkbox',state,{});
    const wrap=ce('div','lst-solo');
    const nest=ce('div','lst-nest');
    nest.appendChild(lstRowBasic(state,{checkbox:true,checked:(state==='selected'),title:'標題',meta:'小標題'}));
    const sub=ce('div','lst-subwrap');sub.style.display='block';
    sub.appendChild(lstRowBasic('default',{title:'子項',meta:'小標題',caret:true}));
    nest.appendChild(sub);
    wrap.appendChild(nest);
    return wrap;
  }

  /* List Item 專用矩陣格：leading（勾選框／圖示／無）× state；已選狀態僅勾選框 leading 適用（其餘不適用） */
  function lstiCell(leading,state){
    if(state==='selected'&&leading!=='checkbox'){const na=ce('div','lst-na');na.textContent='—（需勾選框）';return na;}
    const o={title:'資訊列標題',tag:'標籤',caret:true};
    if(leading==='checkbox'){o.checkbox=true;o.checked=(state==='selected');}
    else if(leading==='icon'){o.leadIcon=IC_GLOBE;}
    const wrap=ce('div','lst-solo');wrap.appendChild(lstRowBasic(state,o));
    return wrap;
  }

  /* 整組列表卡片：收多個列節點 ＋ 可選分隔線；filled=填色卡片底 */
  function lstGroup(nodes,o){
    o=o||{};
    const g=ce('div','lst-group'+(o.filled?' v-filled':''));
    nodes.forEach((n,i)=>{
      if(i>0&&o.divider)g.appendChild(ce('div','lst-divider'));
      g.appendChild(n);
    });
    return g;
  }

  /* ==================== List Item 資訊列（左右欄位可自由配置的單列） ==================== */
  function buildListItem(view){
    const body=viewScaffold(view,{eyebrow:'L3 Component · List Item',title:'List Item 資訊列',
      lede:'列表的<b>基本單元</b>：左 <b>leading</b>（無／圖示／勾選框）＋ 中 <b>body</b>（title，可加副描述）＋ 右 <b>trailing</b>（tag／info／meta／動作鈕／caret／checkbox，<b>可複選</b>）。每個欄位都能獨立開關組合，是 List、Menu、選項卡等容器共用的原子列。狀態走 default／hover／selected／disabled；<b>已選</b>會出現已勾選的 checkbox 作為選取指示。',
      specRows:[['axes','<code>leading × state</code>'],['formula','<code>3 × 4 = 12</code>'],['token-policy','<code>semantic.*.list.*</code>'],['slots','leading / title / desc / trailing 組合']]});
    const axes=DIAL_SPECS['list-item'].axes, zh=DIAL_SPECS['list-item'].zh, active=CHOICE['list-item'].active; // 接中央 store
    const LN={checkbox:['勾選框','checkbox'],icon:['圖示','icon'],none:['無','none']};
    const STN={default:['預設','default'],hover:['滑過','hover'],selected:['已選','selected'],disabled:['停用','disabled']};
    let p;
    function renderM(){ if(!p)return; p.innerHTML='';
      const ls=axes.leading.filter(v=>active.leading.has(v));
      const ss=axes.state.filter(v=>active.state.has(v));
      p.appendChild(matrixPanel({badge:'list · item',name:'Leading × State（前置欄位 × 狀態；已選出現已勾選 checkbox）',
        rows:ls,cols:ss,
        rowLab:v=>labHTML(LN[v][0],LN[v][1]),
        colLab:s=>labHTML(STN[s][0],STN[s][1]),
        cell:(l,s)=>lstiCell(l,s),mincol:260})); }
    mountDial(body,{axes,zh,active,onRender:renderM});
    const sec=section(body,'Leading × State 矩陣','列＝左側前置（勾選框／圖示／無）、欄＝狀態。hover 底色轉深、selected 帶淡藍底＋左側 accent 色條並出現已勾選 checkbox、disabled 整體淡化。');
    p=panelsIn(sec);renderM();

    // ---- Slot 組合：左右欄位自由組合 ----
    const bs=section(body,'Slot 組合 · 左右欄位','左 leading（無／圖示／勾選框）＋ 中 title（可加副描述）＋ 右 trailing 標準化：tag（重用 Tag）／info icon／meta 文字／金額（重用 Price）／動作鈕（文字按鈕，重用 Button）／caret，依資訊密度自由組合。');
    const bwrap=ce('div','lst-group-demo');
    bwrap.appendChild(lstGroup([
      lstRowBasic('default',{title:'純標題'}),
      lstRowBasic('default',{title:'標題',desc:'相關的敘述說明'}),
      lstRowBasic('default',{title:'圖示＋標籤',leadIcon:IC_GLOBE,tag:'標籤'}),
      lstRowBasic('default',{title:'勾選框＋尾端資訊',checkbox:true,meta:'小標題'}),
      lstRowBasic('default',{title:'金額',amount:'1,280'}),
      lstRowBasic('default',{title:'資訊圖示＋箭頭',info:true,caret:true}),
      lstRowBasic('default',{title:'動作鈕',action:'編輯'}),
    ],{divider:true}));
    bs.appendChild(bwrap);

    // ---- 實際互動 Live：每個 slot 一個開關，全部對應樣式；hover 為真實滑過、disabled 用勾選（比照其他頁面）----
    const sl=section(body,'實際互動 Live','切 Leading（無／圖示／勾選框），勾選右側 trailing 各 slot；滑鼠移上去看 hover、勾 disabled 停用、點勾選框 leading 切換勾選並轉已選。每個開關都對應一個可見樣式。');
    mountLive(sl,{
      initial:{leading:'checkbox',desc:false,tag:true,info:false,meta:false,amount:false,action:false,caret:true,disabled:false},
      segs:[
        {key:'leading',label:'Leading 前置',options:['none','icon','checkbox'],labels:['無','圖示','勾選框']},
      ],
      bools:[
        {key:'desc',label:'desc 副描述'},
        {key:'tag',label:'tag 標籤'},
        {key:'info',label:'info 資訊圖示'},
        {key:'meta',label:'meta 尾端文字'},
        {key:'amount',label:'amount 金額'},
        {key:'action',label:'action 動作鈕'},
        {key:'caret',label:'caret 箭頭'},
        {key:'disabled',label:'disabled 停用'},
      ],
      boolLabel:'Trailing 組合',
      render:st=>{
        const state=st.disabled?'disabled':'default';
        const o={title:'資訊列標題',
          desc:st.desc?'相關的敘述說明':null,
          leadIcon:st.leading==='icon'?IC_GLOBE:null,
          checkbox:st.leading==='checkbox',
          tag:st.tag?'標籤':null,info:st.info,meta:st.meta?'小標題':null,
          amount:st.amount?'1,280':null,action:st.action,caret:st.caret};
        const row=lstRowBasic(state,o);
        if(!st.disabled){ // 可點：checkbox-leading 切勾選＋已選；其餘點列切已選
          row.style.cursor='pointer';
          row.addEventListener('click',()=>{
            if(st.leading==='checkbox'){const cb=row.querySelector('.cbx');if(cb){const on=cb.classList.toggle('st-checked');cb.innerHTML=on?ICON_CHECK:'';row.classList.toggle('is-selected',on);}}
            else{row.classList.toggle('is-selected');}

        const box=ce('div','lst-solo');box.appendChild(row);return box;

    });
  }

  /* 單一摺疊面板：variant 控外觀、state 控狀態；expanded 才渲染 body、caret 朝上 */
  function cpsPanel(variant,state,o){
    o=o||{};
    const expanded=(state==='expanded');
    const panel=ce('div','cps-panel v-'+variant+' st-'+state);
    const head=ce('div','cps-head');
    let h=''; if(o.icon)h+=`<span class="cps-lead">${o.icon}</span>`;
    h+=`<span class="cps-title">${o.title||'標題'}</span><span class="cps-caret">${ICON_CARET}</span>`;
    head.innerHTML=h;
    panel.appendChild(head);
    if(expanded){                                   // 展開狀態才渲染 body（外層 wrap 負責展開動畫版位）
      const bwrap=ce('div','cps-body-wrap');
      const bodyEl=ce('div','cps-body');
      bodyEl.innerHTML=o.body||'';
      bwrap.appendChild(bodyEl);
      panel.appendChild(bwrap);
    }
    return panel;
  }

  /* 真正可互動的手風琴：點 header 切換展開／收合（切 class 交給 CSS grid 0fr→1fr 往下展開 + 淡入動畫）。
     o.variant 風格；o.multiple 允許多項同時展開（否則單開手風琴，展開新項自動收合前一項）；
     o.icon 左側前置圖示；o.firstOpen 預設展開第一項；
     o.indicator 指示 icon：'chevron'（caret 旋轉 180°）或 'plusminus'（收合顯示＋、展開顯示−，不旋轉） */
  function cpsAccordion(items,o){
    o=o||{};
    const variant=o.variant||'bordered';
    const indicator=o.indicator||'chevron';
    const wrap=ce('div','cps-acc v-'+variant);
    const panels=[];
    // 統一開合入口：只切 class（動畫由 CSS transition 負責），plusminus 模式同步換＋／−
    const setOpen=(r,open)=>{
      r.panel.classList.toggle('is-open',open);
      r.head.setAttribute('aria-expanded',open?'true':'false');
      if(indicator==='plusminus')r.caret.innerHTML=open?CPS_ICON_MINUS:CPS_ICON_PLUS;
    };
    items.forEach((it,idx)=>{
      const open=!!it.open||(!!o.firstOpen&&idx===0);
      const panel=ce('div','cps-panel v-'+variant+(open?' is-open':'')+(indicator==='plusminus'?' ind-pm':''));
      const head=ce('button','cps-head cps-head-btn');head.type='button';
      let hd=''; if(o.icon)hd+=`<span class="cps-lead">${o.icon}</span>`;
      const ind=indicator==='plusminus'?(open?CPS_ICON_MINUS:CPS_ICON_PLUS):ICON_CARET;
      hd+=`<span class="cps-title">${it.title}</span><span class="cps-caret">${ind}</span>`;
      head.innerHTML=hd;
      head.setAttribute('aria-expanded',open?'true':'false');
      const bwrap=ce('div','cps-body-wrap');          // 動畫外層：grid rows 0fr／1fr
      const body=ce('div','cps-body');body.innerHTML=it.body;
      bwrap.appendChild(body);
      const rec={panel,head,caret:head.querySelector('.cps-caret')};
      head.onclick=()=>{
        const isOpen=panel.classList.contains('is-open');
        if(!o.multiple)panels.forEach(r=>setOpen(r,false)); // 單開模式：先收合所有項
        setOpen(rec,!isOpen);
      };
      panel.append(head,bwrap);
      panels.push(rec);
      wrap.appendChild(panel);
    });
    return wrap;
  }

  /* popup footer：排列與裝置脫鉤，改由旗標自由組合——lay.arrange 四選一：
     'row' 並排（次→主 等寬）／'stack' 垂直堆疊（主 solid 全寬 → 次 outline 全寬）／
     'primary' 單顆主按鈕（solid 全寬）／'secondary' 單顆次按鈕（outline 全寬）；
     lay.text=true 再加一顆 text 按鈕（如「稍後提醒我」）。live 時掛 .live 開啟真互動 */
  function mdlPopFoot(c,lay,live,compact){
    lay=lay||{};
    const arrange=lay.arrange||'row';
    const single=(arrange==='primary'||arrange==='secondary');
    const sz=compact?'sz-s':'sz-m';                       // 矩陣縮小示意用 s、Live 用 m
    const lv=live?' live':'';
    const foot=ce('div','mdl-pop-foot'+((arrange==='stack'||single)?' stack':'')); // stack/單顆皆走全寬直排
    const mkSec=()=>{const b=ce('button','btn v-outline i-primary '+sz+lv);b.innerHTML='<span>'+c.secondary+'</span>';b.setAttribute('data-mdl-cancel','1');return b;}; // 次按鈕：primary outline
    const mkPri=()=>{const b=ce('button','btn v-solid '+c.primary.cls+' '+sz+lv);b.innerHTML='<span>'+c.primary.label+'</span>';return b;}; // 主按鈕：solid（intent 依 variant）
    if(arrange==='primary')foot.appendChild(mkPri());            // 單顆主按鈕
    else if(arrange==='secondary')foot.appendChild(mkSec());     // 單顆次按鈕
    else if(arrange==='stack')foot.append(mkPri(),mkSec());      // 垂直堆疊：主在上、次在下
    else foot.append(mkSec(),mkPri());                           // 並排：次→主 等寬
    if(lay.text){                                         // 文字按鈕（第三動作）：永遠獨占一列全寬
      const txt=ce('button','btn v-text i-primary '+sz+lv);
      txt.innerHTML='<span>'+c.text+'</span>';
      foot.appendChild(txt);
    }
    return foot;
  }
  /* modal footer：右對齊 次按鈕＋確認 */
  function mdlModalFoot(c,live){
    const lv=live?' live':'';
    const foot=ce('div','mdl-foot');
    const sec=ce('button','btn v-outline i-secondary sz-s'+lv);
    sec.innerHTML='<span>'+c.cancel+'</span>';
    sec.setAttribute('data-mdl-cancel','1');              // Live 用來綁「取消」關閉
    const ok=ce('button','btn v-solid i-primary sz-s'+lv);
    ok.innerHTML='<span>'+c.confirm+'</span>';
    foot.append(sec,ok);
    return foot;
  }

  /* close × 按鈕；abs=true 時絕對定位到右上（confirm 版用） */
  function mdlClose(abs){
    const b=ce('button','mdl-close'+(abs?' mdl-abs':''));
    b.innerHTML=ICON_CLOSE;b.setAttribute('aria-label','關閉對話框');
    return b;
  }

  /* 對話框卡片主體。kind=popup|modal；
     o = {variant, icon, arrange, textBtn, closeIcon, description, note, remember, subtitle, long, clip, footer, compact, live} */
  function mdlCard(kind,o){
    o=o||{};
    const compact=o.compact?' mdl-compact':'';
    if(kind==='popup'){
      /* ---- popup 置中小卡：置中標題＋說明＋可選 icon（顏色依語意）／備註／記住帳號 ---- */
      const v=o.variant==='illustration'?'illustration':'normal';
      const c=MDL_CONTENT.popup[v];
      const card=ce('div','mdl-card mdl-kind-popup'+compact);
      const body=ce('div','mdl-pop-body');
      if(o.icon){const ic=ce('div','mdl-illus'+(v==='illustration'?' is-danger':''));ic.innerHTML=MDL_ICON_WARNING;body.appendChild(ic);} // 頂部圓 icon：可選旗標，顏色依 variant 語意（一般＝主色、警示＝紅）
      const t=ce('div','mdl-pop-title');t.textContent=c.title;body.appendChild(t);
      if(o.description!==false){const d=ce('p','mdl-desc');d.textContent=c.desc;body.appendChild(d);}
      if(o.note){const n=ce('div','mdl-note');n.textContent=c.note;body.appendChild(n);}
      if(o.remember){                                     // 記住帳號：重用 .cbx 原子，live 時可點選切換
        const row=ce('label','mdl-remember');
        const cb=ce('span','cbx sz-s st-checked');cb.innerHTML=ICON_CHECK;
        let on=true;
        if(o.live)row.onclick=e=>{e.preventDefault();on=!on;cb.className='cbx sz-s'+(on?' st-checked':'');cb.innerHTML=on?ICON_CHECK:'';};
        row.appendChild(cb);row.appendChild(document.createTextNode(c.remember));
        body.appendChild(row);
      }
      card.appendChild(body);
      if(o.footer!==false)card.appendChild(mdlPopFoot(c,{arrange:o.arrange,text:o.textBtn},o.live,o.compact));
      return card;
    }
    /* ---- modal 寬版視窗：header（標題＋副標題＋×）＋可捲動 content ＋右對齊 footer ---- */
    const v=o.variant==='larger'?'larger':'regular';
    const c=MDL_CONTENT.modal[v];
    const card=ce('div','mdl-card mdl-kind-modal'+(v==='larger'?' mdl-larger':'')+compact);
    const head=ce('div','mdl-mhead');
    const ht=ce('div','mdl-mhead-txt');
    const t=ce('div','mdl-title');t.textContent=c.title;ht.appendChild(t);
    if(o.subtitle!==false&&c.sub){const s=ce('div','mdl-sub');s.textContent=c.sub;ht.appendChild(s);} // 副標題：regular／larger 各有情境文案，可用旗標關閉
    head.appendChild(ht);
    if(o.closeIcon!==false)head.appendChild(mdlClose(false));   // 右上關閉 ×
    card.appendChild(head);
    const ct=ce('div','mdl-content'+(o.clip?' mdl-clip':''));
    const paras=o.long?MDL_CONTENT.paras.concat(MDL_CONTENT.paras):MDL_CONTENT.paras.slice(0,2); // long＝鋪長示範卷軸
    paras.forEach(x=>{const d=ce('p','mdl-desc');d.textContent=x;ct.appendChild(d);});
    if(v==='larger'){                                     // larger 示範內容可承載表單：重用既有 field 原子
      const fs=ce('div','mdl-fields');
      [{ph:'請輸入收件人姓名'},{ph:'請輸入配送備註'}].forEach(f=>{
        const field=ce('div','field v-outline');
        const inp=document.createElement('input');inp.className='bare';inp.placeholder=f.ph;
        field.appendChild(inp);fs.appendChild(field);
      });
      ct.appendChild(fs);
    }
    card.appendChild(ct);
    if(o.footer!==false)card.appendChild(mdlModalFoot(c,o.live));
    return card;
  }

  /* 浮層結構示意：viewport 內三層（頁面骨架 / backdrop 遮罩 / 置中卡片）+ 圖例 */

  function buildModal(view){
    const body=viewScaffold(view,{eyebrow:'L3 Component · Modal',title:'Modal 對話框',
      lede:'覆蓋在頁面之上、需<b>先回應才能繼續</b>的浮層容器：由 <b>backdrop 遮罩</b>＋<b>卡片</b>組成。依 Figma 定義分兩種大小——<b>popup 小彈窗</b>（置中小卡：置中標題＋說明＋可選 icon／備註／記住帳號；icon 為可選旗標、<b>顏色依語意</b>：一般＝主色、警示＝紅；footer 排列可自由組合：<b>並排</b>／<b>垂直堆疊</b>，可再加<b>文字按鈕</b>第三動作）與 <b>modal 大視窗</b>（header 標題＋副標題＋關閉 ×、可捲動 content、footer 右對齊；regular 桌機標準寬 800px、larger 寬高 auto 上限 1224px；<b>行動版轉為 bottom sheet</b>：貼齊底部、全寬、上緣圓角、最高約 95vh、由下往上滑入）。點 × 或遮罩空白處皆可關閉。',
      specRows:[['axes','<code>kind × variant</code>'],['formula','<code>popup(2) + modal(2) = 4</code>'],['token-policy','<code>semantic.*.modal.*</code>'],['features','icon(語意色) / note / remember / 並排·堆疊·文字按鈕 / close-icon / subtitle / scroll-content / footer / bottom-sheet(行動版)']]});
    const axes=DIAL_SPECS.modal.axes, zh=DIAL_SPECS.modal.zh, active=CHOICE.modal.active; // 接中央 store
    const PV={normal:['一般','normal'],illustration:['警示','illustration']};             // popup 的 variant：語意差異，icon 顏色與主按鈕 intent 隨之變化

          rows:pv,cols:['row','stack','primary','secondary'],
          rowLab:v=>labHTML(PV[v][0],PV[v][1]),
          colLab:a=>labHTML(ARRZH[a],a),
          cell:(v,a)=>mdlCard('popup',{variant:v,icon:v==='illustration',note:v==='illustration',remember:v==='illustration',arrange:a,compact:true}),mincol:230}));
      }
      if(ks.includes('modal')&&mv.length){
        p.appendChild(matrixPanel({badge:'kind · modal',name:'Modal 大視窗（列＝variant、欄＝內容長度：適中／溢出出現卷軸）',

    const ls=section(body,'浮層結構','對話框是一個疊在頁面之上的層級：底層頁面內容被 backdrop 遮罩壓暗，卡片置中浮於最上層，點擊遮罩空白處可關閉。');

    /* 共用舞台：root＋重開鈕＋overlay；sheet=true 時（modal 行動版）轉 bottom sheet 版型 */
    function mdlLiveStage(kind,opts,sheet){
      const root=ce('div','mdl-live-root'+(sheet?' vp-mobile':''));      // 行動版：舞台縮成手機視口寬
      const trig=ce('button','btn v-solid i-primary live mdl-reopen');   // 關閉後才現身的重開鈕
      trig.innerHTML='<span>重新開啟對話框</span>';
      root.appendChild(trig);
      let overlay=null;
      function close(){ if(overlay){overlay.remove();overlay=null;trig.classList.add('show');} }
      function open(){ if(overlay)return; trig.classList.remove('show');
        overlay=ce('div','mdl-overlay'+(sheet?' mdl-sheet-ov':''));       // 行動版：內容對齊底部
        const card=mdlCard(kind,Object.assign({live:true},opts));
        if(sheet)card.classList.add('mdl-sheet');                         // 行動版：貼底、全寬、上緣圓角、由下滑入
        overlay.appendChild(card);
        overlay.addEventListener('click',e=>{ if(e.target===overlay)close(); }); // 點遮罩空白處關閉
        const x=card.querySelector('.mdl-close'); if(x)x.onclick=close;           // 點 × 關閉（modal）
        const cc=card.querySelector('[data-mdl-cancel]'); if(cc)cc.onclick=close; // 點「取消／次按鈕」關閉
        root.appendChild(overlay);
      }
      trig.onclick=open;
      open();                                            // ★ 預設開啟：初始畫面直接看到對話框
      return root;
    }

    /* ---- popup 段：只放對 popup 有效的控制項（無空轉開關） ---- */

    sl.appendChild(lp);
    mountLive(lp,{
      initial:{variant:'normal',arrange:'row',icon:false,description:true,note:false,remember:true,textBtn:false},
      segs:[
        {key:'variant',label:'Variant',options:['normal','illustration'],labels:['一般','警示']},
        {key:'arrange',label:'按鈕排列',options:['row','stack','primary','secondary'],labels:['並排','垂直','單顆主','單顆次']},
      ],
      bools:[
        {key:'icon',label:'icon 圖示（顏色依 variant）'},
        {key:'description',label:'description 說明'},
        {key:'note',label:'note 備註'},
        {key:'remember',label:'checkbox 記住帳號'},

      ],
      boolLabel:'Content',
      render:st=>mdlLiveStage('popup',{variant:st.variant,icon:st.icon,description:st.description,note:st.note,remember:st.remember,arrange:st.arrange,textBtn:st.textBtn}),
      note:'排列與裝置脫鉤，可自由組合：<b>並排</b>＝次＋主等寬、<b>垂直堆疊</b>＝主（solid 全寬）→次（outline 全寬），再勾<b>文字按鈕</b>疊出第三動作（如「稍後提醒我」）。<b>icon</b> 是可選旗標、一般版也能開；顏色依 variant 語意——一般＝主色、警示＝紅（警示與一般的差異只在顏色與主按鈕 intent）。↓ 快速對照：同一顆 icon 在兩種語意下的顏色。',
      free:()=>[mdlCard('popup',{variant:'normal',icon:true,compact:true}),mdlCard('popup',{variant:'illustration',icon:true,note:true,remember:true,compact:true})]
    });

    /* ---- modal 段：只放對 modal 有效的控制項（含 Device：行動版轉 bottom sheet） ---- */
    const lm=ce('div','mdl-live-block');
    const lmc=ce('div','mdl-live-cap');lmc.innerHTML='<b>Modal 大視窗</b>';lm.appendChild(lmc);
    sl.appendChild(lm);
    mountLive(lm,{
      initial:{variant:'regular',device:'desktop',subtitle:true,closeIcon:true,long:false,footer:true},
      segs:[
        {key:'variant',label:'Variant',options:['regular','larger'],labels:['標準 800px','大版 ≤1224px']},
        {key:'device',label:'Device',options:['desktop','mobile'],labels:['桌機（置中）','行動版（bottom sheet）']},
      ],
      bools:[
        {key:'subtitle',label:'subtitle 副標題'},
        {key:'closeIcon',label:'close-icon 關閉 ×'},
        {key:'long',label:'長內容卷軸'},
        {key:'footer',label:'footer 動作列'},
      ],
      boolLabel:'Content',
      render:st=>mdlLiveStage('modal',{variant:st.variant,subtitle:st.subtitle,closeIcon:st.closeIcon,long:st.long,footer:st.footer},st.device==='mobile'),
      note:'<b>Device</b> 會真的改變版型：桌機＝置中卡片；行動版＝<b>bottom sheet</b>——舞台縮成手機視口、面板貼齊底部、全寬、上緣圓角（下緣不圓）、最高約 95%（示意 95vh）、由下往上滑入。真實規格：modal content max-height 80vh／min-height 30vh，舞台內以縮小高度示意。↓ 靜態縮小示意：內容溢出出現卷軸。',
      free:()=>[mdlCard('modal',{variant:'regular',long:true,clip:true,compact:true})]

  /* 單一節點：state = done/current/todo/error/disabled；variant 控制內容物 */
  function stpNode(state,variant,o){
