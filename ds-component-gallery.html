        if(i<steps.length-1)rail.appendChild(ce('div','stp-vconn'+(s.state==='done'?' stp-conn-done':'')));
        const labels=ce('div','stp-labels');
        labels.innerHTML=`<span class="stp-title">${s.label}</span>`+(s.description?`<span class="stp-desc">${s.description}</span>`:'');
        step.append(rail,labels);
        w.appendChild(step);
      });
      return w;
    }
    const w=ce('div','stp-horizontal '+vcls);
    steps.forEach((s,i)=>{
      const step=ce('div','stp-step stp-is-'+s.state);
      step.appendChild(stpNode(s.state,variant,{num:i+1,icon:s.icon}));
      const labels=ce('div','stp-labels');
      labels.innerHTML=`<span class="stp-title">${s.label}</span>`+(s.description?`<span class="stp-desc">${s.description}</span>`:'');
      step.appendChild(labels);
      w.appendChild(step);
      if(i<steps.length-1)w.appendChild(ce('div','stp-conn'+(s.state==='done'?' stp-conn-done':'')));
    });
    return w;
  }
  /* 主矩陣用的 4 步流程（結帳情境）：狀態混合 done→current→todo→todo */
  const STP_MX_LABELS=['帳號','資料','付款','完成'];
  const STP_MX_STATES=['done','current','todo','todo'];
  const STP_MX_DESC=['已驗證','填寫中','待處理','待處理'];
  function stpMxSteps(){
    return STP_MX_LABELS.map((lb,i)=>({label:lb,icon:STP_ICONS[i],state:STP_MX_STATES[i]}));
  }
  /* Live 用的 4 步流程（每步可帶副標） */
  const STP_LIVE_STEPS=[
    {label:'建立帳號',description:'填寫 Email 與密碼',icon:ICON_HOUSE},
    {label:'基本資料',description:'姓名與聯絡方式',icon:ICON_LIST},
    {label:'上傳文件',description:'身分證明檔案',icon:ICON_UPLOAD},
    {label:'完成設定',description:'確認並送出',icon:ICON_GEAR},
  ];

  function buildStep(view){
    const body=viewScaffold(view,{eyebrow:'L3 Component · Step',title:'Step 步驟指示器',
      lede:'呈現多步驟流程的<b>進度指示器（stepper）</b>：一連串節點（編號／圓點／圖示）以連接線相接，代表使用者在流程中的位置。單步狀態分 <b>done 已完成</b>（打勾／accent 實心）、<b>current 進行中</b>（accent 外圈高亮）、<b>todo 待處理</b>（灰）、<b>error 錯誤</b>（紅）、<b>disabled 停用</b>。方向可橫向（horizontal）或縱向（vertical）。',
      specRows:[['axes','<code>orientation × variant</code>'],['formula','<code>2 × 3</code>'],['state','<code>done · current · todo · error · disabled</code>'],['token-policy','<code>semantic.*.stepper.*</code>']]});
    const axes=DIAL_SPECS.step.axes, zh=DIAL_SPECS.step.zh, active=CHOICE.step.active; // 接中央 store
    const ORIN={horizontal:['水平','horizontal'],vertical:['垂直','vertical']};
    const VARN={numbered:['編號','numbered'],dotted:['圓點','dotted'],icon:['圖示','icon']};
    let p;
    function renderM(){ if(!p)return; p.innerHTML='';
      const oris=axes.orientation.filter(v=>active.orientation.has(v));
      const vas=axes.variant.filter(v=>active.variant.has(v));
      p.appendChild(matrixPanel({badge:'step · 4-steps',name:'Orientation × Variant（每格為 4 步流程；步1 done、步2 current、步3–4 todo）',
        rows:oris,cols:vas,
        rowLab:o=>labHTML(ORIN[o][0],ORIN[o][1]),
        colLab:v=>labHTML(VARN[v][0],VARN[v][1]),
        cell:(o,v)=>stpStepper(o,v,stpMxSteps()),mincol:320})); }
    mountDial(body,{axes,zh,active,onRender:renderM});
    const sec=section(body,'Orientation × Variant 矩陣','列＝方向（水平／垂直）、欄＝樣式（編號／圓點／圖示）；每格是一條 4 步 stepper，混合 done／current／todo 狀態，已完成段落連接線轉為 accent。');
    p=panelsIn(sec);renderM();

    const ss=section(body,'單一 Step 狀態','單一節點的五種狀態：已完成（打勾）、進行中（高亮外圈）、待處理（灰）、錯誤（紅・警示）、停用（淡化）。');
    const rd=ce('div','row-demo');
    [['done 已完成',()=>stpNode('done','numbered',{num:1})],
     ['current 進行中',()=>stpNode('current','numbered',{num:2})],
     ['todo 待處理',()=>stpNode('todo','numbered',{num:3})],
     ['error 錯誤',()=>stpNode('error','numbered',{num:4})],
     ['disabled 停用',()=>stpNode('disabled','numbered',{num:5})]
    ].forEach(([cap,fn])=>{const it=ce('div','demo-item');it.appendChild(fn());const c=ce('div','cap');c.innerHTML=`<b>${cap}</b>`;it.appendChild(c);rd.appendChild(it);});
    ss.appendChild(rd);

    const sl=section(body,'實際互動 Live','按「上一步／下一步」移動 current，走過的步驟自動變 done；切換方向（水平／垂直）與樣式（編號／圓點／圖示），勾 description 顯示每步副標。');
    mountLive(sl,{
      initial:{orientation:'horizontal',variant:'numbered',description:false,idx:1},
      segs:[
        {key:'orientation',label:'Orientation',options:['horizontal','vertical'],labels:['水平','垂直']},
        {key:'variant',label:'Variant',options:['numbered','dotted','icon'],labels:['編號','圓點','圖示']},
      ],
      bools:[{key:'description',label:'description 每步副標'}],
      boolLabel:'Content',
      render:st=>{
        const wrap=ce('div','stp-live-wrap');
        const stage=ce('div','stp-live-stage');
        function draw(){
          stage.innerHTML='';
          const steps=STP_LIVE_STEPS.map((s,i)=>({
            label:s.label,icon:s.icon,
            description:st.description?s.description:null,
            state:i<st.idx?'done':(i===st.idx?'current':'todo')
          }));
          stage.appendChild(stpStepper(st.orientation,st.variant,steps));
        }
        const ctl=ce('div','stp-live-ctl');
        const prev=ce('button','btn v-outline i-secondary sz-s');prev.textContent='上一步';
        const next=ce('button','btn v-solid i-primary sz-s');next.textContent='下一步';
        function syncBtns(){prev.disabled=st.idx<=0;next.disabled=st.idx>=STP_LIVE_STEPS.length-1;}
        prev.onclick=()=>{if(st.idx>0){st.idx--;draw();syncBtns();}};
        next.onclick=()=>{if(st.idx<STP_LIVE_STEPS.length-1){st.idx++;draw();syncBtns();}};
        ctl.append(prev,next);
        wrap.append(stage,ctl);
        draw();syncBtns();
        return wrap;
      },
      note:'current 表示目前所在步驟（accent 外圈）；點「下一步」後前一步變 done、連接線轉 accent。到最後一步時「下一步」停用。'
    });
  }

  const BUILD={input:buildInput,dropdown:buildDropdown,selector:buildSelector,tag:buildTag,tab:buildTab,tooltip:buildTooltip,notification:buildNotification,skeleton:buildSkeleton,loader:buildLoader,menu:buildMenu,'action-menu':buildActionMenu,breadcrumb:buildBreadcrumb,pagination:buildPagination,icon:buildIcon,price:buildPrice,image:buildImage,header:buildHeader,footer:buildFooter,'section-head':buildSectionHead,list:buildList,'list-item':buildListItem,collapse:buildCollapse,modal:buildModal,drawer:buildDrawer,'floating-line':buildFloatingLine,step:buildStep};

  /* ===== 複雜度確認總覽 ===== */
  function choiceReport(){
    // 回傳 {id:{axis:[選中值],...,count,full}, _total, _full}
    const out={};let total=0,full=0;
    Object.keys(DIAL_SPECS).forEach(id=>{const spec=DIAL_SPECS[id],act=CHOICE[id].active;const rec={};let c=1,f=1;
      spec.order.forEach(k=>{const sel=spec.axes[k].filter(v=>act[k].has(v));rec[k]=sel;c*=sel.length;f*=spec.axes[k].length;});
      rec.count=c;rec.full=f;out[id]=rec;total+=c;full+=f;});
    out._total=total;out._full=full;return out;
  }
  const SUMSEL=new Set(Object.keys(DIAL_SPECS)); // 手動選取要產出的元件（預設全選、跨切頁持久）
  const RECOMMEND=['button','input','dropdown','checkbox','radio','tag']; // AI 建議＝已定案的元件
  let aiOn=false,aiSnapshot=null; // AI 建議 toggle 狀態＋開啟前的選擇快照
  const DIAL_PAGE={button:'button',input:'input',dropdown:'dropdown',checkbox:'selector',radio:'selector',tag:'tag',tab:'tab',notification:'notification',tooltip:'tooltip',skeleton:'skeleton',loader:'loader',menu:'menu','action-menu':'action-menu',breadcrumb:'breadcrumb',pagination:'pagination',icon:'icon',price:'price',image:'image',
    header:'header',
    footer:'footer',
    'section-head':'section-head',
    list:'list',
    'list-item':'list-item',
    collapse:'collapse',
    modal:'modal',
    drawer:'drawer',
    'floating-line':'floating-line',
    step:'step'
  }; // 轉盤元件 → 對應頁面（checkbox/radio 都在 selector 頁）
  const ICON_SPARK='<svg viewBox="0 0 256 256" fill="currentColor"><path d="M208,144a15.78,15.78,0,0,1-10.42,14.94l-51.65,19-19,51.66a15.94,15.94,0,0,1-29.88,0L78,178l-51.62-19a15.94,15.94,0,0,1,0-29.88l51.65-19,19-51.66a15.94,15.94,0,0,1,29.88,0l19,51.65,51.66,19A15.78,15.78,0,0,1,208,144ZM152,48h16V64a8,8,0,0,0,16,0V48h16a8,8,0,0,0,0-16H184V16a8,8,0,0,0-16,0V32H152a8,8,0,0,0,0,16Zm88,32h-8V72a8,8,0,0,0-16,0v8h-8a8,8,0,0,0,0,16h8v8a8,8,0,0,0,16,0V96h8a8,8,0,0,0,0-16Z"/></svg>';
  function renderSummary(view){
    const rep=choiceReport();
    view.innerHTML=`<div class="sum-top"><div class="sum-head"><p class="eyebrow">Overview · 匯出需求</p><h1>匯出需求</h1></div>
        <button class="copybtn" id="copyBtn">複製並匯出JSON</button></div>
      <p class="lede">每個元件<b>最後選定的複雜度</b>——展開牌卡可看該元件在自己頁面上的<b>實際操作</b>，牌卡前的勾選框決定<b>要不要產出</b>這顆元件。回各元件用「變數篩選器」調整組合，這頁即時彙整。</p>
      <div class="sum-actions">
        <button class="aitoggle" id="aiBtn">${ICON_SPARK}<span>AI 建議產出</span><span class="sw"></span></button>
        <div class="spacer"></div>
        <div class="sumtotal" id="sumTotal"></div>
      </div>
      <div id="sumCards"></div>
      <div class="block"><h2>其餘元件</h2><p class="sub" id="sumRest"></p></div>`;
    const host=document.getElementById('sumCards');
    function syncTotal(){let comp=0,vari=0;Object.keys(DIAL_SPECS).forEach(id=>{if(SUMSEL.has(id)){comp++;vari+=rep[id].count;}});
      document.getElementById('sumTotal').innerHTML=`已選 <b>${comp}</b>/${Object.keys(DIAL_SPECS).length} 個元件 · 共 <b>${vari}</b> 個變體將建立`;}
    const _navOrder=NAV.flatMap(g=>g.items).map(x=>x.id); // 側邊欄由上至下
    const _sumKeys=Object.keys(DIAL_SPECS).slice().sort((a,b)=>{const ia=_navOrder.indexOf(DIAL_PAGE[a]||a),ib=_navOrder.indexOf(DIAL_PAGE[b]||b);return (ia<0?999:ia)-(ib<0?999:ib);}); // checkbox/radio 同對應 selector，穩定排序保留原序
    _sumKeys.forEach((id,i)=>{const spec=DIAL_SPECS[id],rec=rep[id];
      const card=ce('div','sumcard collapsed');card.dataset.id=id; // 全部預設收合
      let axesHTML='';
      spec.order.forEach(k=>{const all=spec.axes[k];const sel=new Set(rec[k]);
        const chips=all.map(v=>`<span class="sum-chip ${sel.has(v)?'on':'off'}">${(spec.zh[k]&&spec.zh[k][v])||v}·${v}</span>`).join('');
        axesHTML+=`<div class="sum-axis"><span class="sa-name">${spec.zh.axisName[k]}</span><span class="sa-chips">${chips}</span><span class="sa-n">${rec[k].length}/${all.length}</span></div>`;});
      card.innerHTML=`<div class="sc-head">
          <label class="sc-check"><input type="checkbox" ${SUMSEL.has(id)?'checked':''}></label>
          <span class="sc-name">${spec.label}</span>
          <span class="sc-count">${spec.order.map(k=>rec[k].length).join(' × ')} = <b>${rec.count}</b> <span class="full">/ ${rec.full}</span></span>
          <span class="sc-chevron">${ICON_CARET}</span>
        </div>
        <div class="sc-body">${axesHTML}<div class="sc-sub">實際操作 Live</div><div class="sc-live"></div>
          <div class="sc-foot"><button class="adjustbtn">${ICON_PENCIL}<span>我要調整</span></button></div></div>`;
      card.classList.toggle('unpicked',!SUMSEL.has(id));
      const chk=card.querySelector('.sc-check input');
      card.querySelector('.sc-check').onclick=e=>e.stopPropagation(); // 勾選不觸發展開
      chk.onchange=()=>{chk.checked?SUMSEL.add(id):SUMSEL.delete(id);card.classList.toggle('unpicked',!chk.checked);
        if(aiOn){aiOn=false;aiSnapshot=null;document.getElementById('aiBtn').classList.remove('on');} // 手動改動即脫離 AI 建議
        syncTotal();};
      const head=card.querySelector('.sc-head'),liveHost=card.querySelector('.sc-live');
      head.onclick=()=>{const willOpen=card.classList.contains('collapsed');card.classList.toggle('collapsed');
        if(willOpen && !liveHost.dataset.mounted && LIVE[id]){LIVE[id](liveHost);liveHost.dataset.mounted='1';}}; // 展開時 lazy 掛實際操作 Live
      card.querySelector('.adjustbtn').onclick=()=>renderView(DIAL_PAGE[id]||id); // 右下角「我要調整」→ 跳該元件頁
      host.appendChild(card);});
    syncTotal();
    const todo=NAV.flatMap(g=>g.items).filter(it=>!DIAL_SPECS[it.id]&&it.id!=='input'&&!it.st).length;
    document.getElementById('sumRest').innerHTML=`input 家族的 <code>search / password / textarea / file</code> 以完整狀態建立（無轉盤）。其餘 <b>${todo}</b> 個項目為待建，之後定案後會一併納入此總覽。`;
    const aiBtn=document.getElementById('aiBtn');
    function refreshCards(){host.querySelectorAll('.sumcard').forEach(c=>{const on=SUMSEL.has(c.dataset.id);c.querySelector('.sc-check input').checked=on;c.classList.toggle('unpicked',!on);});}
    aiBtn.classList.toggle('on',aiOn); // 進頁時還原 toggle 狀態
    aiBtn.onclick=()=>{ // AI 建議 toggle：開→套用建議並存快照；關→還原點擊前選擇
      if(!aiOn){aiSnapshot=[...SUMSEL];SUMSEL.clear();RECOMMEND.forEach(x=>SUMSEL.add(x));aiOn=true;}
      else{if(aiSnapshot){SUMSEL.clear();aiSnapshot.forEach(x=>SUMSEL.add(x));}aiSnapshot=null;aiOn=false;}
      aiBtn.classList.toggle('on',aiOn);refreshCards();syncTotal();
    };
    document.getElementById('copyBtn').onclick=()=>{
      const json={};Object.keys(DIAL_SPECS).forEach(id=>{if(!SUMSEL.has(id))return;json[id]={};DIAL_SPECS[id].order.forEach(k=>json[id][k]=rep[id][k]);json[id].count=rep[id].count;});
      json._selected=[...SUMSEL];json._total=[...SUMSEL].reduce((a,id)=>a+rep[id].count,0);
      navigator.clipboard.writeText(JSON.stringify(json,null,2)).then(()=>{const b=document.getElementById('copyBtn');b.textContent='已複製 ✓';setTimeout(()=>b.textContent='複製並匯出JSON',1600);});
    };
  }

  /* ===== 檢視切換 ===== */
  let current='summary';
  function renderView(id){
    current=id;const view=document.getElementById('view');
    const item=NAV.flatMap(g=>g.items).find(x=>x.id===id);
    if(id==='summary'){renderSummary(view);}
    else if(id==='button'){view.innerHTML=buttonViewHTML();renderSpecStrip();renderAxes();renderMatrix();renderSizes();renderBooleans();renderCount();renderLive();}
    else if(BUILD[id]){BUILD[id](view);}
    else{view.innerHTML=`<div class="placeholder"><div class="em">🧩</div><h2>${item.name}</h2><p>這顆元件還沒定案。先在已完成的元件上把「元件該多複雜」的模式定下來，我再用同一套方式套到這裡。</p><div class="axhint">預定軸：variant × state × size（＋各自的內容軸）</div></div>`;}
    document.querySelectorAll('.nav-item').forEach(el=>el.setAttribute('aria-current',el.dataset.id===id));
    if(window.innerWidth<=900)document.getElementById('shell').classList.remove('nav-open'); // 窄螢幕選完自動收起
    const _m=document.querySelector('.main');if(_m)_m.scrollTo(0,0); // app-shell：捲 main 容器（非 document）
  }
  function renderNav(){const host=document.getElementById('sidebar');host.innerHTML='';
    const pin=document.createElement('button');pin.className='nav-item nav-pin';pin.dataset.id='summary';pin.setAttribute('aria-current',current==='summary');
    pin.innerHTML=`<span>📋 匯出需求</span>`;pin.onclick=()=>renderView('summary');host.appendChild(pin);
    NAV.forEach((g,gi)=>{const grp=document.createElement('div');grp.className='nav-group'+(gi>0?' collapsed':'');
      const head=document.createElement('button');head.className='gh';
      head.innerHTML=`<span class="gh-t">${g.emoji?g.emoji+' ':''}${g.group}</span><span class="gh-n">${g.items.length}</span><span class="gh-caret">${ICON_CARET}</span>`;
      head.onclick=()=>grp.classList.toggle('collapsed');
      const list=document.createElement('div');list.className='ng-items';
      g.items.forEach(it=>{const b=document.createElement('button');b.className='nav-item';b.dataset.id=it.id;b.setAttribute('aria-current',it.id===current);
        b.innerHTML=`<span class="nm">${it.name}</span><span class="dot st-${it.st||'todo'}" title="${STAT[it.st]||'待建'}"></span>`;b.onclick=()=>renderView(it.id);list.appendChild(b);});
      grp.append(head,list);host.appendChild(grp);});}

  /* ===== topbar 行為 =====（桌機側欄常駐；窄螢幕漢堡控制抽屜）*/
  const shell=document.getElementById('shell');
  document.getElementById('hambBtn').onclick=()=>shell.classList.toggle('nav-open');
  document.getElementById('scrim').onclick=()=>shell.classList.remove('nav-open');
  document.addEventListener('click',e=>{const h=e.target.closest('.dcard-head');if(h)h.closest('.dcard').classList.toggle('collapsed');});
  (function(){const btn=document.getElementById('themeBtn'),knob=document.getElementById('themeKnob');
    const SUN='<svg viewBox="0 0 256 256" fill="currentColor"><path d="M120,40V16a8,8,0,0,1,16,0V40a8,8,0,0,1-16,0Zm72,88a64,64,0,1,1-64-64A64.07,64.07,0,0,1,192,128Zm-16,0a48,48,0,1,0-48,48A48.05,48.05,0,0,0,176,128ZM58.34,69.66A8,8,0,0,0,69.66,58.34l-16-16A8,8,0,0,0,42.34,53.66Zm0,116.68-16,16a8,8,0,0,0,11.32,11.32l16-16a8,8,0,0,0-11.32-11.32ZM192,72a8,8,0,0,0,5.66-2.34l16-16a8,8,0,0,0-11.32-11.32l-16,16A8,8,0,0,0,192,72Zm5.66,114.34a8,8,0,0,0-11.32,11.32l16,16a8,8,0,0,0,11.32-11.32ZM48,128a8,8,0,0,0-8-8H16a8,8,0,0,0,0,16H40A8,8,0,0,0,48,128Zm80,80a8,8,0,0,0-8,8v24a8,8,0,0,0,16,0V216A8,8,0,0,0,128,208Zm112-88H216a8,8,0,0,0,0,16h24a8,8,0,0,0,0-16Z"/></svg>';
    const MOON='<svg viewBox="0 0 256 256" fill="currentColor"><path d="M240,96a8,8,0,0,1-8,8H216v16a8,8,0,0,1-16,0V104H184a8,8,0,0,1,0-16h16V72a8,8,0,0,1,16,0V88h16A8,8,0,0,1,240,96ZM144,56h8v8a8,8,0,0,0,16,0V56h8a8,8,0,0,0,0-16h-8V32a8,8,0,0,0-16,0v8h-8a8,8,0,0,0,0,16Zm72.77,97a8,8,0,0,1,1.43,8A96,96,0,1,1,95.07,37.8a8,8,0,0,1,10.6,9.06A88.07,88.07,0,0,0,209.14,150.33,8,8,0,0,1,216.77,153Zm-19.39,14.88c-1.79.09-3.59.14-5.38.14A104.11,104.11,0,0,1,88,64c0-1.79,0-3.59.14-5.38A80,80,0,1,0,197.38,167.86Z"/></svg>';
    function cur(){const a=document.documentElement.getAttribute('data-theme');return a||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');}
    function set(t){document.documentElement.setAttribute('data-theme',t);knob.innerHTML=t==='dark'?MOON:SUN;}
    set('light');btn.onclick=()=>set(cur()==='dark'?'light':'dark');})();

  renderNav();renderView('summary');
</script>
