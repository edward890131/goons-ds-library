/* ===== menu (mn-) ===== */
/* ===== Menu 選單 ===== */
  .mn-item{position:relative;display:inline-flex;align-items:center;gap:var(--sp-3);font-family:var(--font-sans);color:var(--muted);background:transparent;border:0;border-radius:var(--r-sm);cursor:pointer;white-space:nowrap;user-select:none;line-height:1.2;transition:background .12s,color .12s;}
  .mn-item--s{padding:var(--sp-2) var(--sp-3);font-size:var(--fs-h9);}
  .mn-item--m{padding:var(--sp-3) var(--sp-4);font-size:var(--fs-h8);}
  .mn-item--l{padding:var(--sp-4) var(--sp-5);font-size:var(--fs-h7);}
  .mn-item--hover{background:var(--panel-2);color:var(--ink);}
  .mn-item--active{color:var(--i-primary);font-weight:600;}
  .mn-item--focus{outline:1px solid var(--accent);outline-offset:1px;color:var(--ink);}
  .mn-item--disabled{opacity:.45;cursor:not-allowed;}
  .mn-item:not(.mn-item--active):not(.mn-item--disabled):not(.mn-item--focus):hover{background:var(--panel-2);color:var(--ink);}
  .mn-ico{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;flex:0 0 auto;}
  .mn-ico svg{width:100%;height:100%;display:block;}
  .mn-item--s .mn-ico{width:16px;height:16px;}
  .mn-item--l .mn-ico{width:20px;height:20px;}
  .mn-ind{position:absolute;background:var(--i-primary);border-radius:2px;opacity:0;pointer-events:none;}
  .mn-item--active .mn-ind{opacity:1;left:10px;right:10px;bottom:0;height:2px;}
  .mn-bar{display:flex;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);}
  .mn-bar--horizontal{flex-direction:row;align-items:center;gap:var(--sp-1);padding:var(--sp-2) var(--sp-3);}
  .mn-bar--vertical{flex-direction:column;align-items:stretch;gap:2px;padding:var(--sp-3);width:200px;}
  .mn-bar--vertical .mn-item{width:100%;justify-content:flex-start;}
  .mn-bar--vertical .mn-item--active{background:var(--i-primary-tint);}
  .mn-bar--vertical .mn-item--active .mn-ind{display:none;}
  .mn-orient{display:flex;flex-wrap:wrap;gap:var(--sp-6);align-items:flex-start;}
  .mn-ocol{display:flex;flex-direction:column;gap:var(--sp-3);}
  .mn-ocap{font-family:var(--font-mono);font-size:var(--fs-h9);color:var(--faint);}
  .mn-ocap b{color:var(--muted);font-weight:600;}
  .mn-live-box{padding:var(--sp-3) 0;}

/* ===== action-menu (am-) ===== */
/* ===== Action Menu 動作選單 ===== */
  .am-panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:0 10px 28px rgba(0,0,0,.16);padding:var(--sp-2);display:flex;flex-direction:column;gap:2px;min-height:max-content;height:max-content;flex:0 0 auto;} /* min-height+height:max-content＋flex:0 0 auto 修正：巢狀 flex column 面板在 grid／flex 容器內被算成單列高、內容溢出，撐回內容高並不被父容器壓縮（矩陣／Live／匯出卡三處通用） */
  .am-panel>.am-item,.am-panel>.am-divider{flex:0 0 auto;} /* 面板被高度限縮時 item 不垂直壓縮 */
  .am-panel.sz-s{min-width:132px;} .am-panel.sz-m{min-width:170px;} .am-panel.sz-l{min-width:210px;}
  .am-item{display:flex;align-items:center;gap:var(--sp-3);min-width:118px;padding:var(--sp-2);border-radius:var(--r-sm);border:1px solid transparent;font-family:var(--font-sans);font-size:var(--fs-h8);line-height:1.2;color:var(--ink);cursor:pointer;user-select:none;white-space:nowrap;}
  .am-item svg{width:16px;height:16px;flex:0 0 auto;color:var(--muted);}
  .am-item .am-lb{flex:1 1 auto;}
  .am-item.st-hover{background:var(--panel-2);}
  .am-item.st-focused{background:var(--i-primary-tint);border-color:var(--i-primary);color:var(--i-primary-p);}
  .am-item.st-focused svg{color:var(--i-primary-p);}
  .am-item.st-disabled{opacity:.4;cursor:not-allowed;}
  .am-item.is-danger{color:var(--i-danger);} .am-item.is-danger svg{color:var(--i-danger);}
  .am-item.is-danger.st-hover{background:var(--i-danger-tint);}
  /* Live 面板：真滑鼠 hover（矩陣仍用 .st-hover class 靜態展示、不受影響）*/
  .am-live-wrap .am-item{cursor:pointer;}
  .am-live-wrap .am-item:hover{background:var(--panel-2);}
  .am-live-wrap .am-item.is-danger:hover{background:var(--i-danger-tint);}
  .am-divider{height:1px;background:var(--line);margin:var(--sp-1) var(--sp-3);}
  .am-live-wrap{display:inline-flex;flex-direction:column;align-items:flex-start;gap:var(--sp-2);} /* Live 面板改順流排在 trigger 下方，框會跟著長高、不溢出 */
  .am-live-wrap .am-panel{position:static;}
  /* trigger 直接沿用 Button 元件的 .btn 樣式（v-solid i-secondary sz-m live），僅補 caret 旋轉 */
  .am-trig .am-tcaret{display:inline-flex;align-items:center;transition:transform .15s ease;}
  .am-trig .am-tcaret svg{width:1em;height:1em;}
  .am-trig.is-open .am-tcaret{transform:rotate(180deg);}

/* ===== breadcrumb (bc-) ===== */
/* ---- BREADCRUMB 麵包屑 ---- */
  .bc-trail{display:flex;flex-wrap:wrap;align-items:center;gap:var(--sp-3);font-family:var(--font-sans);font-size:var(--fs-h8);line-height:1.5;}
  .bc-item{color:var(--muted);cursor:pointer;text-decoration:none;transition:color .12s ease;}
  .bc-item:hover,.bc-item.bc-hover{color:var(--accent);}
  .bc-item.bc-current{color:var(--ink);font-weight:600;cursor:default;text-decoration:none;}
  .bc-item.bc-current:hover{color:var(--ink);text-decoration:none;}
  .bc-sep{display:inline-flex;align-items:center;color:var(--faint);font-size:var(--fs-h9);user-select:none;}
  .bc-sep svg{width:14px;height:14px;display:block;}
  .bc-ellip{color:var(--faint);cursor:default;letter-spacing:.05em;}
  .bc-live-box{display:flex;padding:var(--sp-3) 2px;}

/* ===== pagination (pg-) ===== */
/* ---- PAGINATION 分頁器 ---- */
  .pg-bar{display:flex;align-items:center;gap:var(--sp-2);flex-wrap:wrap;font-family:var(--font-sans);}
  .pg-btn{display:inline-flex;align-items:center;justify-content:center;box-sizing:border-box;background:transparent;color:var(--ink);border:1px solid transparent;border-radius:var(--r-sm);font-family:var(--font-sans);font-weight:600;line-height:1;cursor:pointer;padding:0;transition:background .12s,border-color .12s,color .12s;}
  .pg-btn.pg-sz-s{min-width:28px;height:28px;font-size:var(--fs-h9);}
  .pg-btn.pg-sz-m{min-width:34px;height:34px;font-size:var(--fs-h9);}
  .pg-btn.pg-sz-l{min-width:40px;height:40px;font-size:var(--fs-h7);}
  .pg-btn.pg-sz-s svg{width:14px;height:14px;}
  .pg-btn.pg-sz-m svg{width:16px;height:16px;}
  .pg-btn.pg-sz-l svg{width:18px;height:18px;}
  .pg-btn:hover:not(:disabled):not(.pg-cur){background:var(--panel-2);}
  .pg-btn.pg-st-hover{background:var(--panel-2);}
  .pg-btn.pg-cur{background:var(--i-primary);border-color:var(--i-primary);color:var(--primary-on);cursor:default;}
  .pg-btn:disabled,.pg-btn.pg-st-disabled{opacity:.45;cursor:not-allowed;pointer-events:none;}
  .pg-ellip{color:var(--faint);padding:0 2px;user-select:none;font-family:var(--font-sans);font-size:var(--fs-h9);}
  .pg-info{display:inline-flex;align-items:center;padding:0 var(--sp-4);font-family:var(--font-sans);font-size:var(--fs-h9);font-weight:600;color:var(--ink);white-space:nowrap;}
  .pg-live-box{display:flex;justify-content:center;padding:var(--sp-3) 0;}

/* ===== icon (ic-) ===== */
/* ---- ICON 圖示（namespace ic-）---- */
  .ic-box{display:inline-flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .ic-box svg{display:block;}
  .ic-box.ic-s svg{width:16px;height:16px;}
  .ic-box.ic-m svg{width:20px;height:20px;}
  .ic-box.ic-l svg{width:24px;height:24px;}
  .ic-box.ic-xl svg{width:32px;height:32px;}
  .ic-t-default{color:var(--ink);}
  .ic-t-primary{color:var(--i-primary);}
  .ic-t-secondary{color:var(--muted);}
  .ic-t-danger{color:var(--i-danger);}
  .ic-lib-group{margin-bottom:var(--sp-5);}
  .ic-lib-group:last-child{margin-bottom:0;}
  .ic-lib-cap{font-family:var(--font-mono);font-size:var(--fs-h10);font-weight:600;color:var(--muted);letter-spacing:.04em;margin:0 0 var(--sp-3);}
  .ic-lib{display:grid;grid-template-columns:repeat(auto-fill,minmax(92px,1fr));gap:var(--sp-3);background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:var(--sp-5);}
  .ic-cell{display:flex;flex-direction:column;align-items:center;gap:var(--sp-3);padding:var(--sp-5) var(--sp-3);border:1px solid var(--line);border-radius:var(--r-sm);background:var(--panel-2);transition:border-color .12s;}
  .ic-cell:hover{border-color:var(--accent);}
  .ic-name{font-family:var(--font-mono);font-size:var(--fs-h10);color:var(--faint);letter-spacing:.03em;text-align:center;word-break:break-all;line-height:1.3;}
  .ic-cell:hover .ic-name{color:var(--muted);}
  .ic-inline{display:inline-flex;align-items:center;gap:var(--sp-2);font-family:var(--font-sans);font-size:var(--fs-h8);color:var(--ink);line-height:1.4;}

/* ===== price (pr-) ===== */
.pr-price{display:inline-flex;align-items:baseline;gap:var(--sp-2);font-family:var(--font-sans);color:var(--ink);font-weight:600;line-height:1.1;white-space:nowrap;}
.pr-price .pr-cur{font-weight:600;color:var(--muted);font-size:.68em;}
.pr-sz-sm{font-size:var(--fs-h7);}
.pr-sz-md{font-size:var(--fs-h5);}
.pr-sz-lg{font-size:var(--fs-h3);}
.pr-v-discount{gap:var(--sp-3);}
.pr-v-discount .pr-orig,.pr-v-free .pr-orig{color:var(--muted);font-weight:500;font-size:.62em;text-decoration:line-through;}
.pr-v-discount .pr-now{display:inline-flex;align-items:baseline;gap:var(--sp-1);color:var(--i-danger);}
.pr-v-discount .pr-now .pr-cur{color:var(--i-danger);opacity:.8;}
.pr-price .tg{align-self:center;} /* SALE 改用 DS Tag（i-danger），在 baseline flex 內置中對齊 */
.pr-v-free .pr-free{color:var(--i-primary);font-weight:600;}
.pr-live-box{display:flex;align-items:center;justify-content:center;padding:var(--sp-6) var(--sp-5);min-height:80px;}
.pr-scene{display:flex;flex-wrap:wrap;gap:var(--sp-5);}
.pr-card{width:200px;display:flex;flex-direction:column;gap:var(--sp-3);background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:var(--sp-5);}
.pr-card .pr-thumb{height:96px;border-radius:var(--r-sm);background:var(--panel-3);}
.pr-card .pr-name{font-family:var(--font-sans);font-size:var(--fs-h9);font-weight:600;color:var(--ink);}
.pr-card .pr-save{font-family:var(--font-mono);font-size:var(--fs-h10);color:var(--i-danger);}

/* ===== price / metric（pr-metric）dashboard KPI 數值 ===== */
.pr-metric{display:inline-flex;flex-direction:column;align-items:flex-start;gap:var(--sp-1);font-family:var(--font-sans);color:var(--ink);line-height:1.1;white-space:nowrap;}
/* 尺寸設在容器 font-size，內部元素用 em 等比縮放 */
.pr-m-sz-sm{font-size:var(--fs-h5);} .pr-m-sz-md{font-size:var(--fs-h3);} .pr-m-sz-lg{font-size:var(--fs-h1);}
.pr-metric .pr-numrow{display:inline-flex;align-items:baseline;gap:.28em;}
.pr-metric .pr-num{font-size:1em;font-weight:600;font-variant-numeric:tabular-nums;letter-spacing:-.01em;}
.pr-metric .pr-unit{font-size:.55em;font-weight:600;color:var(--muted);}
.pr-metric .pr-mlabel{font-size:max(11px,.42em);font-weight:500;color:var(--muted);letter-spacing:.02em;}
/* delta 趨勢：上升綁 --ok 正向綠、下降綁 --i-danger；icon 重用 IC_TRENDING */
.pr-delta{display:inline-flex;align-items:center;gap:3px;font-size:max(11px,.42em);font-weight:600;font-variant-numeric:tabular-nums;align-self:center;}
.pr-delta svg{width:1.1em;height:1.1em;flex:0 0 auto;}
.pr-delta.d-up{color:var(--ok);}
.pr-delta.d-down{color:var(--i-danger);}
.pr-delta.d-down svg{transform:scaleY(-1);} /* IC_TRENDING 為上升折線，垂直鏡射即為下降 */
.pr-mstack{display:flex;flex-direction:column;align-items:flex-start;gap:var(--sp-3);} /* 矩陣 delta 格：上升／下降兩態並列展示 */

/* ===== image (im-) ===== */
/* ===== Image 圖片 ===== */
.im-box{position:relative;overflow:hidden;flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;vertical-align:middle;background:var(--panel-2);border:1px solid var(--line);aspect-ratio:1;}
/* 形狀 variant：矩形（小圓角）／圓角（中圓角）／圓形（正圓） */
.im-rectangular{border-radius:var(--r-sm);}
.im-rounded{border-radius:var(--r-lg);}
.im-circular{border-radius:50%;}
/* 尺寸 size → 正方邊長 */
.im-sz-s{height:40px;}
.im-sz-m{height:64px;}
.im-sz-l{height:120px;}
.im-sz-xl{height:240px;}
/* 比例 ratio：改寫盒子長寬比（circular 不套、恆正方）*/
.im-r-4x3{aspect-ratio:4/3;}
.im-r-16x9{aspect-ratio:16/9;}
.im-r-2x1{aspect-ratio:2/1;}
.im-r-1x1{aspect-ratio:1/1;}
/* default：真圖填滿盒子 */
.im-img{width:100%;height:100%;object-fit:cover;display:block;}
/* loading：骨架佔位 + shimmer 掃過（沿用 skeleton 的光澤手法；淺色高透白、深色低透白）*/
.im-loading{--im-sheen:rgba(255,255,255,.55);}
@media (prefers-color-scheme:dark){.im-loading{--im-sheen:rgba(255,255,255,.09);}}
:root[data-theme="dark"] .im-loading{--im-sheen:rgba(255,255,255,.09);}
:root[data-theme="light"] .im-loading{--im-sheen:rgba(255,255,255,.55);}
.im-loading::after{content:"";position:absolute;inset:0;transform:translateX(-100%);background:linear-gradient(90deg,transparent 0%,var(--im-sheen) 50%,transparent 100%);animation:im-shimmer 1.5s ease-in-out infinite;}
@keyframes im-shimmer{100%{transform:translateX(100%);}}
/* error：破圖 fallback，置中破圖 icon + 「載入失敗」小字 */
.im-error{flex-direction:column;gap:var(--sp-2);color:var(--faint);}
.im-broken{width:28px;height:28px;color:var(--faint);}
.im-broken svg{width:100%;height:100%;display:block;}
.im-errtxt{font-family:var(--font-sans);font-size:var(--fs-h10);line-height:1;color:var(--faint);}
/* 尊重「減少動態」偏好：停 shimmer */
@media (prefers-reduced-motion:reduce){.im-loading::after{animation:none;display:none;}}

/* ===== header (Complex) ===== */
/* ==================== header 頁首 ==================== */
  /* 整條頁首 bar：面板底 + 描邊 + 圓角；compact 收縮高度與間距 */
  .hdr-bar{display:flex;align-items:center;gap:var(--sp-5);height:60px;padding:0 var(--sp-4);width:100%;box-sizing:border-box;
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);}
  /* logo：複用 topbar 的 Goons 官方字標 svg */
  .hdr-logo{display:inline-flex;align-items:center;flex:0 0 auto;color:var(--ink);}
  .hdr-logo svg{height:22px;width:auto;display:block;}
  /* 導覽：複用 Menu 元件（.mn-bar / .mn-item），在 header 內去除容器外框、貼齊排列 */
  .hdr-nav-slot{display:flex;align-items:center;min-width:0;}
  .hdr-nav-slot .mn-bar{border:0;background:transparent;border-radius:0;padding:0;gap:2px;}
  /* 彈性間隔：把 search / actions 推到右側（nav 與 search 可同時存在）*/
  .hdr-spacer{flex:1 1 auto;min-width:8px;}
  /* 搜尋框：複用 Search／Input 元件（.field v-outline）*/
  .hdr-search{flex:0 1 340px;min-width:140px;}
  .hdr-search .field{width:100%;display:flex;}
  /* 右側 actions：鈴鐺 → 頭像 → 登入（登入鈕在頭像右側）*/
  .hdr-actions{display:flex;align-items:center;gap:var(--sp-3);flex:0 0 auto;}
  .hdr-bell{position:relative;display:inline-flex;}
  .hdr-badge{position:absolute;top:var(--sp-1);right:var(--sp-1);width:8px;height:8px;border-radius:50%;
    background:var(--i-danger);border:2px solid var(--panel);box-sizing:content-box;pointer-events:none;}
  /* 頭像＝複用 Button v-soft 原子（soft icon-only 圓鈕），僅覆蓋成圓形 */
  .hdr-avatar.btn{border-radius:50%;flex:0 0 auto;}
  /* 陳列：上下堆疊的整條 bar（不再用擠壓的 2D 矩陣）*/
  .hdr-stack{display:flex;flex-direction:column;gap:var(--sp-6);}
  .hdr-row{display:flex;flex-direction:column;gap:var(--sp-3);}
  .hdr-cap{font-family:var(--font-mono);font-size:var(--fs-h10);color:var(--faint);letter-spacing:.05em;}
  .hdr-cap b{color:var(--muted);font-weight:600;}
  .hdr-live-box{width:100%;}
  /* 行動版以 375px 手機框示意 */
  .hdr-phone{max-width:375px;width:100%;}

/* ===== footer (Complex) ===== */
/* ==================== FOOTER 頁尾 ==================== */
  /* 整條頁尾容器：整頁寬版、頂部一條分隔線、走 token 深淺自適應 */
  .ftr-foot{width:100%;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:var(--sp-5);color:var(--muted);font-family:var(--font-sans);overflow:hidden;display:block;margin-top:0;}
  .ftr-foot + .ftr-foot{margin-top:var(--sp-6);}
  .ftr-foot.ftr-v-simple{padding:var(--sp-4);}
  .ftr-foot.ftr-v-minimal{padding:var(--sp-4);}
  /* logo：複用 header 的 Goons 官方字標 svg */
  .ftr-logo{display:inline-flex;align-items:center;color:var(--ink);flex:0 0 auto;}
  .ftr-logo svg{height:22px;width:auto;display:block;}
  /* 品牌區：logo + 簡介 + 聯絡資訊 */
  .ftr-brand{display:flex;flex-direction:column;gap:var(--sp-4);max-width:300px;}
  .ftr-desc{font-size:var(--fs-h9);line-height:1.6;color:var(--faint);}
  .ftr-contact{display:flex;flex-direction:column;gap:var(--sp-3);}
  .ftr-contact-row{display:flex;align-items:flex-start;gap:var(--sp-3);font-size:var(--fs-h9);color:var(--muted);line-height:1.5;}
  .ftr-contact-ic{display:inline-flex;width:16px;height:16px;color:var(--faint);flex:0 0 auto;margin-top:1px;}
  /* rich 主體：品牌左 / 連結欄群靠右 */
  .ftr-main{display:flex;flex-wrap:wrap;gap:var(--sp-6) var(--sp-7);justify-content:space-between;width:100%;}
  .ftr-cols{display:flex;flex-wrap:wrap;gap:var(--sp-6) var(--sp-7);justify-content:flex-end;flex:1;min-width:260px;}
  .ftr-col{display:flex;flex-direction:column;gap:var(--sp-4);min-width:110px;}
  .ftr-coltitle{font-size:var(--fs-h10);font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);}
  .ftr-links{display:flex;flex-direction:column;gap:var(--sp-3);}
  .ftr-link{font-size:var(--fs-h9);color:var(--muted);text-decoration:none;cursor:pointer;width:fit-content;transition:color .12s;}
  .ftr-link:hover{color:var(--ink);}
  /* 底列：分隔線撐滿寬度（負邊距 breakout）+ 版權左、按鈕右 */
  .ftr-bottom{display:flex;flex-wrap:wrap;align-items:center;gap:var(--sp-5);
    margin:var(--sp-5) -32px 0;padding:var(--sp-5) var(--sp-7) 0;border-top:1px solid var(--line);}
  .ftr-v-simple .ftr-bottom{margin-top:var(--sp-5);}
  .ftr-copy{font-size:var(--fs-h10);color:var(--faint);}
  .ftr-botspacer{flex:1;}
  .ftr-actions{display:inline-flex;align-items:center;gap:var(--sp-3);flex-wrap:wrap;}
  .ftr-social{display:inline-flex;align-items:center;gap:var(--sp-1);}
  .ftr-uparrow{display:inline-flex;}
  .ftr-uparrow svg{width:14px;height:14px;transform:rotate(180deg);}
  /* simple 單列：logo 左、連結右（左右撐滿）*/
  .ftr-simplerow{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:var(--sp-5) var(--sp-6);width:100%;}
  .ftr-nav{display:inline-flex;flex-wrap:wrap;align-items:center;justify-content:flex-end;gap:var(--sp-3) var(--sp-6);}
  /* minimal 極簡：單行 © + 連結 */
  .ftr-minirow{display:flex;flex-wrap:wrap;align-items:center;gap:var(--sp-3) var(--sp-5);width:100%;}
  .ftr-minirow .ftr-copy{margin-right:var(--sp-1);}
  .ftr-mininav{display:inline-flex;flex-wrap:wrap;align-items:center;gap:var(--sp-3) var(--sp-5);}
  /* 行動版：限寬手機框，內容單欄堆疊（container-based，不靠 viewport media query）*/
  .ftr-phone{max-width:375px;width:100%;}
  .ftr-foot.ftr-mobile{padding:var(--sp-4);}
  .ftr-mobile .ftr-main{flex-direction:column;gap:var(--sp-6);}
  .ftr-mobile .ftr-brand{max-width:none;}
  .ftr-mobile .ftr-cols{flex-direction:column;gap:var(--sp-6);justify-content:flex-start;flex:none;width:100%;}
  .ftr-mobile .ftr-simplerow{flex-direction:column;align-items:flex-start;gap:var(--sp-5);}
  .ftr-mobile .ftr-nav{justify-content:flex-start;gap:var(--sp-3) var(--sp-5);}
  .ftr-mobile .ftr-bottom{flex-direction:column;align-items:flex-start;gap:var(--sp-4);margin:var(--sp-6) -20px 0;padding:var(--sp-5) var(--sp-5) 0;}
  .ftr-mobile .ftr-botspacer{display:none;}
  .ftr-mobile .ftr-actions{width:100%;flex-wrap:wrap;gap:var(--sp-3);}
  .ftr-mobile .ftr-minirow{flex-direction:column;align-items:flex-start;gap:var(--sp-4);}

  @media(max-width:720px){
    .ftr-main{gap:var(--sp-6);}
    .ftr-bottom{gap:var(--sp-4);}
    .ftr-botspacer{flex-basis:100%;height:0;}
  }

/* ===== section-head (Complex) ===== */
/* ==================== section-head 區段標題 ==================== */
/* 內容區塊上方的標題列：eyebrow（可選）+ 主標 + 副標 +（可選）右側動作 / 計數 / 底線 */
.sch-head{display:flex;align-items:flex-end;justify-content:space-between;gap:var(--sp-5);width:100%;padding:2px 0;font-family:var(--font-sans);}
.sch-head.sch-divider{border-bottom:1px solid var(--line);padding-bottom:var(--sp-4);}
.sch-main{display:flex;flex-direction:column;gap:var(--sp-2);min-width:0;}
.sch-eyebrow{margin-bottom:2px;}
/* 麵包屑式 eyebrow */
.sch-crumb{display:flex;align-items:center;gap:var(--sp-2);font-size:var(--fs-h10);color:var(--muted);letter-spacing:.01em;}
.sch-crumb-sep{color:var(--faint);}
.sch-titlerow{display:flex;align-items:center;gap:var(--sp-3);min-width:0;}
.sch-title{margin:0;color:var(--ink);font-weight:600;font-size:var(--fs-h6);line-height:1.3;letter-spacing:-.01em;}
.sch-sub{margin:0;color:var(--muted);font-size:var(--fs-h9);line-height:1.45;}
/* size = l：標題與副標放大 */
.sch-sz-l .sch-title{font-size:var(--fs-h4);font-weight:600;letter-spacing:-.02em;}
.sch-sz-l .sch-sub{font-size:var(--fs-h8);}
/* 右側動作 / 計數區 */
.sch-actions{display:flex;align-items:center;gap:var(--sp-3);flex-shrink:0;}
.sch-arw{display:inline-flex;width:16px;height:16px;}
.sch-arw svg{width:100%;height:100%;display:block;}
.sch-count{display:inline-flex;}
/* align = center：整體置中、隱藏右側動作 */
.sch-head.sch-a-center{flex-direction:column;align-items:center;text-align:center;}
.sch-a-center .sch-main{align-items:center;}
.sch-a-center .sch-titlerow{justify-content:center;}
.sch-a-center .sch-crumb{justify-content:center;}
.sch-a-center .sch-actions{display:none;}
/* 內容組合示範：直向堆疊，每格一張面板 */
.sch-demolist{display:flex;flex-direction:column;gap:var(--sp-4);}
.sch-demo{border:1px solid var(--line);border-radius:var(--radius);background:var(--panel);padding:var(--sp-4);}
.sch-demo-cap{font-size:var(--fs-h10);letter-spacing:.04em;text-transform:uppercase;color:var(--faint);margin-bottom:var(--sp-3);}
/* Live 舞台容器 */
.sch-live-box{width:100%;max-width:680px;}

/* ===== list (Complex) ===== */
/* ==================== list 列表 ==================== */
  /* 單列 list-item：左 leading（icon／圓形 avatar）＋ 中 title／描述 ＋ 右 trailing（meta／動作鈕／caret） */
  .lst-solo{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;}
  .lst-group{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;}
  .lst-item{display:flex;align-items:center;gap:var(--sp-4);padding:var(--sp-3);position:relative;
    font-family:var(--font-sans);background:transparent;transition:background .12s;cursor:pointer;}
  /* hover：滑過底色轉深一階；同時支援靜態 class（矩陣）與真實 :hover（Live／整組） */
  .lst-item.is-hover,
  .lst-group .lst-item:hover:not(.is-disabled):not(.is-selected),
  .lst-solo .lst-item:hover:not(.is-disabled):not(.is-selected){background:var(--panel-2);}
  /* selected：僅淡藍底＋標題轉主色（不加左側色條） */
  .lst-item.is-selected{background:var(--i-primary-tint);}
  .lst-item.is-selected .lst-title{color:var(--accent);}
  /* 尾端金額（重用 price 原子，行內縮小尺寸） */
  .lst-amount{font-size:var(--fs-h8);}
  /* disabled：整列降透明、不可點 */
  .lst-item.is-disabled{opacity:.5;cursor:not-allowed;}
  /* leading：icon 包一層設尺寸色 */
  .lst-lead{flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;color:var(--muted);}
  .lst-icon{width:20px;height:20px;display:inline-flex;}
  .lst-icon svg{width:100%;height:100%;}
  /* avatar：accent tint 底 ＋ 首字，圓形 */
  .lst-avatar{width:36px;height:36px;border-radius:50%;background:var(--i-primary-tint);color:var(--accent);
    display:inline-flex;align-items:center;justify-content:center;font-size:var(--fs-h8);font-weight:600;flex:0 0 auto;}
  /* body：title ＋ 副描述，min-width:0 讓長文可 ellipsis */
  .lst-body{flex:1 1 auto;min-width:0;display:flex;flex-direction:column;gap:2px;}
  .lst-title{font-size:var(--fs-h8);font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .lst-desc{font-size:var(--fs-h10);color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  /* trailing：meta 文字／動作鈕／caret */
  .lst-trail{flex:0 0 auto;display:inline-flex;align-items:center;gap:var(--sp-3);margin-left:auto;}
  .lst-meta{font-size:var(--fs-h10);color:var(--faint);white-space:nowrap;}
  .lst-caret{width:18px;height:18px;color:var(--faint);display:inline-flex;}
  .lst-caret svg{width:100%;height:100%;}
  /* 整組列表分隔線 */
  .lst-divider{height:1px;background:var(--line);margin:0 var(--sp-3);}
  /* 整組列表示範版位 */
  .lst-group-demo{display:flex;flex-direction:column;gap:var(--sp-5);max-width:520px;}
  /* Live 兩類分段（雙欄／巢狀、選項卡各一段，控制項不共用） */
  .lst-live-block{margin-bottom:var(--sp-6);}
  .lst-live-block:last-child{margin-bottom:0;}
  .lst-live-cap{font-family:var(--font-mono);font-size:var(--fs-h10);letter-spacing:.04em;color:var(--muted);margin:0 0 var(--sp-3);}
  .lst-live-cap b{font-weight:600;}
  /* ---- 雙欄列 two-column：右欄數值（小標題） ---- */
  .lst-value{font-size:var(--fs-h9);color:var(--muted);white-space:nowrap;}
  .lst-2col-demo{display:flex;flex-wrap:wrap;gap:var(--sp-5);}
  .lst-2col-demo .lst-group{flex:1 1 260px;max-width:340px;}
  /* 填色卡片底：整組換 panel-2 灰底、無外框；hover 再深一階 */
  .lst-group.v-filled{background:var(--panel-2);border-color:transparent;}
  .lst-group.v-filled .lst-item:hover:not(.is-disabled):not(.is-selected),.lst-group.v-filled .lst-item.is-hover{background:var(--panel-3);}
  .lst-group.v-filled .lst-divider{background:var(--line-strong);}
  /* ---- trailing info icon（重用 notification 的 info 圓標） ---- */
  .lst-info{width:16px;height:16px;color:var(--faint);display:inline-flex;flex:0 0 auto;}
  .lst-info svg{width:100%;height:100%;}
  /* ---- 明細/摘要列 summary：整列右對齊 ---- */
  .lst-item.lst-sum{justify-content:flex-end;}
  .lst-item.lst-sum .lst-body{flex:0 1 auto;align-items:flex-end;}
  .lst-item.lst-sum.is-add,.lst-item.lst-sum.is-total{cursor:default;}
  .lst-title.w-strong{font-weight:600;}
  /* ---- 巢狀可展開列：子列內縮 ---- */
  /* 巢狀子層：整塊灰底圓角區塊「左側內縮 checkbox＋gap（cbx.sz-s 16＋gap12=28）」，
     子列本身維持預設 padding-left:14；故子標題左緣＝28+14=42＝母標題（母 pad14＋cbx16＋gap12=42），內外標題對齊、灰底又明顯內縮 */
  .lst-subwrap{background:var(--panel-2);border-radius:var(--r-sm);margin:2px var(--sp-4) var(--sp-4) var(--sp-6);overflow:hidden;}
  .lst-subwrap .lst-item:hover:not(.is-disabled):not(.is-selected){background:var(--panel-3);}
  /* ---- 矩陣不適用格（error 為選項卡專屬） ---- */
  .lst-na{font-size:var(--fs-h10);color:var(--faint);padding:var(--sp-3) 0;}
  /* ---- 選項卡 selection card：整列一張有框卡 ---- */
  .lst-sel-wrap{display:flex;flex-direction:column;min-width:0;}
  .lst-sel{display:flex;align-items:center;gap:var(--sp-4);padding:var(--sp-3);border:1px solid var(--line);border-radius:var(--radius);
    background:var(--panel);cursor:pointer;transition:background .12s,border-color .12s;font-family:var(--font-sans);}
  .lst-sel .lst-lead{color:var(--muted);}
  .lst-sel-main{flex:1 1 auto;min-width:0;display:flex;flex-direction:column;gap:2px;}
  .lst-sel-title{font-size:var(--fs-h8);font-weight:600;color:var(--ink);}
  .lst-sel-desc{font-size:var(--fs-h10);color:var(--muted);}
  /* hover：底色轉深一階（靜態 class 與真實 :hover 都支援） */
  .lst-sel.is-hover,.lst-sel:hover:not(.is-disabled):not(.is-selected):not(.is-error){background:var(--panel-2);}
  /* selected：淡藍底 ＋ 藍框 */
  .lst-sel.is-selected{background:var(--i-primary-tint);border-color:var(--accent);}
  /* error：紅框；內部選擇控制同步紅框、卡下掛錯誤訊息 */
  .lst-sel.is-error{border-color:var(--i-danger);}
  .lst-sel.is-error .cbx,.lst-sel.is-error .rdo{border-color:var(--i-danger);}
  .lst-sel.is-disabled{opacity:.5;cursor:not-allowed;background:var(--panel-2);}
  .lst-sel-err{font-size:var(--fs-h10);color:var(--i-danger);margin-top:var(--sp-2);}
  /* 展開帶 inline 下拉的進階版 */
  .lst-sel.is-expanded{flex-wrap:wrap;}
  .lst-sel-extra{flex:1 0 100%;display:flex;align-items:center;gap:var(--sp-3);margin-top:var(--sp-3);padding-left:var(--sp-7);}
  .lst-sel-field{height:32px;padding:0 var(--sp-3);font-size:var(--fs-h9);min-width:0;flex:0 1 150px;}
  .lst-sel-dash{color:var(--faint);}
  /* 選項卡陳列 grid（checkbox 版 × radio 版）＋ 展開示例 ＋ Live 版位 */
  .lst-sel-grid{display:grid;grid-template-columns:repeat(2,minmax(240px,1fr));gap:var(--sp-4);max-width:760px;}
  .lst-sel-cap{font-size:var(--fs-h10);letter-spacing:.04em;text-transform:uppercase;color:var(--faint);align-self:end;}
  .lst-sel-expdemo{margin-top:var(--sp-5);max-width:420px;}
  .lst-sel-live{display:flex;flex-direction:column;gap:var(--sp-4);width:600px;max-width:100%;}

/* ===== collapse (Complex) ===== */
/* ==================== collapse 摺疊 / 手風琴 ==================== */
  /* 單一摺疊面板：header 列（標題 + 右側 caret）+ 展開後的 body */
  .cps-panel{font-family:var(--font-sans);background:var(--panel);overflow:hidden;width:100%;box-sizing:border-box;}
  .cps-head{display:flex;align-items:center;gap:var(--sp-3);width:100%;padding:var(--sp-4);background:none;border:none;font-family:inherit;color:var(--ink);text-align:left;cursor:default;user-select:none;}
  .cps-head-btn{cursor:pointer;}
  .cps-head-btn:hover{background:var(--panel-2);}
  .cps-panel.v-filled .cps-head-btn:hover{background:var(--panel-3);}
  .cps-title{flex:1 1 auto;font-size:var(--fs-h8);font-weight:600;line-height:1.3;color:var(--ink);}
  .cps-lead{display:inline-flex;width:18px;height:18px;flex:0 0 auto;color:var(--muted);}
  .cps-lead svg{width:100%;height:100%;}
  .cps-caret{display:inline-flex;width:18px;height:18px;flex:0 0 auto;color:var(--muted);transition:transform .2s ease;}
  .cps-caret svg{width:100%;height:100%;}
  /* 展開時 caret 旋轉 180°（下箭頭轉成上箭頭） */
  .cps-panel.st-expanded .cps-caret,.cps-panel.is-open .cps-caret{transform:rotate(180deg);}
  /* 加減指示模式：icon 直接換成＋／−，不做旋轉 */
  .cps-panel.ind-pm .cps-caret{transform:none;}
  /* body 外層：grid 0fr→1fr 做「往下展開」動畫，收合時整塊裁切隱藏 */
  .cps-body-wrap{display:grid;grid-template-rows:0fr;overflow:hidden;transition:grid-template-rows .24s ease;}
  .cps-panel.is-open .cps-body-wrap,.cps-panel.st-expanded .cps-body-wrap{grid-template-rows:1fr;}
  /* body 內容：段落文字；opacity 搭配外層展開動畫做淡入淡出 */
  .cps-body{padding:0 var(--sp-4);color:var(--muted);font-size:var(--fs-h8);line-height:1.6;min-height:0;overflow:hidden;opacity:0;transition:opacity .24s ease;}
  /* 底部留白改由 ::after 提供：padding-bottom 直接寫在 grid item 上會在收合（0fr）時殘留 16px 高度 */
  .cps-body::after{content:'';display:block;height:12px;}
  .cps-panel.is-open .cps-body,.cps-panel.st-expanded .cps-body{opacity:1;}

  /* ---- variant 風格 ---- */
  /* bordered 外框：有外框 + 圓角 */
  .cps-panel.v-bordered{border:1px solid var(--line);border-radius:var(--radius);}
  /* filled 填色：整張 panel 填 --panel-2 底（head + body 同一塊色卡，展開後 body 維持填色） */
  .cps-panel.v-filled{border:1px solid var(--line);border-radius:var(--radius);background:var(--panel-2);}
  /* plain 極簡：只有底部分隔線、無框無圓角 */
  .cps-panel.v-plain{border-bottom:1px solid var(--line);border-radius:0;background:none;}

  /* ---- state 狀態 ---- */
  /* hover 滑過（矩陣示意狀態）：header 底色變化；filled 整張再深一階 */
  .cps-panel.st-hover .cps-head{background:var(--panel-2);}
  .cps-panel.v-filled.st-hover{background:var(--panel-3);}
  .cps-panel.v-filled.st-hover .cps-head{background:none;}
  /* disabled 停用：降透明、不可互動 */
  .cps-panel.st-disabled{opacity:.45;pointer-events:none;}

  /* 互動手風琴的可點 header 不加 hover 底色，僅保留 cursor:pointer（矩陣 .st-hover 為靜態示意） */

  /* ---- accordion 手風琴容器 ---- */
  .cps-acc{display:flex;flex-direction:column;width:100%;}
  .cps-acc.v-bordered,.cps-acc.v-filled{gap:var(--sp-3);}
  .cps-acc.v-plain{gap:0;border-top:1px solid var(--line);}

  /* accordion section 三欄並排 */
  .cps-acc-row{display:flex;flex-wrap:wrap;gap:var(--sp-6);align-items:flex-start;}
  .cps-acc-col{flex:1 1 260px;min-width:240px;display:flex;flex-direction:column;gap:var(--sp-3);}
  .cps-acc-cap{font-family:var(--font-mono);font-size:var(--fs-h10);letter-spacing:.05em;color:var(--faint);}
  .cps-acc-cap b{color:var(--muted);font-weight:600;}

  /* Live 預覽容器 */
  .cps-live-box{width:100%;max-width:520px;}

/* ===== modal (Complex) ===== */
/* ==================== modal 對話框 ==================== */
  /* 對話框卡片：兩種 kind（popup 小彈窗／modal 大視窗）共用浮層外框（矩陣為靜態縮小示意、Live 為真浮層） */
  .mdl-card{position:relative;display:flex;flex-direction:column;
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:0 12px 34px rgba(0,0,0,.20);overflow:hidden;}

  /* ---- kind=popup：置中小卡（置中標題＋說明＋可選 icon／備註／記住帳號） ---- */
  .mdl-kind-popup{width:100%;max-width:360px;}
  .mdl-pop-body{display:flex;flex-direction:column;align-items:center;gap:var(--sp-3);padding:var(--sp-4) var(--sp-5) 0;}
  .mdl-illus{flex:0 0 auto;width:46px;height:46px;color:var(--i-primary);}  /* 頂部圓 icon：一般語意＝主色 */
  .mdl-illus.is-danger{color:var(--i-danger);}                              /* 警示語意＝紅，差異只在顏色 */
  .mdl-illus svg{width:100%;height:100%;}
  .mdl-pop-title{font-family:var(--font-sans);font-weight:600;font-size:var(--fs-h7);color:var(--ink);line-height:1.35;text-align:center;}
  .mdl-desc{margin:0;font-family:var(--font-sans);font-size:var(--fs-h9);color:var(--muted);line-height:1.55;}
  .mdl-pop-body .mdl-desc{width:100%;text-align:left;}                      /* 說明文字齊左 */
  .mdl-note{width:100%;font-family:var(--font-sans);font-size:var(--fs-h10);color:var(--faint);line-height:1.5;}
  .mdl-remember{width:100%;display:flex;align-items:center;gap:var(--sp-3);font-family:var(--font-sans);font-size:var(--fs-h9);color:var(--ink);cursor:pointer;user-select:none;}
  /* popup footer：桌機＝次＋主並排等寬；行動版＝主／次／文字 全寬堆疊 */
  /* popup footer 排列為獨立旗標、不綁裝置：預設並排（次→主等寬）、.stack 垂直堆疊（主→次全寬） */
  .mdl-pop-foot{display:flex;flex-wrap:wrap;gap:var(--sp-3);padding:var(--sp-5) var(--sp-5) var(--sp-5);}
  .mdl-pop-foot .btn{flex:1 1 0;justify-content:center;}
  .mdl-pop-foot .btn.v-text{flex:1 1 100%;}           /* 文字按鈕（第三動作）：獨占一列全寬 */
  .mdl-pop-foot.stack{flex-direction:column;gap:var(--sp-3);}
  .mdl-pop-foot.stack .btn{flex:0 0 auto;width:100%;}

  /* ---- kind=modal：寬版視窗（header 標題＋副標題＋× ＋ 可捲動 content ＋ footer 靠右） ---- */
  .mdl-kind-modal{width:100%;max-width:800px;}    /* regular：桌機標準寬 800px */
  .mdl-kind-modal.mdl-larger{max-width:1224px;}   /* larger：寬高 auto、上限 1224px */
  .mdl-mhead{display:flex;align-items:flex-start;justify-content:space-between;gap:var(--sp-4);padding:var(--sp-5) var(--sp-5) 0;}
  .mdl-mhead-txt{display:flex;flex-direction:column;gap:3px;min-width:0;}
  .mdl-title{font-family:var(--font-sans);font-weight:600;font-size:var(--fs-h7);color:var(--ink);line-height:1.35;}
  .mdl-sub{font-family:var(--font-sans);font-size:var(--fs-h9);color:var(--muted);line-height:1.4;}
  .mdl-close{flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;
    width:28px;height:28px;margin:-3px -3px 0 0;padding:0;border:none;background:transparent;
    color:var(--muted);cursor:pointer;border-radius:var(--r-sm);transition:background .13s,color .13s;}
  .mdl-close svg{width:18px;height:18px;}
  .mdl-close:hover{background:var(--panel-2);color:var(--ink);}
  .mdl-close.mdl-abs{position:absolute;top:var(--sp-4);right:var(--sp-4);margin:0;}
  /* content 可捲動：真實規格 max-height 80vh／min-height 30vh、內容溢出出現卷軸；陳列頁舞台有限，改以容器高度／.mdl-clip 示意 */
  .mdl-content{display:flex;flex-direction:column;gap:var(--sp-3);padding:var(--sp-4) var(--sp-5) var(--sp-1);overflow-y:auto;min-height:0;}
  .mdl-clip{max-height:130px;}                    /* 矩陣「內容溢出」示意：固定高度讓卷軸現身 */
  .mdl-fields{display:flex;flex-direction:column;gap:var(--sp-3);}
  .mdl-fields .field{width:100%;min-width:0;}

  /* footer：動作按鈕靠右（modal 用） */
  .mdl-foot{display:flex;justify-content:flex-end;gap:var(--sp-3);padding:var(--sp-5) var(--sp-5) var(--sp-5);}

  /* 矩陣內縮小示意：字級／內距略收，讀起來像迷你卡 */
  .mdl-compact{box-shadow:0 6px 18px rgba(0,0,0,.15);}
  .mdl-compact .mdl-pop-title,.mdl-compact .mdl-title{font-size:var(--fs-h9);}
  .mdl-compact .mdl-desc{font-size:var(--fs-h10);line-height:1.5;}
  .mdl-compact .mdl-note{font-size:var(--fs-h10);}
  .mdl-compact .mdl-pop-body{padding:var(--sp-4) var(--sp-4) 0;gap:var(--sp-3);}
  .mdl-compact .mdl-illus{width:36px;height:36px;}
  .mdl-compact .mdl-pop-foot{padding:var(--sp-4) var(--sp-4) var(--sp-4);gap:var(--sp-3);}
  .mdl-compact .mdl-mhead{padding:var(--sp-4) var(--sp-4) 0;}
  .mdl-compact .mdl-content{padding:var(--sp-3) var(--sp-4) var(--sp-1);gap:var(--sp-3);}
  .mdl-compact .mdl-foot{padding:var(--sp-4) var(--sp-4) var(--sp-4);}

  /* ---- 浮層結構示意：backdrop 遮罩 + 置中卡片 的層次 ---- */
  .mdl-layer-wrap{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:var(--sp-4);
    display:flex;flex-wrap:wrap;gap:var(--sp-6);align-items:center;}
  .mdl-viewport{position:relative;flex:1 1 300px;max-width:440px;height:250px;
    border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:var(--panel-2);}
  /* 底層：頁面內容骨架 */
  .mdl-vp-page{position:absolute;inset:0;padding:var(--sp-4);display:flex;flex-direction:column;gap:var(--sp-3);}
  .mdl-skel{height:10px;border-radius:var(--r-sm);background:var(--panel-3);}
  .mdl-skel.w70{width:70%;} .mdl-skel.w90{width:90%;} .mdl-skel.w50{width:50%;} .mdl-skel.w80{width:80%;}
  /* 中層：backdrop 遮罩 */
  .mdl-vp-scrim{position:absolute;inset:0;background:rgba(0,0,0,.34);
    display:flex;align-items:center;justify-content:center;}
  /* 上層：置中對話框卡 */
  .mdl-vp-card{width:74%;max-width:250px;background:var(--panel);border:1px solid var(--line);
    border-radius:var(--r-sm);box-shadow:0 14px 34px rgba(0,0,0,.28);padding:var(--sp-4);
    display:flex;flex-direction:column;gap:var(--sp-3);}
  .mdl-vp-card .mdl-title{font-size:var(--fs-h9);}
  .mdl-vp-card .mdl-desc{font-size:var(--fs-h10);}
  .mdl-vp-cardfoot{display:flex;justify-content:flex-end;gap:var(--sp-2);margin-top:2px;}
  /* 層次圖例 */
  .mdl-legend{flex:1 1 200px;display:flex;flex-direction:column;gap:var(--sp-4);}
  .mdl-leg-item{display:flex;gap:var(--sp-4);align-items:flex-start;}
  .mdl-leg-dot{flex:0 0 auto;width:15px;height:15px;border-radius:var(--r-sm);margin-top:1px;border:1px solid var(--line-strong);}
  .mdl-leg-dot.l-page{background:var(--panel-3);}
  .mdl-leg-dot.l-scrim{background:rgba(0,0,0,.34);border-color:transparent;}
  .mdl-leg-dot.l-card{background:var(--panel);box-shadow:0 3px 8px rgba(0,0,0,.22);}
  .mdl-leg-t{font-family:var(--font-sans);font-size:var(--fs-h9);font-weight:600;color:var(--ink);}
  .mdl-leg-d{font-family:var(--font-sans);font-size:var(--fs-h9);color:var(--muted);line-height:1.5;margin-top:2px;}

  /* ---- 實際互動 Live：overlay 限縮在 stage 內、不遮全頁，且預設就開啟 ---- */
  .mdl-live-root{position:relative;width:100%;min-height:380px;border-radius:var(--r-sm);
    display:flex;align-items:center;justify-content:center;}
  /* 關閉對話框後才出現的「重新開啟」按鈕 */
  .mdl-live-root .mdl-reopen{display:none;}
  .mdl-live-root .mdl-reopen.show{display:inline-flex;}
  /* backdrop 只蓋住 root（inset:0 absolute），不是 fixed 全頁 */
  .mdl-overlay{position:absolute;inset:0;z-index:2;background:rgba(0,0,0,.34);
    display:flex;align-items:center;justify-content:center;padding:var(--sp-5);border-radius:var(--r-sm);
    animation:mdl-fade .14s ease-out;}
  .mdl-overlay .mdl-card{animation:mdl-pop .16s ease-out;max-height:100%;}
  @keyframes mdl-fade{from{opacity:0;}to{opacity:1;}}
  @keyframes mdl-pop{from{opacity:0;transform:translateY(6px) scale(.98);}to{opacity:1;transform:none;}}
  /* ---- 行動版 bottom sheet：貼齊舞台底部、全寬、上緣圓角（下緣不圓）、最高 95%（示意 95vh）、由下往上滑入 ---- */
  .mdl-overlay.mdl-sheet-ov{align-items:flex-end;padding:var(--sp-5) 0 0;overflow:hidden;}
  .mdl-overlay .mdl-card.mdl-sheet{max-width:none;width:100%;max-height:95%;
    border-radius:var(--r-sm) var(--r-sm) 0 0;border-bottom:none;animation:mdl-slideup .22s ease-out;}
  @keyframes mdl-slideup{from{opacity:0;transform:translateY(100%);}to{opacity:1;transform:none;}}
  /* 行動版舞台：縮成手機視口寬度置中，讓 Device 軸有可見差異 */
  .mdl-live-root.vp-mobile{max-width:400px;margin:0 auto;min-height:460px;}
  /* Live 兩段分區（popup／modal 各一段，控制項不共用） */
  .mdl-live-block{margin-bottom:var(--sp-6);}
  .mdl-live-block:last-child{margin-bottom:0;}
  .mdl-live-cap{font-family:var(--font-mono);font-size:var(--fs-h10);letter-spacing:.04em;color:var(--muted);margin:0 0 var(--sp-3);}
  .mdl-live-cap b{font-weight:600;}

/* ===== drawer (Complex) ===== */
/* ==================== drawer 抽屜 ==================== */
  /* ---- 矩陣：小型裝置框示意（16:10 視窗 + 假內容 + 半透明 backdrop + 側邊抽屜）---- */
  .drw-frame{position:relative;width:100%;aspect-ratio:16/10;background:var(--canvas);
    border:1px solid var(--line-strong);border-radius:var(--r-sm);overflow:hidden;}
  .drw-fake{position:absolute;inset:0;padding:var(--sp-4);display:flex;flex-direction:column;gap:var(--sp-3);}
  .drw-fbar{height:8px;border-radius:var(--r-sm);background:var(--panel-3);}
  .drw-fbar.lead{height:11px;width:38%;background:var(--line-strong);opacity:.55;}
  /* backdrop 遮罩：由 --ink 混出半透明，深淺色都能區隔背景 */
  .drw-backdrop{position:absolute;inset:0;background:color-mix(in srgb,var(--ink) 42%,transparent);}
  /* 抽屜面板：與 Live 浮動樣式一致、縮放到小框（四邊內縮 9px、圓角＋陰影、高度＝框高 − 18px），
     面板 overflow:hidden 讓圓角正確裁切內容，寬度依 size */
  .drw-panel{position:absolute;top:var(--sp-3);bottom:var(--sp-3);height:calc(100% - 18px);background:var(--panel);
    padding:0;/* 同 Live：歸零裸 .sz-* 撞名漏進來的 padding，讓 .drw-phead 分隔線填滿面板寬 */
    display:flex;flex-direction:column;overflow:hidden;border:1px solid var(--line);border-radius:var(--r-sm);
    box-shadow:0 5px 16px color-mix(in srgb,var(--ink) 26%,transparent);}
  .drw-panel.side-left{left:var(--sp-3);} .drw-panel.side-right{right:var(--sp-3);}
  .drw-panel.sz-s{width:42%;} .drw-panel.sz-m{width:54%;} .drw-panel.sz-l{width:68%;}
  .drw-phead{display:flex;align-items:center;justify-content:space-between;gap:var(--sp-2);
    padding:var(--sp-3) var(--sp-3) var(--sp-3) var(--sp-4);border-bottom:1px solid var(--line);}
  .drw-ptitle{font-size:var(--fs-h10);font-weight:600;color:var(--ink);}
  .drw-pclose{display:inline-flex;width:14px;height:14px;color:var(--faint);flex:0 0 auto;}
  .drw-pnav{display:flex;flex-direction:column;gap:2px;padding:var(--sp-2);flex:1;overflow:hidden;}
  .drw-pitem{display:flex;align-items:center;gap:var(--sp-2);padding:var(--sp-1);border-radius:var(--r-sm);
    font-size:var(--fs-h10);color:var(--muted);white-space:nowrap;}
  .drw-pitem.is-active{background:var(--i-primary-tint);color:var(--i-primary);font-weight:600;}
  .drw-pico{display:inline-flex;width:12px;height:12px;flex:0 0 auto;}

  /* ---- 內容結構示意（真實比例抽屜 + 三段圖例）---- */
  .drw-struct-wrap{display:flex;flex-wrap:wrap;gap:var(--sp-7);align-items:stretch;
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:var(--sp-6);}
  .drw-struct{width:300px;max-width:100%;flex:0 0 auto;border:1px solid var(--line);border-radius:var(--r-sm);
    overflow:hidden;background:var(--panel);display:flex;flex-direction:column;
    box-shadow:0 10px 28px color-mix(in srgb,var(--ink) 9%,transparent);}
  .drw-legend{display:flex;flex-direction:column;justify-content:center;gap:var(--sp-5);flex:1;min-width:220px;}
  .drw-legrow{display:flex;align-items:flex-start;gap:var(--sp-4);}
  .drw-legtx{display:flex;flex-direction:column;gap:3px;}
  .drw-legtx b{font-size:var(--fs-h9);color:var(--ink);font-weight:600;}
  .drw-legtx span{font-size:var(--fs-h9);color:var(--faint);line-height:1.5;}

  /* ---- 真實比例抽屜共用（結構示意 + Live）---- */
  .drw-head{display:flex;align-items:center;justify-content:space-between;gap:var(--sp-4);
    padding:var(--sp-5) var(--sp-5) var(--sp-5) var(--sp-5);border-bottom:1px solid var(--line);}
  .drw-title{font-size:var(--fs-h8);font-weight:600;color:var(--ink);}
  .drw-close{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;padding:0;
    border:1px solid var(--line);border-radius:var(--r-sm);background:transparent;color:var(--muted);cursor:pointer;transition:.14s;}
  .drw-close:hover{background:var(--panel-2);color:var(--ink);border-color:var(--line-strong);}
  .drw-close svg{width:16px;height:16px;}
  .drw-nav{flex:1;display:flex;flex-direction:column;gap:var(--sp-1);padding:var(--sp-2);overflow:auto;}
  .drw-navrow{display:flex;align-items:center;gap:var(--sp-4);padding:var(--sp-2);border-radius:var(--r-sm);
    color:var(--muted);font-size:var(--fs-h8);cursor:pointer;transition:.14s;}
  .drw-navrow:hover{background:var(--panel-2);color:var(--ink);}
  .drw-navrow.is-active{background:var(--i-primary-tint);color:var(--i-primary);font-weight:600;}
  .drw-navico{display:inline-flex;width:20px;height:20px;flex:0 0 auto;}
  .drw-foot{display:flex;justify-content:flex-end;gap:var(--sp-3);padding:var(--sp-2);border-top:1px solid var(--line);}

  /* ---- 實際互動 Live：overlay 限縮在 stage 內、不遮全頁 ---- */
  .drw-live-stage{position:relative;width:100%;min-height:320px;border-radius:var(--r-sm);overflow:hidden;
    background:var(--panel-2);display:flex;align-items:center;justify-content:center;}
  .drw-live-backdrop{position:absolute;inset:0;background:color-mix(in srgb,var(--ink) 42%,transparent);
    opacity:0;transition:opacity .28s ease;pointer-events:none;}
  .drw-live-backdrop.is-open{opacity:1;pointer-events:auto;}
  /* 浮動式面板：距舞台四邊內縮 24px（top/bottom 撐出高度＝舞台高−48px），
     圓角＋陰影呈漂浮感；面板本體 overflow:hidden 讓圓角裁切，內容溢出由 .drw-nav 內部捲動 */
  .drw-live-panel{position:absolute;top:var(--sp-6);bottom:var(--sp-6);height:calc(100% - 48px);max-width:calc(82% - 24px);background:var(--panel);
    padding:0;/* 面板掛 sz-* 會撞到 Button 裸 .sz-* 的 padding，明確歸零讓 .drw-head 分隔線填滿面板寬 */
    display:flex;flex-direction:column;overflow:hidden;border:1px solid var(--line);border-radius:var(--r-sm);
    box-shadow:0 12px 40px color-mix(in srgb,var(--ink) 30%,transparent);
    transition:transform .3s cubic-bezier(.4,0,.2,1);}
  .drw-live-panel.sz-s{width:220px;} .drw-live-panel.sz-m{width:300px;} .drw-live-panel.sz-l{width:380px;}
  /* 內縮 24px 後，滑出位移要多推 24px 才能完全離開舞台可視範圍 */
  .drw-live-panel.side-left{left:var(--sp-6);transform:translateX(calc(-100% - 24px));}
  .drw-live-panel.side-right{right:var(--sp-6);transform:translateX(calc(100% + 24px));}
  .drw-live-panel.is-open{transform:translateX(0);}

/* ===== floating-line (Complex) ===== */
/* ==================== floating-line 浮動列 ==================== */
  /* 假內容舞台：浮動列漂浮其上的相對定位容器 */
  .flo-stage{position:relative;width:100%;min-height:150px;background:var(--panel-2);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;padding:var(--sp-4);}
  /* tall 內容舞台（Live）：加高，FAB 展開子項才不會被裁切 */
  .flo-stage.flo-tall{min-height:242px;}
  .flo-fake{display:flex;flex-direction:column;gap:var(--sp-4);pointer-events:none;}
  .flo-line{height:9px;border-radius:var(--r-sm);background:var(--line);}
  .flo-fake .flo-blk{height:34px;border-radius:var(--r-sm);background:var(--line);opacity:.6;}

  /* 浮動列共用定位：絕對疊在舞台底部 */
  .flo-float{position:absolute;z-index:2;display:flex;align-items:center;}
  .flo-float.flo-pos-bottom-center{left:50%;transform:translateX(-50%);bottom:var(--sp-4);}
  .flo-float.flo-pos-bottom-right{right:var(--sp-4);bottom:var(--sp-4);}

  /* 1) 選取列：深色小圓角橫條，計數 + 動作鈕（inline-flex 垂直置中、按鈕等高） */
  .flo-select{display:inline-flex;align-items:center;gap:var(--sp-4);background:var(--ink);color:var(--canvas);
    padding:var(--sp-3) var(--sp-3) var(--sp-3) var(--sp-5);border-radius:var(--r-sm);box-shadow:0 10px 28px rgba(0,0,0,.30);}
  .flo-select .flo-count{font-size:var(--fs-h9);font-weight:600;white-space:nowrap;letter-spacing:.01em;}
  .flo-select .flo-count b{font-weight:600;}
  .flo-select .flo-actions{display:flex;align-items:center;gap:var(--sp-2);}
  /* 深底上的取消文字鈕：文字改用反相色（走 token） */
  .flo-select .btn.v-text.i-secondary{color:var(--canvas);}
  .flo-select .btn.v-text.i-secondary:hover{background:rgba(255,255,255,.14);}

  /* 2) 工具列：白底圓角陰影，icon-only 工具鈕 + 分隔線分組 */
  .flo-toolbar{display:inline-flex;align-items:center;gap:2px;background:var(--panel);border:1px solid var(--line);border-radius:var(--r-sm);padding:var(--sp-1);
    box-shadow:0 8px 24px rgba(0,0,0,.14);}
  .flo-tdiv{width:1px;align-self:stretch;margin:var(--sp-1) var(--sp-1);background:var(--line);}

  /* 3) FAB 浮動主鈕：圓形（沿用 .btn v-solid i-primary，僅改圓角＋尺寸） */
  .flo-fabwrap{flex-direction:column;align-items:flex-end;gap:var(--sp-4);}
  .flo-fab.btn{border-radius:var(--r-pill);width:52px;height:52px;padding:0;box-shadow:0 10px 26px rgba(0,0,0,.24);}
  .flo-fab.btn svg{width:24px;height:24px;transition:transform .2s ease;}
  .flo-fab.is-open svg{transform:rotate(45deg);} /* 展開時＋旋轉成×，暗示可收合 */
  /* FAB 展開的子項：單顆白底膠囊按鈕（icon＋文字整顆可點）；白底＋外框＋陰影，明顯浮於灰底之上 */
  .flo-fab-child-btn.btn{align-self:flex-end;border-radius:var(--r-pill);background:var(--panel);color:var(--ink);
    border:1px solid var(--line);box-shadow:0 6px 16px rgba(0,0,0,.14);font-weight:600;}
  .flo-fab-child-btn.btn:hover{background:var(--panel-2);border-color:var(--line-strong);}
  .flo-fab-child-btn.btn:active{background:var(--panel-3);transform:translateY(1px);}
  .flo-fab-child-btn.btn svg{color:var(--muted);}

  /* 型態細節區塊：三型態並排說明 */
  .flo-detail{display:flex;flex-wrap:wrap;gap:var(--sp-6);}
  .flo-dcol{flex:1 1 260px;min-width:260px;display:flex;flex-direction:column;gap:var(--sp-4);}
  /* 選取列含完整批次動作較寬：獨佔一整列避免擠壓 */
  .flo-dcol.flo-wide{flex:1 1 100%;min-width:100%;}
  .flo-dcap{font-family:var(--font-mono);font-size:var(--fs-h10);color:var(--faint);letter-spacing:.05em;}
  .flo-dcap b{color:var(--muted);font-weight:600;}
  .flo-dbox{background:var(--panel-2);border:1px solid var(--line);border-radius:var(--radius);
    padding:var(--sp-6) var(--sp-5);display:flex;justify-content:center;align-items:flex-end;min-height:96px;}
  /* 細節區裡把浮動列改成靜態置中呈現 */
  .flo-dbox .flo-float{position:static;transform:none;}
  .flo-dbox.flo-tall{min-height:190px;align-items:flex-end;}

/* ===== step (Complex) ===== */
/* ==================== STEP 步驟指示器 ==================== */
  /* 節點圓圈：編號 / 圖示 variant 用 32px，dotted 用 16px 小圓點 */
  .stp-node{flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;
    width:32px;height:32px;border-radius:var(--r-pill);box-sizing:border-box;
    font-family:var(--font-mono);font-size:var(--fs-h9);font-weight:600;line-height:1;transition:all .15s;}
  .stp-node svg{width:18px;height:18px;}
  /* 五種節點狀態（顏色全綁 token） */
  .stp-node.stp-done{background:var(--accent);border:2px solid var(--accent);color:var(--primary-on);}
  .stp-node.stp-current{background:var(--panel);border:2px solid var(--accent);color:var(--accent);box-shadow:0 0 0 4px var(--i-primary-tint);}
  .stp-node.stp-todo{background:var(--panel);border:2px solid var(--line);color:var(--faint);}
  .stp-node.stp-error{background:var(--i-danger);border:2px solid var(--i-danger);color:var(--danger-on);}
  .stp-node.stp-disabled{background:var(--panel-2);border:2px solid var(--line);color:var(--faint);opacity:.55;}
  /* dotted：小圓點，無內容物 */
  .stp-dot .stp-node{width:16px;height:16px;}
  .stp-dot .stp-node svg{display:none;}

  /* 標題／副標 */
  .stp-labels{display:flex;flex-direction:column;gap:2px;min-width:0;}
  .stp-title{font-family:var(--font-sans);font-size:var(--fs-h9);line-height:1.35;color:var(--muted);}
  .stp-desc{font-family:var(--font-sans);font-size:var(--fs-h10);line-height:1.35;color:var(--faint);}
  .stp-is-done .stp-title,.stp-is-current .stp-title{color:var(--ink);}
  .stp-is-current .stp-title{font-weight:600;}
  .stp-is-error .stp-title{color:var(--i-danger);}
  .stp-is-disabled .stp-title{color:var(--faint);}

  /* ---- 水平 horizontal ---- */
  .stp-horizontal{display:flex;align-items:flex-start;width:100%;}
  .stp-horizontal .stp-step{display:flex;flex-direction:column;align-items:center;text-align:center;gap:var(--sp-3);flex:0 0 auto;}
  .stp-horizontal .stp-labels{align-items:center;text-align:center;max-width:76px;}
  .stp-horizontal .stp-conn{flex:1 1 auto;height:2px;min-width:16px;margin-top:var(--sp-5);
    background:var(--line);border-radius:var(--r-xs);}
  .stp-horizontal .stp-conn.stp-conn-done{background:var(--accent);}
  .stp-horizontal.stp-dot .stp-conn{margin-top:var(--sp-2);}

  /* ---- 垂直 vertical ---- */
  .stp-vertical{display:flex;flex-direction:column;}
  .stp-vstep{display:flex;gap:var(--sp-4);}
  .stp-vrail{display:flex;flex-direction:column;align-items:center;flex:0 0 auto;}
  .stp-vconn{width:2px;flex:1 1 auto;min-height:22px;margin:var(--sp-1) 0;background:var(--line);border-radius:var(--r-xs);}
  .stp-vconn.stp-conn-done{background:var(--accent);}
  .stp-vertical .stp-labels{padding-top:var(--sp-2);padding-bottom:var(--sp-5);}
  .stp-vstep:last-child .stp-labels{padding-bottom:0;}
  .stp-vertical.stp-dot .stp-labels{padding-top:0;}

  /* ---- 實際互動 Live ---- */
  .stp-live-wrap{display:flex;flex-direction:column;gap:var(--sp-5);width:100%;}
  .stp-live-stage{display:flex;}
  .stp-live-ctl{display:flex;gap:var(--sp-3);flex-wrap:wrap;}

  /* ===== quantity 商品計數（qty-）＝＋／− Button 原子 ＋ 中間數值，容器依 variant 改外觀 ===== */
  .qty{display:inline-flex;align-items:stretch;font-family:var(--font-sans);}
  .qty .qty-val{min-width:2.4em;padding:0 var(--sp-2);display:flex;align-items:center;justify-content:center;font-weight:600;color:var(--ink);font-variant-numeric:tabular-nums;}
  .qty-sz-s .qty-val{font-size:var(--fs-h9);min-width:2em;} .qty-sz-l .qty-val{font-size:var(--fs-h7);}
  /* 外框：整體一個 bordered 容器，內部按鈕去框、數值兩側分隔線 */
  .qty-v-outline{border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;}
  .qty-v-outline .btn{border:0;border-radius:0;background:transparent;}
  .qty-v-outline .btn:hover:not(:disabled){background:var(--panel-2);}
  .qty-v-outline .qty-val{border-left:1px solid var(--line);border-right:1px solid var(--line);}
  /* 膠囊：全圓角容器 */
  .qty-v-pill{border:1px solid var(--line);border-radius:var(--r-pill);overflow:hidden;}
  .qty-v-pill .btn{border:0;border-radius:0;background:transparent;}
  .qty-v-pill .btn:hover:not(:disabled){background:var(--panel-2);}
  /* 極簡：無外容器，＋／− 為圓形獨立鈕 */
  .qty-v-plain{gap:var(--sp-1);align-items:center;}
  .qty-v-plain .btn{border-radius:50%;}
  .qty.is-disabled{opacity:.5;pointer-events:none;}
  .qty-staterow{display:flex;flex-wrap:wrap;gap:var(--sp-6);}
  .qty-statecell{display:flex;flex-direction:column;gap:var(--sp-3);}
  .qty-statecap{font-family:var(--font-mono);font-size:var(--fs-h10);color:var(--faint);}
  .qty-live-box{display:flex;align-items:center;justify-content:center;padding:var(--sp-6) var(--sp-5);min-height:74px;}

  /* ===== progress 進度條（prg-）＝ track 底軌 ＋ fill 填充（依 value 撐開） ===== */
  .prg{display:block;width:100%;max-width:320px;font-family:var(--font-sans);}
  .prg-label{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:var(--sp-2);gap:var(--sp-4);}
  .prg-cap{font-size:var(--fs-h9);color:var(--muted);}
  .prg-pct{font-size:var(--fs-h10);color:var(--ink);font-weight:600;font-variant-numeric:tabular-nums;}
  /* 標準（m）／粗（l）尺寸：百分比數字再放大（標題同步微調） */
  .prg-sz-m .prg-pct{font-size:var(--fs-h8);}
  .prg-sz-l .prg-cap{font-size:var(--fs-h8);}
  .prg-sz-l .prg-pct{font-size:var(--fs-h6);}
  .prg-track{width:100%;background:var(--panel-3);border-radius:var(--r-pill);overflow:hidden;}
  .prg-sz-s .prg-track{height:4px;} .prg-sz-m .prg-track{height:8px;} .prg-sz-l .prg-track{height:12px;}
  .prg-fill{height:100%;border-radius:var(--r-pill);transition:width .3s ease;}
  .prg-fill.i-primary{background:var(--accent);}
  .prg-fill.i-success{background:var(--ok);}
  .prg-fill.i-warning{background:var(--warn);}
  .prg-fill.i-danger{background:var(--i-danger);}
  /* 漸層填充：每種語意色各自 base→淺色的專屬漸層 */
  .prg-fill.is-grad.i-primary{background:linear-gradient(90deg,var(--accent),color-mix(in srgb,var(--accent) 42%,#fff));}
  .prg-fill.is-grad.i-success{background:linear-gradient(90deg,var(--ok),color-mix(in srgb,var(--ok) 42%,#fff));}
  .prg-fill.is-grad.i-warning{background:linear-gradient(90deg,var(--warn),color-mix(in srgb,var(--warn) 42%,#fff));}
  .prg-fill.is-grad.i-danger{background:linear-gradient(90deg,var(--i-danger),color-mix(in srgb,var(--i-danger) 42%,#fff));}
  .prg-intentrow{display:flex;flex-direction:column;gap:var(--sp-5);max-width:340px;}
  .prg-intentcell{display:flex;flex-direction:column;gap:var(--sp-2);}
  .prg-intentcap{font-family:var(--font-mono);font-size:var(--fs-h10);color:var(--faint);}
  /* Live：進度條固定為互動區 50% 寬（stage 置中） */
  .prg-live-box{width:50%;min-width:260px;}
  .prg-live-box .prg{max-width:none;width:100%;}
  /* 勾選項與滑桿同列，滑桿坐在勾選項右邊 */
  .prg-checks{align-items:center;}
  .prg-checks .prg-range{flex:1 1 180px;min-width:150px;}
  .prg-range{accent-color:var(--accent);cursor:pointer;}

  /* ===== Card group: card ===== */
/* ==================== Card 基礎卡片（crd- namespace）==================== */
/* 泛用內容容器卡：media（Image 原子）＋ badge（Tag 原子）＋ title ＋ desc ＋ footer actions（Button 原子）。
   variant：elevated 浮起（陰影）／outlined 外框（1px --line）／filled 填色（--panel-2 底）。
   矩陣用靜態 class（is-hover / is-selected / is-disabled）模擬狀態；Live／showcase 加 .live 走真實 :hover。
   陰影一律用 color-mix(--ink) 調透明度，暗色模式自動跟著加深（比照 modal/drawer 的做法）。 */

.crd{position:relative;display:flex;flex-direction:column;width:100%;max-width:300px;padding:12px;
  background:var(--panel);border:1px solid transparent;border-radius:var(--radius);overflow:hidden;
  font-family:var(--font-sans);text-align:left;
  transition:box-shadow .15s,border-color .15s,background .15s,transform .12s;}

/* ---- variant 三型態 ---- */
.crd-v-elevated{border-color:transparent;
  box-shadow:0 1px 3px color-mix(in srgb,var(--ink) 10%,transparent),
             0 4px 14px color-mix(in srgb,var(--ink) 7%,transparent);}
.crd-v-outlined{border-color:var(--line);box-shadow:none;}
.crd-v-filled{background:var(--panel-2);border-color:transparent;box-shadow:none;}

/* ---- state：矩陣靜態模擬 ---- */
/* hover＝依 variant 各自「加深」：elevated 陰影變深、outlined 邊框轉強、filled 底再深一階 */
.crd-v-elevated.is-hover{box-shadow:0 3px 8px color-mix(in srgb,var(--ink) 13%,transparent),
                                    0 10px 26px color-mix(in srgb,var(--ink) 11%,transparent);}
.crd-v-outlined.is-hover{border-color:var(--line-strong);
  box-shadow:0 2px 8px color-mix(in srgb,var(--ink) 6%,transparent);}
.crd-v-filled.is-hover{background:var(--panel-3);}
/* selected＝accent 邊框（外加 1px ring 增厚）＋ 主色淡藍底，三 variant 一致 */
.crd.is-selected{border-color:var(--accent);background:var(--i-primary-tint);}
.crd-v-elevated.is-selected{box-shadow:0 1px 3px color-mix(in srgb,var(--ink) 10%,transparent),
  0 4px 14px color-mix(in srgb,var(--ink) 7%,transparent);} /* elevated 選取仍保留浮起陰影 */
/* disabled＝整卡淡化、不可點（Live 由 JS 同步把內部 .btn 設 disabled） */
.crd.is-disabled{opacity:.5;cursor:not-allowed;}
.crd.is-disabled .crd-media .im-img{filter:grayscale(.35);}

/* ---- Live／showcase 真實 hover（.live 才啟用，矩陣靜態格不受影響）---- */
.crd-v-elevated.live:hover:not(.is-disabled){box-shadow:0 3px 8px color-mix(in srgb,var(--ink) 13%,transparent),
  0 10px 26px color-mix(in srgb,var(--ink) 11%,transparent);}
.crd-v-outlined.live:hover:not(.is-disabled){border-color:var(--line-strong);
  box-shadow:0 2px 8px color-mix(in srgb,var(--ink) 6%,transparent);}
.crd-v-filled.live:hover:not(.is-disabled):not(.is-selected){background:var(--panel-3);}

/* ---- slots ---- */
/* media：重用 Image 原子（imEl 16:9），覆寫為滿版寬、貼齊卡片圓角上緣 */
.crd-media{position:relative;flex:0 0 auto;border-radius:var(--r-sm);overflow:hidden;}
.crd-media .im-box{display:block;width:100%;height:auto;aspect-ratio:16/9;
  border:0;border-radius:var(--r-sm);}
.crd-media .im-img{transition:transform .35s ease;}
.crd.is-hover .crd-media .im-img,.crd.live:hover:not(.is-disabled) .crd-media .im-img{transform:scale(1.05);} /* hover 封面微放大（比照文章卡）*/
/* badge：重用 Tag 原子（.tg），釘在媒體圖右上角；無媒體圖時釘在卡片右上角 */
.crd-badge{position:absolute;top:var(--sp-3);right:var(--sp-3);z-index:1;}
/* 圖片上的標籤：半透明黑玻璃＋背景模糊（card / product 共用，壓在照片上）*/
.tg.tg-glass{background:rgba(18,20,26,.5);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-color:transparent!important;color:#fff;box-shadow:none;}
.tg.tg-glass span{color:#fff;}
.crd-badge .tg{box-shadow:0 1px 4px color-mix(in srgb,var(--ink) 18%,transparent);} /* 壓在照片上補一點分離度 */
/* body：標題＋描述 */
.crd-body{display:flex;flex-direction:column;gap:var(--sp-2);padding:var(--sp-4) var(--sp-1) 0;}
.crd-title{font-size:var(--fs-h8);font-weight:600;line-height:1.4;color:var(--ink);}
.crd-desc{font-size:var(--fs-h9);line-height:1.6;color:var(--muted);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;} /* 兩行截斷 */
/* footer actions：重用 Button 原子，主（v-solid i-primary）＋次（v-text i-secondary） */
.crd-foot{display:flex;align-items:center;justify-content:flex-end;gap:var(--sp-3);padding:var(--sp-4) var(--sp-1) 2px;margin-top:auto;}
.crd-body:last-child{padding-bottom:var(--sp-1);} /* 沒有 footer actions 時，body 自己補底部留白 */

/* ---- 矩陣格內的緊湊版 ---- */
.crd-mx{max-width:230px;padding:var(--sp-3);}
.crd-mx .crd-body{padding:var(--sp-3) var(--sp-1) 0;gap:var(--sp-1);}
.crd-mx .crd-title{font-size:var(--fs-h8);}
.crd-mx .crd-desc{font-size:var(--fs-h10);}
.crd-mx .crd-foot{padding:var(--sp-3) var(--sp-1) 2px;}

/* ---- showcase 三卡並排 ---- */
.crd-show{display:flex;flex-wrap:wrap;gap:var(--sp-6);align-items:stretch;}
.crd-show .demo-item{flex:1 1 240px;max-width:320px;}
.crd-show .crd{height:100%;}

/* ---- Live 舞台 ---- */
.crd-live-stage{display:flex;justify-content:flex-start;}
.crd-live-stage .crd{max-width:320px;min-width:260px;}
/* size s：精簡尺寸（字級/間距縮小）*/
.crd-sz-s{padding:var(--sp-3);}
.crd-sz-s .crd-body{padding-top:var(--sp-3);gap:var(--sp-1);}
.crd-sz-s .crd-title{font-size:var(--fs-h9);}
.crd-sz-s .crd-desc{font-size:var(--fs-h10);}
.crd-sz-s .crd-foot{padding-top:var(--sp-3);}
  /* ===== Card group: product-card ===== */
/* ==================== Product Card 商品卡（pcd- namespace）==================== */
/* 卡片本體：panel 底 + line 邊框 + radius token；hover 有浮起過渡 */
.pcd-card{position:relative;display:flex;flex-direction:column;background:var(--panel);padding:var(--sp-3);
  border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;
  font-family:var(--font-sans);text-align:left;max-width:100%;
  transition:box-shadow .18s,transform .18s,border-color .18s;}

/* --- variant 三型態 --- */
.pcd-v-vertical{width:100%;max-width:216px;}                    /* 直式：圖上資訊下 */
.pcd-v-horizontal{flex-direction:row;width:100%;max-width:340px;} /* 橫式：圖左資訊右 */
.pcd-v-minimal{width:100%;max-width:216px;}                     /* 精簡：無圖純資訊 */

/* --- hover：矩陣用靜態 is-hover、Live/showcase 用真實 :hover（售完不浮起）--- */
.pcd-card.is-hover,
.pcd-card.live:hover:not(.is-soldout){
  box-shadow:0 10px 26px rgba(0,0,0,.13),0 2px 6px rgba(0,0,0,.06);
  transform:translateY(-3px);border-color:var(--line-strong);}

/* --- 縮圖區：重用 image 原子（.im-box），在 pcd 範圍內改為填滿卡寬 --- */
.pcd-thumb{position:relative;flex:0 0 auto;min-width:0;border-radius:var(--r-sm);overflow:hidden;}
.pcd-thumb .im-box{display:block;width:100%;height:auto;border:0;border-radius:var(--r-sm);}
.pcd-thumb .im-img{transition:transform .35s ease;}
.pcd-card.is-hover .pcd-thumb .im-img,.pcd-card.live:hover:not(.is-soldout) .pcd-thumb .im-img{transform:scale(1.05);} /* hover 縮圖微放大 */
.pcd-v-horizontal .pcd-thumb{width:120px;align-self:stretch;display:flex;}
.pcd-v-horizontal .pcd-thumb .im-box{width:100%;height:100%;aspect-ratio:auto;}

/* 左上角角標：重用 .tg 原子，僅負責定位 */
.pcd-badge{position:absolute;top:var(--sp-3);left:var(--sp-3);z-index:2;}

/* 右上角收藏：重用 .btn v-text icon-only 原子，補圓底浮在圖上 */
.pcd-wish{position:absolute;top:var(--sp-2);right:var(--sp-2);z-index:2;background:transparent;box-shadow:none;border-radius:var(--r-pill);} /* 無白底圓框 */
.pcd-wish svg{filter:drop-shadow(0 1px 2px rgba(0,0,0,.28));}     /* 直接壓在照片上，靠 icon 陰影保可讀 */
.pcd-wish.is-on{color:var(--i-danger);}                          /* 點擊後轉紅色實心愛心（fill 版 svg） */
.pcd-v-minimal .pcd-wish{position:static;}
.pcd-v-minimal .pcd-wish svg{filter:none;}                       /* 精簡版無圖，不需陰影 */

/* --- 售完 soldout：圖轉灰階 + 半透明覆蓋 + 「售完」標（tg 原子） --- */
.pcd-card.is-soldout .im-img{filter:grayscale(1);opacity:.85;}
.pcd-card.is-soldout .pcd-badge{filter:grayscale(1);opacity:.65;}
.pcd-soldout-ov{position:absolute;inset:0;z-index:1;display:flex;align-items:center;justify-content:center;
  background:color-mix(in srgb,var(--panel) 45%,transparent);}
.pcd-card.is-soldout .pcd-name,
.pcd-card.is-soldout .pcd-rating{color:var(--faint);}
.pcd-card.is-soldout .pr-price{color:var(--muted);}
.pcd-card.is-soldout .pr-price .pr-cur{color:var(--faint);}

/* --- 資訊區 --- */
.pcd-info{display:flex;flex-direction:column;gap:var(--sp-3);padding:var(--sp-4) var(--sp-1) var(--sp-1);flex:1;min-width:0;}
.pcd-v-horizontal .pcd-info{padding:var(--sp-1) var(--sp-1) var(--sp-1) var(--sp-4);}
.pcd-toprow{display:flex;align-items:flex-start;justify-content:space-between;gap:var(--sp-3);} /* minimal 用：角標＋收藏同列、靠上對齊 */
.pcd-name{font-size:var(--fs-h8);font-weight:600;color:var(--ink);line-height:1.4;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

/* --- 評分星列：warn 黃實星 + faint 空星 + 分數/則數 --- */
.pcd-rating{display:flex;align-items:center;gap:var(--sp-2);font-size:var(--fs-h10);color:var(--muted);}
.pcd-stars{display:inline-flex;gap:1px;color:var(--warn);}
.pcd-stars svg{width:13px;height:13px;display:block;}
.pcd-stars .pcd-star-empty{color:var(--faint);}
.pcd-rate-val{font-weight:600;color:var(--ink);}
.pcd-rate-cnt{color:var(--faint);}

/* --- 價格 + 加入購物車（重用 prEl 與 .btn 原子） --- */
.pcd-buy{display:flex;flex-direction:column;gap:var(--sp-3);margin-top:auto;}   /* 貼底：橫式時資訊高度不齊也對齊 */
.pcd-buy .btn{width:100%;justify-content:center;}
.pcd-v-horizontal .pcd-buy .btn{width:auto;align-self:flex-start;}
/* size s：精簡尺寸 */
.pcd-sz-s{padding:var(--sp-3);}
.pcd-sz-s.pcd-v-vertical,.pcd-sz-s.pcd-v-minimal{max-width:184px;}
.pcd-sz-s .pcd-info{padding-top:var(--sp-3);gap:var(--sp-2);}
.pcd-sz-s .pcd-name{font-size:var(--fs-h9);}
.pcd-sz-s .pcd-buy .btn{height:30px;}
  /* ===== Card group: category-tile ===== */
/* ===== category-tile (Card) ===== */
/* ==================== category-tile 分類磚 ==================== */
/* 基底磚：panel 底＋細框，橫向 flex（leading 圓圈/圖片 ＋ body ＋ arrow） */
.cat-tile{position:relative;display:flex;align-items:center;gap:var(--sp-4);
  width:100%;min-width:200px;max-width:300px;padding:var(--sp-4);box-sizing:border-box;
  background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  font-family:var(--font-sans);cursor:pointer;user-select:none;overflow:hidden;text-align:left;
  transition:border-color .13s,background .13s,transform .13s,box-shadow .13s,filter .13s;}
.cat-tile:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}

/* leading 圓圈（icon 磚＝主色淡底；gradient 磚＝半透明白，見下方 variant 覆寫） */
.cat-circle{flex:0 0 auto;width:44px;height:44px;border-radius:var(--r-pill);
  display:flex;align-items:center;justify-content:center;
  background:var(--i-primary-tint);color:var(--accent);transition:background .13s,color .13s;}
.cat-circle svg{width:22px;height:22px;}

/* 內容區：分類名／描述（可選）／count 標籤列 */
.cat-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px;}
.cat-name{font-size:var(--fs-h8);font-weight:600;color:var(--ink);line-height:1.25;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .13s;}
.cat-desc{font-size:var(--fs-h10);color:var(--muted);line-height:1.4;}
.cat-meta{display:flex;align-items:center;gap:var(--sp-2);margin-top:2px;}

/* 右側箭頭（重用 ICON_ARROW；hover 右滑） */
.cat-arrow{flex:0 0 auto;display:inline-flex;color:var(--faint);transition:color .13s,transform .13s;}
.cat-arrow svg{width:16px;height:16px;}

/* ---- variant: image 圖片磚 ---- */
/* Image 原子（.im-box）攤平成滿版背景，內容沉到磚底、疊在遮罩上 */
.cat-image{min-height:132px;align-items:flex-end;}
.cat-media{position:absolute;inset:0;z-index:0;}
.cat-media .im-box{position:absolute;inset:0;width:100%;height:100%;aspect-ratio:auto;border:0;border-radius:0;} /* 蓋掉原子的固定高/圓角，攤平滿版 */
.cat-media .im-img{width:100%;height:100%;object-fit:cover;transition:transform .35s ease;}
.cat-image.is-hover .cat-media .im-img,.cat-image.live:hover .cat-media .im-img{transform:scale(1.05);} /* hover 圖片微放大 */
/* 底部暗色漸層遮罩：確保白字可讀（overlay 固定暗色、非主題色，明暗模式皆適用） */
.cat-scrim{position:absolute;inset:0;z-index:1;pointer-events:none;
  background:linear-gradient(180deg,rgba(0,0,0,0) 32%,rgba(0,0,0,.62) 100%);transition:background .13s;}
.cat-image .cat-body,.cat-image .cat-arrow{position:relative;z-index:2;}

/* ---- variant: gradient 漸層磚 ---- */
.cat-gradient{border-color:transparent;
  background:linear-gradient(135deg,var(--c-neutral-600),var(--c-neutral-900));} /* 灰階漸層（中性色 深灰→近黑）；固定暗色，白字皆可讀、不隨主題翻轉 */
.cat-gradient .cat-circle{background:color-mix(in srgb,#fff 18%,transparent);color:#fff;}

/* ---- 媒體底（image 暗遮罩 / gradient 灰階）文字與原子：固定用白字（媒體底恆為暗色，不能用 --primary-on＝深色模式會翻黑看不到）---- */
.cat-image .cat-name,.cat-gradient .cat-name{color:#fff;}
.cat-image .cat-desc,.cat-gradient .cat-desc{color:color-mix(in srgb,#fff 78%,transparent);}
.cat-image .cat-arrow,.cat-gradient .cat-arrow{color:color-mix(in srgb,#fff 85%,transparent);}
/* count 用的 Tag 原子在暗媒體上改半透明白底，保住對比 */
.cat-image .tg.v-soft,.cat-gradient .tg.v-soft{
  background:color-mix(in srgb,#fff 22%,transparent);color:#fff;}

/* ---- state: hover（矩陣靜態 .is-hover ＋ Live 真實 :hover，兩者同步） ---- */
.cat-tile.is-hover,.cat-tile.live:hover{transform:translateY(-2px);
  border-color:var(--line-strong);box-shadow:0 6px 18px rgba(0,0,0,.10);}
.cat-icon.is-hover,.cat-icon.live:hover{background:var(--panel-2);}                       /* icon 磚：底色加深 */
.cat-icon.is-hover .cat-circle,.cat-icon.live:hover .cat-circle{background:var(--i-primary-tint2);}
.cat-icon.is-hover .cat-arrow,.cat-icon.live:hover .cat-arrow{color:var(--accent);}
.cat-image.is-hover .cat-scrim,.cat-image.live:hover .cat-scrim{                          /* image 磚：遮罩整體加深 */
  background:linear-gradient(180deg,rgba(0,0,0,.10) 0%,rgba(0,0,0,.72) 100%);}
.cat-gradient.is-hover,.cat-gradient.live:hover{filter:saturate(1.12) brightness(1.06);}  /* gradient 磚：提亮增飽和 */
.cat-tile.is-hover .cat-arrow,.cat-tile.live:hover .cat-arrow{transform:translateX(2px);}

/* ---- state: active 選中（accent 邊框＋選中感；可與 hover 疊加） ---- */
.cat-tile.is-active{border-color:var(--accent);}
.cat-icon.is-active{background:var(--i-primary-tint);}
.cat-icon.is-active .cat-circle{background:var(--accent);color:var(--primary-on);}        /* 圓圈變實心 accent */
.cat-icon.is-active .cat-name{color:var(--accent);}
.cat-gradient.is-active{box-shadow:0 0 0 1px var(--panel),0 0 0 2px var(--accent);}       /* 本體即 accent 底 → 用 panel 間隙＋外圈 accent 表達選中 */
.cat-tile.is-active.is-hover,.cat-tile.is-active.live:hover{transform:translateY(-2px);
  box-shadow:0 6px 18px rgba(0,0,0,.10);}
.cat-gradient.is-active.is-hover,.cat-gradient.is-active.live:hover{
  box-shadow:0 0 0 1px var(--panel),0 0 0 2px var(--accent),0 6px 18px rgba(0,0,0,.10);}

/* ---- Showcase / Grid / Live 版位 ---- */
.cat-row{display:flex;flex-wrap:wrap;gap:var(--sp-4);align-items:stretch;}
.cat-row .cat-tile{width:280px;}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:var(--sp-4);}
.cat-grid .cat-tile{max-width:none;}
.cat-live{display:flex;justify-content:flex-start;padding:var(--sp-2) 2px;}
.cat-live .cat-tile{width:280px;}
/* size s：精簡尺寸 */
.cat-sz-s{padding:var(--sp-3);gap:var(--sp-3);}
.cat-sz-s .cat-circle{width:36px;height:36px;}
.cat-sz-s .cat-circle svg{width:18px;height:18px;}
.cat-sz-s .cat-name{font-size:var(--fs-h9);}
.cat-sz-s.cat-image{min-height:108px;}
  /* ===== Card group: article-card ===== */
/* ==================== ARTICLE CARD 文章卡（art-）==================== */
/* 卡片外殼：--panel 底 + --line 邊框 + --radius 圓角；hover 過渡（浮起/陰影/邊框） */
.art-card{position:relative;display:flex;flex-direction:column;width:100%;max-width:340px;
  background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;
  font-family:var(--font-sans);text-align:left;
  transition:box-shadow .18s ease,transform .18s ease,border-color .18s ease;}
.art-card.v-horizontal{flex-direction:row;max-width:560px;}
.art-card.v-overlay{aspect-ratio:4/3;justify-content:flex-end;}
.art-card.live{cursor:pointer;}

/* ---- 封面（重用 Image 原子 imEl；此處只做容器級覆寫，不重畫 primitive）---- */
.art-cover{position:relative;overflow:hidden;flex:0 0 auto;}
/* 直式：封面滿版寬、高度交給 im-box 的 aspect-ratio（16:9），並去掉原子的邊框/圓角（卡片外殼已收） */
.art-card .art-cover .im-box{display:block;width:100%;height:auto;border:0;border-radius:0;}
.art-card .art-cover .im-img{transition:transform .35s ease;}
/* 橫式：封面靠左固定欄寬、填滿卡片高度 */
.art-card.v-horizontal .art-cover{width:38%;min-width:120px;}
.art-card.v-horizontal .art-cover .im-box{height:100%;aspect-ratio:auto;}
/* 疊字：封面鋪滿整張卡當底圖 */
.art-card.v-overlay .art-cover{position:absolute;inset:0;}
.art-card.v-overlay .art-cover .im-box{height:100%;aspect-ratio:auto;}
/* 疊字暗漸層遮罩：置底文字的可讀性保障 */
.art-card.v-overlay .art-cover::after{content:'';position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.7),rgba(0,0,0,.4) 55%);} /* 全圖 ≥40% 黑遮罩、底部再深保文字 */

/* ---- 內容區 ---- */
.art-body{display:flex;flex-direction:column;gap:var(--sp-3);padding:var(--sp-4) var(--sp-5) var(--sp-5);min-width:0;flex:1 1 auto;}
.art-card.v-overlay .art-body{position:relative;flex:0 0 auto;} /* 疊字：內容壓在遮罩上、貼齊底部 */
.art-cat{display:flex;}
.art-title{margin:0;font-size:var(--fs-h7);font-weight:600;line-height:1.45;color:var(--ink);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  transition:color .15s ease;}
.art-excerpt{margin:0;font-size:var(--fs-h9);line-height:1.7;color:var(--muted);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

/* ---- 作者列：圓形頭像（imEl circular）＋作者名＋「·」＋日期＋閱讀時間 ---- */
.art-foot{display:flex;align-items:center;gap:var(--sp-3);margin-top:auto;padding-top:var(--sp-1);min-width:0;flex-wrap:wrap;}
.art-author{display:flex;align-items:center;gap:var(--sp-3);min-width:0;}
.art-author .im-box{height:24px;width:24px;flex:0 0 auto;} /* 頭像原子縮到 24px（覆寫 im-sz-s 的 40px） */
.art-author-name{font-size:var(--fs-h10);font-weight:600;color:var(--ink);white-space:nowrap;}
.art-meta{display:inline-flex;align-items:center;gap:var(--sp-2);font-size:var(--fs-h10);color:var(--faint);white-space:nowrap;}
.art-dot{color:var(--faint);}
/* 閱讀更多列（重用 .btn v-text 原子） */
.art-more{display:flex;margin-top:2px;margin-left:-8px;}

/* ---- 疊字版文字反白（壓在暗漸層上，白色為影像疊字慣例）---- */
.art-card.v-overlay .art-title{color:#fff;}
.art-card.v-overlay .art-excerpt{color:rgba(255,255,255,.82);}
.art-card.v-overlay .art-author-name{color:#fff;}
.art-card.v-overlay .art-meta,.art-card.v-overlay .art-dot{color:rgba(255,255,255,.72);}
.art-card.v-overlay .art-author .im-box{border-color:rgba(255,255,255,.4);}

/* ---- hover：矩陣用靜態 .is-hover 模擬、Live/showcase 用真實 :hover（.live）---- */
.art-card.is-hover,.art-card.live:hover{transform:translateY(-3px);
  box-shadow:0 10px 26px rgba(0,0,0,.13);border-color:var(--line-strong);}
.art-card.is-hover .art-cover .im-img,.art-card.live:hover .art-cover .im-img{transform:scale(1.05);}
.art-card:not(.v-overlay).is-hover .art-title,.art-card:not(.v-overlay).live:hover .art-title{color:var(--accent);}

/* ---- 矩陣格 / showcase 排版 ---- */
.art-cell{width:100%;display:flex;justify-content:flex-start;}
.art-cell .art-card{max-width:100%;}
.art-showcase{display:flex;flex-wrap:wrap;gap:var(--sp-5);align-items:stretch;margin-bottom:var(--sp-3);}
.art-showcase .art-card{flex:0 1 320px;}
.art-showcase .art-card.v-horizontal{flex:0 1 520px;}
/* size s：精簡尺寸 */
.art-sz-s .art-body{padding:var(--sp-4) var(--sp-4) var(--sp-4);gap:var(--sp-2);}
.art-sz-s .art-title{font-size:var(--fs-h8);}
.art-sz-s .art-excerpt{font-size:var(--fs-h10);}

  /* ===== Table&Chart group: table ===== */
/* ===================== Table 資料表格（tbl-） =====================
   variant：tbl-v-bordered 格線 / tbl-v-striped 斑馬紋 / tbl-v-plain 簡潔
   density：tbl-dn-comfortable 寬鬆 / tbl-dn-compact 緊湊
   斑馬紋實際生效用 .tbl-zebra（v-striped 或 Live stripe 開關都會加上）
   矩陣用靜態 .is-hover / .is-selected；Live／showcase 在 .tbl-wrap 加 .live 走真實 :hover
   全部顏色綁 token，明暗色自動跟切 */

/* ---- 外框容器 ---- */
.tbl-wrap{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;max-width:100%;font-family:var(--font-sans);}
.tbl-wrap.tbl-v-plain{border-color:transparent;}                     /* 簡潔款：拿掉外框 */

/* ---- 表格本體 ---- */
.tbl{width:100%;border-collapse:collapse;font-size:13px;color:var(--ink);}
.tbl-wrap.tbl-dn-compact .tbl{font-size:var(--fs-h9);}

/* ---- 表頭 ---- */
.tbl-th{text-align:left;font-size:var(--fs-h10);font-weight:600;color:var(--muted);background:var(--panel-2);
  border-bottom:1px solid var(--line-strong);white-space:nowrap;}
.tbl-wrap.tbl-dn-compact .tbl-th{font-size:var(--fs-h10);}
.tbl-wrap.tbl-v-plain .tbl-th{background:transparent;}               /* 簡潔款：表頭不鋪底，只留底線 */

/* ---- 資料格 ---- */
.tbl-td{border-bottom:1px solid var(--line);vertical-align:middle;}
.tbl-wrap.tbl-v-plain .tbl-td{border-bottom:0;}                      /* 簡潔款：無列線 */

/* ---- density 兩級 padding ---- */
.tbl-wrap.tbl-dn-comfortable .tbl-th{padding:var(--sp-3) var(--sp-4);}
.tbl-wrap.tbl-dn-comfortable .tbl-td{padding:var(--sp-4) var(--sp-4);}
.tbl-wrap.tbl-dn-compact .tbl-th{padding:var(--sp-2) var(--sp-3);}
.tbl-wrap.tbl-dn-compact .tbl-td{padding:var(--sp-2) var(--sp-3);}
.tbl-wrap.tbl-dn-compact .tg{height:20px;font-size:var(--fs-h10);}          /* 緊湊時狀態標籤同步縮小（scoped 覆寫） */

/* ---- variant：bordered 直向格線 ---- */
.tbl-wrap.tbl-v-bordered .tbl-th+.tbl-th,
.tbl-wrap.tbl-v-bordered .tbl-td+.tbl-td{border-left:1px solid var(--line);}

/* ---- variant：striped／stripe 開關 → 斑馬紋（偶數列鋪淺灰；讓給選取態） ---- */
.tbl-wrap.tbl-zebra .tbl tbody tr:nth-child(even):not(.is-selected)>td{background:var(--panel-2);}

/* ---- 列 hover：矩陣靜態 .is-hover ＋ Live/showcase 真實 :hover（.live）---- */
.tbl-wrap .tbl tbody tr.is-hover:not(.is-selected)>td,
.tbl-wrap.live .tbl tbody tr:hover:not(.is-selected)>td{background:var(--panel-2);}
/* 斑馬紋表 hover 要壓過偶數列底色 → 用更深一階 */
.tbl-wrap.tbl-zebra .tbl tbody tr.is-hover:not(.is-selected)>td,
.tbl-wrap.tbl-zebra.live .tbl tbody tr:hover:not(.is-selected)>td{background:var(--panel-3);}

/* ---- 列 selected：淡藍底＋姓名轉主色（勾選框由 JS 同步 .st-checked） ---- */
.tbl-wrap .tbl tbody tr.is-selected>td{background:var(--i-primary-tint);}
.tbl-wrap .tbl tbody tr.is-selected .tbl-name{color:var(--accent);font-weight:600;}

/* ---- 欄位型別 ---- */
.tbl-num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap;} /* 金額：右對齊＋等寬數字，不換行 */
.tbl-mut{color:var(--muted);}                                        /* 日期等次要文字 */
.tbl-col-cbx{width:36px;text-align:center;}                          /* 勾選欄（重用 .cbx 原子） */
.tbl-col-cbx .cbx{vertical-align:middle;cursor:pointer;}

/* ---- 表頭排序鈕（重用 .btn v-text 原子，去殼貼齊表頭字） ---- */
.tbl-th .tbl-sortbtn{padding:0;height:auto;min-height:0;background:none;border:none;
  font:inherit;font-weight:600;color:inherit;gap:var(--sp-1);}
.tbl-th .tbl-sortbtn:hover{background:none;color:var(--ink);}
.tbl-sortbtn svg{width:12px;height:12px;flex:0 0 auto;}
.tbl-sortic{display:inline-flex;color:var(--faint);}                 /* 未排序：中性雙箭頭（TBL_IC_SORT，淡色） */
.tbl-sortbtn.is-active{color:var(--accent);}                         /* 排序中：整鈕轉主色 */
.tbl-sortbtn.is-active .tbl-sortic{color:var(--accent);}
.tbl-sortic.tbl-asc svg{transform:rotate(180deg);}                   /* 升冪：ICON_CARET 轉 180 度朝上 */
.tbl-th.tbl-num .tbl-sortbtn{justify-content:flex-end;width:100%;}   /* 金額欄表頭同步右對齊 */

/* ---- 表尾總計列 ---- */
.tbl-ft{background:var(--panel-2);border-top:1px solid var(--line-strong);border-bottom:0;font-weight:600;}
.tbl-ft.tbl-ft-lab{color:var(--muted);font-size:var(--fs-h10);}
.tbl-wrap.tbl-v-plain .tbl-ft{background:transparent;}

/* ---- 分頁列（重用 .btn 原子；showcase 示意） ---- */
.tbl-pgbar{display:flex;align-items:center;justify-content:flex-end;gap:var(--sp-1);
  padding:var(--sp-3) var(--sp-4);border-top:1px solid var(--line);background:var(--panel);}
.tbl-wrap.tbl-v-plain .tbl-pgbar{background:transparent;}
.tbl-pginfo{font-size:var(--fs-h10);color:var(--muted);margin-right:auto;font-variant-numeric:tabular-nums;}
.tbl-pgnav{display:flex;align-items:center;}                         /* 包住 library pgBar 元件 */
.tbl-pgnav .pg-bar{margin:0;}

/* ---- Cell Types 欄位型別表：Dropdown 選單需溢出可見、儲存格內原子縮排 ---- */
.tbl-wrap.tbl-celltypes{overflow:visible;}                           /* 讓 Dropdown 展開選單不被裁切 */
.tbl-celltypes .tbl-owner{width:158px;}
.tbl-celltypes .tbl-dd{min-width:138px;}
.tbl-celltypes .tbl-dd .field.dd{min-height:32px;padding:var(--sp-1) var(--sp-3);font-size:var(--fs-h9);} /* 收窄成表格內尺寸 */
.tbl-celltypes .ddmenu{z-index:40;}
.tbl-celltypes .tbl-td{overflow:visible;}
.tbl-actbtn{padding:2px var(--sp-1);min-height:0;}                           /* 文字按鈕儲存格：貼齊列高 */

/* ---- 陳列容器 ---- */
.tbl-demo{max-width:100%;}
/* ⚠ 不要再用 .tbl-row 當並排容器：Table 元件的資料列 <tr> 已用 class="tbl-row"，
   若對 .tbl-row 下 display:grid 會把每一列 <tr> 變成 grid、整張表欄位錯位（2026-07-16 踩過）。
   未來要並排等分 table，用 .tbl-cols 這種不撞名的容器類。 */
.tbl-cols{display:grid;grid-auto-flow:column;grid-auto-columns:minmax(0,1fr);gap:var(--sp-5);align-items:start;}
.tbl-cols>.tbl-wrap,.tbl-cols>.tbl-demo{min-width:0;max-width:100%;}
/* 矩陣小表：格內文字一律不換行（狀態 pill／金額不再擠爆成兩行）；欄寬夠時各欄自然排開，
   欄寬不足時整個矩陣走 .grid-scroll 橫向捲動（見 mincol），而非把內容擠爛 */
.tbl-mini .tbl-td,.tbl-mini .tbl-th{white-space:nowrap;}
