    --fw-regular:400; --fw-medium:500; --fw-semibold:600; --fw-bold:700;
    --lh-tight:1.2; --lh-snug:1.35; --lh-normal:1.5; --lh-relaxed:1.6;
    /* ── Typography 複合 text style（每階 weight／line-height／字距；weight 對齊 v0：600 封頂、無 700）── */
    --fw-h1:600; --fw-h2:600; --fw-h3:600; --fw-h4:600; --fw-h5:500; --fw-h6:500; --fw-h7:500; --fw-h8:400; --fw-h9:400; --fw-h10:400;
    /* 行高：中文（zh，套用於 .ty-h*，較鬆）＋ 英文（en，供對照，較緊） */
    --lh-h1:1.25; --lh-h2:1.3; --lh-h3:1.35; --lh-h4:1.4; --lh-h5:1.45; --lh-h6:1.5; --lh-h7:1.55; --lh-h8:1.6; --lh-h9:1.6; --lh-h10:1.5;
    --lh-en-h1:1.15; --lh-en-h2:1.2; --lh-en-h3:1.25; --lh-en-h4:1.3; --lh-en-h5:1.4; --lh-en-h6:1.4; --lh-en-h7:1.5; --lh-en-h8:1.5; --lh-en-h9:1.5; --lh-en-h10:1.4;
    /* 字距：中文（zh，CJK 幾乎不收）＋ 英文（en，大標題略收；Latin 才明顯） */
    --ls-h1:-0.01em; --ls-h2:-0.01em; --ls-h3:-0.005em; --ls-h4:-0.005em; --ls-h5:0; --ls-h6:0; --ls-h7:0; --ls-h8:0; --ls-h9:0; --ls-h10:0.01em;
    --ls-en-h1:-0.03em; --ls-en-h2:-0.025em; --ls-en-h3:-0.02em; --ls-en-h4:-0.015em; --ls-en-h5:-0.01em; --ls-en-h6:-0.01em; --ls-en-h7:0; --ls-en-h8:0; --ls-en-h9:0; --ls-en-h10:0.01em;
    /* ── L1 Primitive · Elevation / Motion（框架值）── */
    --e-sm:0 1px 2px 0 rgba(0,0,0,.05);
    --e-md:0 4px 6px -1px rgba(0,0,0,.10),0 2px 4px -2px rgba(0,0,0,.10);
    --e-lg:0 10px 15px -3px rgba(0,0,0,.10),0 4px 6px -4px rgba(0,0,0,.10);
    --e-xl:0 20px 25px -5px rgba(0,0,0,.10),0 8px 10px -6px rgba(0,0,0,.10);
    --e-2xl:0 25px 50px -12px rgba(0,0,0,.25);
    --dur-fast:150ms; --dur-default:300ms; --dur-slow:500ms;
    --ease-standard:cubic-bezier(.4,0,.2,1); --ease-in:cubic-bezier(.4,0,1,1);
    --ease-out:cubic-bezier(0,0,.2,1); --ease-spring:cubic-bezier(.34,1.56,.64,1);

    /* ── L2 Semantic（角色 → primitive；LIGHT）── */
    --s-surface-canvas:var(--c-neutral-50); --s-surface-1:var(--c-neutral-0);
    --s-surface-2:var(--c-neutral-100); --s-surface-3:var(--c-neutral-200);
    --s-text-1:var(--c-neutral-900); --s-text-2:var(--c-neutral-600); --s-text-3:var(--c-neutral-500);
    --s-border-1:var(--c-neutral-300); --s-border-2:var(--c-neutral-400);
    --s-on-primary:#FFFFFF;
    --s-action-primary:var(--c-brand-500); --s-action-primary-hover:var(--c-brand-600); --s-action-primary-press:var(--c-brand-700);
    --s-action-primary-tint:color-mix(in srgb,var(--c-brand-500) 10%,transparent);
    --s-action-primary-tint2:color-mix(in srgb,var(--c-brand-500) 20%,transparent);
    --s-action-danger:var(--c-error-500); --s-action-danger-hover:var(--c-error-600); --s-action-danger-press:var(--c-error-700);
    --s-action-danger-tint:color-mix(in srgb,var(--c-error-500) 10%,transparent);
    --s-action-danger-tint2:color-mix(in srgb,var(--c-error-500) 20%,transparent);
    --s-sec-fill:var(--c-neutral-100); --s-sec-fill-hover:var(--c-neutral-200); --s-sec-fill-press:var(--c-neutral-300);
    --s-sec-on:var(--c-neutral-800); --s-sec-edge:var(--c-neutral-400); --s-sec-fg:var(--c-neutral-700);
    --s-sec-tint:color-mix(in srgb,var(--c-neutral-600) 10%,transparent);
    --s-sec-tint2:color-mix(in srgb,var(--c-neutral-600) 18%,transparent);
    --s-feedback-success:var(--c-success-500); --s-feedback-warning:var(--c-warning-500);
    --s-feedback-error:var(--c-error-500); --s-feedback-info:var(--c-info-500);
    --s-feedback-success-tint:color-mix(in srgb,var(--c-success-500) 12%,transparent);
    --s-feedback-warning-tint:color-mix(in srgb,var(--c-warning-500) 12%,transparent);

    /* ── 舊變數別名（→ L2 semantic；元件全數沿用、無需改動）── */
    --canvas:var(--s-surface-canvas); --panel:var(--s-surface-1); --panel-2:var(--s-surface-2); --panel-3:var(--s-surface-3);
    --ink:var(--s-text-1); --muted:var(--s-text-2); --faint:var(--s-text-3);
    --line:var(--s-border-1); --line-strong:var(--s-border-2);
    --accent:var(--s-action-primary);
    --i-primary:var(--s-action-primary); --i-primary-h:var(--s-action-primary-hover); --i-primary-p:var(--s-action-primary-press);
    --i-primary-tint:var(--s-action-primary-tint); --i-primary-tint2:var(--s-action-primary-tint2);
    --i-danger:var(--s-action-danger); --i-danger-h:var(--s-action-danger-hover); --i-danger-p:var(--s-action-danger-press);
    --i-danger-tint:var(--s-action-danger-tint); --i-danger-tint2:var(--s-action-danger-tint2);
    --i-sec-fill:var(--s-sec-fill); --i-sec-fill-h:var(--s-sec-fill-hover); --i-sec-fill-p:var(--s-sec-fill-press);
    --i-sec-on:var(--s-sec-on); --i-sec-edge:var(--s-sec-edge); --i-sec-fg:var(--s-sec-fg);
    --i-sec-tint:var(--s-sec-tint); --i-sec-tint2:var(--s-sec-tint2);
    --primary-on:var(--s-on-primary); --danger-on:#FFFFFF;
    --radius:var(--r-sm);
  }

  /* ── L2 Semantic overrides · DARK（只覆寫語意層＋品牌 accent 提亮；別名自動跟隨）── */
  @media (prefers-color-scheme:dark){ :root{
    --s-surface-canvas:#0B0B0C; --s-surface-1:#141416; --s-surface-2:#1C1C20; --s-surface-3:#26262B;
    --s-text-1:#F4F4F5; --s-text-2:#9A9CA4; --s-text-3:#6B6E77;
    --s-border-1:#26272B; --s-border-2:#34363C;
    --s-action-primary:var(--c-brand-200); --s-action-primary-hover:#FFFFFF; --s-action-primary-press:var(--c-brand-300);
    --s-action-primary-tint:color-mix(in srgb,var(--c-brand-200) 16%,transparent);
    --s-action-primary-tint2:color-mix(in srgb,var(--c-brand-200) 28%,transparent);
    --s-on-primary:#0B0B0C;
    --s-action-danger:var(--c-error-400); --s-action-danger-hover:#F58A8A; --s-action-danger-press:var(--c-error-500);
    --s-action-danger-tint:color-mix(in srgb,var(--c-error-400) 16%,transparent);
    --s-action-danger-tint2:color-mix(in srgb,var(--c-error-400) 28%,transparent);
    --s-sec-fill:#22232A; --s-sec-fill-hover:#2A2C34; --s-sec-fill-press:#34363E;
    --s-sec-on:#F4F4F5; --s-sec-edge:#3A3C43; --s-sec-fg:#C7CAD1;
    --s-sec-tint:color-mix(in srgb,#9A9CA4 12%,transparent); --s-sec-tint2:color-mix(in srgb,#9A9CA4 22%,transparent);
    --s-feedback-success:var(--c-success-400); --s-feedback-warning:var(--c-warning-400);
    --s-feedback-error:var(--c-error-400); --s-feedback-info:var(--c-info-400);
    --s-feedback-success-tint:color-mix(in srgb,var(--c-success-400) 16%,transparent);
    --s-feedback-warning-tint:color-mix(in srgb,var(--c-warning-400) 16%,transparent);
    /* dark elevation：暗底改用更深的陰影撐層次 */
    --e-sm:0 1px 2px 0 rgba(0,0,0,.4);
    --e-md:0 4px 6px -1px rgba(0,0,0,.5),0 2px 4px -2px rgba(0,0,0,.5);
    --e-lg:0 10px 15px -3px rgba(0,0,0,.5),0 4px 6px -4px rgba(0,0,0,.5);
    --e-xl:0 20px 25px -5px rgba(0,0,0,.6),0 8px 10px -6px rgba(0,0,0,.6);
    --e-2xl:0 25px 50px -12px rgba(0,0,0,.7);
  }}
  :root[data-theme="dark"]{
    --s-surface-canvas:#0B0B0C; --s-surface-1:#141416; --s-surface-2:#1C1C20; --s-surface-3:#26262B;
    --s-text-1:#F4F4F5; --s-text-2:#9A9CA4; --s-text-3:#6B6E77;
    --s-border-1:#26272B; --s-border-2:#34363C;
    --s-action-primary:var(--c-brand-200); --s-action-primary-hover:#FFFFFF; --s-action-primary-press:var(--c-brand-300);
    --s-action-primary-tint:color-mix(in srgb,var(--c-brand-200) 16%,transparent);
    --s-action-primary-tint2:color-mix(in srgb,var(--c-brand-200) 28%,transparent);
    --s-on-primary:#0B0B0C;
    --s-action-danger:var(--c-error-400); --s-action-danger-hover:#F58A8A; --s-action-danger-press:var(--c-error-500);
    --s-action-danger-tint:color-mix(in srgb,var(--c-error-400) 16%,transparent);
    --s-action-danger-tint2:color-mix(in srgb,var(--c-error-400) 28%,transparent);
    --s-sec-fill:#22232A; --s-sec-fill-hover:#2A2C34; --s-sec-fill-press:#34363E;
    --s-sec-on:#F4F4F5; --s-sec-edge:#3A3C43; --s-sec-fg:#C7CAD1;
    --s-sec-tint:color-mix(in srgb,#9A9CA4 12%,transparent); --s-sec-tint2:color-mix(in srgb,#9A9CA4 22%,transparent);
    --s-feedback-success:var(--c-success-400); --s-feedback-warning:var(--c-warning-400);
    --s-feedback-error:var(--c-error-400); --s-feedback-info:var(--c-info-400);
    --s-feedback-success-tint:color-mix(in srgb,var(--c-success-400) 16%,transparent);
    --s-feedback-warning-tint:color-mix(in srgb,var(--c-warning-400) 16%,transparent);
    --e-sm:0 1px 2px 0 rgba(0,0,0,.4);
    --e-md:0 4px 6px -1px rgba(0,0,0,.5),0 2px 4px -2px rgba(0,0,0,.5);
    --e-lg:0 10px 15px -3px rgba(0,0,0,.5),0 4px 6px -4px rgba(0,0,0,.5);
    --e-xl:0 20px 25px -5px rgba(0,0,0,.6),0 8px 10px -6px rgba(0,0,0,.6);
    --e-2xl:0 25px 50px -12px rgba(0,0,0,.7);
  }
  :root[data-theme="light"]{
    --s-surface-canvas:var(--c-neutral-50); --s-surface-1:var(--c-neutral-0);
    --s-surface-2:var(--c-neutral-100); --s-surface-3:var(--c-neutral-200);
    --s-text-1:var(--c-neutral-900); --s-text-2:var(--c-neutral-600); --s-text-3:var(--c-neutral-500);
    --s-border-1:var(--c-neutral-300); --s-border-2:var(--c-neutral-400);
    --s-action-primary:var(--c-brand-500); --s-action-primary-hover:var(--c-brand-600); --s-action-primary-press:var(--c-brand-700);
    --s-action-primary-tint:color-mix(in srgb,var(--c-brand-500) 10%,transparent);
    --s-action-primary-tint2:color-mix(in srgb,var(--c-brand-500) 20%,transparent);
    --s-on-primary:#FFFFFF;   /* ‼ 必補：淺色主色＝黑，文字要白；不補則 OS=深色+手動切淺色時洩漏成深字→黑底黑字看不到 */
    --s-action-danger:var(--c-error-500); --s-action-danger-hover:var(--c-error-600); --s-action-danger-press:var(--c-error-700);
    --s-action-danger-tint:color-mix(in srgb,var(--c-error-500) 10%,transparent);
    --s-action-danger-tint2:color-mix(in srgb,var(--c-error-500) 20%,transparent);
    --s-sec-fill:var(--c-neutral-100); --s-sec-fill-hover:var(--c-neutral-200); --s-sec-fill-press:var(--c-neutral-300);
    --s-sec-on:var(--c-neutral-800); --s-sec-edge:var(--c-neutral-400); --s-sec-fg:var(--c-neutral-700);
    --s-sec-tint:color-mix(in srgb,var(--c-neutral-600) 10%,transparent);
    --s-sec-tint2:color-mix(in srgb,var(--c-neutral-600) 18%,transparent);
    --s-feedback-success:var(--c-success-500); --s-feedback-warning:var(--c-warning-500);
    --s-feedback-error:var(--c-error-500); --s-feedback-info:var(--c-info-500);
    --s-feedback-success-tint:color-mix(in srgb,var(--c-success-500) 12%,transparent);
    --s-feedback-warning-tint:color-mix(in srgb,var(--c-warning-500) 12%,transparent);
    /* ‼ 必補：淺色 elevation，否則 OS=深色時洩漏成深色重陰影 */
    --e-sm:0 1px 2px 0 rgba(0,0,0,.05);
    --e-md:0 4px 6px -1px rgba(0,0,0,.10),0 2px 4px -2px rgba(0,0,0,.10);
    --e-lg:0 10px 15px -3px rgba(0,0,0,.10),0 4px 6px -4px rgba(0,0,0,.10);
    --e-xl:0 20px 25px -5px rgba(0,0,0,.10),0 8px 10px -6px rgba(0,0,0,.10);
    --e-2xl:0 25px 50px -12px rgba(0,0,0,.25);
  }

  /* ── 響應式 token（device mode）：只覆寫尺寸類（字級/間距/圓角/容器）；顏色不隨裝置變 ──
     Desktop ≥1024＝base（上方 :root）／Tablet ≤1023／Mobile ≤767；元件吃 var() 自動跟隨。 */
  @media(max-width:1023px){ :root{                                  /* Tablet */
    --fs-h1:40px; --fs-h2:28px; --fs-h3:24px; --fs-h4:20px; --fs-h5:19px; --fs-h6:17px;
    --sp-6:20px; --sp-7:28px; --sp-8:40px; --sp-9:56px;
    --r-lg:10px; --r-xl:16px;
    --container-max:1024px; --container-pad:24px;
  }}
  @media(max-width:767px){ :root{                                   /* Mobile */
    --fs-h1:32px; --fs-h2:26px; --fs-h3:22px; --fs-h4:19px; --fs-h5:18px; --fs-h6:16px; --fs-h7:15px;
    --sp-5:12px; --sp-6:16px; --sp-7:24px; --sp-8:32px; --sp-9:48px;
    --r-lg:8px; --r-xl:12px;
    --container-max:100%; --container-pad:16px;
  }}

  /* ── Typography 複合 text style utility（= Figma text style：一個 class 綁 size＋weight＋line-height＋字距；size 響應式跟 --fs-h*）── */
  .ty-h1{font-size:var(--fs-h1);font-weight:var(--fw-h1);line-height:var(--lh-h1);letter-spacing:var(--ls-h1);}
  .ty-h2{font-size:var(--fs-h2);font-weight:var(--fw-h2);line-height:var(--lh-h2);letter-spacing:var(--ls-h2);}
  .ty-h3{font-size:var(--fs-h3);font-weight:var(--fw-h3);line-height:var(--lh-h3);letter-spacing:var(--ls-h3);}
  .ty-h4{font-size:var(--fs-h4);font-weight:var(--fw-h4);line-height:var(--lh-h4);letter-spacing:var(--ls-h4);}
  .ty-h5{font-size:var(--fs-h5);font-weight:var(--fw-h5);line-height:var(--lh-h5);letter-spacing:var(--ls-h5);}
  .ty-h6{font-size:var(--fs-h6);font-weight:var(--fw-h6);line-height:var(--lh-h6);letter-spacing:var(--ls-h6);}
  .ty-h7{font-size:var(--fs-h7);font-weight:var(--fw-h7);line-height:var(--lh-h7);letter-spacing:var(--ls-h7);}
  .ty-h8{font-size:var(--fs-h8);font-weight:var(--fw-h8);line-height:var(--lh-h8);letter-spacing:var(--ls-h8);}
  .ty-h9{font-size:var(--fs-h9);font-weight:var(--fw-h9);line-height:var(--lh-h9);letter-spacing:var(--ls-h9);}
  .ty-h10{font-size:var(--fs-h10);font-weight:var(--fw-h10);line-height:var(--lh-h10);letter-spacing:var(--ls-h10);}

  *{box-sizing:border-box}
  /* 全域：所有表單控制項繼承 DS 字體（消除瀏覽器預設 Arial，全站數字/文字一致用 Geist）。個別元件另設 mono 者仍優先。 */
  input,button,select,textarea,optgroup{font-family:inherit;}
  html,body{margin:0;height:100%;}
  body{background:var(--canvas);color:var(--ink);font-family:var(--font-sans);-webkit-font-smoothing:antialiased;line-height:1.5;overflow:hidden;} /* app-shell：document 不捲，捲動交給 sidebar / main */

  /* ---------- scrollbar：純標準屬性一套（scrollbar-width/color 會被繼承，整頁與側邊欄自動一致）。
       不混用 ::-webkit-scrollbar——同時存在會讓 Chrome 對 root 與元素捲軸挑不同渲染路徑，一粗一細。
       無底色（track = transparent）、深淺不同色 ---------- */
  html,body,*{scrollbar-width:thin;scrollbar-color:var(--line-strong) transparent;} /* 綁 token，明暗自動跟隨 */

  /* ---------- topbar ---------- */
  .topbar{z-index:30;height:58px;flex:0 0 58px;display:flex;align-items:center;gap:var(--sp-4);
    padding:0 var(--sp-4);background:var(--panel);border-bottom:1px solid var(--line);}
  .hamb{display:inline-flex;width:38px;height:38px;border:1px solid var(--line-strong);border-radius:var(--r-sm);background:var(--panel);
    color:var(--muted);cursor:pointer;align-items:center;justify-content:center;transition:.13s;flex:0 0 auto;}
  .hamb:hover{color:var(--ink);border-color:var(--accent);}
  .hamb svg{width:19px;height:19px;}
  .brand{display:flex;align-items:center;gap:var(--sp-3);min-width:0;}
  .brand-logo{height:20px;width:auto;display:block;color:var(--ink);flex:0 0 auto;}
  .brand .divider{width:1px;height:18px;background:var(--line-strong);flex:0 0 auto;}
  .brand-title{font-size:var(--fs-h8);font-weight:600;color:var(--ink);white-space:nowrap;letter-spacing:-.005em;}
  .spacer{flex:1}
  .theme-toggle{position:relative;width:46px;height:26px;box-sizing:border-box;flex:0 0 auto;background:var(--panel-3);
    border:1px solid var(--line-strong);border-radius:var(--r-pill);padding:0;cursor:pointer;transition:background .18s,border-color .18s;}
  .theme-toggle:hover{border-color:var(--accent);}
  .theme-toggle .knob{position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:var(--r-pill);background:var(--accent);color:var(--primary-on);
    display:flex;align-items:center;justify-content:center;transition:transform .22s var(--ease-standard);}
  .theme-toggle .knob svg{width:12px;height:12px;}
  :root[data-theme="dark"] .theme-toggle .knob{transform:translateX(20px);}

  /* ---------- layout ---------- */
  .shell{--sb:max(200px,20vw);height:100vh;height:100dvh;display:flex;flex-direction:column;} /* 整個 app 固定一屏；側邊欄＝20vw，最小 200px */
  .layout{flex:1 1 auto;min-height:0;position:relative;display:grid;grid-template-columns:var(--sb) 1fr;} /* 填滿 topbar 以下的剩餘高度；min-height:0 讓子欄可各自內捲；relative 供拖曳把手定位 */
  .sidebar{min-height:0;overflow-y:auto;border-right:1px solid var(--line);background:var(--panel);padding:var(--sp-4) var(--sp-3);} /* 撐滿 layout 高度、自身垂直捲動 */
  /* ---- 側邊欄拖曳調寬把手：貼在 sidebar 右緣，left 跟隨 --sb ---- */
  .sidebar-resize{position:absolute;top:0;bottom:0;left:var(--sb);width:9px;transform:translateX(-5px);z-index:31;cursor:col-resize;touch-action:none;}
  .sidebar-resize::after{content:'';position:absolute;top:0;bottom:0;left:5px;width:2px;background:transparent;transition:background .15s;} /* 視覺線：hover/拖曳才亮 */
  .sidebar-resize:hover::after,.sidebar-resize.is-drag::after{background:var(--accent);}
  body.is-resizing{cursor:col-resize;user-select:none;}
  body.is-resizing .main{pointer-events:none;} /* 拖曳中避免內容誤觸/選字 */
  .main{min-width:0;min-height:0;overflow:auto;padding:var(--sp-6) var(--container-pad) 96px;} /* 水平 gutter 接響應式 container-pad（32/24/16）；下捲留白 96 例外 */
  .container{max-width:none;} /* 右側內容填滿寬度 */
  /* ---- 桌機側邊欄收合（漢堡切換）＋收合時滑鼠移到左緣 peek 顯示 ---- */
  .edge-trigger{display:none;}
  /* ===== 右緣本頁目錄（Notion 式錨點）===== */
  .toc-dock{position:fixed;top:58px;right:0;bottom:0;z-index:38;pointer-events:none;}
  .toc-handle{position:absolute;top:50%;right:6px;transform:translateY(-50%);width:4px;height:52px;border-radius:var(--r-pill);background:var(--line-strong);opacity:0;transition:opacity .2s;}
  .toc-dock.hint .toc-handle{opacity:.5;}
  .toc-dock.peek .toc-handle{opacity:0;}
  .toc-panel{position:absolute;top:20px;right:14px;width:250px;max-height:calc(100% - 40px);overflow-y:auto;pointer-events:auto;
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:0 14px 36px rgba(0,0,0,.14);
    padding:var(--sp-4);opacity:0;visibility:hidden;transform:translateX(10px);transition:opacity .18s,transform .18s,visibility .18s;}
  .toc-panel.on{opacity:1;visibility:visible;transform:translateX(0);}
  .toc-panel .toc-head{font-family:var(--font-mono);font-size:var(--fs-h10);letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin:0 0 var(--sp-3);padding:0 var(--sp-2);}
  .toc-item{display:block;width:100%;text-align:left;border:none;background:transparent;cursor:pointer;font-family:var(--font-sans);
    font-size:var(--fs-h9);color:var(--muted);padding:var(--sp-2) var(--sp-3);border-radius:var(--r-sm);line-height:1.4;
    border-left:2px solid transparent;transition:background .12s,color .12s;}
  .toc-item:hover{background:var(--canvas);color:var(--ink);}
  .toc-item.lv2{padding-left:var(--sp-6);font-size:var(--fs-h10);color:var(--faint);}
  .toc-item.active{color:var(--accent);border-left-color:var(--accent);background:var(--i-primary-tint);}
  @media(max-width:900px){.toc-dock{display:none!important;}}
  @media(min-width:901px){
    .shell.nav-collapsed .layout{grid-template-columns:1fr;} /* sidebar/edge-trigger 皆 position:fixed 出流，只剩 .main 在 grid 內 → 單軌填滿（不能用 0 1fr，否則 main 遞補進 0 寬軌被壓爛）*/
    .shell.nav-collapsed .sidebar-resize{display:none;} /* 收合時無左欄可拖 */
    .shell.nav-collapsed .sidebar{position:fixed;top:58px;left:0;bottom:0;width:var(--sb);z-index:40;
      transform:translateX(-100%);transition:transform .2s var(--ease-standard) .32s;box-shadow:6px 0 24px rgba(0,0,0,.10);} /* 離開延遲 .32s：滑走後不馬上縮回，留時間移到側欄上 */
    .shell.nav-collapsed .edge-trigger{display:block;position:fixed;top:58px;left:0;bottom:0;width:28px;z-index:39;} /* 左緣熱區加寬 14→28，較好觸發 */
    .shell.nav-collapsed .edge-trigger:hover ~ .sidebar,
    .shell.nav-collapsed .sidebar:hover{transform:translateX(0);transition-delay:.14s;} /* 進入延遲 .14s：hover-intent，避免滑過就彈出 */
  }

  /* 類別間以淺灰細線分隔；類別標題與頁籤標題同字級/字重/顏色 */
  .nav-group{border-top:1px solid var(--line);margin-top:var(--sp-2);padding-top:var(--sp-2);margin-bottom:2px;}
  .nav-sep{height:1px;background:var(--line);margin:var(--sp-2) 6px;} /* 需求匯總/Design Token 間分隔線 */
  .nav-group .gh{display:flex;align-items:center;gap:var(--sp-2);width:100%;text-align:left;background:transparent;border:none;cursor:pointer;
    font-family:var(--font-sans);font-size:var(--fs-h8);font-weight:600;color:var(--muted);
    padding:var(--sp-2);border-radius:var(--r-sm);transition:.12s;}
  .nav-group .gh:hover{background:var(--canvas);}
  .nav-group .gh .gh-n{font-family:var(--font-mono);font-size:var(--fs-h9);color:var(--faint);font-variant-numeric:tabular-nums;min-width:13px;text-align:center;flex:0 0 auto;} /* 計數在 chevron 左邊、無底色 */
  .nav-group .gh .gh-caret{display:inline-flex;transition:transform .18s;color:var(--faint);flex:0 0 auto;} /* 計數＋chevron 靠標題右側，標題靠左 */
  .nav-group .gh .gh-caret svg{width:13px;height:13px;display:block;}
  .nav-group .gh .gh-t{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .nav-group.collapsed .gh .gh-caret{transform:rotate(-90deg);}
  .nav-group.collapsed .ng-items{display:none;}
  .ng-items{position:relative;padding-left:var(--sp-5);} /* 展開內層往內縮（24） */
  .ng-items::before{content:'';position:absolute;left:14px;top:1px;bottom:1px;width:1px;background:var(--line);}
  .nav-item{display:flex;align-items:center;gap:var(--sp-2);width:100%;text-align:left;border:none;background:transparent;
    color:var(--muted);font-family:var(--font-sans);font-size:var(--fs-h8);font-weight:600;padding:var(--sp-2);border-radius:var(--r-sm);cursor:pointer;transition:.12s;}
  .nav-item:hover{background:var(--canvas);}
  .nav-item[aria-current="true"]{background:var(--i-primary-tint);color:var(--accent);} /* 當前頁淺藍底 */
  .nav-item .nm{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .nav-item .dot{margin-left:auto;width:7px;height:7px;border-radius:var(--r-pill);flex:0 0 auto;background:var(--line-strong);} /* 建立狀態＝色圈（已停用） */
  .nav-item .dot.st-ready{background:var(--ok);}
  .nav-item .dot.st-partial{background:var(--warn);}

  /* ---------- headings / spec ---------- */
  .eyebrow{font-family:var(--font-mono);font-size:var(--fs-h10);letter-spacing:.14em;text-transform:uppercase;
    color:var(--faint);font-weight:600;margin:0 0 var(--sp-2);}
  h1{font-size:var(--fs-h2);line-height:1.15;letter-spacing:-.02em;margin:0 0 var(--sp-5);text-wrap:balance;font-weight:600;}
  .lede{color:var(--muted);max-width:62ch;margin:0;font-size:var(--fs-h8);}
  .sum-top + .lede{margin-top:var(--sp-5);} /* 匯總/Token 頁：標題區塊 → 說明距離加大 */
  .head-rule{border-top:1px solid var(--line);margin:var(--sp-5) 0 0;} /* 說明文字下方淺分隔線（滿內容寬）*/
  .lede b{color:var(--ink);} .lede code{font-family:var(--font-mono);font-size:var(--fs-h9);background:var(--panel-2);padding:1px 6px;border-radius:var(--r-sm);}

  .spec{margin:var(--sp-5) 0;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:var(--sp-5);display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:var(--sp-4) var(--sp-5);}
  .spec .cell .k{font-family:var(--font-mono);font-size:var(--fs-h10);letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-bottom:6px;}
  .spec .cell .v{font-size:var(--fs-h8);color:var(--ink);}
  .spec .cell .v code{font-family:var(--font-mono);font-size:var(--fs-h9);background:var(--panel-2);padding:1px 6px;border-radius:var(--r-sm);color:var(--muted);}

  /* ---------- dial ---------- */
  .dial{margin:var(--sp-5) 0 var(--sp-6);background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:var(--sp-5);}
  .dial .head{display:flex;justify-content:space-between;align-items:baseline;gap:var(--sp-4);flex-wrap:wrap;margin-bottom:var(--sp-1);}
  .dial h2{font-size:var(--fs-h7);margin:0;font-weight:600;}
  .dial .hint{color:var(--muted);font-size:var(--fs-h9);margin:2px 0 var(--sp-4);}
  .count{font-family:var(--font-mono);font-size:var(--fs-h9);color:var(--muted);font-variant-numeric:tabular-nums;}
  .count b{color:var(--accent);font-size:var(--fs-h7);} .count .full{color:var(--faint);}
  .axes{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:var(--sp-5) var(--sp-4);}
  .axis .name{font-family:var(--font-mono);font-size:var(--fs-h10);letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-bottom:var(--sp-2);}
  /* 變數篩選器：勾選清單（每個軸值一列，前面 checkbox）*/
  .chk-list{display:flex;flex-direction:column;gap:1px;}
  .chk-list .chk-row{display:flex;align-items:center;gap:var(--sp-2);padding:6px var(--sp-2);border-radius:var(--r-sm);cursor:pointer;
    font-family:var(--font-mono);font-size:var(--fs-h9);color:var(--muted);user-select:none;transition:background .12s,color .12s;}
  .chk-list .chk-row:hover{background:var(--panel-2);color:var(--ink);}
  .chk-list .chk-row input{accent-color:var(--accent);width:16px;height:16px;flex:0 0 auto;cursor:pointer;margin:0;}
  .chk-list .chk-row.off{color:var(--faint);}
  .chips{display:flex;flex-wrap:wrap;gap:6px;}
  /* tab-button 樣式：active 實色填滿、inactive 灰階 */
  .chip{display:inline-flex;align-items:center;border:1px solid var(--line-strong);background:var(--panel-2);
    color:var(--faint);border-radius:var(--r-pill);padding:var(--sp-2) var(--sp-4);font-size:var(--fs-h9);cursor:pointer;user-select:none;
    transition:.13s;font-family:var(--font-mono);filter:grayscale(1);}
  .chip:hover{border-color:var(--accent);color:var(--muted);}
  .chip[aria-pressed="true"]{background:var(--accent);border-color:var(--accent);color:var(--primary-on);filter:none;
    box-shadow:0 1px 3px color-mix(in srgb,var(--ink) 14%,transparent);}
  .chip[aria-pressed="true"]:hover{color:var(--primary-on);}

  /* ---------- blocks ---------- */
  section.block{margin:var(--sp-7) 0 0;}
  .block > h2{font-size:var(--fs-h9);font-family:var(--font-mono);letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:0 0 var(--sp-1);font-weight:600;}
  .block > .sub{color:var(--faint);font-size:var(--fs-h9);margin:0 0 var(--sp-5);} .block > .sub code{font-family:var(--font-mono);background:var(--panel-2);padding:1px 5px;border-radius:var(--r-sm);}
  /* 站台 chrome 文字：英文用 Geist Mono（技術風格），中文自動 fallback PingFang；元件庫元件維持 sans（見 body 預設） */
  .brand-title,h1,.lede,.block>.sub,.dial h2,.dial .hint,.spec .cell .v,
  .vpanel .vtitle .vname,.vpanel .vtitle .vdesc,.nav-item .nm,.nav-group .gh .gh-t,
  .famhead .fz,.placeholder h2,.placeholder p,.site-footer,
  .sc-name,.sumcat-t,.sr-name,.st-name,.tok-gh .t,.tok-gh .d,.dh-title,
  .tok-tab,.tokbtn,.copybtn{font-family:var(--font-mono);}

  .panels{display:flex;flex-direction:column;gap:var(--sp-4);}
  .vpanel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;}
  .vpanel .vtitle{display:flex;align-items:center;gap:var(--sp-2);padding:var(--sp-4) var(--sp-5);border-bottom:1px solid var(--line);background:var(--panel-2);}
  .vpanel .vtitle .badge{font-family:var(--font-mono);font-size:var(--fs-h9);color:var(--accent);border:1px solid var(--line-strong);border-radius:var(--r-sm);padding:2px var(--sp-2);letter-spacing:.04em;}
  .vpanel .vtitle .vname{font-size:var(--fs-h8);font-weight:600;}
  .vpanel .vtitle .vdesc{font-size:var(--fs-h9);color:var(--faint);margin-left:auto;}
  .grid-scroll{overflow-x:auto;}
  .mgrid{display:grid;gap:0;}
  .mgrid .corner,.mgrid .colhead,.mgrid .rowhead,.mgrid .mcell{padding:var(--sp-4);border-bottom:1px solid var(--line);border-right:1px solid var(--line);display:flex;align-items:center;}
  .mgrid .colhead{justify-content:center;flex-direction:column;gap:2px;background:var(--panel);}
  .mgrid .colhead .zh{font-size:var(--fs-h9);color:var(--muted);font-weight:600;}
  .mgrid .colhead .en{font-family:var(--font-mono);font-size:var(--fs-h10);color:var(--faint);letter-spacing:.06em;text-transform:uppercase;}
  .mgrid .rowhead{flex-direction:column;align-items:flex-start;gap:2px;background:var(--panel);}
  .mgrid .rowhead .zh{font-size:var(--fs-h9);color:var(--muted);font-weight:600;}
  .mgrid .rowhead .en{font-family:var(--font-mono);font-size:var(--fs-h10);color:var(--faint);letter-spacing:.06em;text-transform:uppercase;}
  .mgrid .mcell{justify-content:center;}
  .mgrid .colhead.lastcol,.mgrid .mcell.lastcol{border-right:none;}

  /* ---------- button ---------- */
  .btn{--fill:var(--i-primary);--fill-h:var(--i-primary-h);--fill-p:var(--i-primary-p);--on:var(--primary-on);
    --edge:var(--i-primary);--fg:var(--i-primary);--tint:var(--i-primary-tint);--tint2:var(--i-primary-tint2);
    display:inline-flex;align-items:center;justify-content:center;gap:.5em;font-family:var(--font-sans);font-weight:600;
    line-height:1;border:0.75px solid transparent;border-radius:var(--r-sm);cursor:pointer;white-space:nowrap;
    transition:background .13s,border-color .13s,transform .06s,box-shadow .13s;}
  .btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
  .btn svg{width:1.15em;height:1.15em;flex:0 0 auto;}
  .sz-s{height:32px;padding:0 var(--sp-4);font-size:var(--fs-h9);border-radius:var(--r-sm);}
  .sz-m{height:40px;padding:0 var(--sp-5);font-size:var(--fs-h8);border-radius:var(--r-sm);}
  .sz-l{height:48px;padding:0 var(--sp-5);font-size:var(--fs-h7);border-radius:var(--r-sm);}
  .btn.icon-only{padding:0;aspect-ratio:1;} .sz-s.icon-only{width:32px} .sz-m.icon-only{width:40px} .sz-l.icon-only{width:48px}
  .i-primary{--fill:var(--i-primary);--fill-h:var(--i-primary-h);--fill-p:var(--i-primary-p);--on:var(--primary-on);--edge:var(--i-primary);--fg:var(--i-primary);--tint:var(--i-primary-tint);--tint2:var(--i-primary-tint2);}
  .i-danger{--fill:var(--i-danger);--fill-h:var(--i-danger-h);--fill-p:var(--i-danger-p);--on:var(--danger-on);--edge:var(--i-danger);--fg:var(--i-danger);--tint:var(--i-danger-tint);--tint2:var(--i-danger-tint2);}
  .i-secondary{--fill:var(--i-sec-fill);--fill-h:var(--i-sec-fill-h);--fill-p:var(--i-sec-fill-p);--on:var(--i-sec-on);--edge:var(--i-sec-edge);--fg:var(--i-sec-fg);--tint:var(--i-sec-tint);--tint2:var(--i-sec-tint2);}
  .v-solid{background:var(--fill);color:var(--on);border-color:var(--fill);}
  .v-solid.st-hover{background:var(--fill-h);border-color:var(--fill-h);}
  .v-solid.st-pressed{background:var(--fill-p);border-color:var(--fill-p);transform:translateY(1px);}
  .v-outline{background:transparent;color:var(--fg);border-color:var(--edge);}
  .v-outline.st-hover{background:var(--tint);}
  .v-outline.st-pressed{background:var(--tint2);transform:translateY(1px);}
  .v-text{background:transparent;color:var(--fg);border-color:transparent;}
  .v-text.st-hover{background:var(--tint);}
  .v-text.st-pressed{background:var(--tint2);transform:translateY(1px);}
  .v-soft{background:var(--tint);color:var(--fg);border-color:transparent;}
  .v-soft.st-hover{background:var(--tint2);}
  .v-soft.st-pressed{background:var(--tint2);transform:translateY(1px);}
  .st-disabled{opacity:.42;cursor:not-allowed;transform:none !important;}
  /* live real interaction */
  .v-solid.live:hover:not(:disabled){background:var(--fill-h);border-color:var(--fill-h);}
  .v-solid.live:active:not(:disabled){background:var(--fill-p);border-color:var(--fill-p);transform:translateY(1px);}
  .v-outline.live:hover:not(:disabled){background:var(--tint);}
  .v-outline.live:active:not(:disabled){background:var(--tint2);transform:translateY(1px);}
  .v-text.live:hover:not(:disabled){background:var(--tint);}
  .v-text.live:active:not(:disabled){background:var(--tint2);transform:translateY(1px);}
  .v-soft.live:hover:not(:disabled){background:var(--tint2);}
  .v-soft.live:active:not(:disabled){background:var(--tint2);transform:translateY(1px);}

  /* ---------- demo rows ---------- */
  .row-demo{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:var(--sp-6);display:flex;flex-wrap:wrap;gap:var(--sp-7);align-items:flex-end;}
  .demo-item{display:flex;flex-direction:column;align-items:flex-start;gap:var(--sp-4);}
  .demo-item .cap{font-family:var(--font-mono);font-size:var(--fs-h10);color:var(--faint);letter-spacing:.05em;} .demo-item .cap b{color:var(--muted);font-weight:600;}

  /* ---------- live section ---------- */
  .livewrap{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:var(--sp-6);}
  .livewrap + .livewrap{margin-top:var(--sp-6);} /* 同段兩張 Live 牌卡間距（price/metric）*/
  .ctl-row{display:flex;flex-wrap:wrap;gap:var(--sp-5) var(--sp-7);align-items:flex-start;margin-bottom:var(--sp-6);}
  .ctl{display:flex;flex-direction:column;gap:var(--sp-3);}
  .ctl .lab{font-family:var(--font-mono);font-size:var(--fs-h10);letter-spacing:.1em;text-transform:uppercase;color:var(--faint);}
  .seg{display:inline-flex;background:var(--panel-2);border:1px solid var(--line-strong);border-radius:var(--r-sm);padding:3px;gap:2px;}
  .seg button{border:none;background:transparent;color:var(--muted);font-family:var(--font-mono);font-size:var(--fs-h9);padding:var(--sp-2) var(--sp-4);border-radius:var(--r-sm);cursor:pointer;transition:.12s;}
  .seg button[aria-pressed="true"]{background:var(--panel);color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.07);}
  .seg button:disabled,.seg button.is-off{opacity:.32;cursor:not-allowed;box-shadow:none;} /* 篩選器未勾的軸值→Live 對應選項停用 */
  .checks{display:flex;gap:var(--sp-5);flex-wrap:wrap;padding-top:2px;}
  .chk{display:inline-flex;align-items:center;gap:var(--sp-2);font-size:var(--fs-h9);color:var(--muted);cursor:pointer;font-family:var(--font-mono);}
  .chk input{accent-color:var(--accent);width:15px;height:15px;}
  .live-stage{background:var(--panel);border:1px dashed var(--line-strong);border-radius:var(--r-sm);padding:var(--sp-8);display:flex;justify-content:center;align-items:center;min-height:118px;}
  .live-note{font-family:var(--font-mono);font-size:var(--fs-h10);color:var(--faint);margin:var(--sp-5) 0 var(--sp-3);}
  .live-free{display:flex;gap:var(--sp-5);flex-wrap:wrap;align-items:flex-end;}
  /* live 可輸入欄位（裸 input 嵌在 .field 容器內，hover/focus 為真）*/
  .field.live-field{cursor:text;}
  .field .bare{border:none;background:transparent;outline:none;flex:1;min-width:40px;font:inherit;color:var(--ink);padding:0;}
  .field .bare::placeholder{color:var(--faint);}
  .field.live-field:hover{border-color:var(--muted);}
  .field.v-filled.live-field:hover{background:var(--panel-3);border-color:transparent;}
  .field.live-field:focus-within{border-color:var(--accent);}
  .field.v-filled.live-field:focus-within{border-color:var(--accent);background:var(--panel-2);}

  /* ---------- placeholder ---------- */
  .placeholder{border:1px dashed var(--line-strong);border-radius:var(--radius);padding:60px 40px;text-align:center;background:var(--panel);}
  .placeholder .em{font-size:30px;margin-bottom:10px;}
  .placeholder h2{color:var(--ink);font-size:var(--fs-h5);margin:0 0 var(--sp-3);}
  .placeholder p{color:var(--muted);max-width:46ch;margin:0 auto;font-size:var(--fs-h8);}
  .placeholder .axhint{font-family:var(--font-mono);font-size:var(--fs-h9);color:var(--faint);margin-top:var(--sp-5);}

  /* ---------- 家族子區塊小標 ---------- */
  .famhead{display:flex;align-items:baseline;gap:var(--sp-3);margin:var(--sp-8) 0 var(--sp-2);padding-top:var(--sp-6);border-top:1px solid var(--line-strong);}
  .famhead:first-child{margin-top:var(--sp-6);}
  .famhead .fz{font-size:var(--fs-h7);font-weight:600;color:var(--ink);letter-spacing:-.01em;}
  .famhead .fe{font-family:var(--font-mono);font-size:var(--fs-h10);letter-spacing:.08em;text-transform:uppercase;color:var(--accent);}

  /* ---------- 側邊欄置頂：複雜度確認（與其他頁同一套 current 高亮邏輯）---------- */
  .nav-pin{margin-bottom:2px;}

  /* ---------- 複雜度確認總覽 ---------- */
  .sum-top{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
  .sum-top .sum-head{min-width:0;} .sum-top .copybtn{flex:0 0 auto;}
  .sum-actions{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin:22px 0 20px;}
  .sum-actions .spacer{flex:1;}
  .sumtotal{font-family:var(--font-mono);font-size:var(--fs-h8);color:var(--muted);font-variant-numeric:tabular-nums;}
  .sumtotal b{color:var(--accent);font-size:var(--fs-h7);} .sumtotal .full{color:var(--faint);}
  .aitoggle{display:inline-flex;align-items:center;gap:9px;height:38px;padding:0 8px 0 14px;border-radius:999px;border:1px solid var(--line-strong);
    background:var(--panel-2);color:var(--muted);font-family:var(--font-sans);font-size:var(--fs-h8);font-weight:600;cursor:pointer;transition:.15s;}
  .aitoggle:hover{border-color:var(--accent);color:var(--ink);}
  .aitoggle svg{width:16px;height:16px;flex:0 0 auto;}
  .aitoggle .sw{position:relative;width:34px;height:20px;border-radius:999px;background:var(--line-strong);transition:background .18s;flex:0 0 auto;}
  .aitoggle .sw::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:var(--r-pill);background:var(--c-neutral-0);transition:transform .2s;box-shadow:0 1px 2px color-mix(in srgb,var(--ink) 20%,transparent);}
  .aitoggle.on{background:var(--i-primary-tint);border-color:transparent;color:var(--accent);}
  .aitoggle.on .sw{background:var(--accent);}
  .aitoggle.on .sw::after{transform:translateX(14px);}
  .copybtn{height:38px;padding:0 var(--sp-4);border-radius:var(--r-sm);border:1px solid var(--accent);background:var(--accent);color:var(--primary-on);
    font-family:var(--font-sans);font-size:var(--fs-h8);font-weight:600;cursor:pointer;transition:.13s;}
  .copybtn:hover{filter:brightness(1.06);}
  .sumcard{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;transition:opacity .15s,border-color .13s;}
  .sumcard.unpicked{opacity:.8;} /* 未選（非 disabled）：只微淡化，仍可點選 */
  .sc-head{display:flex;align-items:center;gap:13px;padding:15px 20px;cursor:pointer;}
  .sc-head:hover{background:var(--canvas);}
  .sc-check{display:inline-flex;flex:0 0 auto;align-items:center;}
  .sc-check input{width:17px;height:17px;accent-color:var(--accent);cursor:pointer;margin:0;}
  .sc-name{font-size:var(--fs-h8);font-weight:600;flex:1;min-width:0;}
  .sc-count{font-family:var(--font-mono);font-size:var(--fs-h9);color:var(--muted);font-variant-numeric:tabular-nums;flex:0 0 auto;} .sc-count b{color:var(--accent);} .sc-count .full{color:var(--faint);}
  .sc-chevron{display:inline-flex;color:var(--faint);transition:transform .18s;flex:0 0 auto;}
  .sc-chevron svg{width:14px;height:14px;display:block;}
  .sumcard.collapsed .sc-chevron{transform:rotate(-90deg);}
  .sc-body{padding:4px 20px 20px;border-top:1px solid var(--line);}
  .sumcard.collapsed .sc-body{display:none;}
  .sc-sub{font-family:var(--font-mono);font-size:var(--fs-h10);letter-spacing:.09em;text-transform:uppercase;color:var(--faint);margin:18px 0 10px;}
  .sc-foot{display:flex;justify-content:flex-end;margin-top:18px;padding-top:16px;border-top:1px solid var(--line);}
  .adjustbtn{display:inline-flex;align-items:center;gap:7px;height:34px;padding:0 14px;border-radius:var(--r-sm);border:1px solid var(--line-strong);
    background:transparent;color:var(--muted);font-family:var(--font-sans);font-size:var(--fs-h9);font-weight:600;cursor:pointer;transition:.13s;}
  .adjustbtn:hover{border-color:var(--accent);color:var(--accent);}
  .adjustbtn svg{width:14px;height:14px;flex:0 0 auto;}
  .sum-axis{display:flex;align-items:baseline;gap:12px;padding:6px 0;}
  .sum-axis .sa-name{flex:0 0 110px;font-family:var(--font-mono);font-size:var(--fs-h10);letter-spacing:.08em;text-transform:uppercase;color:var(--faint);padding-top:3px;}
  .sum-axis .sa-chips{flex:1;display:flex;flex-wrap:wrap;gap:6px;}
  .sum-axis .sa-n{flex:0 0 auto;font-family:var(--font-mono);font-size:var(--fs-h10);color:var(--muted);font-variant-numeric:tabular-nums;}
  .sum-chip{display:inline-flex;font-family:var(--font-mono);font-size:var(--fs-h9);padding:3px 9px;border-radius:999px;border:1px solid var(--line-strong);}
  .sum-chip.on{background:var(--i-primary-tint);color:var(--accent);border-color:transparent;}
  .sum-chip.off{color:var(--faint);text-decoration:line-through;opacity:.6;}

  /* ===== 匯出頁：方案 tab（AI toggle 右側）＋分類分層＋三種版型 ===== */
  .sum-tabs{display:inline-flex;gap:2px;padding:3px;border-radius:var(--r-sm);background:var(--panel-2);border:1px solid var(--line);}
  .stab{height:32px;padding:0 13px;border:none;background:transparent;border-radius:var(--r-sm);cursor:pointer;
    font-family:var(--font-sans);font-size:var(--fs-h9);font-weight:600;color:var(--muted);transition:.13s;white-space:nowrap;}
  .stab:hover{color:var(--ink);}
  .stab.on{background:var(--panel);color:var(--accent);box-shadow:0 1px 3px color-mix(in srgb, var(--ink) 10%, transparent);}
  /* 分類外殼（收合行為同側邊欄 nav-group） */
  .sumcat{border:1px solid var(--line);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;background:var(--panel);}
  .sumcat-h{display:flex;align-items:center;gap:10px;width:100%;text-align:left;cursor:pointer;
    padding:14px 18px;background:var(--panel-2);border:none;font-family:var(--font-sans);}
  .sumcat-h:hover{background:var(--panel-3);}
  .sumcat-t{flex:1;min-width:0;font-size:var(--fs-h8);font-weight:600;color:var(--ink);}
  .sumcat-n{flex:0 0 auto;font-family:var(--font-mono);font-size:var(--fs-h9);color:var(--muted);font-variant-numeric:tabular-nums;
    padding:2px 9px;border-radius:999px;background:var(--panel);border:1px solid var(--line);}
  .sumcat-caret{flex:0 0 auto;display:inline-flex;color:var(--faint);transition:transform .18s;}
  .sumcat-caret svg{width:14px;height:14px;display:block;}
  .sumcat.collapsed .sumcat-caret{transform:rotate(-90deg);}
  .sumcat.collapsed .sumcat-body{display:none;}
  .sumcat-body{padding:14px 16px;border-top:1px solid var(--line);}
  .sumcat-cards .sumcard:last-child{margin-bottom:0;}
  /* list 版型：緊湊列 */
  .sumlist{display:flex;flex-direction:column;gap:2px;}
  .sumrow{display:flex;align-items:center;gap:13px;padding:10px 12px;border-radius:var(--r-sm);cursor:pointer;transition:background .12s,opacity .15s;}
  .sumrow:hover{background:var(--panel-2);}
  .sumrow.unpicked{opacity:.8;}
  .sr-check{display:inline-flex;flex:0 0 auto;align-items:center;}
  .sr-check input{width:17px;height:17px;accent-color:var(--accent);cursor:pointer;margin:0;}
  .sr-name{flex:1;min-width:0;font-size:var(--fs-h8);font-weight:600;color:var(--ink);}
  .sr-count{flex:0 0 auto;font-family:var(--font-mono);font-size:var(--fs-h9);color:var(--muted);font-variant-numeric:tabular-nums;} .sr-count b{color:var(--accent);}
  .sr-go{flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:var(--r-sm);
    border:1px solid var(--line);background:transparent;color:var(--muted);cursor:pointer;transition:.13s;}
  .sr-go:hover{border-color:var(--accent);color:var(--accent);}
  .sr-go svg{width:15px;height:15px;}
  /* grid 版型：分組網格磚 */
  .sumgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(178px,1fr));gap:10px;}
  .sumtile{position:relative;display:flex;flex-direction:column;gap:5px;padding:14px;border:1px solid var(--line);border-radius:var(--r-sm);
    background:var(--panel-2);cursor:pointer;transition:border-color .13s,opacity .15s,box-shadow .13s;}
  .sumtile:hover{border-color:var(--accent);box-shadow:0 2px 10px color-mix(in srgb, var(--ink) 8%, transparent);}
  .sumtile.unpicked{opacity:.8;}
  .st-check{position:absolute;top:11px;right:11px;display:inline-flex;}
  .st-check input{width:16px;height:16px;accent-color:var(--accent);cursor:pointer;margin:0;}
  .st-name{font-size:var(--fs-h8);font-weight:600;color:var(--ink);padding-right:22px;line-height:1.3;}
  .st-count{font-family:var(--font-mono);font-size:var(--fs-h9);color:var(--muted);font-variant-numeric:tabular-nums;} .st-count b{color:var(--accent);font-size:var(--fs-h9);}
  .st-go{display:inline-flex;align-items:center;justify-content:center;align-self:flex-start;width:26px;height:26px;margin-top:2px;
    border-radius:var(--r-sm);border:1px solid var(--line);background:var(--panel);color:var(--muted);cursor:pointer;transition:.13s;}
  .st-go:hover{border-color:var(--accent);color:var(--accent);}
  .st-go svg{width:14px;height:14px;}

  /* ===== Design Token 頁（檢視 + 手動調整；L1/L2 切換、精簡版）===== */
  .tok-lead{display:flex;align-items:center;gap:var(--sp-3);flex-wrap:wrap;margin:var(--sp-4) 0 var(--sp-5);}
  .tok-lead .spacer{flex:1;}
  .tok-tabs{display:inline-flex;gap:2px;padding:3px;border-radius:var(--r-sm);background:var(--panel-2);border:1px solid var(--line);}
  .tok-tab{height:32px;padding:0 var(--sp-4);border:none;background:transparent;border-radius:var(--r-sm);cursor:pointer;
    font-family:var(--font-sans);font-size:var(--fs-h9);font-weight:600;color:var(--muted);transition:.13s;}
  .tok-tab:hover{color:var(--ink);}
  .tok-tab.on{background:var(--panel);color:var(--accent);box-shadow:var(--e-sm);}
  .tokbtn{height:34px;padding:0 var(--sp-3);border-radius:var(--r-sm);border:1px solid var(--line-strong);background:var(--panel);
    color:var(--ink);font-family:var(--font-sans);font-size:var(--fs-h9);font-weight:600;cursor:pointer;transition:.13s;display:inline-flex;align-items:center;gap:6px;}
  .tokbtn:hover{border-color:var(--accent);color:var(--accent);}
  .tokbtn.primary{background:var(--accent);border-color:var(--accent);color:var(--primary-on);}
  .tokbtn.primary:hover{filter:brightness(1.06);color:var(--primary-on);}
  .tok-group{border:1px solid var(--line);border-radius:var(--r-sm);margin-bottom:var(--sp-3);overflow:hidden;background:var(--panel);}
  .tok-gh{display:flex;align-items:baseline;gap:var(--sp-2);padding:var(--sp-3) var(--sp-4);background:var(--panel-2);border-bottom:1px solid var(--line);}
  .tok-gh .t{font-size:var(--fs-h8);font-weight:600;color:var(--ink);}
  .tok-gh .d{font-size:var(--fs-h10);color:var(--muted);}
  .tok-gh .layer{margin-left:auto;font-family:var(--font-mono);font-size:var(--fs-h10);letter-spacing:.06em;text-transform:uppercase;
    color:var(--faint);border:1px solid var(--line);border-radius:var(--r-pill);padding:2px var(--sp-2);}
  /* L1 列：名稱 | 控制（色票鈕填滿＋hex／或值輸入／或陰影示意） */
  .tok-row{display:grid;grid-template-columns:minmax(190px,1fr) minmax(190px,1.3fr);align-items:center;gap:var(--sp-4);
    padding:6px var(--sp-4);border-top:1px solid var(--line);}
  .tok-row:first-child{border-top:none;}
  .tok-row.l2{grid-template-columns:minmax(170px,1fr) 1fr 1fr;}         /* 名稱 | Light | Dark */
  .tok-row.resp{grid-template-columns:minmax(150px,1fr) 1fr 1fr 1fr;}   /* 名稱 | Desktop | Tablet | Mobile */
  .tok-modehead.resp{grid-template-columns:minmax(150px,1fr) 1fr 1fr 1fr;}
  .tok-name{font-family:var(--font-mono);font-size:var(--fs-h9);color:var(--ink);min-width:0;}
  .tok-name .lab{color:var(--muted);margin-left:6px;font-size:var(--fs-h10);}
  .tok-name .map{display:block;color:var(--faint);font-size:var(--fs-h10);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .tok-ctl{display:flex;align-items:center;gap:var(--sp-2);min-width:0;}
  /* 填滿式色票鈕：色鋪滿整顆、無白邊 padding */
  .tok-sw-btn{width:44px;height:30px;border-radius:var(--r-sm);border:1px solid var(--line-strong);padding:0;background:none;overflow:hidden;cursor:pointer;flex:0 0 auto;}
  .tok-sw-btn::-webkit-color-swatch-wrapper{padding:0;}
  .tok-sw-btn::-webkit-color-swatch{border:none;border-radius:3px;}
  .tok-sw-btn::-moz-color-swatch{border:none;}
  .tok-hex{flex:1;min-width:0;height:30px;padding:0 var(--sp-2);border:1px solid var(--line-strong);border-radius:var(--r-sm);
    background:var(--panel);color:var(--ink);font-family:var(--font-mono);font-size:var(--fs-h9);}
  .tok-hex:focus{outline:none;border-color:var(--accent);}
  /* 陰影示意 box */
  .tok-shprev{width:52px;height:30px;border-radius:var(--r-sm);background:var(--panel);border:1px solid var(--line);flex:0 0 auto;}
  /* L2 mode 欄：小色票 + 值（可點色票改） */
  .tok-modehead{display:grid;grid-template-columns:minmax(170px,1fr) 1fr 1fr;gap:var(--sp-4);padding:6px var(--sp-4) 4px;
    font-family:var(--font-mono);font-size:var(--fs-h10);letter-spacing:.06em;text-transform:uppercase;color:var(--faint);background:var(--panel-2);border-bottom:1px solid var(--line);}
  .tok-mode{display:flex;align-items:center;gap:var(--sp-2);min-width:0;}
  .m-val{font-family:var(--font-mono);font-size:var(--fs-h10);color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .tok-fontrow{padding:var(--sp-3) var(--sp-4);border-top:1px solid var(--line);display:flex;flex-direction:column;gap:var(--sp-2);}
  .tok-fontrow .fp{font-size:var(--fs-h4);color:var(--ink);}
  /* 牌卡多欄容器：L1 / 框架索引的 group 兩兩並列（固定 2 欄、不擠成 3 欄；窄螢幕收 1 欄） */
  .tok-cardgrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:var(--sp-3);align-items:start;}
  .tok-cardgrid .tok-group{margin-bottom:0;}                 /* gap 已處理間距 */
  .tok-cardgrid .tok-group.span{grid-column:1/-1;}           /* 寬表（typography）跨滿整列 */
  .tok-cardgrid .tref-note{grid-column:1/-1;}
  /* device 切換小 tab（typography 用；補下方間距） */
  .tok-devtabs{display:inline-flex;gap:2px;margin:var(--sp-3) var(--sp-4) var(--sp-3);padding:3px;border-radius:var(--r-sm);background:var(--panel-2);border:1px solid var(--line);}
  .tok-devtab{height:26px;padding:0 var(--sp-3);border:none;background:transparent;border-radius:var(--r-sm);cursor:pointer;font-family:var(--font-sans);font-size:var(--fs-h10);font-weight:600;color:var(--muted);}
  .tok-devtab:hover{color:var(--ink);}
  .tok-devtab.on{background:var(--panel);color:var(--accent);box-shadow:var(--e-sm);}
  /* 複合 typography 列：Token | 字級 | 字重 | 行高中 | 行高英 | 預覽 */
  .tok-row.typo{grid-template-columns:minmax(48px,.45fr) 68px 56px 56px 56px minmax(140px,1.8fr);gap:var(--sp-2);}
  .tok-modehead.typo{grid-template-columns:minmax(48px,.45fr) 68px 56px 56px 56px minmax(140px,1.8fr);gap:var(--sp-2);}
  .tok-row.typo .tok-hex{text-align:center;padding:0 4px;}
  .ty-prev{min-width:0;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;align-self:center;font-family:var(--font-sans);}
  /* typo 控制列：device tab ｜ 中英 tab ｜ 自訂文案 input */
  .tok-typobar{display:flex;align-items:center;gap:var(--sp-3);flex-wrap:wrap;margin:var(--sp-3) var(--sp-4);}
  .tok-typotext{flex:1;min-width:160px;height:30px;padding:0 var(--sp-3);border:1px solid var(--line-strong);border-radius:var(--r-sm);background:var(--panel);color:var(--ink);font-family:var(--font-sans);font-size:var(--fs-h9);}
  .tok-typotext:focus{outline:none;border-color:var(--accent);}
  .tok-typobar .tok-devtabs{margin:0;}
  /* 字距中/英兩欄 */
  .tok-row.ls2{grid-template-columns:minmax(48px,.5fr) 1fr 1fr;gap:var(--sp-3);}
  .tok-modehead.ls2{grid-template-columns:minmax(48px,.5fr) 1fr 1fr;gap:var(--sp-3);}
  .tok-row.ls2 .tok-hex{text-align:center;}
  /* 框架索引值表：Token | 值（可帶色塊）· 角色 */
  .tref-note{font-size:var(--fs-h9);color:var(--muted);margin:0 0 var(--sp-2);padding:var(--sp-2) var(--sp-3);border-left:2px solid var(--accent);background:var(--panel-2);border-radius:0 var(--r-sm) var(--r-sm) 0;}
  .tref-row{display:grid;grid-template-columns:minmax(88px,1fr) minmax(120px,1.5fr);align-items:center;gap:var(--sp-3);padding:5px var(--sp-4);border-top:1px solid var(--line);}
  .tref-row:first-child{border-top:none;}
  .tref-k{font-family:var(--font-mono);font-size:var(--fs-h9);color:var(--ink);}
  .tref-v{display:flex;align-items:center;gap:var(--sp-2);font-family:var(--font-mono);font-size:var(--fs-h9);color:var(--muted);min-width:0;}
  .tref-v .tref-sw{width:18px;height:18px;border-radius:var(--r-sm);border:1px solid var(--line-strong);flex:0 0 auto;}
  @media(max-width:720px){.tok-row,.tok-row.l2,.tok-row.resp,.tok-row.typo,.tok-row.ls2,.tok-modehead,.tok-modehead.resp,.tok-modehead.typo,.tok-modehead.ls2,.tref-row{grid-template-columns:1fr;}.tok-modehead{display:none;}.tok-cardgrid{grid-template-columns:1fr;}}

  /* ===== extra semantic tokens（→ 接 Batch1 feedback token，light/dark 自動跟隨）===== */
  :root{--ok:var(--s-feedback-success);--ok-tint:var(--s-feedback-success-tint);--warn:var(--s-feedback-warning);}

  /* ===== input ===== */
  .field{display:inline-flex;align-items:center;gap:var(--sp-3);height:36px;padding:0 var(--sp-3);border-radius:var(--r-sm);
    border:0.75px solid var(--i-sec-edge);background:var(--panel);color:var(--ink);font-size:var(--fs-h8);min-width:220px;
    font-family:var(--font-sans);transition:border-color .13s,box-shadow .13s,background .13s;}
  .field .ph{color:var(--faint);flex:1;} .field .val{color:var(--ink);flex:1;}
  .field svg{width:17px;height:17px;color:var(--muted);flex:0 0 auto;}
  .field .fieldclear{display:inline-flex;cursor:pointer;flex:0 0 auto;}
  .field .fieldclear svg{color:var(--faint);}
  .field .fieldclear:hover svg{color:var(--muted);}
  .field.v-filled{background:var(--panel-2);border-color:transparent;}
  .field.st-hover{border-color:var(--muted);}                       /* outline hover：換邊框色 */
  .field.v-filled.st-hover{background:var(--panel-3);border-color:transparent;} /* filled hover：加深底色、不加框 */
  .field.st-focus{border-color:var(--accent);}
  .field.st-disabled{opacity:.5;cursor:not-allowed;}
  .field.st-error{border-color:var(--i-danger);}                    /* error：只描紅框、無外陰影 */
  /* 真實互動 hover（live 欄位）*/
  input.field{outline:none;}
  input.field:hover:not(:focus){border-color:var(--muted);}
  input.field.v-filled:hover:not(:focus){background:var(--panel-3);border-color:transparent;}
  input.field:focus{border-color:var(--accent);}
  .fieldwrap{display:flex;flex-direction:column;gap:var(--sp-2);min-width:240px;}
  .fieldwrap .fl{font-size:var(--fs-h9);color:var(--muted);font-weight:600;}
  .fieldwrap .fl .req{color:var(--i-danger);margin-left:1px;}
  .fieldwrap .fh{font-size:var(--fs-h10);color:var(--faint);} .fieldwrap .fh.err{color:var(--i-danger);}

  /* ===== textarea 多行輸入 ===== */
  .tarea{display:flex;align-items:flex-start;min-height:80px;padding:var(--sp-3);border-radius:var(--r-sm);border:0.75px solid var(--i-sec-edge);
    background:var(--panel);color:var(--ink);font-size:var(--fs-h8);min-width:260px;font-family:var(--font-sans);line-height:1.5;transition:border-color .13s,background .13s;}
  .tarea .ph{color:var(--faint);} .tarea .val{color:var(--ink);}
  .tarea.v-filled{background:var(--panel-2);border-color:transparent;}
  .tarea.st-hover{border-color:var(--muted);} .tarea.v-filled.st-hover{background:var(--panel-3);border-color:transparent;}
  .tarea.st-focus{border-color:var(--accent);}
  .tarea.st-disabled{opacity:.5;} .tarea.st-error{border-color:var(--i-danger);}
  textarea.tarea{outline:none;resize:vertical;width:100%;color:var(--ink);}
  textarea.tarea::placeholder{color:var(--faint);}
  textarea.tarea:hover:not(:focus){border-color:var(--muted);}
  textarea.tarea.v-filled:hover:not(:focus){background:var(--panel-3);border-color:transparent;}
  textarea.tarea:focus{border-color:var(--accent);}

  /* ===== file 檔案上傳 ===== */
  .filefield{display:inline-flex;align-items:center;gap:var(--sp-3);padding:0 var(--sp-3);height:36px;border-radius:var(--r-sm);
    border:0.75px solid var(--i-sec-edge);background:var(--panel);min-width:260px;font-size:var(--fs-h9);color:var(--muted);transition:.13s;}
  .filefield.has-file{color:var(--ink);}
  /* file variant：外框／實色 對齊 input（外框＝白底實線、實色＝panel-2 填色）*/
  .filefield.v-solid{background:var(--panel-2);border-color:transparent;color:var(--ink);}
  .filefield.v-solid.st-hover{background:var(--panel-3);border-color:transparent;}
  .live-stage .filefield.v-solid:not(.st-disabled):hover{background:var(--panel-3);border-color:transparent;}
  .filefield.st-hover{border-color:var(--accent);color:var(--ink);}
  .filefield.st-focus{border-color:var(--accent);}
  .filefield.st-disabled{opacity:.5;}
  .filefield.st-error{border-color:var(--i-danger);}
  .filefield .fname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .filefield svg{width:16px;height:16px;flex:0 0 auto;color:var(--muted);}
  .filebtn{display:inline-flex;align-items:center;gap:var(--sp-2);height:28px;padding:0 var(--sp-4);border-radius:var(--r-sm);
    background:var(--i-sec-fill);color:var(--i-sec-on);font-size:var(--fs-h9);font-weight:600;border:none;cursor:pointer;flex:0 0 auto;}
  .filebtn svg{color:var(--i-sec-on);}
  .filefield .fieldclear{display:inline-flex;cursor:pointer;flex:0 0 auto;}
  .filefield .fieldclear svg{color:var(--faint);}
  .filefield .fieldclear:hover svg{color:var(--muted);}
  /* file live 真實 hover（只作用在 Live 預覽，不影響狀態列）*/
  .live-stage .filefield:not(.st-disabled):hover{border-color:var(--accent);color:var(--ink);}
  .live-stage .filefield:not(.st-disabled) .filebtn:hover{background:var(--i-sec-fill-h);}

  /* ===== dropdown 下拉 ===== */
  .field.dd{cursor:pointer;}
  .field.st-open{border-color:var(--accent);}
  .field.v-filled.st-open{border-color:var(--accent);background:var(--panel-2);}
  .ddcaret{display:inline-flex;color:var(--muted);flex:0 0 auto;transition:transform .15s;}
  .ddcaret.up{transform:rotate(180deg);}
  .ddwrap{position:relative;display:inline-block;min-width:260px;}
  .ddmenu{position:absolute;left:0;right:0;top:calc(100% + 6px);z-index:20;background:var(--panel);border:1px solid var(--line-strong);
    border-radius:var(--r-sm);box-shadow:0 10px 30px rgba(0,0,0,.16);padding:var(--sp-1);max-height:240px;overflow-y:auto;}
  .ddopt{display:flex;align-items:center;gap:var(--sp-3);padding:var(--sp-3) var(--sp-4);border-radius:var(--r-sm);font-size:var(--fs-h9);color:var(--ink);cursor:pointer;}
  .ddopt:hover{background:var(--i-primary-tint);color:var(--accent);}
  .ddopt.sel{color:var(--accent);font-weight:600;}
  .ddsearch{width:100%;box-sizing:border-box;height:34px;padding:0 var(--sp-3);margin-bottom:var(--sp-1);border:1px solid var(--i-sec-edge);
    border-radius:var(--r-sm);background:var(--panel-2);color:var(--ink);font-size:var(--fs-h9);outline:none;}
  .ddsearch:focus{border-color:var(--accent);}
  /* 多選 dropdown：trigger 內 chip + 選項勾選框 */
  .dd-body{flex:1;display:flex;flex-wrap:wrap;gap:var(--sp-1);align-items:center;min-width:0;}
  .field.dd.multi{height:auto;min-height:36px;padding-top:var(--sp-1);padding-bottom:var(--sp-1);}
  .ddchip{display:inline-flex;align-items:center;gap:var(--sp-1);height:22px;padding:0 var(--sp-1) 0 var(--sp-3);border-radius:var(--r-sm);
    background:var(--i-primary-tint);color:var(--accent);font-size:var(--fs-h9);font-weight:600;}
  .ddchip .x{display:inline-flex;cursor:pointer;opacity:.7;} .ddchip .x:hover{opacity:1;} .ddchip svg{width:12px;height:12px;}
  .ddcheck{width:16px;height:16px;border:1.5px solid var(--i-sec-edge);border-radius:var(--r-sm);display:inline-flex;
    align-items:center;justify-content:center;color:#fff;flex:0 0 auto;}
  .ddopt.on .ddcheck{background:var(--accent);border-color:var(--accent);}
  .ddcheck svg{width:12px;height:12px;}

  /* ===== checkbox / radio ===== */
  .cbx{border:1.5px solid var(--i-sec-edge);background:var(--panel);border-radius:var(--r-sm);display:inline-flex;box-sizing:border-box;padding:0;flex:0 0 auto;
    align-items:center;justify-content:center;color:var(--primary-on);transition:.12s;cursor:pointer;} /* 打勾色＝primary-on：淺色黑底白勾、深色亮底深勾，隨主題翻轉 */
  .cbx svg{width:14px;height:14px;flex:0 0 auto;}
  .cbx.sz-s{width:16px;height:16px;border-radius:var(--r-sm);} .cbx.sz-m{width:20px;height:20px;} .cbx.sz-l{width:24px;height:24px;border-radius:var(--r-sm);}
  .cbx.sz-s svg{width:11px;height:11px;} .cbx.sz-l svg{width:16px;height:16px;}
  .cbx.st-hover{border-color:var(--accent);}
  .cbx.st-checked,.cbx.st-indeterminate{background:var(--accent);border-color:var(--accent);}
  .cbx.st-focus{border-color:var(--accent);}
  .cbx.st-disabled{opacity:.45;cursor:not-allowed;}
  .cbx .dash{width:60%;height:2px;background:var(--primary-on);border-radius:2px;}
  .rdo{border:1.5px solid var(--i-sec-edge);background:var(--panel);border-radius:var(--r-pill);display:inline-flex;box-sizing:border-box;padding:0;flex:0 0 auto;
    align-items:center;justify-content:center;transition:.12s;cursor:pointer;}
  .rdo.sz-s{width:16px;height:16px;} .rdo.sz-m{width:20px;height:20px;} .rdo.sz-l{width:24px;height:24px;}
  .rdo .dot{width:0;height:0;border-radius:var(--r-pill);background:var(--accent);transition:.12s;}
  .rdo.st-hover{border-color:var(--accent);}
  .rdo.st-checked{border-color:var(--accent);} .rdo.st-checked .dot{width:50%;height:50%;}
  .rdo.st-focus{border-color:var(--accent);}
  .rdo.st-disabled{opacity:.45;cursor:not-allowed;}
  .optrow{display:inline-flex;align-items:center;gap:var(--sp-3);cursor:pointer;} .optrow .oplab{font-size:var(--fs-h9);color:var(--ink);}

  /* ===== tag ===== */
  .tg{display:inline-flex;align-items:center;gap:var(--sp-1);height:22px;padding:0 var(--sp-3);border-radius:var(--r-pill);font-size:var(--fs-h10);
    font-weight:600;border:0.75px solid transparent;font-family:var(--font-sans);cursor:default;transition:.12s;white-space:nowrap;}
  .tg.c-round{border-radius:var(--r-pill);} .tg.c-rect{border-radius:var(--r-sm);}
  .tg.i-brand{--tfill:var(--accent);--tc:var(--accent);--tedge:var(--accent);--ton:var(--primary-on);--ttint:var(--i-primary-tint);--ttint2:var(--i-primary-tint2);}
  .tg.i-neutral{--tfill:var(--i-sec-fill);--tc:var(--i-sec-fg);--tedge:var(--i-sec-edge);--ton:var(--i-sec-on);--ttint:var(--i-sec-tint);--ttint2:var(--i-sec-tint2);}
  .tg.i-danger{--tfill:var(--i-danger);--tc:var(--i-danger);--tedge:var(--i-danger);--ton:var(--danger-on);--ttint:var(--i-danger-tint);--ttint2:var(--i-danger-tint2);}
  .tg.v-solid{background:var(--tfill);color:var(--ton);border-color:var(--tfill);}
  .tg.v-outline{background:transparent;color:var(--tc);border-color:var(--tedge);}
  .tg.v-soft{background:var(--ttint);color:var(--tc);border-color:transparent;}
  .tg.st-hover.v-solid{filter:brightness(.94);}
  .tg.st-hover.v-outline,.tg.st-hover.v-soft{background:var(--ttint2);}
  .tg.st-disabled{opacity:.45;}
  .tg .x{display:inline-flex;cursor:pointer;opacity:.7;margin-right:-3px;} .tg .x:hover{opacity:1;}
  .tg svg{width:12px;height:12px;}

  /* ===== tab ===== */
  .tabbar{display:inline-flex;align-items:stretch;gap:2px;}
  .tabbar.v-line{gap:0;border-bottom:1px solid var(--line);}
  .tabbar.v-contained{gap:var(--sp-2);} .tabbar.v-pill{gap:var(--sp-1);background:var(--panel-2);padding:var(--sp-1);border-radius:var(--r-pill);}
  .tabi{display:inline-flex;align-items:center;gap:var(--sp-2);height:38px;padding:0 var(--sp-5);font-size:var(--fs-h9);font-weight:600;
    color:var(--muted);cursor:pointer;border:1px solid transparent;background:transparent;font-family:var(--font-sans);transition:.12s;white-space:nowrap;}
  .v-line .tabi{border-radius:0;margin-bottom:-1px;box-shadow:inset 0 -2px 0 transparent;}
  .v-line .tabi.st-hover{color:var(--ink);}
  .v-line .tabi.st-active{color:var(--accent);box-shadow:inset 0 -2px 0 var(--accent);}
  .v-contained .tabi{border:1px solid var(--line);border-radius:var(--r-pill);} /* 容器 variant：全圓角 */
  .v-contained .tabi.st-hover{background:var(--panel-2);color:var(--ink);}
  .v-contained .tabi.st-active{background:var(--accent);color:var(--primary-on);border-color:var(--accent);}
  .v-pill .tabi{border-radius:var(--r-pill);}
  .v-pill .tabi.st-hover{color:var(--ink);}
  .v-pill .tabi.st-active{background:var(--panel);color:var(--accent);box-shadow:0 1px 2px rgba(0,0,0,.08);}
  .tabi.st-disabled{opacity:.4;cursor:not-allowed;}
  /* size：sz-m 為標準（base 值），sz-s 較小 */
  .tabi.sz-s{height:30px;padding:0 var(--sp-4);font-size:var(--fs-h9);gap:var(--sp-1);}
  /* tab-item 內容零件：leading icon／count badge */
  .tabi .ticon{display:inline-flex;flex:0 0 auto;}
  .tabi .ticon svg{width:16px;height:16px;}
  .tabi.sz-s .ticon svg{width:14px;height:14px;}
  .tabi .tcount{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 var(--sp-1);border-radius:var(--r-pill);
    background:var(--panel-2);color:var(--muted);font-size:11px;font-weight:600;font-family:var(--font-mono);box-sizing:border-box;}
  .tabi.sz-s .tcount{min-width:16px;height:16px;padding:0 var(--sp-1);font-size:var(--fs-h10);}
  .tabi.st-active .tcount{background:var(--i-primary-tint);color:var(--accent);}
  .v-contained .tabi.st-active .tcount{background:color-mix(in srgb,var(--primary-on) 24%,transparent);color:var(--primary-on);}

  /* ===== toggle 開關（tab 家族 atom）===== */
  .switchrow{display:inline-flex;align-items:center;gap:11px;}
  .switch{position:relative;width:44px;height:24px;border-radius:999px;background:var(--line-strong);cursor:pointer;
    transition:background .18s;flex:0 0 auto;box-sizing:border-box;border:none;padding:0;}
  .switch::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:999px;background:#fff;
    box-shadow:0 1px 2px rgba(0,0,0,.28);transition:transform .2s;}
  .switch.on{background:var(--accent);}
  .switch.on::after{transform:translateX(20px);}
  .switch.st-disabled{opacity:.4;cursor:not-allowed;}
  .switch-label{font-size:13.5px;color:var(--ink);font-weight:500;}

  /* ===== live 真實 hover（只作用在互動 demo，不影響 matrix 靜態格）===== */
  .optrow:hover .cbx:not(.st-disabled){border-color:var(--accent);}
  .optrow:hover .rdo:not(.st-disabled){border-color:var(--accent);}
  .row-demo .tg.v-solid:hover{filter:brightness(.94);}
  .row-demo .tg.v-outline:hover,.row-demo .tg.v-soft:hover{background:var(--ttint2);}
  .row-demo .v-line .tabi:hover:not(.st-active){color:var(--ink);}
  .row-demo .v-contained .tabi:hover:not(.st-active){background:var(--panel-2);color:var(--ink);}
  .row-demo .v-pill .tabi:hover:not(.st-active){color:var(--ink);}

  /* ===== 變數篩選器 collapsible card ===== */
  .dcard{margin:0 0 26px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;}
  .dcard-head{width:100%;display:flex;align-items:center;gap:12px;padding:15px 20px;background:var(--panel-2);
    border:none;border-bottom:1px solid var(--line);cursor:pointer;font-family:var(--font-sans);text-align:left;color:var(--ink);transition:.13s;}
  .dcard.collapsed .dcard-head{border-bottom-color:transparent;}
  .dcard-head:hover{background:var(--panel-3);}
  .dcard-head .dh-title{font-size:14px;font-weight:600;}
  .dcard-head .dh-count{font-family:var(--font-mono);font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums;}
  .dcard-head .dh-count b{color:var(--accent);}
  .dcard-head .dh-chevron{margin-left:auto;color:var(--faint);transition:transform .18s;display:inline-flex;}
  .dcard-head .dh-chevron svg{width:16px;height:16px;display:block;}
  .dcard.collapsed .dh-chevron{transform:rotate(-90deg);}
  .dcard-body{padding:20px;}
  .dcard.collapsed .dcard-body{display:none;}
  .dcard-body .hint{color:var(--muted);font-size:13px;margin:0 0 16px;}

  footer{margin-top:var(--sp-8);padding-top:var(--sp-5);border-top:1px solid var(--line);color:var(--faint);font-size:var(--fs-h9);display:flex;justify-content:space-between;gap:var(--sp-4);flex-wrap:wrap;font-family:var(--font-mono);}
  .site-footer{justify-content:center;text-align:center;margin-top:var(--sp-7);padding:var(--sp-5) 0 6px;letter-spacing:.02em;}

  .scrim{display:none;}
  /* 平板 / 手機：側邊欄改抽屜式覆蓋，漢堡控制收合 */
  @media (max-width:900px){
    .hamb{display:inline-flex;}
    .layout{grid-template-columns:1fr;background:none;} /* 抽屜模式關掉左欄漸層 */
    .sidebar-resize{display:none;} /* 行動抽屜模式不提供拖曳調寬 */
    .sidebar{position:fixed;top:58px;left:0;bottom:0;height:auto;width:min(84vw,300px);z-index:40;
      transform:translateX(-100%);transition:transform .22s ease;border-right:1px solid var(--line-strong);}
    .shell.nav-open .sidebar{transform:translateX(0);}
    .shell.nav-open .scrim{display:block;position:fixed;inset:58px 0 0 0;background:rgba(0,0,0,.42);z-index:35;}
    .main{padding:26px 18px 80px;}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none !important;}}

  /* ===== 回饋+載入批次（alert/tooltip/notification/skeleton/loader）2026-07-14 平行產出 ===== */
/* ===== Tooltip 提示（前綴 tt-）===== */
/* solid 提示泡泡：深底白字，用 --ink/--canvas 反相 → 深淺色自動可讀，不需 feedback hex。
   TODO: 待接 semantic.*.tooltip.surface / .text token 後改綁 token */
.tt-tip{position:relative;display:inline-block;max-width:220px;background:var(--ink);color:var(--canvas);
  font-family:var(--font-sans);line-height:1.45;border-radius:var(--r-sm);
  box-shadow:0 4px 14px rgba(0,0,0,.20);word-break:break-word;}
.tt-tip.tt-sz-s{font-size:var(--fs-h10);padding:var(--sp-1) var(--sp-3);border-radius:var(--r-sm);letter-spacing:.01em;}
.tt-tip.tt-sz-m{font-size:var(--fs-h9);padding:var(--sp-3) var(--sp-4);}
/* 箭頭：同色小方塊旋轉 45°，依 placement 指向 trigger（tooltip 在該側，箭頭朝反向刺出）*/
.tt-tip.tt-arrow::after{content:"";position:absolute;width:9px;height:9px;background:var(--ink);border-radius:1px;}
.tt-tip.tt-arrow.tt-p-top::after{bottom:-4px;left:50%;transform:translateX(-50%) rotate(45deg);}
.tt-tip.tt-arrow.tt-p-bottom::after{top:-4px;left:50%;transform:translateX(-50%) rotate(45deg);}
.tt-tip.tt-arrow.tt-p-left::after{right:-4px;top:50%;transform:translateY(-50%) rotate(45deg);}
.tt-tip.tt-arrow.tt-p-right::after{left:-4px;top:50%;transform:translateY(-50%) rotate(45deg);}
/* ---- Live：可 hover 的 trigger ---- */
.tt-live-box{display:flex;align-items:center;justify-content:center;min-height:130px;padding:44px;}
.tt-trigwrap{position:relative;display:inline-flex;}
.tt-trig{display:inline-flex;align-items:center;gap:var(--sp-2);padding:var(--sp-2) var(--sp-4);
  background:var(--i-sec-fill);color:var(--i-sec-on);border:1px solid var(--i-sec-edge);
  border-radius:var(--r-sm);font-family:var(--font-sans);font-size:var(--fs-h9);cursor:default;transition:background .14s;}
.tt-trig:hover{background:var(--i-sec-tint);}
.tt-trig svg{width:15px;height:15px;flex:0 0 auto;}
/* 浮出定位：預設隱藏，hover trigger 才顯示；nowrap 讓單行浮出 */
.tt-tip.tt-float{position:absolute;opacity:0;pointer-events:none;white-space:nowrap;max-width:260px;
  z-index:5;transition:opacity .15s ease, transform .15s ease;}
.tt-tip.tt-fp-top{bottom:calc(100% + 9px);left:50%;transform:translateX(-50%) translateY(4px);}
.tt-tip.tt-fp-bottom{top:calc(100% + 9px);left:50%;transform:translateX(-50%) translateY(-4px);}
.tt-tip.tt-fp-left{right:calc(100% + 9px);top:50%;transform:translateY(-50%) translateX(4px);}
.tt-tip.tt-fp-right{left:calc(100% + 9px);top:50%;transform:translateY(-50%) translateX(-4px);}
.tt-trigwrap:hover .tt-tip.tt-fp-top{opacity:1;transform:translateX(-50%) translateY(0);}
.tt-trigwrap:hover .tt-tip.tt-fp-bottom{opacity:1;transform:translateX(-50%) translateY(0);}
.tt-trigwrap:hover .tt-tip.tt-fp-left{opacity:1;transform:translateY(-50%) translateX(0);}
.tt-trigwrap:hover .tt-tip.tt-fp-right{opacity:1;transform:translateY(-50%) translateX(0);}
/* ===== Notification 通知 / Toast（前綴 nt-）===== */
/* TODO: 待接 semantic.*.feedback token；下列 success/warning/info 為固定 hex（框架尚未給回饋色 token），
   已挑選在深淺色兩模式皆可讀的色階。error/info 也用固定 hex 以確保 self-contained。*/
.nt-i-success{--nt-c:#2E9E6B;--nt-solid:#278A5C;--nt-soft:rgba(46,158,107,.13);--nt-soft-edge:rgba(46,158,107,.34);}
.nt-i-warning{--nt-c:#D9930B;--nt-solid:#B9770C;--nt-soft:rgba(217,147,11,.15);--nt-soft-edge:rgba(217,147,11,.36);}
.nt-i-error{--nt-c:#E5484D;--nt-solid:#D93A3F;--nt-soft:rgba(229,72,77,.13);--nt-soft-edge:rgba(229,72,77,.34);}
.nt-i-info{--nt-c:#3B82F6;--nt-solid:#2E6FE0;--nt-soft:rgba(59,130,246,.13);--nt-soft-edge:rgba(59,130,246,.34);}

.nt-toast{position:relative;display:flex;gap:var(--sp-3);align-items:flex-start;min-width:220px;max-width:360px;
  padding:var(--sp-4) var(--sp-4);border-radius:var(--radius);box-shadow:0 6px 20px rgba(0,0,0,.10);
  font-family:var(--font-sans);box-sizing:border-box;}
.nt-ico{flex:0 0 auto;display:inline-flex;width:20px;height:20px;margin-top:1px;color:var(--nt-c);}
.nt-ico svg{width:20px;height:20px;display:block;}
.nt-body{flex:1 1 auto;min-width:0;}
.nt-title{font-size:var(--fs-h8);font-weight:600;line-height:1.3;color:var(--ink);}
.nt-msg{font-size:var(--fs-h9);line-height:1.45;color:var(--muted);margin-top:2px;word-break:break-word;}
.nt-action{margin-top:var(--sp-3);display:inline-flex;align-items:center;height:26px;padding:0 var(--sp-4);
  font-size:var(--fs-h9);font-weight:600;border-radius:var(--r-sm);background:transparent;
  border:1px solid var(--line-strong);color:var(--nt-c);cursor:pointer;font-family:inherit;}
.nt-action:hover{background:var(--nt-soft);}
.nt-close{flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;
  margin:-2px -4px 0 0;padding:0;border:0;background:transparent;color:var(--muted);cursor:pointer;border-radius:var(--r-sm);}
.nt-close svg{width:15px;height:15px;display:block;}
.nt-close:hover{background:rgba(125,125,125,.16);color:var(--ink);}

/* variant：solid 填色白字 / outline 描邊 / soft 柔色底 */
.nt-v-solid{background:var(--nt-solid);border:1px solid transparent;}
.nt-v-solid .nt-title{color:#fff;}
.nt-v-solid .nt-msg{color:rgba(255,255,255,.86);}
.nt-v-solid .nt-ico{color:#fff;}
.nt-v-solid .nt-close{color:rgba(255,255,255,.82);}
.nt-v-solid .nt-close:hover{background:rgba(255,255,255,.18);color:#fff;}
.nt-v-solid .nt-action{color:#fff;border-color:rgba(255,255,255,.5);}
.nt-v-solid .nt-action:hover{background:rgba(255,255,255,.14);}
.nt-v-outline{background:var(--panel);border:1px solid var(--nt-c);}
.nt-v-soft{background:var(--nt-soft);border:1px solid var(--nt-soft-edge);}
/* dark：半透明黑（frosted），白字、icon 保留 intent 語意色 */
.nt-v-dark{background:rgba(22,24,30,.82);border:1px solid rgba(255,255,255,.10);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);}
.nt-v-dark .nt-title{color:#fff;}
.nt-v-dark .nt-msg{color:rgba(255,255,255,.72);}
.nt-v-dark .nt-ico{color:var(--nt-c);}
.nt-v-dark .nt-close{color:rgba(255,255,255,.72);}
.nt-v-dark .nt-close:hover{background:rgba(255,255,255,.16);color:#fff;}
.nt-v-dark .nt-action{color:#fff;border-color:rgba(255,255,255,.34);}
.nt-v-dark .nt-action:hover{background:rgba(255,255,255,.12);}


/* Position 示意：小螢幕 + mini toast 停靠 */
.nt-screen{position:relative;width:200px;height:130px;border:1px solid var(--line-strong);
  border-radius:var(--r-sm);background:var(--panel-2);overflow:hidden;}
.nt-mini{position:absolute;display:inline-flex;align-items:center;gap:var(--sp-2);height:24px;min-width:92px;
  padding:0 var(--sp-3);background:var(--panel);border:1px solid var(--line-strong);border-radius:var(--r-sm);
  box-shadow:0 3px 10px rgba(0,0,0,.12);}
.nt-mini .nt-dot{width:8px;height:8px;border-radius:50%;background:var(--nt-c);flex:0 0 auto;}
.nt-mini .nt-mline{height:5px;width:46px;border-radius:var(--r-xs);background:var(--line-strong);flex:0 0 auto;}
.nt-pos-tr{top:10px;right:10px;}
.nt-pos-br{bottom:10px;right:10px;}
.nt-pos-bc{bottom:10px;left:50%;transform:translateX(-50%);}
/* Rect Toast 方形（置中：圓 icon badge 在上、文字在下，對齊 Figma toast/rect_*）*/
.nt-rect{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;gap:var(--sp-3);
  width:124px;height:124px;padding:var(--sp-5);box-sizing:border-box;text-align:center;background:var(--panel);border-radius:var(--r-sm);
  box-shadow:0 8px 16px rgba(0,0,0,.18),0 16px 32px rgba(0,0,0,.06);}
.nt-rect .nt-rect-badge{width:32px;height:32px;border-radius:50%;background:var(--nt-c);flex:0 0 auto;
  display:inline-flex;align-items:center;justify-content:center;color:#fff;}
.nt-rect .nt-rect-badge svg{width:18px;height:18px;display:block;}
.nt-rect .nt-rect-txt{font-size:var(--fs-h8);line-height:1.5;font-weight:600;letter-spacing:.01em;color:var(--ink);word-break:break-word;}
.nt-rect-stage{min-height:150px;display:flex;align-items:center;justify-content:center;
  border:1px dashed var(--line-strong);border-radius:var(--r-sm);background:var(--panel-2);}
/* ===== Skeleton 骨架（前綴 sk-）===== */
/* 骨架佔位色走中性 token：--panel-3 疊在 --panel 之上，深淺色自動切換 */
.sk{position:relative;overflow:hidden;background:var(--panel-3);display:inline-block;vertical-align:middle;
  /* shimmer 掃過的光澤色：淺色模式用高透白、深色模式用低透白 */
  --sk-sheen:rgba(255,255,255,.55);}
@media (prefers-color-scheme:dark){.sk{--sk-sheen:rgba(255,255,255,.09);}}
:root[data-theme="dark"] .sk{--sk-sheen:rgba(255,255,255,.09);}
:root[data-theme="light"] .sk{--sk-sheen:rgba(255,255,255,.55);}

/* shape：文字列（圓角細條）／矩形（中圓角）／圓形（正圓） */
.sk-text{border-radius:var(--r-sm);width:112px;max-width:100%;}
.sk-text.sk-sz-s{height:8px;}
.sk-text.sk-sz-m{height:12px;}
.sk-text.sk-sz-l{height:16px;}
.sk-rectangle{border-radius:var(--r-sm);}
.sk-rectangle.sk-sz-s{width:56px;height:34px;}
.sk-rectangle.sk-sz-m{width:84px;height:52px;}
.sk-rectangle.sk-sz-l{width:112px;height:72px;}
.sk-circle{border-radius:var(--r-pill);flex:0 0 auto;}
.sk-circle.sk-sz-s{width:24px;height:24px;}
.sk-circle.sk-sz-m{width:40px;height:40px;}
.sk-circle.sk-sz-l{width:56px;height:56px;}

/* 動畫 feature flag：shimmer 光澤掃過（linear-gradient 平移）*/
.sk-a-shimmer::after{content:"";position:absolute;inset:0;transform:translateX(-100%);
  background:linear-gradient(90deg,transparent 0%,var(--sk-sheen) 50%,transparent 100%);
  animation:sk-shimmer 1.5s ease-in-out infinite;}
/* 動畫 feature flag：pulse 脈衝（整體 opacity 呼吸，低能耗）*/
.sk-a-pulse{animation:sk-pulse 1.6s ease-in-out infinite;}
/* sk-a-none：靜態，不掛任何動畫 */

@keyframes sk-shimmer{100%{transform:translateX(100%);}}
@keyframes sk-pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

/* 尊重使用者「減少動態」偏好：一律停動畫、隱藏 shimmer 遮罩 */
@media (prefers-reduced-motion:reduce){
  .sk-a-shimmer::after{animation:none;display:none;}
  .sk-a-pulse{animation:none;}
}

/* ===== 組合範例容器（頭像卡／段落／媒體卡）===== */
.sk-card{display:flex;align-items:center;gap:var(--sp-4);padding:var(--sp-5);
  border:1px solid var(--line);border-radius:var(--radius);background:var(--panel);min-width:220px;}
.sk-lines{display:flex;flex-direction:column;gap:var(--sp-3);flex:1 1 auto;min-width:0;}
.sk-lines .sk-text:first-child{width:70%;}
.sk-lines .sk-text:last-child{width:46%;}
.sk-para{display:flex;flex-direction:column;gap:var(--sp-3);padding:var(--sp-5);
  border:1px solid var(--line);border-radius:var(--radius);background:var(--panel);min-width:220px;}
.sk-para .sk-text{width:100%;}
.sk-para .sk-text:last-child{width:58%;}
.sk-media{display:flex;flex-direction:column;gap:var(--sp-3);padding:var(--sp-5);
  border:1px solid var(--line);border-radius:var(--radius);background:var(--panel);min-width:200px;}
.sk-media .sk-rectangle{width:100%;}
.sk-media .sk-text:first-of-type{width:80%;}
.sk-media .sk-text:last-child{width:55%;}
/* ===== Loader 載入器（前綴 ld-）===== */
/* NOTE: loader 只用 neutral / primary，兩者都有 token；本頁不需 feedback 色。
   TODO: 若日後 loader 要吃 success/warning/info，需先接 semantic.*.feedback token，勿寫死 hex。 */
.ld-wrap{display:inline-flex;align-items:center;gap:var(--sp-3);}
.ld-wrap.ld-inline{gap:var(--sp-2);vertical-align:middle;}
.ld-label{font:500 13px/1.2 var(--font-sans);color:var(--muted);white-space:nowrap;}
.ld-pct{font:600 12px/1 var(--font-mono);color:var(--muted);min-width:34px;text-align:right;}

/* circular：border + 旋轉 */
.ld-circ{box-sizing:border-box;border-radius:50%;border-style:solid;flex:0 0 auto;animation:ld-spin .7s linear infinite;}
.ld-circ.ld-sz-s{width:16px;height:16px;border-width:2px;}
.ld-circ.ld-sz-m{width:24px;height:24px;border-width:3px;}
.ld-circ.ld-sz-l{width:36px;height:36px;border-width:4px;}
.ld-circ.ld-neutral{border-color:var(--line-strong);border-top-color:var(--muted);}
.ld-circ.ld-primary{border-color:var(--i-primary-tint2);border-top-color:var(--i-primary);}

/* dots：三顆 scale 交錯跳動 */
.ld-dots{display:inline-flex;align-items:center;flex:0 0 auto;}
.ld-dots.ld-sz-s{gap:var(--sp-1);}
.ld-dots.ld-sz-m{gap:var(--sp-1);}
.ld-dots.ld-sz-l{gap:var(--sp-2);}
.ld-dot{border-radius:50%;animation:ld-bounce 1.2s ease-in-out infinite;}
.ld-dots.ld-sz-s .ld-dot{width:5px;height:5px;}
.ld-dots.ld-sz-m .ld-dot{width:7px;height:7px;}
.ld-dots.ld-sz-l .ld-dot{width:10px;height:10px;}
.ld-dots.ld-neutral .ld-dot{background:var(--muted);}
.ld-dots.ld-primary .ld-dot{background:var(--i-primary);}
.ld-dot:nth-child(2){animation-delay:.16s;}
.ld-dot:nth-child(3){animation-delay:.32s;}

/* bar：底槽 + 內條（不定量左右滑 / 定量寬度）*/
.ld-bar{position:relative;overflow:hidden;border-radius:var(--r-pill);background:var(--panel-3);flex:0 0 auto;}
.ld-bar.ld-sz-s{width:80px;height:4px;}
.ld-bar.ld-sz-m{width:120px;height:6px;}
.ld-bar.ld-sz-l{width:168px;height:8px;}
.ld-bar-fill{position:absolute;top:0;bottom:0;left:0;border-radius:var(--r-pill);transition:width .25s ease;}
.ld-bar.ld-neutral .ld-bar-fill{background:var(--muted);}
.ld-bar.ld-primary .ld-bar-fill{background:var(--i-primary);}
.ld-bar-fill.ld-indet{width:40%;transition:none;animation:ld-bar 1.15s ease-in-out infinite;}

/* full-screen 遮罩示意（容器模擬）*/
.ld-screen{position:relative;width:100%;min-width:220px;height:150px;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:var(--panel-2);}
.ld-screen-sk{padding:var(--sp-4);display:flex;flex-direction:column;gap:var(--sp-3);}
.ld-screen-sk i{display:block;height:10px;border-radius:var(--r-sm);background:var(--panel-3);}
.ld-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:var(--sp-4);background:color-mix(in srgb,var(--canvas) 72%,transparent);backdrop-filter:blur(1.5px);}

@keyframes ld-spin{to{transform:rotate(360deg);}}
@keyframes ld-bounce{0%,80%,100%{transform:scale(.45);opacity:.45;}40%{transform:scale(1);opacity:1;}}
@keyframes ld-bar{0%{left:-40%;}100%{left:100%;}}
