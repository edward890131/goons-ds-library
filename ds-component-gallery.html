  /* ===== Table&Chart group: chart ===== */
/* ==================== CHART 圖表（cht-）==================== */
/* 儀表板圖表：stat 統計數字卡（重用 prMetricEl 原子）＋ line 折線／bar 長條／donut 甜甜圈（inline SVG 手刻）。
   系列色一律綁 token：--accent 主／--ok 成功／--warn 警告／--i-danger 危險；格線 --line、軸線 --line-strong。 */

/* --- 基礎容器 --- */
.cht-box{display:inline-flex;flex-direction:column;align-items:flex-start;gap:var(--sp-3);font-family:var(--font-sans);color:var(--ink);max-width:100%;}
.cht-box svg{display:block;overflow:visible;max-width:100%;}
.cht-box svg text{font-family:var(--font-sans);}

/* --- 尺寸：m 標準／s 精簡（SVG 用 viewBox 等比縮放，只控顯示寬；2026-07-16 加寬） --- */
.cht-line.cht-sz-m svg,.cht-curve.cht-sz-m svg,.cht-bar.cht-sz-m svg{width:300px;height:auto;}
.cht-line.cht-sz-s svg,.cht-curve.cht-sz-s svg,.cht-bar.cht-sz-s svg{width:170px;height:auto;}
.cht-box.cht-wide.cht-sz-m svg{width:380px;}          /* Live／dashboard 加寬版 */
.cht-box.cht-wide.cht-sz-s svg{width:210px;}
.cht-donut.cht-sz-m svg{width:120px;height:auto;}
.cht-donut.cht-sz-s svg{width:80px;height:auto;}

/* --- 互動繪圖區＋hover tooltip（folded 端點只在 hover 出現） --- */
.cht-plot{position:relative;display:inline-block;max-width:100%;}
.cht-plot svg{display:block;}
.cht-guide{stroke:var(--line-strong);stroke-width:1;stroke-dasharray:3 3;pointer-events:none;}
.cht-hdot{fill:var(--accent);stroke:var(--panel);stroke-width:1.6;pointer-events:none;}
.cht-seg{cursor:default;}
.cht-bhl{fill:var(--accent);pointer-events:none;}
.cht-axis{font-size:8px;fill:var(--muted);font-variant-numeric:tabular-nums;}
.cht-tip{position:absolute;transform:translate(-50%,calc(-100% - 9px));background:var(--ink);color:var(--canvas);
  font-size:var(--fs-h10);line-height:1.3;padding:var(--sp-1) var(--sp-3);border-radius:var(--r-sm);white-space:nowrap;pointer-events:none;
  opacity:0;transition:opacity .12s;z-index:6;display:flex;flex-direction:column;align-items:center;gap:1px;
  box-shadow:0 4px 14px color-mix(in srgb, var(--ink) 22%, transparent);}
.cht-tip.on{opacity:1;}
.cht-tip b{font-weight:600;font-variant-numeric:tabular-nums;}
.cht-tip span{font-size:var(--fs-h10);font-weight:500;opacity:.68;}
.cht-tile-wide{width:100%;max-width:440px;}
.cht-tile-wide .cht-box,.cht-tile-wide .cht-plot,.cht-tile-wide .cht-plot svg{width:100%;}

/* --- SVG 內文字（class 掛在 <text> 上，inline SVG 吃得到頁面 CSS；數字一律 tabular-nums） --- */
.cht-donut-num{font-size:var(--fs-h4);font-weight:600;fill:var(--ink);font-variant-numeric:tabular-nums;letter-spacing:-.01em;}
.cht-donut-sub{font-size:var(--fs-h10);font-weight:500;fill:var(--muted);letter-spacing:.04em;}
.cht-val{font-size:8.5px;font-weight:600;fill:var(--muted);font-variant-numeric:tabular-nums;}

/* --- 矩陣格／Live 舞台的 dashboard tile 容器（panel 底＋細邊） --- */
.cht-tile{display:inline-flex;flex-direction:column;align-items:flex-start;gap:var(--sp-3);background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:var(--sp-4) var(--sp-5);max-width:100%;}

/* --- 圖例：重用 .tg 原子（v-soft i-neutral），前置色點綁各系列色 token --- */
.cht-legend{display:flex;flex-wrap:wrap;gap:var(--sp-2);}
.cht-dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto;display:inline-block;}
.cht-dot.c-accent{background:var(--accent);}
.cht-dot.c-ok{background:var(--ok);}
.cht-dot.c-warn{background:var(--warn);}
.cht-dot.c-danger{background:var(--i-danger);}

/* --- Showcase：dashboard 組合（6 欄 grid：stat 2＋stat 2＋donut 2／line 3＋bar 3） --- */
.cht-dash{display:grid;grid-template-columns:repeat(6,1fr);gap:var(--sp-4);width:100%;}
.cht-card{grid-column:span 2;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:var(--sp-5);display:flex;flex-direction:column;gap:var(--sp-3);min-width:0;}
.cht-card.cht-span-3{grid-column:span 3;}
.cht-card-h{display:flex;align-items:center;justify-content:space-between;gap:var(--sp-3);width:100%;}
.cht-card-t{font-size:var(--fs-h9);font-weight:600;color:var(--muted);letter-spacing:.02em;}
/* 卡內圖表撐滿卡寬（donut 例外：維持固定圓徑不變形拉伸） */
.cht-card .cht-box{width:100%;}
.cht-card .cht-plot{width:100%;}
.cht-card .cht-line svg,.cht-card .cht-curve svg,.cht-card .cht-bar svg{width:100%;}
.cht-card .cht-donut svg{width:110px;}
@media(max-width:760px){.cht-card,.cht-card.cht-span-3{grid-column:span 6;}}

/* --- Live 舞台 --- */
.cht-live-stage{display:flex;justify-content:center;padding:var(--sp-3) 0;}
  /* ===== Table&Chart group: tree-view ===== */
/* ==================== Tree View 樹狀（trv- namespace）==================== */
/* 樹容器：ul 巢狀結構，縮排靠 .trv-children 的 padding-left 疊出 depth */
.trv-tree{list-style:none;margin:0;padding:0;font-family:var(--font-sans);font-size:var(--fs-h9);color:var(--ink);}
.trv-tree ul{list-style:none;margin:0;}
.trv-children{padding-left:var(--sp-6);}
.trv-item{position:relative;}
.trv-item:not(.is-open)>.trv-children{display:none;}   /* 收合：直接藏子層 */

/* --- 節點列：箭頭＋(cbx)＋icon＋名稱＋count --- */
.trv-row{display:flex;align-items:center;gap:var(--sp-2);padding:var(--sp-1) var(--sp-3);border-radius:var(--r-sm);
  min-width:0;transition:background .12s;cursor:default;}
.trv-row.live{cursor:pointer;}
/* hover：矩陣用靜態 is-hover、Live/showcase 用真實 :hover（選取列不再變灰） */
.trv-row.is-hover,
.trv-row.live:hover:not(.is-selected){background:var(--panel-2);}
/* selected：淡藍底＋名稱/圖示轉主色 */
.trv-row.is-selected{background:var(--i-primary-tint);}
.trv-row.is-selected .trv-name{color:var(--accent);font-weight:600;}
.trv-row.is-selected .trv-ic,
.trv-row.is-selected .trv-caret{color:var(--accent);}

/* --- 展開箭頭：重用 ICON_CARET（下箭頭），收合時轉 -90 度朝右 --- */
.trv-caret{width:16px;height:16px;flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;
  color:var(--muted);transform:rotate(-90deg);transition:transform .15s;}
.trv-caret svg{width:12px;height:12px;display:block;}
.trv-item.is-open>.trv-row .trv-caret{transform:rotate(0deg);}
.trv-caret.trv-blank{visibility:hidden;}                /* 葉子節點：同寬占位對齊 */

/* --- 分支/葉子 icon（IC_FOLDER / IC_FILE）與名稱、count --- */
.trv-ic{width:16px;height:16px;flex:0 0 auto;display:inline-flex;color:var(--muted);}
.trv-ic svg{width:16px;height:16px;display:block;}
.trv-name{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.5;}
.trv-count{margin-left:auto;padding-left:var(--sp-3);flex:0 0 auto;
  font-size:var(--fs-h10);color:var(--faint);font-variant-numeric:tabular-nums;}

/* checkbox variant：列內重用 .cbx 原子，live hover 給邊框提示 */
.trv-row .cbx{flex:0 0 auto;}
.trv-row.live:hover .cbx:not(.st-checked){border-color:var(--accent);}

/* --- lines variant：L 形連接線（--line token；只畫第二層以下） --- */
.trv-v-lines .trv-children{padding-left:var(--sp-6);}
/* 每個子節點一段 L：直線落在父層箭頭中心，橫線接到子列前緣 */
.trv-v-lines .trv-children>.trv-item::before{content:'';position:absolute;left:-10px;top:0;
  width:10px;height:15px;border-left:1px solid var(--line);border-bottom:1px solid var(--line);
  border-bottom-left-radius:6px;}
/* 非最後一個手足：直線繼續往下延伸 */
.trv-v-lines .trv-children>.trv-item:not(:last-child)::after{content:'';position:absolute;left:-10px;top:0;bottom:0;
  border-left:1px solid var(--line);}

/* --- 容器：矩陣格輕量包、showcase/Live 用 panel 卡 --- */
.trv-cellbox{width:100%;min-width:0;padding:2px 0;box-sizing:border-box;}
.trv-box{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:var(--sp-3);box-sizing:border-box;}

/* showcase 三棵並排 */
.trv-show-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:var(--sp-4);align-items:start;}
.trv-show-cap{font-size:var(--fs-h10);font-weight:600;color:var(--muted);margin-bottom:var(--sp-3);}
  /* ===== Table&Chart group: schedule-chart ===== */
/* ==================== Schedule Chart 排程圖（gnt- namespace）==================== */
/* 三 variant：gantt 甘特圖（任務欄＋日期軸＋起訖橫條）／week 週排程（7 天 × 時段格）／timeline 垂直時間軸
   × size m 標準／s 精簡。系列色一律經 --gc 綁 token（accent/ok/warn/i-danger），格線 --line、字 --muted/--faint。 */

/* --- 容器共通：panel 底 + line 邊框 + radius token；數字一律 tabular --- */
.gnt-box{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  font-family:var(--font-sans);font-variant-numeric:tabular-nums;max-width:100%;box-sizing:border-box;}

/* --- size 兩級：所有尺寸經 CSS 變數收斂，m 標準／s 精簡 --- */
.gnt-sz-m{--gnt-row:34px;--gnt-bar:16px;--gnt-day:46px;--gnt-fs:12.5px;--gnt-fs-sm:11px;
  --gnt-slot:34px;--gnt-timew:52px;--gnt-side:150px;--gnt-ww:560px;--gnt-tlw:380px;}
.gnt-sz-s{--gnt-row:26px;--gnt-bar:10px;--gnt-day:34px;--gnt-fs:11.5px;--gnt-fs-sm:10px;
  --gnt-slot:24px;--gnt-timew:44px;--gnt-side:112px;--gnt-ww:430px;--gnt-tlw:310px;}

/* --- 系列色：橫條／事件塊／節點一律走 --gc，禁 hard-code 色值 --- */
.gnt-bar,.gnt-evt{--gc:var(--accent);}
/* 圖表（Chart＋Schedule Chart）主色黑→品牌藍：scoped 覆寫 --accent，狀態色(ok/warn/danger)不受影響 */
.cht-box,.cht-tile,.cht-card,.cht-dash,.gnt-box{--accent:var(--c-brand2-500);}
.gnt-bar.c-ok,.gnt-evt.c-ok{--gc:var(--ok);}
.gnt-bar.c-warn,.gnt-evt.c-warn{--gc:var(--warn);}
.gnt-bar.c-danger,.gnt-evt.c-danger{--gc:var(--i-danger);}

/* ==================== variant 1：gantt 甘特圖 ==================== */
.gnt-gantt{display:flex;overflow:hidden;width:fit-content;}
/* 左側任務名欄：表頭 + 每列任務名（+ .tg 狀態標，重用 Tag 原子靠右） */
.gnt-g-side{flex:0 0 var(--gnt-side);min-width:0;border-right:1px solid var(--line-strong);}
.gnt-g-side-head{height:var(--gnt-row);display:flex;align-items:center;padding:0 var(--sp-4);
  font-family:var(--font-mono);font-size:var(--gnt-fs-sm);color:var(--faint);border-bottom:1px solid var(--line-strong);}
.gnt-g-task{height:var(--gnt-row);display:flex;align-items:center;gap:var(--sp-2);padding:0 var(--sp-4);
  border-bottom:1px solid var(--line);font-size:var(--gnt-fs);color:var(--ink);white-space:nowrap;min-width:0;}
.gnt-g-task:last-child{border-bottom:0;}
.gnt-g-name{overflow:hidden;text-overflow:ellipsis;font-weight:500;}
.gnt-g-task .tg{margin-left:auto;flex:0 0 auto;}
.gnt-sz-s .gnt-g-task .tg{display:none;}          /* s 精簡：側欄不放狀態標 */

/* 右側時間軸：日期表頭 + 格線背景 + 每列橫條；過寬時容器內橫向捲動 */
.gnt-g-scroll{flex:1;min-width:0;overflow-x:auto;}
.gnt-g-main{min-width:max-content;}
.gnt-g-head{display:flex;}
.gnt-g-hcell{flex:1 0 var(--gnt-day);height:var(--gnt-row);display:flex;align-items:center;justify-content:center;
  font-family:var(--font-mono);font-size:var(--gnt-fs-sm);color:var(--faint);border-left:1px solid var(--line);border-bottom:1px solid var(--line-strong);}
.gnt-g-hcell:first-child{border-left:0;}
.gnt-g-hcell.is-wkend{background:var(--panel-2);}                       /* 週末欄：panel-2 淺灰 */
.gnt-g-hcell.is-today{color:var(--accent);font-weight:600;background:var(--i-primary-tint);}
.gnt-g-rows{position:relative;}
/* 直欄格線＋週末底：改由每列 in-flow 的 cell 提供（原本畫在絕對定位背景層，1px 線在橫向捲動時會被 GPU 合成器丟格→線消失；in-flow 徹底解決，且與表頭 hcell 同結構自動對齊）*/
.gnt-g-row{position:relative;display:flex;height:var(--gnt-row);border-bottom:1px solid var(--line);}
.gnt-g-cell{flex:1 0 var(--gnt-day);border-left:1px solid var(--line);}
.gnt-g-cell:first-child{border-left:0;}
.gnt-g-cell.is-wkend{background:var(--panel-2);}
.gnt-g-row:last-child{border-bottom:0;}

/* 橫條：依起訖日以 % 定位；底＝系列色 24% 淡底，疊加進度實色填充，皆全圓角 */

/* 今日線：accent 直線 + 頂端「今日」小籤（#fff 比照 .tg i-brand 的 --ton 慣例） */
.gnt-today{position:absolute;top:0;bottom:0;width:2px;margin-left:-1px;background:var(--accent);z-index:2;}

/* 矩陣縮小示意：更窄側欄、隱藏進度百分比與狀態標 */
.gnt-g-compact{--gnt-side:88px;width:100%;}

/* ==================== variant 3：timeline 垂直時間軸 ==================== */
.gnt-tl{padding:var(--sp-5) var(--sp-5);display:flex;flex-direction:column;width:var(--gnt-tlw);}
.gnt-sz-s.gnt-tl{padding:var(--sp-4) var(--sp-4);}

/* 節點圓點：狀態綁語意色（完成 ok 實心／進行中 accent 空心／延遲 danger 實心／待開始 line-strong 空心） */
.gnt-tl-dot{--gc:var(--accent);width:12px;height:12px;border-radius:50%;flex:0 0 auto;margin-top:var(--sp-1);

/* ==================== Calendar 日曆時間（cal- namespace）==================== */
/* 日期時間選擇：month 月曆／range 日期區間／time 時間清單 × size m 標準／s 精簡。
   表頭上下月鈕重用 .btn v-text icon-only 原子；日格為 .cal-day（一般／今日 accent 圈／
   選取 accent 實心／非本月淡／停用劃掉／有事件下方圓點）；range 用起訖實心＋中間淡 accent 連續帶。
   矩陣用靜態 class（is-hover）模擬；Live／showcase 加 .live 走真實 :hover。
   全部綁 token：--accent／--i-primary-tint／--line／--panel*／--ink／--muted／--faint，不 hard-code 色值。 */

.cal{display:inline-flex;flex-direction:column;gap:var(--sp-2);background:var(--panel);
  border:1px solid var(--line);border-radius:var(--radius);
  font-family:var(--font-sans);text-align:left;flex:0 0 auto;}
.cal-sz-m{width:290px;padding:var(--sp-4);}
.cal-sz-s{width:232px;padding:var(--sp-3);gap:var(--sp-1);}

/* ---- 表頭：‹ 2026 年 7 月 ›（上下月鈕＝Button 原子 v-text icon-only）---- */
.cal-head{display:flex;align-items:center;gap:var(--sp-1);}
.cal-head-title{flex:1;text-align:center;font-weight:600;color:var(--ink);font-variant-numeric:tabular-nums;}
.cal-sz-m .cal-head-title{font-size:var(--fs-h9);}
.cal-sz-s .cal-head-title{font-size:var(--fs-h9);}
/* s 尺寸把 icon-only 鈕微縮（僅覆蓋尺寸，樣式仍走 .btn 原子） */
.cal-sz-s .cal-head .btn.icon-only{width:26px;height:26px;border-radius:var(--r-sm);font-size:var(--fs-h10);}

/* ---- 星期列（日一二三四五六）---- */
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);}
.cal-dow-c{display:flex;align-items:center;justify-content:center;color:var(--faint);font-weight:600;}
.cal-sz-m .cal-dow-c{height:24px;font-size:var(--fs-h10);}
.cal-sz-s .cal-dow-c{height:20px;font-size:var(--fs-h10);}

/* ---- 6×7 日格（column-gap=0 讓 range 連續帶不斷開）---- */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);row-gap:2px;}
/* 週數欄開啟時左側多一欄 */
.cal-has-wk .cal-dow,.cal-has-wk .cal-grid{grid-template-columns:24px repeat(7,1fr);}
.cal-wk,.cal-wk-head{display:flex;align-items:center;justify-content:center;color:var(--faint);
  font-size:var(--fs-h10);font-variant-numeric:tabular-nums;}

/* ---- 日格 ---- */
.cal-day{position:relative;display:flex;align-items:center;justify-content:center;
  border:1px solid transparent;background:transparent;color:var(--ink);cursor:pointer;
  font-family:inherit;font-variant-numeric:tabular-nums;padding:0;
  transition:background .12s,color .12s;}
.cal-sz-m .cal-day{height:34px;font-size:var(--fs-h9);border-radius:var(--r-sm);}
.cal-sz-s .cal-day{height:26px;font-size:var(--fs-h10);border-radius:var(--r-sm);}
/* 非本月：淡 */
.cal-day.is-out{color:var(--faint);}
/* 今日：accent 內圈描邊 */
.cal-day.is-today{box-shadow:inset 0 0 0 1.5px var(--accent);color:var(--accent);font-weight:600;}
/* 滑過：矩陣靜態模擬 */
.cal-day.is-hover{background:var(--panel-2);}
/* 選取：accent 實心 */
.cal-day.is-selected{background:var(--accent);color:var(--primary-on);font-weight:600;box-shadow:none;}
/* 停用：淡化＋劃掉、不可點 */
.cal-day.is-disabled{color:var(--faint);opacity:.5;cursor:not-allowed;text-decoration:line-through;}
/* 有事件：下方小圓點（選取日反白） */
.cal-day.has-event::after{content:'';position:absolute;left:50%;transform:translateX(-50%);
  width:4px;height:4px;border-radius:50%;background:var(--c-brand2-500);}
.cal-sz-m .cal-day.has-event::after{bottom:var(--sp-1);}
.cal-sz-s .cal-day.has-event::after{bottom:2px;}
.cal-day.is-selected.has-event::after{background:var(--primary-on);}

/* ---- range 區間：起訖實心、中間淡 accent 連續帶 ---- */
.cal-day.is-in-range{background:var(--i-primary-tint);border-radius:0;}
.cal-day.is-range-start,.cal-day.is-range-end{background:var(--accent);color:var(--primary-on);
  font-weight:600;box-shadow:none;}
.cal-sz-m .cal-day.is-range-start{border-radius:var(--r-sm) 0 0 var(--r-sm);}
.cal-sz-m .cal-day.is-range-end{border-radius:0 var(--r-sm) var(--r-sm) 0;}
.cal-sz-s .cal-day.is-range-start{border-radius:var(--r-sm) 0 0 var(--r-sm);}
.cal-sz-s .cal-day.is-range-end{border-radius:0 var(--r-sm) var(--r-sm) 0;}
/* 起訖同一天：恢復完整圓角 */
.cal-sz-m .cal-day.is-range-start.is-range-end{border-radius:var(--r-sm);}
.cal-sz-s .cal-day.is-range-start.is-range-end{border-radius:var(--r-sm);}

.cal.live .cal-day:hover:not(:disabled):not(.is-selected):not(.is-range-start):not(.is-range-end){background:var(--panel-2);}

/* ---- 區間文字 foot（range 用）---- */
.cal-foot{border-top:1px solid var(--line);padding-top:var(--sp-3);margin-top:2px;font-size:var(--fs-h10);color:var(--muted);}
.cal-foot b{color:var(--accent);font-variant-numeric:tabular-nums;font-weight:600;}

/* ---- time 時間清單 ---- */
.cal-v-time.cal-sz-m{width:206px;}
.cal-v-time.cal-sz-s{width:170px;}
.cal-time-head{display:flex;align-items:center;gap:var(--sp-2);color:var(--muted);font-weight:600;padding:2px 2px var(--sp-1);}
.cal-sz-m .cal-time-head{font-size:var(--fs-h9);}
.cal-sz-s .cal-time-head{font-size:var(--fs-h10);}
.cal-time-ic{display:inline-flex;color:var(--faint);}
.cal-time-ic svg{width:14px;height:14px;}
.cal-time-list{display:flex;flex-direction:column;gap:2px;overflow-y:auto;padding-right:2px;}
.cal-sz-m .cal-time-list{max-height:238px;}

.cal-time-item{display:flex;align-items:center;justify-content:center;flex:0 0 auto;

  font-family:inherit;font-variant-numeric:tabular-nums;transition:background .12s,color .12s;}
.cal-sz-m .cal-time-item{height:32px;font-size:var(--fs-h9);border-radius:var(--r-sm);}
.cal-sz-s .cal-time-item{height:26px;font-size:var(--fs-h10);border-radius:var(--r-sm);}
.cal-time-item.is-hover{background:var(--panel-2);}
.cal-time-item.is-selected{background:var(--accent);color:var(--primary-on);font-weight:600;}
.cal.live .cal-time-item:hover:not(.is-selected){background:var(--panel-2);}

/* ---- 日格狀態一覽（裸格：拿掉容器外框只留單一日格）---- */
.cal-staterow{display:flex;flex-wrap:wrap;gap:var(--sp-5);}
.cal-statecell{display:flex;flex-direction:column;align-items:center;gap:var(--sp-3);}
.cal-statecap{font-size:var(--fs-h10);color:var(--muted);}
.cal-bare{border:0;background:transparent;padding:0;width:auto;border-radius:0;}

/* ---- showcase／Live 舞台 ---- */
.cal-show{display:flex;flex-wrap:wrap;gap:var(--sp-6);align-items:flex-start;}
.cal-live-stage{display:flex;justify-content:flex-start;}

  function mkBtn(o){
    const {variant,intent,size='m',label=true,lead=false,trail=false,iconOnly=false,isLive=false}=o;
    let state=o.state||'default'; const disabled=o.disabled||state==='disabled';
    if(disabled && state==='default') state='disabled';
    const b=document.createElement('button');
    b.className=`btn v-${variant} i-${intent} sz-${size} st-${state}${iconOnly?' icon-only':''}${isLive?' live':''}`;
    if(disabled) b.disabled=true;
    let html='';
    if(iconOnly){html=ICON_PENCIL;b.setAttribute('aria-label',LABEL[intent]);}
    else{ if(lead)html+=ICON_PENCIL; if(label)html+=`<span>${LABEL[intent]}</span>`; if(trail)html+=ICON_ARROW; }
    b.innerHTML=html; return b;
  }

  function renderSpecStrip(){
    const rows=[['axes','<code>variant × intent × state × size</code>'],['formula','<code>4 × 3 × 4 × 3 = 144</code> 全展'],
      ['token-policy','<code>semantic.action.*</code>（禁 primitive）'],['content boolean','show-label / leading / trailing icon']];
    document.getElementById('specStrip').innerHTML=rows.map(([k,v])=>`<div class="cell"><div class="k">${k}</div><div class="v">${v}</div></div>`).join('');

  function renderMatrix(){
    const host=document.getElementById('matrix');host.innerHTML='';
    const vs=AXES.variant.filter(v=>active.variant.has(v)),is=AXES.intent.filter(i=>active.intent.has(i)),ss=AXES.state.filter(s=>active.state.has(s));

      panel.innerHTML=`<div class="vtitle"><span class="badge">variant</span><span class="vname">${ZH.variant[variant]} · ${variant}</span><span class="vdesc">${VDESC[variant]}</span></div>`;

      });

    });

  function renderSizes(){const host=document.getElementById('sizeRow');host.innerHTML='';
    AXES.size.filter(s=>active.size.has(s)).forEach(size=>{const item=document.createElement('div');item.className='demo-item';const w=document.createElement('div');w.appendChild(mkBtn({variant:'solid',intent:'primary',state:'default',size}));const cap=document.createElement('div');cap.className='cap';cap.innerHTML=`<b>size ${size}</b>`;item.append(w,cap);host.appendChild(item);});}
  function renderBooleans(){const host=document.getElementById('boolRow');host.innerHTML='';

  function renderCount(){const n={};for(const k in AXES)n[k]=[...active[k]].length;const total=n.variant*n.intent*n.state*n.size;

  function seg(key,opts){const s=document.createElement('div');s.className='seg';const gate=active[key];opts.forEach(o=>{const b=document.createElement('button');b.textContent=o;const on=!gate||gate.has(o);b.disabled=!on;b.classList.toggle('is-off',!on);b.setAttribute('aria-pressed',live[key]===o);b.onclick=()=>{if(b.disabled)return;live[key]=o;renderLive();};s.appendChild(b);});return s;}
  function renderLive(){
    ['variant','intent','size'].forEach(k=>{if(active[k]&&!active[k].has(live[k])){const f=AXES[k].find(v=>active[k].has(v));if(f)live[k]=f;}}); // 篩選器連動：選中值被篩掉就跳到第一個啟用值
    const ctl=document.getElementById('liveCtl');ctl.innerHTML='';
    const groups=[['variant','Variant',AXES.variant],['intent','Intent',AXES.intent],['size','Size',AXES.size]];

    c.appendChild(checks);ctl.appendChild(c);
    const stage=document.getElementById('liveStage');stage.innerHTML='';
    stage.appendChild(mkBtn({variant:live.variant,intent:live.intent,size:live.size,lead:live.lead,trail:live.trail,iconOnly:live.iconOnly,disabled:live.disabled,isLive:true}));

  /* ---- 共用：可收合變數篩選器 ---- */
  function mountDial(host,cfg){
    const {axes,zh,active,onRender}=cfg;
    const card=ce('div','dcard');
    const head=ce('button','dcard-head');
    const countSpan=ce('span','dh-count');
    const title=ce('span','dh-title');title.textContent='變數篩選器';
    const chev=ce('span','dh-chevron');chev.innerHTML=ICON_CARET;
    head.append(title,countSpan,chev);
    const bodyEl=ce('div','dcard-body');
    const hint=ce('p','hint');hint.textContent='勾掉不需要的軸值，矩陣即時縮減。每軸至少保留一個。';bodyEl.appendChild(hint);
    const axesWrap=ce('div','axes');bodyEl.appendChild(axesWrap);
    const full=Object.keys(axes).reduce((a,k)=>a*axes[k].length,1);
    function updateCount(){const parts=Object.keys(axes).map(k=>[...active[k]].length);const total=parts.reduce((a,b)=>a*b,1);countSpan.innerHTML=parts.join(' × ')+' = <b>'+total+'</b> / '+full;}
    Object.keys(axes).forEach(k=>{const ax=ce('div','axis');ax.innerHTML=`<div class="name">${zh.axisName[k]}</div>`;const list=ce('div','chk-list');
      axes[k].forEach(val=>{const row=ce('label','chk-row'+(active[k].has(val)?'':' off'));
        const box=document.createElement('input');box.type='checkbox';box.checked=active[k].has(val);
        const txt=document.createElement('span');txt.textContent=(zh[k][val]||val).replace(/\s.*/,'')+'·'+val;
        box.onchange=()=>{if(!box.checked){if(active[k].size===1){box.checked=true;return;}active[k].delete(val);}else active[k].add(val);
          row.classList.toggle('off',!box.checked);onRender();updateCount();(LIVE_REFRESH.get(active)||[]).forEach(fn=>fn());};
        row.append(box,txt);list.appendChild(row);});
      ax.appendChild(list);axesWrap.appendChild(ax);});
    card.append(head,bodyEl);host.appendChild(card);updateCount();
  }

  /* ---- 共用：實際互動 Live 控制面板（segmented 控制 + boolean 勾選 + 即時預覽）---- */
  function mountLive(host,cfg){
    const state=Object.assign({},cfg.initial||{});
    // 篩選器連動：cfg.gate=元件 id → 讀 DIAL_SPECS[id].axes（完整軸值）＋ CHOICE[id].active（目前勾選），
    // 讓「變數篩選器」沒勾的軸值，在下方實際操作 Live 的對應 seg 選項一起被 disable。
    const gid=cfg.gate; const gAxes=(gid&&DIAL_SPECS[gid])?DIAL_SPECS[gid].axes:null; const gActive=(gid&&CHOICE[gid])?CHOICE[gid].active:null;
    const wrap=ce('div','livewrap');
    const ctlRow=ce('div','ctl-row');
    const stage=ce('div','live-stage');
    function rerender(){stage.innerHTML='';stage.appendChild(cfg.render(state));}
    const segRefs=[]; // 供篩選器連動時更新各 seg 選項 disabled
    (cfg.segs||[]).forEach(s=>{
      const c=ce('div','ctl');c.innerHTML=`<span class="lab">${s.label}</span>`;
      const seg=ce('div','seg');const btns=[];
      s.options.forEach((o,i)=>{const b=document.createElement('button');b.textContent=s.labels?s.labels[i]:o;b.dataset.val=o;
        b.setAttribute('aria-pressed',state[s.key]===o);
        b.onclick=()=>{if(b.disabled)return;state[s.key]=o;[...seg.children].forEach(x=>x.setAttribute('aria-pressed','false'));b.setAttribute('aria-pressed','true');rerender();};
        seg.appendChild(b);btns.push(b);});
      c.appendChild(seg);ctlRow.appendChild(c);segRefs.push({key:s.key,btns});});
    if((cfg.bools||[]).length){
      const c=ce('div','ctl');c.innerHTML=`<span class="lab">${cfg.boolLabel||'Content'}</span>`;
      const checks=ce('div','checks');
      cfg.bools.forEach(bo=>{const l=ce('label','chk');const i=document.createElement('input');i.type='checkbox';i.checked=!!state[bo.key];
        i.onchange=()=>{state[bo.key]=i.checked;rerender();};l.append(i,document.createTextNode(bo.label));checks.appendChild(l);});
      c.appendChild(checks);ctlRow.appendChild(c);}
    if(ctlRow.children.length)wrap.appendChild(ctlRow);
    wrap.appendChild(stage);
    if(cfg.free){if(cfg.note){const n=ce('p','live-note');n.innerHTML=cfg.note;wrap.appendChild(n);}
      const f=ce('div','live-free');cfg.free().forEach(nd=>f.appendChild(nd));wrap.appendChild(f);}
    host.appendChild(wrap);
    // 依篩選器 active 停用未勾軸值選項；若目前選中的值被停用，改跳到第一個仍啟用值
    function syncActive(){ if(!gActive){rerender();return;}
      segRefs.forEach(({key,btns})=>{ const set=gActive[key], full=gAxes&&gAxes[key]; if(!set||!full)return;
        let cur=state[key];
        if(full.includes(cur)&&!set.has(cur)){const first=btns.find(b=>full.includes(b.dataset.val)&&set.has(b.dataset.val));if(first)cur=first.dataset.val;}
        state[key]=cur;
        btns.forEach(b=>{const v=b.dataset.val, gated=full.includes(v), on=!gated||set.has(v);
          b.disabled=!on; b.classList.toggle('is-off',!on); b.setAttribute('aria-pressed',String(v===cur));});
      });
      rerender();
    }
    if(gActive){ if(!LIVE_REFRESH.has(gActive))LIVE_REFRESH.set(gActive,[]); LIVE_REFRESH.get(gActive).push(syncActive); }
    syncActive();
  }

  /* ===== 各元件「實際操作 Live」共用 registry ===== 元件頁與「複雜度確認」頁共用同一份，改一處兩邊同步 */

  /* ---- INPUT ---- */
  function inputEl(variant,state){
    const filled=['focus','filled-value','error'].includes(state);
    const f=ce('div',`field v-${variant} st-${state}`);
    f.innerHTML=filled?`<span class="val">使用者輸入的內容</span>`:`<span class="ph">請輸入…</span>`;

    return f;
  }
  function buildInput(view){
    const body=viewScaffold(view,{eyebrow:'L3 Component · Input',title:'Input 輸入框',
      lede:'Input 家族：<b>純文字 input、search、password、textarea、file</b>。以下先攤開基本 input（<b>outline／filled 兩 variant、無 size 軸</b>；label／必填／hint／icon／後綴 eye／清除 ×／錯誤文案走 boolean，有值時右側出現清除 ×，focus 只描邊、無外陰影），再往下逐個列出其餘子元件的狀態與互動。',
      specRows:[['axes','<code>variant × state</code>（無 size）'],['formula','<code>2 × 6</code>'],['token-policy','<code>semantic.*.input.*</code>'],['content boolean','label(+必填) / hint / leading icon / 後綴 eye / 清除 × / 錯誤文案']]});
    const Z={default:['預設','default'],hover:['滑過','hover'],focus:['聚焦','focus'],'filled-value':['已填值','filled-value'],disabled:['停用','disabled'],error:['錯誤','error']};
    const axes=DIAL_SPECS.input.axes, zh=DIAL_SPECS.input.zh, active=CHOICE.input.active; // 接中央 store
    let p;
    function renderM(){ if(!p)return; p.innerHTML=''; const vs=axes.variant.filter(v=>active.variant.has(v)),ss=axes.state.filter(s=>active.state.has(s));
      p.appendChild(matrixPanel({badge:'field',name:'輸入欄位 field',rows:ss,cols:vs,rowLab:s=>labHTML(Z[s][0],Z[s][1]),colLab:v=>labHTML(v==='outline'?'外框':'實填',v),cell:(s,v)=>inputEl(v,s),mincol:240})); }
    mountDial(body,{axes,zh,active,onRender:renderM});
    const sec=section(body,'State × Variant 矩陣','列＝狀態、欄＝variant（外框／實填左右並排）。focus 只換邊框色（無外陰影）、error 帶紅框。');p=panelsIn(sec);renderM();
    const sb=section(body,'Content 內容軸（boolean）','內容差異用 boolean 開關、不進 variant 矩陣。');

      ['with-hint',()=>{const w=ce('div','fieldwrap');w.innerHTML='<span class="fl">密碼</span>';w.appendChild(inputEl('outline','default'));const h=ce('span','fh');h.textContent='至少 8 碼';w.appendChild(h);return w;}],

    const sl=section(body,'實際互動 Live','用控制項調 variant／內容，下面即時預覽——欄位可真的打字、滑過看 hover、點一下看 focus。');

  function ddEl(variant,state,multi){const f=ce('div',`field dd v-${variant}${multi?' multi':''} st-${state}`);
    const b=ce('span','dd-body');
    if(state==='selected'){
      if(multi)['台北市','台中市'].forEach(o=>{const chip=ce('span','ddchip');chip.innerHTML=`<span>${o}</span><span class="x">${ICON_CLOSE}</span>`;b.appendChild(chip);});
      else{const val=ce('span','val');val.textContent='台北市';b.appendChild(val);}
    } else {const ph=ce('span','ph');ph.textContent='請選擇…';b.appendChild(ph);}
    const c=ce('span',`ddcaret${state==='open'?' up':''}`);c.innerHTML=ICON_CARET;
    f.append(b,c);return f;}
  /* 可互動下拉：opts={searchable, multi} —— 單選點了關閉、多選勾選 chip 不關 */
  function ddField(variant,opts){opts=opts||{};
    const OPTS=['台北市','台中市','高雄市','花蓮縣'];const selected=new Set();
    const wrap=ce('div','ddwrap');
    const trg=ce('div',`field dd v-${variant}${opts.multi?' multi':''}`);
    const bodyEl=ce('span','dd-body');
    const caret=ce('span','ddcaret');caret.innerHTML=ICON_CARET;
    trg.append(bodyEl,caret);
    const menu=ce('div','ddmenu');menu.style.display='none';
    let searchInput;
    if(opts.searchable){searchInput=document.createElement('input');searchInput.className='ddsearch';searchInput.placeholder='搜尋…';
      searchInput.oninput=()=>{const q=searchInput.value;[...menu.querySelectorAll('.ddopt')].forEach(el=>{el.style.display=el.textContent.includes(q)?'flex':'none';});};
      menu.appendChild(searchInput);}
    const optEls={};
    OPTS.forEach(o=>{const it=ce('div','ddopt');
      if(opts.multi){const box=ce('span','ddcheck');const lab=document.createElement('span');lab.textContent=o;it.append(box,lab);}
      else it.textContent=o;
      it.onclick=()=>{ if(opts.multi){selected.has(o)?selected.delete(o):selected.add(o);syncMenu();renderTrg();}
        else{selected.clear();selected.add(o);renderTrg();toggle(false);} };
      optEls[o]=it;menu.appendChild(it);});
    function renderTrg(){bodyEl.innerHTML='';
      if(selected.size===0){const p=ce('span','ph');p.textContent='請選擇…';bodyEl.appendChild(p);return;}
      if(opts.multi){[...selected].forEach(o=>{const chip=ce('span','ddchip');chip.innerHTML=`<span>${o}</span>`;const x=ce('span','x');x.innerHTML=ICON_CLOSE;
        x.onclick=e=>{e.stopPropagation();selected.delete(o);syncMenu();renderTrg();};chip.appendChild(x);bodyEl.appendChild(chip);});}
      else{const val=ce('span','val');val.textContent=[...selected][0];bodyEl.appendChild(val);}}
    function syncMenu(){if(!opts.multi)return;OPTS.forEach(o=>{optEls[o].classList.toggle('on',selected.has(o));optEls[o].querySelector('.ddcheck').innerHTML=selected.has(o)?ICON_CHECK:'';});}
    let open=false;
    function toggle(v){open=v;menu.style.display=v?'block':'none';trg.classList.toggle('st-open',v);caret.classList.toggle('up',v);if(v&&searchInput)searchInput.focus();}
    trg.onclick=()=>toggle(!open);
    renderTrg();wrap.append(trg,menu);return wrap;}

  function loaderEl(variant,intent,size,opts){opts=opts||{};
    intent=intent||'neutral';size=size||'m';
    const iCls='ld-'+intent;
    const wrap=ce('div','ld-wrap'+(opts.inline?' ld-inline':''));
    let core;
    if(variant==='dots'){
      core=ce('div','ld-dots '+iCls+' ld-sz-'+size);
      core.innerHTML='<span class="ld-dot"></span><span class="ld-dot"></span><span class="ld-dot"></span>';
    } else if(variant==='bar'){
      core=ce('div','ld-bar '+iCls+' ld-sz-'+size);
      const fill=ce('div','ld-bar-fill');
      if(opts.progress){fill.style.left='0';fill.style.width=(opts.pct||65)+'%';}
      else fill.className='ld-bar-fill ld-indet';
      core.appendChild(fill);
    } else {
      core=ce('div','ld-circ '+iCls+' ld-sz-'+size);
    }
    wrap.appendChild(core);
    if(opts.label){const l=ce('span','ld-label');l.textContent=opts.labelText||'載入中…';wrap.appendChild(l);}
    if(opts.progress){const pc=ce('span','ld-pct');pc.textContent=(opts.pct||65)+'%';wrap.appendChild(pc);}
    return wrap;
  }

  const MN_ICONS=[ICON_HOUSE,ICON_LIST,ICON_GEAR,ICON_PENCIL];
  function mnItem(state,size,o){
    o=o||{};
    const it=ce('div','mn-item mn-item--'+size);
    if(state==='hover')it.classList.add('mn-item--hover');
    if(state==='active')it.classList.add('mn-item--active');
    if(state==='focus')it.classList.add('mn-item--focus');
    if(state==='disabled')it.classList.add('mn-item--disabled');
    if(o.icon){const ic=ce('span','mn-ico');ic.innerHTML=(typeof o.icon==='string'?o.icon:ICON_HOUSE);it.appendChild(ic);}
    const lb=ce('span','mn-label');lb.textContent=o.label||'選單項';it.appendChild(lb);
    const ind=ce('span','mn-ind');it.appendChild(ind);
    return it;
  }
  function mnBar(variant,size,o){
    o=o||{};
    const items=o.items||[];
    const bar=ce('div','mn-bar mn-bar--'+variant);
    bar.setAttribute('role','navigation');
    let cur=(o.activeIndex==null?0:o.activeIndex);
    const nodes=[];
    items.forEach((label,i)=>{
      const it=mnItem(i===cur?'active':'default',size,{label:label,icon:o.icon?MN_ICONS[i%MN_ICONS.length]:false});
      if(i===cur)it.setAttribute('aria-current','page');
      if(o.clickable!==false){it.onclick=()=>{cur=i;nodes.forEach((n,j)=>{const on=(j===i);n.classList.toggle('mn-item--active',on);if(on)n.setAttribute('aria-current','page');else n.removeAttribute('aria-current');});};}
      nodes.push(it);bar.appendChild(it);
    });
    return bar;
  }

  const bcChevron='<svg viewBox="0 0 256 256" fill="currentColor"><path d="M181.66,133.66l-80,80a8,8,0,0,1-11.32-11.32L164.69,128,90.34,53.66a8,8,0,0,1,11.32-11.32l80,80A8,8,0,0,1,181.66,133.66Z"/></svg>';

  function bcTrail(items,o){
    o=o||{};

    }else{
      seq=items.map((lb,i)=>({label:lb,current:i===items.length-1})); // 末項自動 current

  const pgArrowL='<svg viewBox="0 0 256 256" fill="currentColor"><path d="M165.66,202.34a8,8,0,0,1-11.32,11.32l-80-80a8,8,0,0,1,0-11.32l80-80a8,8,0,0,1,11.32,11.32L91.31,128Z"/></svg>';
  const pgArrowR='<svg viewBox="0 0 256 256" fill="currentColor"><path d="M181.66,133.66l-80,80a8,8,0,0,1-11.32-11.32L154.69,128,90.34,53.66a8,8,0,0,1,11.32-11.32l80,80A8,8,0,0,1,181.66,133.66Z"/></svg>';
  // 單顆頁碼／箭頭方鈕：state 控外觀、size 控邊長、current=當前頁高亮、arrow=left/right 放箭頭
  function pgBtn(state,size,o){
    const opt=o||{};
    const b=document.createElement('button');
    b.className='pg-btn pg-sz-'+size+' pg-st-'+state+(opt.current?' pg-cur':'')+(opt.arrow?' pg-arw':'');
    if(state==='disabled')b.disabled=true;
    if(opt.arrow==='left')b.innerHTML=pgArrowL;
    else if(opt.arrow==='right')b.innerHTML=pgArrowR;
    else b.textContent=opt.label;
    return b;
  }
  // 完整分頁器：numbered=數字頁碼＋雙邊箭頭（gap>1 才插省略號）；prev-next=前後翻頁＋頁次資訊
  function pgBar(variant,size,o){
    const opt=o||{},total=opt.total,current=opt.current;
    const bar=ce('div','pg-bar pg-bar-'+size);
    if(variant==='prev-next'){
      const prev=pgBtn(current<=1?'disabled':'default',size,{arrow:'left'});
      const info=ce('span','pg-info');info.textContent='第 '+current+' / '+total+' 頁';
      const next=pgBtn(current>=total?'disabled':'default',size,{arrow:'right'});
      if(opt.onNav){if(current>1)prev.onclick=()=>opt.onNav(current-1);if(current<total)next.onclick=()=>opt.onNav(current+1);}
      bar.append(prev,info,next);return bar;
    }
    // numbered：‹ 1 … (c-1)[c](c+1) … total ›
    const prev=pgBtn(current<=1?'disabled':'default',size,{arrow:'left'});
    if(opt.onNav&&current>1)prev.onclick=()=>opt.onNav(current-1);
    bar.appendChild(prev);
    const set=[]; [1,total,current-1,current,current+1].forEach(n=>{if(n>=1&&n<=total&&set.indexOf(n)<0)set.push(n);});
    set.sort((a,b)=>a-b);
    let last=0;
    set.forEach(n=>{
      if(last&&n-last>1){const e=ce('span','pg-ellip');e.textContent='…';bar.appendChild(e);}
      const nb=pgBtn(n===current?'active':'default',size,{label:n,current:n===current});
      if(opt.onNav&&n!==current)nb.onclick=()=>opt.onNav(n);
      bar.appendChild(nb);last=n;
    });
    const next=pgBtn(current>=total?'disabled':'default',size,{arrow:'right'});
    if(opt.onNav&&current<total)next.onclick=()=>opt.onNav(current+1);
    bar.appendChild(next);return bar;
  }
  LIVE.pagination=(host)=>{

        draw();return box;                              // 內部點擊改 cur 後只重繪自身，達成真實翻頁
      },
      note:'數字頁碼點頁碼或箭頭會真的移動當前頁；切 variant／size 後沿用目前頁次。'

/* ---- PRICE 價格（builders 提升頂層，頁面與 summary Live 共用）---- */
  function prEl(variant,size){
    const el=ce('span',`pr-price pr-sz-${size} pr-v-${variant}`);
    if(variant==='normal'){
      el.innerHTML='<span class="pr-cur">NT$</span><span class="pr-amt">1,280</span>';
    }else if(variant==='discount'){
      el.setAttribute('aria-label','原價 NT$ 1,680，優惠價 NT$ 1,280');
      el.innerHTML='<s class="pr-orig" aria-hidden="true">NT$ 1,680</s><span class="pr-now"><span class="pr-cur">NT$</span><span class="pr-amt">1,280</span></span>';
    }else if(variant==='sale'){
      el.innerHTML='<span class="pr-cur">NT$</span><span class="pr-amt">990</span><span class="tg v-solid c-round i-danger st-default"><span>SALE</span></span>';
    }else if(variant==='free'){
      el.setAttribute('aria-label','免費');
      el.innerHTML='<s class="pr-orig" aria-hidden="true">NT$ 480</s><span class="pr-free">免費</span>';
    }
    return el;
  }
  /* metric 數值（dashboard KPI）：可組合式——基底大數字，另可各自開關 標題／單位／趨勢
     o.title=true 上方顯示標題、o.unit=true 數字後接單位、o.trend='up'|'down' 顯示趨勢 delta
     （趨勢 up 綁 --ok 正向綠、down 綁 --i-danger，icon 重用 IC_TRENDING；三者彼此正交、可任意組合） */
  function prMetricEl(size,o){o=o||{};
    const el=ce('span','pr-metric pr-m-sz-'+size);
    if(o.title){const t=ce('span','pr-mlabel');t.textContent='本月營收';el.appendChild(t);}
    const row=ce('span','pr-numrow');
    const num=ce('span','pr-num');num.textContent='8,542';row.appendChild(num);
    if(o.unit){const u=ce('span','pr-unit');u.textContent='筆';row.appendChild(u);}
    if(o.trend){const up=o.trend==='up';
      const d=ce('span','pr-delta '+(up?'d-up':'d-down'));d.setAttribute('aria-hidden','true');
      d.innerHTML=IC_TRENDING+'<span>'+(up?'+12.5%':'-3.2%')+'</span>';row.appendChild(d);}
    el.appendChild(row);
    if(o.trend){num.setAttribute('aria-hidden','true'); // a11y：容器報讀升降語意
      el.setAttribute('aria-label','8,542'+(o.unit?' 筆':'')+'，較上期'+(o.trend==='up'?'上升 12.5%':'下降 3.2%'));}
    return el;
  }

  const IM_BROKEN='<svg viewBox="0 0 256 256" fill="currentColor"><path d="M216,40H40A16,16,0,0,0,24,56V200a16,16,0,0,0,16,16H216a16,16,0,0,0,16-16V56A16,16,0,0,0,216,40Zm0,16V158.75l-26.07-26.06a16,16,0,0,0-22.63,0l-20,20-44-44a16,16,0,0,0-22.62,0L40,149.37V56ZM40,172l52-52,80,80H40Zm176,28H194.63l-36-36,20-20L216,181.38V200ZM144,100a12,12,0,1,1,12,12A12,12,0,0,1,144,100Z"/></svg>';
  const IM_POOL=['photo-1506905925346-21bda4d32df4','photo-1470071459604-3b5ec3a7fe05','photo-1501785888041-af3ef285b470','photo-1426604966848-d7adac402bff','photo-1470770841072-f978cf4d019e','photo-1447752875215-b2761acb3c5d','photo-1472214103451-9374bd1c798e','photo-1433086966358-54859d0ed716']; // 已驗證 200 的 Unsplash 自然風景池（山湖／森林／瀑布／綠丘）
  const IM_CIRCLE='photo-1501785888041-af3ef285b470'; // circular 用構圖置中的風景（湖光山色）
  const IM_SIZE={s:40,m:64,l:120,xl:240}; // size → 高度（px）；寬度由 aspect-ratio 依比例算
  /* 組出固定方形的 Unsplash URL；一律帶 &h 強制正方，配 object-fit:cover 填滿 */
  function imUrl(id,w){return `https://images.unsplash.com/${id}?w=${w}&q=80&auto=format&fit=crop`;} // 不鎖比例，裁切交給盒子 aspect-ratio + object-fit:cover
  /* Image atom：variant=rectangular|rounded|circular；state=default|loading|error；size=s|m|l|xl
     opts={src:Unsplash 圖片 ID, alt:替代文字}。circular 為正方，rectangular/rounded 亦統一用正方最簡單 */
  function imEl(variant,state,size,opts){opts=opts||{};
    size=size||'m';
    const box=ce('div',`im-box im-${variant} im-sz-${size} im-st-${state}`);
    if(opts.ratio && variant!=='circular'){box.classList.add('im-r-'+opts.ratio.replace(':','x'));} // circular 恆正方，其餘依比例改盒子 aspect-ratio
    if(state==='loading'){
      box.classList.add('im-loading'); // 骨架佔位：--panel-2 底 + shimmer 掃過，不放真圖
    } else if(state==='error'){
      box.classList.add('im-error'); // 破圖 fallback：置中破圖 icon + 「載入失敗」小字
      const ic=ce('div','im-broken');ic.innerHTML=IM_BROKEN;
      const tx=ce('div','im-errtxt');tx.textContent='載入失敗';
      box.append(ic,tx);
    } else {
      const img=document.createElement('img');img.className='im-img';
      img.src=imUrl(opts.src||IM_POOL[0],600); // W 用 400，實際顯示尺寸由 CSS 控制
      img.alt=(opts.alt!=null)?opts.alt:''; // a11y：必填 alt；裝飾性傳 '' 即可
      img.loading='lazy';
      box.appendChild(img);
    }
    return box;
  }
  LIVE.image=(host)=>mountLive(host,{gate:'image',
    initial:{variant:'rounded',state:'default',size:'l',ratio:'4:3'},
    segs:[
      {key:'variant',label:'Shape',options:['rectangular','rounded','circular'],labels:['矩形','圓角','圓形']},
      {key:'state',label:'State',options:['default','loading','error'],labels:['正常','載入中','錯誤']},
      {key:'size',label:'Size',options:['s','m','l','xl']},
      {key:'ratio',label:'Ratio',options:['1:1','4:3','16:9','2:1']}
    ],
    render:st=>{
      const src=(st.variant==='circular')?IM_CIRCLE:IM_POOL[3]; // circular 用置中風景
      return imEl(st.variant,st.state,st.size,{src,alt:'示意圖片',ratio:st.ratio});
    },
    note:'切形狀時 circular 自動改用人像圖；state 切到 loading 看 shimmer 骨架、error 看破圖 fallback。'

    const axes=DIAL_SPECS.image.axes, zh=DIAL_SPECS.image.zh, active=CHOICE.image.active; // 接中央 store

/* ==================== section-head 區段標題 ==================== */
  /* 單一區段標題列 builder：矩陣 / 內容示範 / Live 共用同一顆 */
  /* o = {align,size,eyebrow:false|'tag'|'breadcrumb',eyebrowText,title,sub:false|undefined,subText,action,filters,count:false|字串,divider} */
  function schHead(o){
    o=o||{};
    const head=ce('div','sch-head sch-a-'+(o.align||'left')+' sch-sz-'+(o.size||'m')+(o.divider?' sch-divider':''));
    const main=ce('div','sch-main');
    /* eyebrow：tag 標籤 or 麵包屑式 */
    if(o.eyebrow==='tag'){
      const eb=ce('div','sch-eyebrow');
      eb.innerHTML='<div class="tg v-soft c-rect i-brand st-default"><span>'+(o.eyebrowText||'本月焦點')+'</span></div>';
      main.appendChild(eb);
    }else if(o.eyebrow==='breadcrumb'){
      const eb=ce('div','sch-eyebrow sch-crumb');
      eb.innerHTML='訂單管理 <span class="sch-crumb-sep">›</span> 出貨明細';
      main.appendChild(eb);
    }
    /* 主標題（可選帶計數 badge） */
    const tr=ce('div','sch-titlerow');
    const h=ce('h3','sch-title');h.textContent=o.title||'近期訂單';
    tr.appendChild(h);
    if(o.count){
      const cb=ce('div','sch-count');
      cb.innerHTML='<div class="tg v-soft c-round i-neutral st-default"><span>'+o.count+'</span></div>';
      tr.appendChild(cb);
    }
    main.appendChild(tr);
    /* 副標（sub===false 才隱藏） */
    if(o.sub!==false){
      const s=ce('p','sch-sub');s.textContent=o.subText||'顯示最近 30 天內建立的訂單資料';
      main.appendChild(s);
    }
    head.appendChild(main);
    /* 右側動作：filter 按鈕群 or 單顆「查看全部」文字鈕 */
    if(o.filters){
      const act=ce('div','sch-actions');
      act.innerHTML=
        '<button class="btn v-solid i-primary sz-s">待處理</button>'+
        '<button class="btn v-outline i-secondary sz-s">已完成</button>'+
        '<button class="btn v-text i-secondary sz-s">全部</button>';
      head.appendChild(act);
    }else if(o.action){
      const act=ce('div','sch-actions');
      const b=document.createElement('button');b.className='btn v-text i-primary sz-s';
      b.innerHTML='<span>查看全部</span><span class="sch-arw">'+ICON_ARROW+'</span>';
      act.appendChild(b);head.appendChild(act);
    }
    return head;
  }

/* list icons */
/* ---- list 家族自訂 icon ---- */
  /* caret-right（Phosphor regular）：列尾指向箭頭，比下拉 caret 更符合「可進入」語意 */
  const LST_IC_CHEVRON='<svg viewBox="0 0 256 256" fill="currentColor"><path d="M181.66,133.66l-80,80a8,8,0,0,1-11.32-11.32L164.69,128,90.34,53.66a8,8,0,0,1,11.32-11.32l80,80A8,8,0,0,1,181.66,133.66Z"/></svg>';

/* list build */
/* ==================== list 列表（資料列 ＋ 選項卡完整體系） ==================== */
  /* leading icon 池（示意用，重用既有 Phosphor const） */
  const LST_LEAD_ICONS=[ICON_HOUSE,ICON_LIST,ICON_GEAR];

  /* 狀態 → 靜態 class 字串（矩陣展示用） */
  function lstStCls(state){return state==='hover'?' is-hover':state==='selected'?' is-selected':state==='disabled'?' is-disabled':'';}
  /* 列內勾選框（重用既有 .cbx 原子） */
  function lstCbx(checked,state){
    const cb=ce('div','cbx sz-s'+(checked?' st-checked':'')+(state==='disabled'?' st-disabled':''));
    if(checked)cb.innerHTML=ICON_CHECK;
    return cb;
  }

  /* ---- 基本列 basic：左 leading（checkbox／icon 可省）＋ 中 title ＋ 右 trailing 組合 ----
     trailing 標準化：tag（重用 .tg）／info（重用 NT_IC_INFO）／meta 文字／動作鈕／caret，可組合
     o：{title,desc,leadIcon,checkbox,checked,tag,info,meta,action,caret} */
  function lstRowBasic(state,o){
    o=o||{};
    const it=ce('div','lst-item'+lstStCls(state));
    if(o.checkbox)it.appendChild(lstCbx(o.checked,state));
    if(o.leadIcon){const ld=ce('span','lst-lead');const ic=ce('span','lst-icon');ic.innerHTML=o.leadIcon;ld.appendChild(ic);it.appendChild(ld);}
    const bd=ce('div','lst-body');
    const tt=ce('div','lst-title');tt.textContent=o.title||'';bd.appendChild(tt);
    if(o.desc){const ds=ce('div','lst-desc');ds.textContent=o.desc;bd.appendChild(ds);}
    it.appendChild(bd);
    const tr=ce('div','lst-trail');let has=false;
    if(o.tag){const t=ce('div','tg v-soft c-round i-brand st-default');t.innerHTML='<span>'+o.tag+'</span>';tr.appendChild(t);has=true;} // 重用 Tag 原子
    if(o.info){const ic=ce('span','lst-info');ic.innerHTML=NT_IC_INFO;tr.appendChild(ic);has=true;} // 重用 notification info 圓標
    if(o.meta){const m=ce('span','lst-meta');m.textContent=o.meta;tr.appendChild(m);has=true;}
    if(o.amount){const p=ce('span','pr-price pr-sz-sm lst-amount');p.innerHTML='<span class="pr-cur">NT$</span><span class="pr-amt">'+o.amount+'</span>';tr.appendChild(p);has=true;} // 重用 Price 原子顯示金額
    if(o.action){const b=ce('button','btn v-text i-primary sz-s');b.innerHTML='<span>'+(typeof o.action==='string'?o.action:'動作')+'</span>';tr.appendChild(b);has=true;} // 文字按鈕（重用 Button 原子）
    if(o.caret){const c=ce('span','lst-caret');c.innerHTML=LST_IC_CHEVRON;tr.appendChild(c);has=true;}
    if(o.selCheck){tr.appendChild(lstCbx(true,state));has=true;} // 已選指示：右側補已勾選 checkbox（非 checkbox-leading 時）
    if(has)it.appendChild(tr);
    return it;
  }

  /* ---- 雙欄列 two-column：左 title、右 value（小標題）＋ caret ---- */
  function lstRowTwoCol(state,o){
    o=o||{};
    const it=ce('div','lst-item'+lstStCls(state));
    const bd=ce('div','lst-body');
    const tt=ce('div','lst-title');tt.textContent=o.title||'';bd.appendChild(tt);
    it.appendChild(bd);
    const tr=ce('div','lst-trail');
    const v=ce('span','lst-value');v.textContent=o.value||'';tr.appendChild(v);
    if(o.caret!==false){const c=ce('span','lst-caret');c.innerHTML=LST_IC_CHEVRON;tr.appendChild(c);}
    it.appendChild(tr);
    return it;
  }

  /* ---- 明細/摘要列 summary：右對齊 label（＋說明／caret）、＋按鈕新增列、NT$ 總計列 ----
     o：{label,desc,strong,caret} ／ {add:true} ／ {total:'200,000'} */
  function lstSumRow(o){
    o=o||{};
    const it=ce('div','lst-item lst-sum');
    if(o.add){ // 新增列：重用 Button 原子（text / primary）＋ IC_PLUS
      it.classList.add('is-add');
      const b=ce('button','btn v-text i-primary sz-s');b.innerHTML=IC_PLUS+'<span>按鈕</span>';it.appendChild(b);
      return it;
    }
    if(o.total){ // 總計列：重用 Price 原子（.pr-price）
      it.classList.add('is-total');
      const p=ce('span','pr-price pr-sz-md');
      p.innerHTML='<span class="pr-cur">NT$</span><span class="pr-amt">'+o.total+'</span>';
      it.appendChild(p);
      return it;
    }
    const bd=ce('div','lst-body');
    const tt=ce('div','lst-title'+(o.strong?' w-strong':''));tt.textContent=o.label||'';bd.appendChild(tt);
    if(o.desc){const ds=ce('div','lst-desc');ds.textContent=o.desc;bd.appendChild(ds);}
    it.appendChild(bd);
    if(o.caret){const tr=ce('div','lst-trail');const c=ce('span','lst-caret');c.innerHTML=LST_IC_CHEVRON;tr.appendChild(c);it.appendChild(tr);}
    return it;
  }

  /* ---- 巢狀可展開列 nested：checkbox 母列 ＋ 內縮子列，點列展開收合 ----
     o：{title,meta,checked,open,children:[{title,meta}]} */
  function lstNested(o){
    o=o||{};
    const box=ce('div','lst-nest');
    const parent=lstRowBasic('default',{title:o.title,checkbox:true,checked:o.checked,meta:o.meta});
    const sub=ce('div','lst-subwrap');
    (o.children||[]).forEach(c=>sub.appendChild(lstRowBasic('default',{title:c.title,meta:c.meta,caret:true})));
    sub.style.display=o.open?'block':'none';
    parent.addEventListener('click',e=>{
      const cb=e.target.closest('.cbx');
      if(cb){ // 點勾選框只切換勾選，不觸發展開
        const on=cb.classList.toggle('st-checked');cb.innerHTML=on?ICON_CHECK:'';return;
      }
      sub.style.display=(sub.style.display==='none')?'block':'none';
    });
    box.append(parent,sub);
    return box;
  }

  /* ---- 選項卡 selection card：整列一張有框卡（icon＋主標題＋敘述＋checkbox/radio）----
     kind：checkbox／radio；state：default/hover/selected/error/disabled
     o：{title,desc,icon,error 錯誤訊息文字,expand 展開帶 inline 下拉} */
  function lstSelCard(kind,state,o){
    o=o||{};
    const wrap=ce('div','lst-sel-wrap');
    const card=ce('div','lst-sel'+lstStCls(state)+(state==='error'?' is-error':'')+(o.expand?' is-expanded':''));
    // leading icon（預設 globe，沿用 .lst-lead / .lst-icon 尺寸樣式）
    const ld=ce('span','lst-lead');const ic=ce('span','lst-icon');ic.innerHTML=o.icon||IC_GLOBE;ld.appendChild(ic);card.appendChild(ld);
    const main=ce('div','lst-sel-main');
    const tt=ce('div','lst-sel-title');tt.textContent=o.title||'主標題';main.appendChild(tt);
    const ds=ce('div','lst-sel-desc');ds.textContent=o.desc||'相關的敘述說明';main.appendChild(ds);
    card.appendChild(main);
    // 右側選擇控制：checkbox 重用 .cbx、radio 重用 .rdo 原子
    const on=state==='selected';
    let ctl;
    if(kind==='radio'){
      ctl=ce('div','rdo sz-m'+(on?' st-checked':state==='disabled'?' st-disabled':' st-default'));
      ctl.innerHTML='<span class="dot"></span>';
    }else{
      ctl=ce('div','cbx sz-m'+(on?' st-checked':state==='disabled'?' st-disabled':' st-default'));
      if(on)ctl.innerHTML=ICON_CHECK;
    }
    card.appendChild(ctl);
    // 展開帶 inline 下拉的進階版（重用 .field 靜態外觀）
    if(o.expand){
      const ex=ce('div','lst-sel-extra');
      ex.appendChild(lstMiniField());
      const dash=ce('span','lst-sel-dash');dash.textContent='–';ex.appendChild(dash);
      ex.appendChild(lstMiniField());
      card.appendChild(ex);
    }
    wrap.appendChild(card);
    if(state==='error'){const e=ce('div','lst-sel-err');e.textContent=o.error||'錯誤訊息';wrap.appendChild(e);}
    return wrap;
  }
  /* 選項卡展開版 inline 下拉（重用 .field / .ph / .ddcaret 樣式，靜態示意） */
  function lstMiniField(){
    const f=ce('div','field dd v-outline lst-sel-field');
    f.innerHTML='<span class="dd-body"><span class="ph">請選擇</span></span><span class="ddcaret">'+ICON_CARET+'</span>';
    return f;
  }

  /* 依 variant × state 給矩陣單格內容；error 為選項卡專屬 → 其餘顯示不適用
     雙欄／巢狀：母列（checkbox＋標題＋右側小標題）＋ 一條內縮子列示意上下兩層；已選 → 母列勾選框打勾 */
  function lstMatrixCell(variant,state){
    if(state==='error'&&variant!=='selection'){const na=ce('div','lst-na');na.textContent='—（selection 專屬）';return na;}
    if(variant==='selection')return lstSelCard('checkbox',state,{});
    const wrap=ce('div','lst-solo');
    const nest=ce('div','lst-nest');
    nest.appendChild(lstRowBasic(state,{checkbox:true,checked:(state==='selected'),title:'標題',meta:'小標題'}));
    const sub=ce('div','lst-subwrap');sub.style.display='block';
    sub.appendChild(lstRowBasic('default',{title:'子項',meta:'小標題',caret:true}));
    nest.appendChild(sub);
    wrap.appendChild(nest);
    return wrap;
  }

  /* List Item 專用矩陣格：leading（勾選框／圖示／無）× state；已選狀態僅勾選框 leading 適用（其餘不適用） */
  function lstiCell(leading,state){
    if(state==='selected'&&leading!=='checkbox'){const na=ce('div','lst-na');na.textContent='—（需勾選框）';return na;}
    const o={title:'資訊列標題',tag:'標籤',caret:true};
    if(leading==='checkbox'){o.checkbox=true;o.checked=(state==='selected');}
    else if(leading==='icon'){o.leadIcon=IC_GLOBE;}
    const wrap=ce('div','lst-solo');wrap.appendChild(lstRowBasic(state,o));
    return wrap;
  }

  /* 整組列表卡片：收多個列節點 ＋ 可選分隔線；filled=填色卡片底 */
  function lstGroup(nodes,o){
    o=o||{};
    const g=ce('div','lst-group'+(o.filled?' v-filled':''));
    nodes.forEach((n,i)=>{
      if(i>0&&o.divider)g.appendChild(ce('div','lst-divider'));
      g.appendChild(n);
    });
    return g;
  }

  /* ==================== List Item 資訊列（左右欄位可自由配置的單列） ==================== */
  function buildListItem(view){
    const body=viewScaffold(view,{eyebrow:'L3 Component · List Item',title:'List Item 資訊列',

  /* 單一摺疊面板：variant 控外觀、state 控狀態；expanded 才渲染 body、caret 朝上 */
  function cpsPanel(variant,state,o){
    o=o||{};
    const expanded=(state==='expanded');
    const panel=ce('div','cps-panel v-'+variant+' st-'+state);
    const head=ce('div','cps-head');
    let h=''; if(o.icon)h+=`<span class="cps-lead">${o.icon}</span>`;
    h+=`<span class="cps-title">${o.title||'標題'}</span><span class="cps-caret">${ICON_CARET}</span>`;
    head.innerHTML=h;
    panel.appendChild(head);
    if(expanded){                                   // 展開狀態才渲染 body（外層 wrap 負責展開動畫版位）
      const bwrap=ce('div','cps-body-wrap');
      const bodyEl=ce('div','cps-body');
      bodyEl.innerHTML=o.body||'';
      bwrap.appendChild(bodyEl);
      panel.appendChild(bwrap);
    }
    return panel;
  }

  /* 真正可互動的手風琴：點 header 切換展開／收合（切 class 交給 CSS grid 0fr→1fr 往下展開 + 淡入動畫）。
     o.variant 風格；o.multiple 允許多項同時展開（否則單開手風琴，展開新項自動收合前一項）；
     o.icon 左側前置圖示；o.firstOpen 預設展開第一項；
     o.indicator 指示 icon：'chevron'（caret 旋轉 180°）或 'plusminus'（收合顯示＋、展開顯示−，不旋轉） */
  function cpsAccordion(items,o){
    o=o||{};
    const variant=o.variant||'bordered';
    const indicator=o.indicator||'chevron';
    const wrap=ce('div','cps-acc v-'+variant);
    const panels=[];
    // 統一開合入口：只切 class（動畫由 CSS transition 負責），plusminus 模式同步換＋／−
    const setOpen=(r,open)=>{
      r.panel.classList.toggle('is-open',open);
      r.head.setAttribute('aria-expanded',open?'true':'false');
      if(indicator==='plusminus')r.caret.innerHTML=open?CPS_ICON_MINUS:CPS_ICON_PLUS;
    };
    items.forEach((it,idx)=>{
      const open=!!it.open||(!!o.firstOpen&&idx===0);
      const panel=ce('div','cps-panel v-'+variant+(open?' is-open':'')+(indicator==='plusminus'?' ind-pm':''));
      const head=ce('button','cps-head cps-head-btn');head.type='button';
      let hd=''; if(o.icon)hd+=`<span class="cps-lead">${o.icon}</span>`;
      const ind=indicator==='plusminus'?(open?CPS_ICON_MINUS:CPS_ICON_PLUS):ICON_CARET;
      hd+=`<span class="cps-title">${it.title}</span><span class="cps-caret">${ind}</span>`;
      head.innerHTML=hd;
      head.setAttribute('aria-expanded',open?'true':'false');
      const bwrap=ce('div','cps-body-wrap');          // 動畫外層：grid rows 0fr／1fr
      const body=ce('div','cps-body');body.innerHTML=it.body;
      bwrap.appendChild(body);
      const rec={panel,head,caret:head.querySelector('.cps-caret')};
      head.onclick=()=>{
        const isOpen=panel.classList.contains('is-open');
        if(!o.multiple)panels.forEach(r=>setOpen(r,false)); // 單開模式：先收合所有項
        setOpen(rec,!isOpen);
      };
      panel.append(head,bwrap);
      panels.push(rec);
      wrap.appendChild(panel);
    });
    return wrap;
  }

  /* popup footer：排列與裝置脫鉤，改由旗標自由組合——lay.arrange 四選一：
     'row' 並排（次→主 等寬）／'stack' 垂直堆疊（主 solid 全寬 → 次 outline 全寬）／
     'primary' 單顆主按鈕（solid 全寬）／'secondary' 單顆次按鈕（outline 全寬）；
     lay.text=true 再加一顆 text 按鈕（如「稍後提醒我」）。live 時掛 .live 開啟真互動 */
  function mdlPopFoot(c,lay,live,compact){
    lay=lay||{};
    const arrange=lay.arrange||'row';
    const single=(arrange==='primary'||arrange==='secondary');
    const sz=compact?'sz-s':'sz-m';                       // 矩陣縮小示意用 s、Live 用 m
    const lv=live?' live':'';
    const foot=ce('div','mdl-pop-foot'+((arrange==='stack'||single)?' stack':'')); // stack/單顆皆走全寬直排
    const mkSec=()=>{const b=ce('button','btn v-outline i-primary '+sz+lv);b.innerHTML='<span>'+c.secondary+'</span>';b.setAttribute('data-mdl-cancel','1');return b;}; // 次按鈕：primary outline
    const mkPri=()=>{const b=ce('button','btn v-solid '+c.primary.cls+' '+sz+lv);b.innerHTML='<span>'+c.primary.label+'</span>';return b;}; // 主按鈕：solid（intent 依 variant）
    if(arrange==='primary')foot.appendChild(mkPri());            // 單顆主按鈕
    else if(arrange==='secondary')foot.appendChild(mkSec());     // 單顆次按鈕
    else if(arrange==='stack')foot.append(mkPri(),mkSec());      // 垂直堆疊：主在上、次在下
    else foot.append(mkSec(),mkPri());                           // 並排：次→主 等寬
    if(lay.text){                                         // 文字按鈕（第三動作）：永遠獨占一列全寬
      const txt=ce('button','btn v-text i-primary '+sz+lv);
      txt.innerHTML='<span>'+c.text+'</span>';
      foot.appendChild(txt);
    }
    return foot;
  }
  /* modal footer：右對齊 次按鈕＋確認 */
  function mdlModalFoot(c,live){
    const lv=live?' live':'';
    const foot=ce('div','mdl-foot');
    const sec=ce('button','btn v-outline i-secondary sz-s'+lv);
    sec.innerHTML='<span>'+c.cancel+'</span>';
    sec.setAttribute('data-mdl-cancel','1');              // Live 用來綁「取消」關閉
    const ok=ce('button','btn v-solid i-primary sz-s'+lv);
    ok.innerHTML='<span>'+c.confirm+'</span>';
    foot.append(sec,ok);
    return foot;
  }

  /* close × 按鈕；abs=true 時絕對定位到右上（confirm 版用） */
  function mdlClose(abs){
    const b=ce('button','mdl-close'+(abs?' mdl-abs':''));
    b.innerHTML=ICON_CLOSE;b.setAttribute('aria-label','關閉對話框');
    return b;
  }

  /* 對話框卡片主體。kind=popup|modal；
     o = {variant, icon, arrange, textBtn, closeIcon, description, note, remember, subtitle, long, clip, footer, compact, live} */
  function mdlCard(kind,o){
    o=o||{};
    const compact=o.compact?' mdl-compact':'';
    if(kind==='popup'){
      /* ---- popup 置中小卡：置中標題＋說明＋可選 icon（顏色依語意）／備註／記住帳號 ---- */
      const v=o.variant==='illustration'?'illustration':'normal';
      const c=MDL_CONTENT.popup[v];
      const card=ce('div','mdl-card mdl-kind-popup'+compact);
      const body=ce('div','mdl-pop-body');
      if(o.icon){const ic=ce('div','mdl-illus'+(v==='illustration'?' is-danger':''));ic.innerHTML=MDL_ICON_WARNING;body.appendChild(ic);} // 頂部圓 icon：可選旗標，顏色依 variant 語意（一般＝主色、警示＝紅）
      const t=ce('div','mdl-pop-title');t.textContent=c.title;body.appendChild(t);
      if(o.description!==false){const d=ce('p','mdl-desc');d.textContent=c.desc;body.appendChild(d);}
      if(o.note){const n=ce('div','mdl-note');n.textContent=c.note;body.appendChild(n);}
      if(o.remember){                                     // 記住帳號：重用 .cbx 原子，live 時可點選切換
        const row=ce('label','mdl-remember');
        const cb=ce('span','cbx sz-s st-checked');cb.innerHTML=ICON_CHECK;
        let on=true;
        if(o.live)row.onclick=e=>{e.preventDefault();on=!on;cb.className='cbx sz-s'+(on?' st-checked':'');cb.innerHTML=on?ICON_CHECK:'';};
        row.appendChild(cb);row.appendChild(document.createTextNode(c.remember));
        body.appendChild(row);
      }
      card.appendChild(body);
      if(o.footer!==false)card.appendChild(mdlPopFoot(c,{arrange:o.arrange,text:o.textBtn},o.live,o.compact));
      return card;
    }
    /* ---- modal 寬版視窗：header（標題＋副標題＋×）＋可捲動 content ＋右對齊 footer ---- */
    const v=o.variant==='larger'?'larger':'regular';
    const c=MDL_CONTENT.modal[v];
    const card=ce('div','mdl-card mdl-kind-modal'+(v==='larger'?' mdl-larger':'')+compact);
    const head=ce('div','mdl-mhead');
    const ht=ce('div','mdl-mhead-txt');
    const t=ce('div','mdl-title');t.textContent=c.title;ht.appendChild(t);
    if(o.subtitle!==false&&c.sub){const s=ce('div','mdl-sub');s.textContent=c.sub;ht.appendChild(s);} // 副標題：regular／larger 各有情境文案，可用旗標關閉
    head.appendChild(ht);
    if(o.closeIcon!==false)head.appendChild(mdlClose(false));   // 右上關閉 ×
    card.appendChild(head);
    const ct=ce('div','mdl-content'+(o.clip?' mdl-clip':''));
    const paras=o.long?MDL_CONTENT.paras.concat(MDL_CONTENT.paras):MDL_CONTENT.paras.slice(0,2); // long＝鋪長示範卷軸
    paras.forEach(x=>{const d=ce('p','mdl-desc');d.textContent=x;ct.appendChild(d);});
    card.appendChild(ct);
    if(o.footer!==false)card.appendChild(mdlModalFoot(c,o.live));
    return card;
  }

  function buildModal(view){
    const body=viewScaffold(view,{eyebrow:'L3 Component · Modal',title:'Modal 對話框',
      lede:'覆蓋在頁面之上、需<b>先回應才能繼續</b>的浮層容器：由 <b>backdrop 遮罩</b>＋<b>卡片</b>組成。依 Figma 定義分兩種大小——<b>popup 小彈窗</b>（置中小卡：置中標題＋說明＋可選 icon／備註／記住帳號；icon 為可選旗標、<b>顏色依語意</b>：一般＝主色、警示＝紅；footer 排列可自由組合：<b>並排</b>／<b>垂直堆疊</b>，可再加<b>文字按鈕</b>第三動作）與 <b>modal 大視窗</b>（header 標題＋副標題＋關閉 ×、可捲動 content、footer 右對齊；regular 桌機標準寬 800px、larger 寬高 auto 上限 1224px；<b>行動版轉為 bottom sheet</b>：貼齊底部、全寬、上緣圓角、最高約 95vh、由下往上滑入）。點 × 或遮罩空白處皆可關閉。',

    /* 共用舞台：root＋重開鈕＋overlay；sheet=true 時（modal 行動版）轉 bottom sheet 版型 */
    function mdlLiveStage(kind,opts,sheet){

  /* ---- 內容結構示意：真實比例抽屜 + 三段圖例 ---- */

/* floating-line build */
/* ==================== floating-line 浮動列 ==================== */
  /* 浮動列＝漂浮在內容上方的橫向動作列：三型態 selection / toolbar / fab，兩種底部位置 */

  const FLO_TOOLS=[ICON_PENCIL,ICON_EYE,ICON_UPLOAD,ICON_GEAR];        // 工具列 icon 池
  const FLO_FAB_CHILD=[                                                 // FAB 展開子項
    {icon:ICON_PENCIL,label:'新增文件'},
    {icon:ICON_UPLOAD,label:'上傳檔案'},

  /* 通用 .btn 組裝：cls=額外 class；icon=原始 svg（走 .btn svg em 尺寸）；label=文字 */
  function floBtn(cls,label,icon){
    const b=ce('button','btn '+cls);
    let h=''; if(icon)h+=icon; if(label)h+=`<span>${label}</span>`;
    b.innerHTML=h; return b;
  }

  /* 假內容區：淡背景假內容線條（tall 時多一塊卡片示意有較高內容） */
  function floFake(o){o=o||{};
    const f=ce('div','flo-fake');
    if(o.tall)f.appendChild(ce('div','flo-blk'));
    [92,74,88,60].forEach((w,i)=>{const l=ce('div','flo-line');l.style.width=w+'%';f.appendChild(l);
      if(o.tall&&i===1)f.appendChild(ce('div','flo-blk'));});
    return f;
  }

  /* 型態 1：選取列（深色 pill）＝「已選 N 項」＋ 取消（v-text）＋ 刪除（v-solid i-danger）；more=多動作 */
  function floSelectBar(o){o=o||{};
    const bar=ce('div','flo-select');
    const cnt=ce('span','flo-count');cnt.innerHTML=`已選 <b>${o.count==null?3:o.count}</b> 項`;
    const acts=ce('div','flo-actions');
    if(o.more){                                          // 展開更多批次動作
      acts.appendChild(floBtn('v-text i-secondary sz-s','匯出'));
      acts.appendChild(floBtn('v-text i-secondary sz-s','封存'));
    }
    acts.appendChild(floBtn('v-text i-secondary sz-s','取消'));
    acts.appendChild(floBtn('v-solid i-danger sz-s','刪除',FLO_ICON_TRASH));
    bar.append(cnt,acts);
    return bar;
  }

  /* 型態 2：浮動工具列（白底圓角陰影）＝一排 icon-only 工具鈕，用分隔線分組 */
  function floToolbar(o){o=o||{};
    const bar=ce('div','flo-toolbar');
    const n=o.count||4;
    const gp=o.groupAt==null?2:o.groupAt;               // 第 gp 顆前插分隔線
    for(let i=0;i<n;i++){
      if(gp&&i===gp)bar.appendChild(ce('div','flo-tdiv'));
      bar.appendChild(floBtn('v-text i-secondary sz-s icon-only',null,FLO_TOOLS[i%FLO_TOOLS.length]));
    }
    return bar;
  }

  /* 型態 3：FAB 浮動主鈕（accent 圓形＋＋圖示）；expanded=展開子項清單 */
  function floFab(o){o=o||{};
    const wrap=ce('div','flo-float flo-fabwrap');        // 直向堆疊：子項在上、主鈕在下
    const kids=[];
    // 子項＝單顆白底 library 按鈕（icon＋文字同在一顆、整顆可點）；interactive 時先建好、預設隱藏，點主鈕再展開
    if(o.expanded||o.interactive){
      FLO_FAB_CHILD.forEach(c=>{
        const b=floBtn('flo-fab-child-btn sz-m',c.label,c.icon);
        if(o.interactive&&!o.expanded)b.style.display='none';
        wrap.appendChild(b);kids.push(b);
      });
    }
    const main=floBtn('v-solid i-primary flo-fab icon-only'+(o.interactive?' live':''),null,FLO_ICON_PLUS);
    main.setAttribute('aria-label','新增');
    if(o.interactive){                                   // 點主鈕即時展開／收合子項（＋ 旋轉成 ×）
      let open=!!o.expanded;
      main.classList.toggle('is-open',open);main.setAttribute('aria-expanded',open);
      main.onclick=()=>{open=!open;kids.forEach(k=>k.style.display=open?'':'none');main.classList.toggle('is-open',open);main.setAttribute('aria-expanded',open);};
    }
    wrap.appendChild(main);
    return wrap;
  }

  /* 舞台：假內容區 + 依 variant/position 疊上浮動列 */
  function floStage(variant,position,o){o=o||{};
    const st=ce('div','flo-stage'+(o.tall?' flo-tall':''));   // tall 時加高舞台，容納 FAB 展開子項
    st.appendChild(floFake({tall:o.tall}));
    let float;
    if(variant==='fab'){float=floFab(o);}               // fab 自帶 flo-float wrap
    else{
      float=ce('div','flo-float');
      float.appendChild(variant==='selection'?floSelectBar(o):floToolbar(o));
    }
    float.classList.add('flo-pos-'+(position||'bottom-center'));
    st.appendChild(float);
    return st;
  }

/* step icons */
/* ---- STEP 步驟指示器 專用 icon ---- */
  /* error 狀態用 Phosphor warning（警示三角）；done 沿用既有 ICON_CHECK */
  const STP_ICON_WARN='<svg viewBox="0 0 256 256" fill="currentColor"><path d="M236.8,188.09,149.35,36.22h0a24.76,24.76,0,0,0-42.7,0L19.2,188.09a23.51,23.51,0,0,0,0,23.72A24.35,24.35,0,0,0,40.55,224h174.9a24.35,24.35,0,0,0,21.33-12.19A23.51,23.51,0,0,0,236.8,188.09ZM120,104a8,8,0,0,1,16,0v40a8,8,0,0,1-16,0Zm8,88a12,12,0,1,1,12-12A12,12,0,0,1,128,192Z"/></svg>';
  /* icon variant 每步的圖示池（沿用既有 Phosphor const） */
  const STP_ICONS=[ICON_HOUSE,ICON_LIST,ICON_UPLOAD,ICON_GEAR];

/* step build */
/* ==================== step 步驟指示器 ==================== */
  /* 單一節點：state = done/current/todo/error/disabled；variant 控制內容物 */
  function stpNode(state,variant,o){
    o=o||{};
    const n=ce('div','stp-node stp-'+state);
    if(variant!=='dotted'){                 // dotted 為純小圓點、內部留空
      if(state==='done')n.innerHTML=ICON_CHECK;          // 完成打勾
      else if(state==='error')n.innerHTML=STP_ICON_WARN; // 錯誤警示
      else if(variant==='icon')n.innerHTML=o.icon||STP_ICONS[0];
      else n.textContent=o.num;             // numbered：顯示步驟編號
    }
    return n;
  }
  /* 完整 stepper：orientation 決定橫向/縱向、variant 決定節點樣式 */
  function stpStepper(orientation,variant,steps){
    const vcls=variant==='dotted'?'stp-dot':(variant==='icon'?'stp-icon':'stp-num');
    if(orientation==='vertical'){
      const w=ce('div','stp-vertical '+vcls);
      steps.forEach((s,i)=>{
        const step=ce('div','stp-vstep stp-is-'+s.state);
        const rail=ce('div','stp-vrail');
        rail.appendChild(stpNode(s.state,variant,{num:i+1,icon:s.icon}));
        if(i<steps.length-1)rail.appendChild(ce('div','stp-vconn'+(s.state==='done'?' stp-conn-done':'')));
        const labels=ce('div','stp-labels');
        labels.innerHTML=`<span class="stp-title">${s.label}</span>`+(s.description?`<span class="stp-desc">${s.description}</span>`:'');
        step.append(rail,labels);
        w.appendChild(step);
      });
      return w;
    }
    const w=ce('div','stp-horizontal '+vcls);
    steps.forEach((s,i)=>{
      const step=ce('div','stp-step stp-is-'+s.state);
      step.appendChild(stpNode(s.state,variant,{num:i+1,icon:s.icon}));
      const labels=ce('div','stp-labels');
      labels.innerHTML=`<span class="stp-title">${s.label}</span>`+(s.description?`<span class="stp-desc">${s.description}</span>`:'');
      step.appendChild(labels);
      w.appendChild(step);
      if(i<steps.length-1)w.appendChild(ce('div','stp-conn'+(s.state==='done'?' stp-conn-done':'')));
    });
    return w;
  }
  /* 主矩陣用的 4 步流程（結帳情境）：狀態混合 done→current→todo→todo */
  const STP_MX_LABELS=['帳號','資料','付款','完成'];
  const STP_MX_STATES=['done','current','todo','todo'];
  const STP_MX_DESC=['已驗證','填寫中','待處理','待處理'];
  function stpMxSteps(){
    return STP_MX_LABELS.map((lb,i)=>({label:lb,icon:STP_ICONS[i],state:STP_MX_STATES[i]}));
  }
  /* Live 用的 4 步流程（每步可帶副標） */
  const STP_LIVE_STEPS=[
    {label:'建立帳號',description:'填寫 Email 與密碼',icon:ICON_HOUSE},
    {label:'基本資料',description:'姓名與聯絡方式',icon:ICON_LIST},
    {label:'上傳文件',description:'身分證明檔案',icon:ICON_UPLOAD},
    {label:'完成設定',description:'確認並送出',icon:ICON_GEAR},
  ];

  function buildStep(view){
    const body=viewScaffold(view,{eyebrow:'L3 Component · Step',title:'Step 步驟指示器',
      lede:'呈現多步驟流程的<b>進度指示器（stepper）</b>：一連串節點（編號／圓點／圖示）以連接線相接，代表使用者在流程中的位置。單步狀態分 <b>done 已完成</b>（打勾／accent 實心）、<b>current 進行中</b>（accent 外圈高亮）、<b>todo 待處理</b>（灰）、<b>error 錯誤</b>（紅）、<b>disabled 停用</b>。方向可橫向（horizontal）或縱向（vertical）。',
      specRows:[['axes','<code>orientation × variant</code>'],['formula','<code>2 × 3</code>'],['state','<code>done · current · todo · error · disabled</code>'],['token-policy','<code>semantic.*.stepper.*</code>']]});
    const axes=DIAL_SPECS.step.axes, zh=DIAL_SPECS.step.zh, active=CHOICE.step.active; // 接中央 store
    const ORIN={horizontal:['水平','horizontal'],vertical:['垂直','vertical']};
    const VARN={numbered:['編號','numbered'],dotted:['圓點','dotted'],icon:['圖示','icon']};
    let p;
    function renderM(){ if(!p)return; p.innerHTML='';
      const oris=axes.orientation.filter(v=>active.orientation.has(v));
      const vas=axes.variant.filter(v=>active.variant.has(v));
      p.appendChild(matrixPanel({badge:'step · 4-steps',name:'Orientation × Variant（每格為 4 步流程；步1 done、步2 current、步3–4 todo）',
        rows:oris,cols:vas,
        rowLab:o=>labHTML(ORIN[o][0],ORIN[o][1]),
        colLab:v=>labHTML(VARN[v][0],VARN[v][1]),
        cell:(o,v)=>stpStepper(o,v,stpMxSteps()),mincol:320})); }
    mountDial(body,{axes,zh,active,onRender:renderM});
    const sec=section(body,'Orientation × Variant 矩陣','列＝方向（水平／垂直）、欄＝樣式（編號／圓點／圖示）；每格是一條 4 步 stepper，混合 done／current／todo 狀態，已完成段落連接線轉為 accent。');
    p=panelsIn(sec);renderM();

    const ss=section(body,'單一 Step 狀態','單一節點的五種狀態：已完成（打勾）、進行中（高亮外圈）、待處理（灰）、錯誤（紅・警示）、停用（淡化）。');
    const rd=ce('div','row-demo');
    [['done 已完成',()=>stpNode('done','numbered',{num:1})],
     ['current 進行中',()=>stpNode('current','numbered',{num:2})],
     ['todo 待處理',()=>stpNode('todo','numbered',{num:3})],
     ['error 錯誤',()=>stpNode('error','numbered',{num:4})],
     ['disabled 停用',()=>stpNode('disabled','numbered',{num:5})]
    ].forEach(([cap,fn])=>{const it=ce('div','demo-item');it.appendChild(fn());const c=ce('div','cap');c.innerHTML=`<b>${cap}</b>`;it.appendChild(c);rd.appendChild(it);});
    ss.appendChild(rd);

    const sl=section(body,'實際互動 Live','按「上一步／下一步」移動 current，走過的步驟自動變 done；切換方向（水平／垂直）與樣式（編號／圓點／圖示），勾 description 顯示每步副標。');
    mountLive(sl,{
      initial:{orientation:'horizontal',variant:'numbered',description:false,idx:1},
      segs:[
        {key:'orientation',label:'Orientation',options:['horizontal','vertical'],labels:['水平','垂直']},
        {key:'variant',label:'Variant',options:['numbered','dotted','icon'],labels:['編號','圓點','圖示']},
      ],
      bools:[{key:'description',label:'description 每步副標'}],
      boolLabel:'Content',
      render:st=>{
        const wrap=ce('div','stp-live-wrap');
        const stage=ce('div','stp-live-stage');
        function draw(){
          stage.innerHTML='';
          const steps=STP_LIVE_STEPS.map((s,i)=>({
            label:s.label,icon:s.icon,
            description:st.description?s.description:null,
            state:i<st.idx?'done':(i===st.idx?'current':'todo')
          }));
          stage.appendChild(stpStepper(st.orientation,st.variant,steps));
        }
        const ctl=ce('div','stp-live-ctl');
        const prev=ce('button','btn v-outline i-secondary sz-s');prev.textContent='上一步';
        const next=ce('button','btn v-solid i-primary sz-s');next.textContent='下一步';
        function syncBtns(){prev.disabled=st.idx<=0;next.disabled=st.idx>=STP_LIVE_STEPS.length-1;}
        prev.onclick=()=>{if(st.idx>0){st.idx--;draw();syncBtns();}};
        next.onclick=()=>{if(st.idx<STP_LIVE_STEPS.length-1){st.idx++;draw();syncBtns();}};
        ctl.append(prev,next);
        wrap.append(stage,ctl);
        draw();syncBtns();
        return wrap;
      },
      note:'current 表示目前所在步驟（accent 外圈）；點「下一步」後前一步變 done、連接線轉 accent。到最後一步時「下一步」停用。'
    });
  }

  /* ==================== Quantity 商品計數 ==================== */
  /* 計數器：variant 外觀、size 尺寸；state：default／min(−停用)／max(＋停用)／disabled。＋／− 重用 Button 原子（icon-only）*/
  function qtyEl(variant,size,o){
    o=o||{};
    const val=(o.value!=null)?o.value:1;
    const state=o.state||'default';
    const el=ce('div','qty qty-v-'+variant+' qty-sz-'+size+(state==='disabled'?' is-disabled':''));
    const bv=variant==='plain'?'v-outline':'v-outline';                 // 內部 −/＋ 皆用 outline 原子，容器再依 variant 改外觀
    const minus=ce('button','btn '+bv+' i-secondary sz-'+size+' icon-only'+(o.live?' live':''));
    minus.innerHTML=ICON_MINUS;minus.setAttribute('aria-label','減少');
    if(state==='min'||state==='disabled')minus.disabled=true;
    const num=ce('span','qty-val');num.textContent=val;
    const plus=ce('button','btn '+bv+' i-secondary sz-'+size+' icon-only'+(o.live?' live':''));
    plus.innerHTML=IC_PLUS;plus.setAttribute('aria-label','增加');
    if(state==='max'||state==='disabled')plus.disabled=true;
    el.append(minus,num,plus);
    el._parts={minus,num,plus};
    return el;
  }
  function buildQuantity(view){
    const body=viewScaffold(view,{eyebrow:'L3 Component · Quantity',title:'Quantity 商品計數',

      specRows:[['axes','<code>variant × size</code>'],['formula','<code>3 × 3 = 9</code>'],['token-policy','<code>semantic.*.control.*</code>'],['a11y','<code>aria-label 減少／增加</code>']]});
    const axes=DIAL_SPECS.quantity.axes, zh=DIAL_SPECS.quantity.zh, active=CHOICE.quantity.active;
    const VN={outline:['外框','outline'],pill:['膠囊','pill'],plain:['極簡','plain']};
    const SZN={s:['小','s'],m:['標準','m'],l:['大','l']};

    const sec=section(body,'Variant × Size 矩陣','列＝三型態（外框／膠囊／極簡）、欄＝三尺寸；＋／− 為 Button 原子（icon-only），容器依 variant 改外觀。');

      srow.appendChild(cell);

    mountLive(sl,{
      initial:{variant:'outline',size:'m',disabled:false},
      segs:[{key:'variant',label:'Variant',options:['outline','pill','plain'],labels:['外框','膠囊','極簡']},
            {key:'size',label:'Size',options:['s','m','l']}],
      bools:[{key:'disabled',label:'disabled 停用'}],
      boolLabel:'State',
      render:st=>{
        let v=1;const MIN=1,MAX=10;
        const wrap=ce('div','qty-live-box');
        function mk(){wrap.innerHTML='';
          const state=st.disabled?'disabled':(v<=MIN?'min':v>=MAX?'max':'default');
          const el=qtyEl(st.variant,st.size,{value:v,state:state,live:true});
          if(!st.disabled){
            el._parts.minus.onclick=()=>{if(v>MIN){v--;mk();}};
            el._parts.plus.onclick=()=>{if(v<MAX){v++;mk();}};
          }
          wrap.appendChild(el);

        mk();return wrap;
      },
      note:'數量範圍 1–10；到下限 − 停用、到上限 ＋ 停用。＋／− 為 Button 原子（icon-only、live 開啟真互動）。'
    });

  /* ==================== Progress 進度條 ==================== */
  /* 進度條：variant（bar 基本／label 帶百分比／gradient 漸層）× size（細/標準/粗）；o.value 0–100、o.intent 語意色
     label／gradient 亦可用 o.label / o.gradient 旗標獨立疊加（Live 用），彼此正交 */
  function prgEl(variant,size,o){
    o=o||{};
    const intent=o.intent||'primary';
    const val=(o.value!=null)?o.value:60;
    const showLabel=(o.label!=null)?o.label:(variant==='label');
    const gradient=(o.gradient!=null)?o.gradient:(variant==='gradient');
    const wrap=ce('div','prg prg-sz-'+size);
    wrap.setAttribute('role','progressbar');
    wrap.setAttribute('aria-valuenow',val);wrap.setAttribute('aria-valuemin','0');wrap.setAttribute('aria-valuemax','100');
    if(showLabel){
      const lab=ce('div','prg-label');
      const t=ce('span','prg-cap');t.textContent=o.cap||'上傳進度';
      const pct=ce('span','prg-pct');pct.textContent=val+'%';
      lab.append(t,pct);wrap.appendChild(lab);
    }
    const track=ce('div','prg-track');
    const fill=ce('div','prg-fill i-'+intent+(gradient?' is-grad':''));
    fill.style.width=val+'%';
    track.appendChild(fill);wrap.appendChild(track);
    return wrap;
  }
  function buildProgress(view){
    const body=viewScaffold(view,{eyebrow:'L3 Component · Progress',title:'Progress 進度條',
      lede:'線性<b>進度指示</b>：track 底軌 ＋ fill 填充（依 value 0–100% 撐開）。三種 variant（<b>基本</b>／<b>帶百分比</b>／<b>漸層</b>）× 三尺寸（細／標準／粗）。語意色 primary／success／warning／danger 綁 semantic token；漸層版每種語意色各有對應的深淺漸層。',
      specRows:[['axes','<code>variant × size</code>'],['formula','<code>3 × 3 = 9</code>'],['token-policy','<code>--accent / --ok / --warn / --i-danger</code>'],['a11y','<code>role=progressbar</code>']]});

  /* ===== Card group build: card ===== */
  /* ==================== Card 基礎卡片（crd-）==================== */
  /* 泛用內容容器卡：media（imEl 圖）＋ badge（.tg 標籤）＋ title ＋ desc ＋ footer actions（.btn）。
     variant：elevated 浮起／outlined 外框／filled 填色 × state：default／hover／selected／disabled。
     全部重用既有原子：imEl（Image）、.tg（Tag）、.btn（Button），不 inline 重畫 primitive。 */

  /* 卡片工廠：o={variant, state, media, badge, title, desc, actions, live, compact, src}
     state 用靜態 class 模擬（矩陣用）；live=true 時掛 .live 走真實 :hover、disabled 同步鎖內部按鈕 */
  function crdCard(o){
    o=o||{};
    const variant=o.variant||'elevated';
    const state=o.state||'default';
    const card=ce('div','crd crd-v-'+variant
      +(state!=='default'?' is-'+state:'')
      +(o.live?' live':'')
      +(o.compact?' crd-mx':'')
      +(o.size==='s'?' crd-sz-s':''));

    /* media slot：重用 Image 原子（16:9 滿版），CSS 覆寫為卡片滿寬 */
    if(o.media){
      const md=ce('div','crd-media');
      md.appendChild(imEl('rectangular','default','l',{src:o.src||IM_POOL[5],alt:o.title||'卡片圖片',ratio:'16:9'}));
      card.appendChild(md);
    }
    /* badge slot：重用 Tag 原子，釘右上角（有圖壓圖上、無圖壓卡上） */
    if(o.badge){
      const bd=ce('div','crd-badge');
      const onImg=!!o.media; // 壓在照片上用半透明黑玻璃、無圖時用一般柔色標
      const t=ce('div','tg c-round st-default '+(onImg?'v-soft i-neutral tg-glass':'v-soft i-brand'));t.innerHTML='<span>精選</span>';
      bd.appendChild(t);
      (onImg?card.firstChild:card).appendChild(bd);
    }
    /* body slot：title 恆有、desc 可選（CSS 兩行截斷） */
    const body=ce('div','crd-body');
    const ti=ce('div','crd-title');ti.textContent=o.title||'合歡山日出季開跑';
    body.appendChild(ti);
    if(o.desc){
      const de=ce('div','crd-desc');
      de.textContent=(typeof o.desc==='string')?o.desc:'十月至二月為最佳觀賞期，凌晨出發上武嶺停車場，建議提前一週預約松雪樓住宿並攜帶保暖衣物。';
      body.appendChild(de);
    }
    card.appendChild(body);
    /* footer actions slot：重用 Button 原子（主 solid primary＋次 text secondary） */
    if(o.actions){
      const ft=ce('div','crd-foot');
      const bp=ce('button','btn v-solid i-primary sz-s'+(o.live?' live':''));bp.innerHTML='<span>查看詳情</span>';
      const bs=ce('button','btn v-text i-secondary sz-s'+(o.live?' live':''));bs.innerHTML='<span>稍後</span>';
      if(state==='disabled'){bp.disabled=true;bs.disabled=true;} // disabled 整卡不可點，按鈕同步鎖
      ft.append(bs,bp); // 次要在左、主 CTA 靠最右
      card.appendChild(ft);
    }
    return card;
  }

  /* 矩陣格：一張緊湊代表卡（media＋title＋desc＋actions 全開，看得到完整解剖），state 靜態模擬 */
  function crdCell(variant,state,size){
    return crdCard({variant,state,size,media:true,badge:false,title:'合歡山日出季',desc:'凌晨出發武嶺，建議預約松雪樓並備保暖衣物。',actions:true,compact:true,src:IM_POOL[(({elevated:0,outlined:1,filled:2})[variant]||0)+3]});

    mountLive(sl,{

      bools:[{key:'media',label:'media 媒體圖'},{key:'badge',label:'badge 角標'},{key:'description',label:'description 描述'},{key:'actions',label:'footer actions'},{key:'disabled',label:'disabled'}],

        }));

/* 重用原子：imEl（縮圖）、.tg（角標／售完標）、prEl（價格）、.btn（加入購物車／收藏）、IC_HEART／IC_STAR／IC_CART（既有 icon）
   新增 icon const：PCD_IC_STAR_FILL（實心星，評分用）、PCD_IC_HEART_FILL（實心愛心，已收藏狀態用）——Phosphor fill 版，與既有 regular 版不同名 */
const PCD_IC_STAR_FILL='<svg viewBox="0 0 256 256" fill="currentColor"><path d="M234.29,114.85l-45,38.83L203,211.75a16.4,16.4,0,0,1-24.5,17.82L128,198.49,77.47,229.57A16.4,16.4,0,0,1,53,211.75l13.76-58.07-45-38.83A16.46,16.46,0,0,1,31.08,86l59-4.76,22.76-55.08a16.36,16.36,0,0,1,30.27,0l22.75,55.08,59,4.76a16.38,16.38,0,0,1,9.37,28.86Z"/></svg>';
const PCD_IC_HEART_FILL='<svg viewBox="0 0 256 256" fill="currentColor"><path d="M240,102c0,70-103.79,126.66-108.21,129a8,8,0,0,1-7.58,0C119.79,228.66,16,172,16,102A62.07,62.07,0,0,1,78,40c20.65,0,38.73,8.88,50,23.89C139.27,48.88,157.35,40,178,40A62.07,62.07,0,0,1,240,102Z"/></svg>';
/* 真實商品照（已驗證 200）：托特包／羊毛圍巾／保溫瓶 */
