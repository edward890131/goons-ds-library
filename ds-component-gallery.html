<meta charset="utf-8">
<title>DS 元件陳列 · L3 複雜度溝通</title>
<style>
  :root{
    --canvas:#F6F7FA; --panel:#FFFFFF; --panel-2:#F1F3F7; --panel-3:#EAEDF2;
    --ink:#1B1F28; --muted:#59616F; --faint:#8993A2;
    --line:#E4E7ED; --line-strong:#D2D8E1;
    --accent:#3358D4;
    --i-primary:#3358D4; --i-primary-h:#2B49B6; --i-primary-p:#233C97;
    --i-primary-tint:rgba(51,88,212,.10); --i-primary-tint2:rgba(51,88,212,.20);
    --i-danger:#D14343; --i-danger-h:#BB3636; --i-danger-p:#9E2C2C;
    --i-danger-tint:rgba(209,67,67,.10); --i-danger-tint2:rgba(209,67,67,.20);
    --i-sec-fill:#E8EAEF; --i-sec-fill-h:#DCDFE6; --i-sec-fill-p:#CDD2DB;
    --i-sec-on:#2A2F3A; --i-sec-edge:#C4C9D3; --i-sec-fg:#3A4150;
    --i-sec-tint:rgba(90,100,116,.10); --i-sec-tint2:rgba(90,100,116,.18);
    --primary-on:#FFFFFF; --danger-on:#FFFFFF;
    --font-sans:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,"PingFang TC","Noto Sans TC",sans-serif;
    --font-mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,monospace;
    --radius:14px;
  }
  @media (prefers-color-scheme:dark){ :root{
      --canvas:#0E1116; --panel:#161A21; --panel-2:#1C212A; --panel-3:#232935;
      --ink:#E7EAF0; --muted:#98A2B2; --faint:#697384;
      --line:#262C37; --line-strong:#343B47; --accent:#6E8AF5;
      --i-primary:#4E6EE6; --i-primary-h:#6180F0; --i-primary-p:#3F5AD0;
      --i-primary-tint:rgba(110,138,245,.14); --i-primary-tint2:rgba(110,138,245,.26);
      --i-danger:#E05A5A; --i-danger-h:#EC6E6E; --i-danger-p:#C74848;
      --i-danger-tint:rgba(224,90,90,.14); --i-danger-tint2:rgba(224,90,90,.26);
      --i-sec-fill:#262C37; --i-sec-fill-h:#2E3540; --i-sec-fill-p:#373F4B;
      --i-sec-on:#E7EAF0; --i-sec-edge:#3A424E; --i-sec-fg:#C4CBD7;
      --i-sec-tint:rgba(154,163,178,.12); --i-sec-tint2:rgba(154,163,178,.22);
  }}
  :root[data-theme="dark"]{
      --canvas:#0E1116; --panel:#161A21; --panel-2:#1C212A; --panel-3:#232935;
      --ink:#E7EAF0; --muted:#98A2B2; --faint:#697384;
      --line:#262C37; --line-strong:#343B47; --accent:#6E8AF5;
      --i-primary:#4E6EE6; --i-primary-h:#6180F0; --i-primary-p:#3F5AD0;
      --i-primary-tint:rgba(110,138,245,.14); --i-primary-tint2:rgba(110,138,245,.26);
      --i-danger:#E05A5A; --i-danger-h:#EC6E6E; --i-danger-p:#C74848;
      --i-danger-tint:rgba(224,90,90,.14); --i-danger-tint2:rgba(224,90,90,.26);
      --i-sec-fill:#262C37; --i-sec-fill-h:#2E3540; --i-sec-fill-p:#373F4B;
      --i-sec-on:#E7EAF0; --i-sec-edge:#3A424E; --i-sec-fg:#C4CBD7;
      --i-sec-tint:rgba(154,163,178,.12); --i-sec-tint2:rgba(154,163,178,.22);
  }
  :root[data-theme="light"]{
      --canvas:#F6F7FA; --panel:#FFFFFF; --panel-2:#F1F3F7; --panel-3:#EAEDF2;
      --ink:#1B1F28; --muted:#59616F; --faint:#8993A2;
      --line:#E4E7ED; --line-strong:#D2D8E1; --accent:#3358D4;
      --i-primary:#3358D4; --i-primary-h:#2B49B6; --i-primary-p:#233C97;
      --i-primary-tint:rgba(51,88,212,.10); --i-primary-tint2:rgba(51,88,212,.20);
      --i-danger:#D14343; --i-danger-h:#BB3636; --i-danger-p:#9E2C2C;
      --i-danger-tint:rgba(209,67,67,.10); --i-danger-tint2:rgba(209,67,67,.20);
      --i-sec-fill:#E8EAEF; --i-sec-fill-h:#DCDFE6; --i-sec-fill-p:#CDD2DB;
      --i-sec-on:#2A2F3A; --i-sec-edge:#C4C9D3; --i-sec-fg:#3A4150;
      --i-sec-tint:rgba(90,100,116,.10); --i-sec-tint2:rgba(90,100,116,.18);
  }

  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--canvas);color:var(--ink);font-family:var(--font-sans);-webkit-font-smoothing:antialiased;line-height:1.5;}

  /* ---------- topbar ---------- */
  .topbar{position:sticky;top:0;z-index:30;height:58px;display:flex;align-items:center;gap:14px;
    padding:0 18px;background:var(--panel);border-bottom:1px solid var(--line);}
  .brand{font-size:14px;font-weight:640;display:flex;align-items:baseline;gap:9px;}
  .brand .muted2{color:var(--faint);font-weight:400;font-family:var(--font-mono);font-size:11.5px;letter-spacing:.02em;}
  .spacer{flex:1}
  .theme-toggle{display:inline-flex;align-items:center;gap:8px;background:var(--panel-2);
    border:1px solid var(--line-strong);color:var(--muted);border-radius:999px;padding:7px 8px 7px 14px;
    font-family:var(--font-mono);font-size:12px;cursor:pointer;transition:.15s;}
  .theme-toggle:hover{color:var(--ink);border-color:var(--accent);}
  .theme-toggle .knob{width:22px;height:22px;border-radius:999px;background:var(--accent);color:#fff;
    display:inline-flex;align-items:center;justify-content:center;}
  .theme-toggle .knob svg{width:13px;height:13px}

  /* ---------- layout ---------- */
  .shell{--sb:250px;}
  .layout{display:grid;grid-template-columns:var(--sb) 1fr;align-items:start;}
  .sidebar{position:sticky;top:58px;height:calc(100vh - 58px);overflow-y:auto;
    border-right:1px solid var(--line);background:var(--panel);padding:16px 12px;}
  .main{min-width:0;padding:34px 34px 96px;}
  .container{max-width:1060px;}

  .nav-group{margin-bottom:10px;}
  .nav-group .gh{display:flex;align-items:center;gap:7px;width:100%;background:transparent;border:none;cursor:pointer;
    font-family:var(--font-mono);font-size:10px;letter-spacing:.11em;text-transform:uppercase;
    color:var(--faint);padding:8px 10px 6px;transition:color .12s;}
  .nav-group .gh:hover{color:var(--muted);}
  .nav-group .gh .gh-caret{display:inline-flex;transition:transform .18s;}
  .nav-group .gh .gh-caret svg{width:12px;height:12px;display:block;}
  .nav-group .gh .gh-n{margin-left:auto;font-variant-numeric:tabular-nums;opacity:.7;}
  .nav-group.collapsed .gh .gh-caret{transform:rotate(-90deg);}
  .nav-group.collapsed .ng-items{display:none;}
  .nav-item{display:flex;align-items:center;gap:8px;width:100%;text-align:left;border:none;background:transparent;
    color:var(--muted);font-family:var(--font-sans);font-size:13.5px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:.12s;}
  .nav-item:hover{background:var(--panel-2);color:var(--ink);}
  .nav-item[aria-current="true"]{background:var(--i-primary-tint);color:var(--accent);font-weight:600;}
  .nav-item .tag{margin-left:auto;font-family:var(--font-mono);font-size:9px;letter-spacing:.05em;text-transform:uppercase;
    color:var(--faint);border:1px solid var(--line-strong);border-radius:5px;padding:1px 6px;}
  .nav-item[aria-current="true"] .tag{color:var(--accent);border-color:var(--accent);}
  .nav-item .tag.st-ready{color:var(--ok);border-color:var(--ok);}
  .nav-item .tag.st-partial{color:var(--warn);border-color:var(--warn);}

  /* ---------- headings / spec ---------- */
  .eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--accent);font-weight:600;margin:0 0 10px;}
  h1{font-size:28px;line-height:1.15;letter-spacing:-.02em;margin:0 0 10px;text-wrap:balance;font-weight:680;}
  .lede{color:var(--muted);max-width:62ch;margin:0;font-size:14.5px;}
  .lede b{color:var(--ink);} .lede code{font-family:var(--font-mono);font-size:12.5px;background:var(--panel-2);padding:1px 6px;border-radius:5px;}

  .spec{margin:26px 0 8px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:20px 22px;display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:18px 26px;}
  .spec .cell .k{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-bottom:6px;}
  .spec .cell .v{font-size:13.5px;color:var(--ink);}
  .spec .cell .v code{font-family:var(--font-mono);font-size:12px;background:var(--panel-2);padding:1px 6px;border-radius:5px;color:var(--muted);}

  /* ---------- dial ---------- */
  .dial{margin:22px 0 34px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:22px;}
  .dial .head{display:flex;justify-content:space-between;align-items:baseline;gap:16px;flex-wrap:wrap;margin-bottom:4px;}
  .dial h2{font-size:15px;margin:0;font-weight:640;}
  .dial .hint{color:var(--muted);font-size:13px;margin:2px 0 18px;}
  .count{font-family:var(--font-mono);font-size:13px;color:var(--muted);font-variant-numeric:tabular-nums;}
  .count b{color:var(--accent);font-size:15px;} .count .full{color:var(--faint);}
  .axes{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px 16px;}
  .axis .name{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-bottom:8px;}
  /* 複雜度轉盤：勾選清單（每個軸值一列，前面 checkbox）*/
  .chk-list{display:flex;flex-direction:column;gap:1px;}
  .chk-list .chk-row{display:flex;align-items:center;gap:9px;padding:6px 8px;border-radius:7px;cursor:pointer;
    font-family:var(--font-mono);font-size:12.5px;color:var(--muted);user-select:none;transition:background .12s,color .12s;}
  .chk-list .chk-row:hover{background:var(--panel-2);color:var(--ink);}
  .chk-list .chk-row input{accent-color:var(--accent);width:16px;height:16px;flex:0 0 auto;cursor:pointer;margin:0;}
  .chk-list .chk-row.off{color:var(--faint);}
  .chips{display:flex;flex-wrap:wrap;gap:6px;}
  /* tab-button 樣式：active 實色填滿、inactive 灰階 */
  .chip{display:inline-flex;align-items:center;border:1px solid var(--line-strong);background:var(--panel-2);
    color:var(--faint);border-radius:999px;padding:7px 14px;font-size:12px;cursor:pointer;user-select:none;
    transition:.13s;font-family:var(--font-mono);filter:grayscale(1);}
  .chip:hover{border-color:var(--accent);color:var(--muted);}
  .chip[aria-pressed="true"]{background:var(--accent);border-color:var(--accent);color:#fff;filter:none;
    box-shadow:0 1px 3px rgba(0,0,0,.14);}
  .chip[aria-pressed="true"]:hover{color:#fff;}

  /* ---------- blocks ---------- */
  section.block{margin:44px 0 0;}
  .block > h2{font-size:13px;font-family:var(--font-mono);letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:0 0 4px;font-weight:600;}
  .block > .sub{color:var(--faint);font-size:13px;margin:0 0 20px;} .block > .sub code{font-family:var(--font-mono);background:var(--panel-2);padding:1px 5px;border-radius:4px;}

  .panels{display:flex;flex-direction:column;gap:18px;}
  .vpanel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;}
  .vpanel .vtitle{display:flex;align-items:center;gap:10px;padding:14px 20px;border-bottom:1px solid var(--line);background:var(--panel-2);}
  .vpanel .vtitle .badge{font-family:var(--font-mono);font-size:11px;color:var(--accent);border:1px solid var(--line-strong);border-radius:6px;padding:2px 8px;letter-spacing:.04em;}
  .vpanel .vtitle .vname{font-size:14px;font-weight:620;}
  .vpanel .vtitle .vdesc{font-size:12.5px;color:var(--faint);margin-left:auto;}
  .grid-scroll{overflow-x:auto;}
  .mgrid{display:grid;gap:0;}
  .mgrid .corner,.mgrid .colhead,.mgrid .rowhead,.mgrid .mcell{padding:14px 16px;border-bottom:1px solid var(--line);border-right:1px solid var(--line);display:flex;align-items:center;}
  .mgrid .colhead{justify-content:center;flex-direction:column;gap:2px;background:var(--panel);}
  .mgrid .colhead .zh{font-size:12.5px;color:var(--muted);font-weight:600;}
  .mgrid .colhead .en{font-family:var(--font-mono);font-size:10px;color:var(--faint);letter-spacing:.06em;text-transform:uppercase;}
  .mgrid .rowhead{flex-direction:column;align-items:flex-start;gap:2px;background:var(--panel);}
  .mgrid .rowhead .zh{font-size:12.5px;color:var(--muted);font-weight:600;}
  .mgrid .rowhead .en{font-family:var(--font-mono);font-size:10px;color:var(--faint);letter-spacing:.06em;text-transform:uppercase;}
  .mgrid .mcell{justify-content:center;}
  .mgrid .colhead.lastcol,.mgrid .mcell.lastcol{border-right:none;}

  /* ---------- button ---------- */
  .btn{--fill:var(--i-primary);--fill-h:var(--i-primary-h);--fill-p:var(--i-primary-p);--on:var(--primary-on);
    --edge:var(--i-primary);--fg:var(--i-primary);--tint:var(--i-primary-tint);--tint2:var(--i-primary-tint2);
    display:inline-flex;align-items:center;justify-content:center;gap:.5em;font-family:var(--font-sans);font-weight:600;
    line-height:1;border:1px solid transparent;border-radius:8px;cursor:pointer;white-space:nowrap;
    transition:background .13s,border-color .13s,transform .06s,box-shadow .13s;}
  .btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
  .btn svg{width:1.15em;height:1.15em;flex:0 0 auto;}
  .sz-s{height:32px;padding:0 12px;font-size:13px;border-radius:7px;}
  .sz-m{height:40px;padding:0 16px;font-size:14px;border-radius:8px;}
  .sz-l{height:48px;padding:0 20px;font-size:15.5px;border-radius:10px;}
  .btn.icon-only{padding:0;aspect-ratio:1;} .sz-s.icon-only{width:32px} .sz-m.icon-only{width:40px} .sz-l.icon-only{width:48px}
  .i-primary{--fill:var(--i-primary);--fill-h:var(--i-primary-h);--fill-p:var(--i-primary-p);--on:var(--primary-on);--edge:var(--i-primary);--fg:var(--i-primary);--tint:var(--i-primary-tint);--tint2:var(--i-primary-tint2);}
  .i-danger{--fill:var(--i-danger);--fill-h:var(--i-danger-h);--fill-p:var(--i-danger-p);--on:var(--danger-on);--edge:var(--i-danger);--fg:var(--i-danger);--tint:var(--i-danger-tint);--tint2:var(--i-danger-tint2);}
  .i-secondary{--fill:var(--i-sec-fill);--fill-h:var(--i-sec-fill-h);--fill-p:var(--i-sec-fill-p);--on:var(--i-sec-on);--edge:var(--i-sec-edge);--fg:var(--i-sec-fg);--tint:var(--i-sec-tint);--tint2:var(--i-sec-tint2);}
  .v-solid{background:var(--fill);color:var(--on);border-color:var(--fill);}
  .v-solid.st-hover{background:var(--fill-h);border-color:var(--fill-h);}
  .v-solid.st-pressed{background:var(--fill-p);border-color:var(--fill-p);transform:translateY(1px);}
  .v-outline{background:transparent;color:var(--fg);border-color:var(--edge);}
  .v-outline.st-hover{background:var(--tint);}
  .v-outline.st-pressed{background:var(--tint2);transform:translateY(1px);}
  .v-text{background:transparent;color:var(--fg);border-color:transparent;}
  .v-text.st-hover{background:var(--tint);}
  .v-text.st-pressed{background:var(--tint2);transform:translateY(1px);}
  .st-disabled{opacity:.42;cursor:not-allowed;transform:none !important;}
  /* live real interaction */
  .v-solid.live:hover:not(:disabled){background:var(--fill-h);border-color:var(--fill-h);}
  .v-solid.live:active:not(:disabled){background:var(--fill-p);border-color:var(--fill-p);transform:translateY(1px);}
  .v-outline.live:hover:not(:disabled){background:var(--tint);}
  .v-outline.live:active:not(:disabled){background:var(--tint2);transform:translateY(1px);}
  .v-text.live:hover:not(:disabled){background:var(--tint);}
  .v-text.live:active:not(:disabled){background:var(--tint2);transform:translateY(1px);}

  /* ---------- demo rows ---------- */
  .row-demo{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:26px;display:flex;flex-wrap:wrap;gap:30px;align-items:flex-end;}
  .demo-item{display:flex;flex-direction:column;align-items:flex-start;gap:12px;}
  .demo-item .cap{font-family:var(--font-mono);font-size:11px;color:var(--faint);letter-spacing:.05em;} .demo-item .cap b{color:var(--muted);font-weight:600;}

  /* ---------- live section ---------- */
  .livewrap{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:24px;}
  .ctl-row{display:flex;flex-wrap:wrap;gap:20px 30px;align-items:flex-start;margin-bottom:22px;}
  .ctl{display:flex;flex-direction:column;gap:8px;}
  .ctl .lab{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);}
  .seg{display:inline-flex;background:var(--panel-2);border:1px solid var(--line-strong);border-radius:9px;padding:3px;gap:2px;}
  .seg button{border:none;background:transparent;color:var(--muted);font-family:var(--font-mono);font-size:12px;padding:6px 12px;border-radius:6px;cursor:pointer;transition:.12s;}
  .seg button[aria-pressed="true"]{background:var(--panel);color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.07);}
  .checks{display:flex;gap:18px;flex-wrap:wrap;padding-top:2px;}
  .chk{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;color:var(--muted);cursor:pointer;font-family:var(--font-mono);}
  .chk input{accent-color:var(--accent);width:15px;height:15px;}
  .live-stage{background:var(--panel);border:1px dashed var(--line-strong);border-radius:12px;padding:44px;display:flex;justify-content:center;align-items:center;min-height:118px;}
  .live-note{font-family:var(--font-mono);font-size:11.5px;color:var(--faint);margin:16px 0 8px;}
  .live-free{display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end;}
  /* live 可輸入欄位（裸 input 嵌在 .field 容器內，hover/focus 為真）*/
  .field.live-field{cursor:text;}
  .field .bare{border:none;background:transparent;outline:none;flex:1;min-width:40px;font:inherit;color:var(--ink);padding:0;}
  .field .bare::placeholder{color:var(--faint);}
  .field.live-field:hover{border-color:var(--muted);}
  .field.v-filled.live-field:hover{background:var(--panel-3);border-color:transparent;}
  .field.live-field:focus-within{border-color:var(--accent);}
  .field.v-filled.live-field:focus-within{border-color:var(--accent);background:var(--panel-2);}

  /* ---------- placeholder ---------- */
  .placeholder{border:1px dashed var(--line-strong);border-radius:var(--radius);padding:60px 40px;text-align:center;background:var(--panel);}
  .placeholder .em{font-size:30px;margin-bottom:10px;}
  .placeholder h2{color:var(--ink);font-size:20px;margin:0 0 8px;}
  .placeholder p{color:var(--muted);max-width:46ch;margin:0 auto;font-size:14px;}
  .placeholder .axhint{font-family:var(--font-mono);font-size:12px;color:var(--faint);margin-top:16px;}

  /* ---------- 家族子區塊小標 ---------- */
  .famhead{display:flex;align-items:baseline;gap:10px;margin:46px 0 6px;padding-top:24px;border-top:1px solid var(--line-strong);}
  .famhead:first-child{margin-top:24px;}
  .famhead .fz{font-size:16px;font-weight:680;color:var(--ink);letter-spacing:-.01em;}
  .famhead .fe{font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);}

  /* ---------- 側邊欄置頂：複雜度確認 ---------- */
  .nav-pin{margin-bottom:10px;background:var(--i-primary-tint);color:var(--accent);font-weight:600;border:1px solid transparent;}
  .nav-pin:hover{background:var(--i-primary-tint2);color:var(--accent);}
  .nav-pin[aria-current="true"]{background:var(--accent);color:#fff;}

  /* ---------- 複雜度確認總覽 ---------- */
  .sumbar{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin:22px 0 20px;}
  .sumtotal{font-family:var(--font-mono);font-size:14px;color:var(--muted);font-variant-numeric:tabular-nums;}
  .sumtotal b{color:var(--accent);font-size:18px;} .sumtotal .full{color:var(--faint);}
  .copybtn{height:38px;padding:0 16px;border-radius:8px;border:1px solid var(--accent);background:var(--accent);color:#fff;
    font-family:var(--font-sans);font-size:13.5px;font-weight:600;cursor:pointer;transition:.13s;}
  .copybtn:hover{filter:brightness(1.06);}
  .sumcard{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;margin-bottom:14px;}

  function mountDial(host,cfg){
    const {axes,zh,active,onRender}=cfg;
    const card=ce('div','dcard');
    const head=ce('button','dcard-head');
    const countSpan=ce('span','dh-count');
    const title=ce('span','dh-title');title.textContent='複雜度轉盤';
    const chev=ce('span','dh-chevron');chev.innerHTML=ICON_CARET;
    head.append(title,countSpan,chev);
    const bodyEl=ce('div','dcard-body');
    const hint=ce('p','hint');hint.textContent='勾掉不需要的軸值，矩陣即時縮減。每軸至少保留一個。';bodyEl.appendChild(hint);
    const axesWrap=ce('div','axes');bodyEl.appendChild(axesWrap);
    const full=Object.keys(axes).reduce((a,k)=>a*axes[k].length,1);
    function updateCount(){const parts=Object.keys(axes).map(k=>[...active[k]].length);const total=parts.reduce((a,b)=>a*b,1);countSpan.innerHTML=parts.join(' × ')+' = <b>'+total+'</b> / '+full;}
    Object.keys(axes).forEach(k=>{const ax=ce('div','axis');ax.innerHTML=`<div class="name">${zh.axisName[k]}</div>`;const list=ce('div','chk-list');
      axes[k].forEach(val=>{const row=ce('label','chk-row'+(active[k].has(val)?'':' off'));
        const box=document.createElement('input');box.type='checkbox';box.checked=active[k].has(val);
        const txt=document.createElement('span');txt.textContent=(zh[k][val]||val).replace(/\s.*/,'')+'·'+val;
        box.onchange=()=>{if(!box.checked){if(active[k].size===1){box.checked=true;return;}active[k].delete(val);}else active[k].add(val);
          row.classList.toggle('off',!box.checked);onRender();updateCount();};
        row.append(box,txt);list.appendChild(row);});
      ax.appendChild(list);axesWrap.appendChild(ax);});
    card.append(head,bodyEl);host.appendChild(card);updateCount();
  }

  /* ---- 共用：實際互動 Live 控制面板（segmented 控制 + boolean 勾選 + 即時預覽）---- */
  function mountLive(host,cfg){
    const state=Object.assign({},cfg.initial||{});
    const wrap=ce('div','livewrap');
    const ctlRow=ce('div','ctl-row');
    const stage=ce('div','live-stage');
    function rerender(){stage.innerHTML='';stage.appendChild(cfg.render(state));}
    (cfg.segs||[]).forEach(s=>{
      const c=ce('div','ctl');c.innerHTML=`<span class="lab">${s.label}</span>`;
      const seg=ce('div','seg');
      s.options.forEach((o,i)=>{const b=document.createElement('button');b.textContent=s.labels?s.labels[i]:o;
        b.setAttribute('aria-pressed',state[s.key]===o);
        b.onclick=()=>{state[s.key]=o;[...seg.children].forEach(x=>x.setAttribute('aria-pressed','false'));b.setAttribute('aria-pressed','true');rerender();};
        seg.appendChild(b);});
      c.appendChild(seg);ctlRow.appendChild(c);});
    if((cfg.bools||[]).length){
      const c=ce('div','ctl');c.innerHTML=`<span class="lab">${cfg.boolLabel||'Content'}</span>`;
      const checks=ce('div','checks');
      cfg.bools.forEach(bo=>{const l=ce('label','chk');const i=document.createElement('input');i.type='checkbox';i.checked=!!state[bo.key];
        i.onchange=()=>{state[bo.key]=i.checked;rerender();};l.append(i,document.createTextNode(bo.label));checks.appendChild(l);});
      c.appendChild(checks);ctlRow.appendChild(c);}
    if(ctlRow.children.length)wrap.appendChild(ctlRow);
    wrap.appendChild(stage);
    if(cfg.free){if(cfg.note){const n=ce('p','live-note');n.innerHTML=cfg.note;wrap.appendChild(n);}
      const f=ce('div','live-free');cfg.free().forEach(nd=>f.appendChild(nd));wrap.appendChild(f);}
    host.appendChild(wrap);rerender();
  }

  /* ---- 家族子區塊小標 ---- */

  /* ---- input 家族子元件的靜態 element ---- */

  function checkboxCore(body){
    const Z={default:['預設','default'],hover:['滑過','hover'],checked:['已選','checked'],indeterminate:['半選','indeterminate'],disabled:['停用','disabled'],focus:['聚焦','focus']};

    mountDial(body,{axes,zh,active,onRender:renderM});

  }

  /* ---- TAB ---- */
  function tabCell(v,state){const bar=ce('div',`tabbar v-${v}`);const ti=ce('div',`tabi st-${state}`);ti.textContent='分頁';bar.appendChild(ti);return bar;}
  function tabBarLive(v){const bar=ce('div',`tabbar v-${v}`);['總覽','明細','設定'].forEach((t,i)=>{const ti=ce('button','tabi'+(i===0?' st-active':''));ti.textContent=t;
    ti.onclick=()=>{bar.querySelectorAll('.tabi').forEach(x=>x.classList.remove('st-active'));ti.classList.add('st-active');};bar.appendChild(ti);});return bar;}
  function buildTab(view){
    const body=viewScaffold(view,{eyebrow:'L3 Component · Tab',title:'Tab 分頁',
      lede:'分頁容器；單一觸發鈕拆為 <code>tab-item</code> sub-component。<b>variant：line／contained／pill</b>，狀態 default／hover／active／disabled。',
      specRows:[['axes','<code>variant × state × size</code>'],['formula','tab-item：<code>3 × 4</code>'],['token-policy','<code>semantic.surface/text/border.*</code>'],['composition','tab → N × tab-item（INSTANCE_SWAP）']]});
    const Z={default:['預設','default'],hover:['滑過','hover'],active:['選中','active'],disabled:['停用','disabled']};
    const VN={line:'底線 line',contained:'容器 contained',pill:'藥丸 pill'};
    const axes=DIAL_SPECS.tab.axes, zh=DIAL_SPECS.tab.zh, active=CHOICE.tab.active; // 接中央 store
    let p;
    function renderM(){ if(!p)return; p.innerHTML=''; const vs=axes.variant.filter(v=>active.variant.has(v)),ss=axes.state.filter(s=>active.state.has(s));
      vs.forEach(v=>p.appendChild(matrixPanel({badge:'variant',name:VN[v],rows:ss,cols:['x'],rowLab:s=>labHTML(Z[s][0],Z[s][1]),colLab:()=>labHTML('樣本','tab-item'),cell:s=>tabCell(v,s),mincol:150}))); }
    mountDial(body,{axes,zh,active,onRender:renderM});
    const sec=section(body,'State 矩陣（tab-item，每個 variant）','列＝狀態；三個 variant 的選中樣式不同（line 底線／contained 填色／pill 藥丸）。');p=panelsIn(sec);renderM();
    const sl=section(body,'實際互動 Live','切 variant，下面分頁列可真的點擊切換選中。');
    mountLive(sl,{
      initial:{variant:'line'},
      segs:[{key:'variant',label:'Variant',options:['line','contained','pill']}],
      render:st=>tabBarLive(st.variant)
    });
  }

  /* 家族 id → builder（button 為特例走 buttonView）。form/tag/tab 目前先接代表子元件，家族其餘之後補。 */
  const BUILD={input:buildInput,selector:buildSelector,tag:buildTag,tab:buildTab};

  /* ===== 複雜度確認總覽 ===== */
  function choiceReport(){
    // 回傳 {id:{axis:[選中值],...,count,full}, _total, _full}
    const out={};let total=0,full=0;
    Object.keys(DIAL_SPECS).forEach(id=>{const spec=DIAL_SPECS[id],act=CHOICE[id].active;const rec={};let c=1,f=1;
      spec.order.forEach(k=>{const sel=spec.axes[k].filter(v=>act[k].has(v));rec[k]=sel;c*=sel.length;f*=spec.axes[k].length;});
      rec.count=c;rec.full=f;out[id]=rec;total+=c;full+=f;});
    out._total=total;out._full=full;return out;
  }
  function renderSummary(view){
    view.innerHTML=`<p class="eyebrow">Overview · 複雜度確認</p><h1>複雜度確認</h1>
      <p class="lede">每個元件<b>最後選定的複雜度</b>——之後在設計稿裡就會建立這些 <b>variant × state</b> 組合。回各元件用「複雜度轉盤」勾選，這頁即時彙整。把下方結果複製給我或貼進 DS 建立流程，就知道會產出哪些元件。</p>
      <div class="sumbar"><div class="sumtotal" id="sumTotal"></div><button class="copybtn" id="copyBtn">複製篩選結果 (JSON)</button></div>
      <div id="sumCards"></div>
      <div class="block"><h2>其餘元件</h2><p class="sub" id="sumRest"></p></div>`;
    const rep=choiceReport();
    document.getElementById('sumTotal').innerHTML=`共 <b>${rep._total}</b> 個變體將被建立 <span class="full">/ 全展 ${rep._full}</span>`;
    const host=document.getElementById('sumCards');
    Object.keys(DIAL_SPECS).forEach(id=>{const spec=DIAL_SPECS[id],rec=rep[id];
      const card=ce('div','sumcard');
      let axesHTML='';
      spec.order.forEach(k=>{const all=spec.axes[k];const sel=new Set(rec[k]);
        const chips=all.map(v=>`<span class="sum-chip ${sel.has(v)?'on':'off'}">${(spec.zh[k]&&spec.zh[k][v])||v}·${v}</span>`).join('');
        axesHTML+=`<div class="sum-axis"><span class="sa-name">${spec.zh.axisName[k]}</span><span class="sa-chips">${chips}</span><span class="sa-n">${rec[k].length}/${all.length}</span></div>`;});
      card.innerHTML=`<div class="sc-head"><span class="sc-name">${spec.label}</span><span class="sc-count">${spec.order.map(k=>rec[k].length).join(' × ')} = <b>${rec.count}</b> <span class="full">/ ${rec.full}</span></span></div>${axesHTML}`;
      host.appendChild(card);});
    // 其餘元件（非轉盤）
    const dialIds=new Set(Object.keys(DIAL_SPECS).concat(['input']));
    const built=['search','password','textarea','file（input 家族，以完整狀態建立）'];
    const todo=NAV.flatMap(g=>g.items).filter(it=>!DIAL_SPECS[it.id]&&it.id!=='input'&&!it.st).length;
    document.getElementById('sumRest').innerHTML=`input 家族的 <code>search / password / textarea / file</code> 以完整狀態建立（無轉盤）。其餘 <b>${todo}</b> 個項目為待建，之後定案後會一併納入此總覽。`;
    document.getElementById('copyBtn').onclick=()=>{
      const json={};Object.keys(DIAL_SPECS).forEach(id=>{json[id]={};DIAL_SPECS[id].order.forEach(k=>json[id][k]=rep[id][k]);json[id].count=rep[id].count;});
      json._total=rep._total;
      const txt=JSON.stringify(json,null,2);
      navigator.clipboard.writeText(txt).then(()=>{const b=document.getElementById('copyBtn');b.textContent='已複製 ✓';setTimeout(()=>b.textContent='複製篩選結果 (JSON)',1600);});
    };
  }

  /* ===== 檢視切換 ===== */
  let current='button';
  function renderView(id){
    current=id;const view=document.getElementById('view');
    const item=NAV.flatMap(g=>g.items).find(x=>x.id===id);
    if(id==='summary'){renderSummary(view);}
    else if(id==='button'){view.innerHTML=buttonViewHTML();renderSpecStrip();renderAxes();renderMatrix();renderSizes();renderBooleans();renderCount();renderLive();}
    else if(BUILD[id]){BUILD[id](view);}
    else{view.innerHTML=`<div class="placeholder"><div class="em">🧩</div><h2>${item.name}</h2><p>這顆元件還沒定案。先在已完成的元件上把「元件該多複雜」的模式定下來，我再用同一套方式套到這裡。</p><div class="axhint">預定軸：variant × state × size（＋各自的內容軸）</div></div>`;}
    document.querySelectorAll('.nav-item').forEach(el=>el.setAttribute('aria-current',el.dataset.id===id));
    window.scrollTo(0,0);
  }
  function renderNav(){const host=document.getElementById('sidebar');host.innerHTML='';
    const pin=document.createElement('button');pin.className='nav-item nav-pin';pin.dataset.id='summary';pin.setAttribute('aria-current',current==='summary');
    pin.innerHTML=`<span>📋 複雜度確認</span>`;pin.onclick=()=>renderView('summary');host.appendChild(pin);
    NAV.forEach((g,gi)=>{const grp=document.createElement('div');grp.className='nav-group'+(gi>0?' collapsed':'');
      const head=document.createElement('button');head.className='gh';
      head.innerHTML=`<span class="gh-caret">${ICON_CARET}</span><span class="gh-t">${g.group}</span><span class="gh-n">${g.items.length}</span>`;
      head.onclick=()=>grp.classList.toggle('collapsed');
      const list=document.createElement('div');list.className='ng-items';
      g.items.forEach(it=>{const b=document.createElement('button');b.className='nav-item';b.dataset.id=it.id;b.setAttribute('aria-current',it.id===current);
        const st=STAT[it.st]||'待建';b.innerHTML=`<span>${it.name}</span><span class="tag st-${it.st||'todo'}">${st}</span>`;b.onclick=()=>renderView(it.id);list.appendChild(b);});
      grp.append(head,list);host.appendChild(grp);});}

  /* ===== topbar 行為（側邊欄永遠顯示，無收合）===== */
  document.addEventListener('click',e=>{const h=e.target.closest('.dcard-head');if(h)h.closest('.dcard').classList.toggle('collapsed');});
  (function(){const btn=document.getElementById('themeBtn'),lbl=document.getElementById('themeLabel'),knob=document.getElementById('themeKnob');
    const SUN='<svg viewBox="0 0 256 256" fill="currentColor"><path d="M120,40V16a8,8,0,0,1,16,0V40a8,8,0,0,1-16,0Zm72,88a64,64,0,1,1-64-64A64.07,64.07,0,0,1,192,128Zm-16,0a48,48,0,1,0-48,48A48.05,48.05,0,0,0,176,128ZM58.34,69.66A8,8,0,0,0,69.66,58.34l-16-16A8,8,0,0,0,42.34,53.66Zm0,116.68-16,16a8,8,0,0,0,11.32,11.32l16-16a8,8,0,0,0-11.32-11.32ZM192,72a8,8,0,0,0,5.66-2.34l16-16a8,8,0,0,0-11.32-11.32l-16,16A8,8,0,0,0,192,72Zm5.66,114.34a8,8,0,0,0-11.32,11.32l16,16a8,8,0,0,0,11.32-11.32ZM48,128a8,8,0,0,0-8-8H16a8,8,0,0,0,0,16H40A8,8,0,0,0,48,128Zm80,80a8,8,0,0,0-8,8v24a8,8,0,0,0,16,0V216A8,8,0,0,0,128,208Zm112-88H216a8,8,0,0,0,0,16h24a8,8,0,0,0,0-16Z"/></svg>';
    const MOON='<svg viewBox="0 0 256 256" fill="currentColor"><path d="M240,96a8,8,0,0,1-8,8H216v16a8,8,0,0,1-16,0V104H184a8,8,0,0,1,0-16h16V72a8,8,0,0,1,16,0V88h16A8,8,0,0,1,240,96ZM144,56h8v8a8,8,0,0,0,16,0V56h8a8,8,0,0,0,0-16h-8V32a8,8,0,0,0-16,0v8h-8a8,8,0,0,0,0,16Zm72.77,97a8,8,0,0,1,1.43,8A96,96,0,1,1,95.07,37.8a8,8,0,0,1,10.6,9.06A88.07,88.07,0,0,0,209.14,150.33,8,8,0,0,1,216.77,153Zm-19.39,14.88c-1.79.09-3.59.14-5.38.14A104.11,104.11,0,0,1,88,64c0-1.79,0-3.59.14-5.38A80,80,0,1,0,197.38,167.86Z"/></svg>';
    function cur(){const a=document.documentElement.getAttribute('data-theme');return a||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');}
    function set(t){document.documentElement.setAttribute('data-theme',t);lbl.textContent=t==='dark'?'Dark':'Light';knob.innerHTML=t==='dark'?MOON:SUN;}
    set('light');btn.onclick=()=>set(cur()==='dark'?'light':'dark');})();

  renderNav();renderView('button');
</script>
