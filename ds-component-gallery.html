<meta charset="utf-8">
<title>Design System Library</title>
<style>
  :root{
    --canvas:#F6F7FA; --panel:#FFFFFF; --panel-2:#F1F3F7; --panel-3:#EAEDF2;
    --ink:#1B1F28; --muted:#59616F; --faint:#8993A2;
    --line:#E4E7ED; --line-strong:#D2D8E1;
    --accent:#3358D4;
    --i-primary:#3358D4; --i-primary-h:#2B49B6; --i-primary-p:#233C97;
    --i-primary-tint:rgba(51,88,212,.10); --i-primary-tint2:rgba(51,88,212,.20);
    --i-danger:#D14343; --i-danger-h:#BB3636; --i-danger-p:#9E2C2C;
    --i-danger-tint:rgba(209,67,67,.10); --i-danger-tint2:rgba(209,67,67,.20);
    --i-sec-fill:#E8EAEF; --i-sec-fill-h:#DCDFE6; --i-sec-fill-p:#CDD2DB;
    --i-sec-on:#2A2F3A; --i-sec-edge:#C4C9D3; --i-sec-fg:#3A4150;
    --i-sec-tint:rgba(90,100,116,.10); --i-sec-tint2:rgba(90,100,116,.18);
    --primary-on:#FFFFFF; --danger-on:#FFFFFF;
    --font-sans:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,"PingFang TC","Noto Sans TC",sans-serif;
    --font-mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,monospace;
    --radius:14px;
  }
  @media (prefers-color-scheme:dark){ :root{
      --canvas:#0E1116; --panel:#161A21; --panel-2:#1C212A; --panel-3:#232935;
      --ink:#E7EAF0; --muted:#98A2B2; --faint:#697384;
      --line:#262C37; --line-strong:#343B47; --accent:#6E8AF5;
      --i-primary:#4E6EE6; --i-primary-h:#6180F0; --i-primary-p:#3F5AD0;
      --i-primary-tint:rgba(110,138,245,.14); --i-primary-tint2:rgba(110,138,245,.26);
      --i-danger:#E05A5A; --i-danger-h:#EC6E6E; --i-danger-p:#C74848;
      --i-danger-tint:rgba(224,90,90,.14); --i-danger-tint2:rgba(224,90,90,.26);
      --i-sec-fill:#262C37; --i-sec-fill-h:#2E3540; --i-sec-fill-p:#373F4B;
      --i-sec-on:#E7EAF0; --i-sec-edge:#3A424E; --i-sec-fg:#C4CBD7;
      --i-sec-tint:rgba(154,163,178,.12); --i-sec-tint2:rgba(154,163,178,.22);
  }}
  :root[data-theme="dark"]{
      --canvas:#0E1116; --panel:#161A21; --panel-2:#1C212A; --panel-3:#232935;
      --ink:#E7EAF0; --muted:#98A2B2; --faint:#697384;
      --line:#262C37; --line-strong:#343B47; --accent:#6E8AF5;
      --i-primary:#4E6EE6; --i-primary-h:#6180F0; --i-primary-p:#3F5AD0;
      --i-primary-tint:rgba(110,138,245,.14); --i-primary-tint2:rgba(110,138,245,.26);
      --i-danger:#E05A5A; --i-danger-h:#EC6E6E; --i-danger-p:#C74848;
      --i-danger-tint:rgba(224,90,90,.14); --i-danger-tint2:rgba(224,90,90,.26);
      --i-sec-fill:#262C37; --i-sec-fill-h:#2E3540; --i-sec-fill-p:#373F4B;
      --i-sec-on:#E7EAF0; --i-sec-edge:#3A424E; --i-sec-fg:#C4CBD7;
      --i-sec-tint:rgba(154,163,178,.12); --i-sec-tint2:rgba(154,163,178,.22);
  }
  :root[data-theme="light"]{
      --canvas:#F6F7FA; --panel:#FFFFFF; --panel-2:#F1F3F7; --panel-3:#EAEDF2;
      --ink:#1B1F28; --muted:#59616F; --faint:#8993A2;
      --line:#E4E7ED; --line-strong:#D2D8E1; --accent:#3358D4;
      --i-primary:#3358D4; --i-primary-h:#2B49B6; --i-primary-p:#233C97;
      --i-primary-tint:rgba(51,88,212,.10); --i-primary-tint2:rgba(51,88,212,.20);
      --i-danger:#D14343; --i-danger-h:#BB3636; --i-danger-p:#9E2C2C;
      --i-danger-tint:rgba(209,67,67,.10); --i-danger-tint2:rgba(209,67,67,.20);
      --i-sec-fill:#E8EAEF; --i-sec-fill-h:#DCDFE6; --i-sec-fill-p:#CDD2DB;
      --i-sec-on:#2A2F3A; --i-sec-edge:#C4C9D3; --i-sec-fg:#3A4150;
      --i-sec-tint:rgba(90,100,116,.10); --i-sec-tint2:rgba(90,100,116,.18);
  }

  *{box-sizing:border-box}
  html,body{margin:0;height:100%;}
  body{background:var(--canvas);color:var(--ink);font-family:var(--font-sans);-webkit-font-smoothing:antialiased;line-height:1.5;overflow:hidden;} /* app-shell：document 不捲，捲動交給 sidebar / main */

  /* ---------- scrollbar：純標準屬性一套（scrollbar-width/color 會被繼承，整頁與側邊欄自動一致）。
       不混用 ::-webkit-scrollbar——同時存在會讓 Chrome 對 root 與元素捲軸挑不同渲染路徑，一粗一細。
       無底色（track = transparent）、深淺不同色 ---------- */
  html,body,*{scrollbar-width:thin;scrollbar-color:#C4C9D3 transparent;}
  :root[data-theme="light"],:root[data-theme="light"] *{scrollbar-color:#C4C9D3 transparent;}
  :root[data-theme="dark"],:root[data-theme="dark"] *{scrollbar-color:#3D4553 transparent;}
  @media(prefers-color-scheme:dark){html,body,*{scrollbar-color:#3D4553 transparent;}}

  /* ---------- topbar ---------- */
  .topbar{z-index:30;height:58px;flex:0 0 58px;display:flex;align-items:center;gap:14px;
    padding:0 18px;background:var(--panel);border-bottom:1px solid var(--line);}
  .hamb{display:none;width:38px;height:38px;border:1px solid var(--line-strong);border-radius:9px;background:var(--panel);
    color:var(--muted);cursor:pointer;align-items:center;justify-content:center;transition:.13s;flex:0 0 auto;}
  .hamb:hover{color:var(--ink);border-color:var(--accent);}
  .hamb svg{width:19px;height:19px;}
  .brand{display:flex;align-items:center;gap:11px;min-width:0;}
  .brand-logo{height:20px;width:auto;display:block;color:var(--ink);flex:0 0 auto;}
  .brand .divider{width:1px;height:18px;background:var(--line-strong);flex:0 0 auto;}
  .brand-title{font-size:14px;font-weight:640;color:var(--ink);white-space:nowrap;letter-spacing:-.005em;}
  .spacer{flex:1}
  .theme-toggle{position:relative;width:46px;height:26px;box-sizing:border-box;flex:0 0 auto;background:var(--panel-3);
    border:1px solid var(--line-strong);border-radius:999px;padding:0;cursor:pointer;transition:background .18s,border-color .18s;}
  .theme-toggle:hover{border-color:var(--accent);}
  .theme-toggle .knob{position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:999px;background:var(--accent);color:#fff;
    display:flex;align-items:center;justify-content:center;transition:transform .22s cubic-bezier(.4,0,.2,1);}
  .theme-toggle .knob svg{width:12px;height:12px;}
  :root[data-theme="dark"] .theme-toggle .knob{transform:translateX(20px);}

  /* ---------- layout ---------- */
  .shell{--sb:max(200px,20vw);height:100vh;height:100dvh;display:flex;flex-direction:column;} /* 整個 app 固定一屏；側邊欄＝20vw，最小 200px */
  .layout{flex:1 1 auto;min-height:0;display:grid;grid-template-columns:var(--sb) 1fr;} /* 填滿 topbar 以下的剩餘高度；min-height:0 讓子欄可各自內捲 */
  .sidebar{min-height:0;overflow-y:auto;border-right:1px solid var(--line);background:var(--panel);padding:16px 12px;} /* 撐滿 layout 高度、自身垂直捲動 */
  .main{min-width:0;min-height:0;overflow:auto;padding:34px 34px 96px;} /* 填滿右側、內容過寬/過高皆可上下左右捲 */
  .container{max-width:none;} /* 右側內容填滿寬度 */

  /* 類別間以淺灰細線分隔；類別標題與頁籤標題同字級/字重/顏色 */
  .nav-group{border-top:1px solid var(--line);margin-top:8px;padding-top:8px;margin-bottom:2px;}
  .nav-group .gh{display:flex;align-items:center;gap:8px;width:100%;text-align:left;background:transparent;border:none;cursor:pointer;
    font-family:var(--font-sans);font-size:13.5px;font-weight:600;color:var(--muted);
    padding:7px 10px;border-radius:8px;transition:.12s;}
  .nav-group .gh:hover{background:var(--canvas);}
  .nav-group .gh .gh-n{font-family:var(--font-mono);font-size:11px;color:var(--faint);font-variant-numeric:tabular-nums;min-width:13px;text-align:center;flex:0 0 auto;} /* 計數在 chevron 左邊、無底色 */
  .nav-group .gh .gh-caret{display:inline-flex;transition:transform .18s;color:var(--faint);flex:0 0 auto;} /* 計數＋chevron 靠標題右側，標題靠左 */
  .nav-group .gh .gh-caret svg{width:13px;height:13px;display:block;}
  .nav-group .gh .gh-t{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .nav-group.collapsed .gh .gh-caret{transform:rotate(-90deg);}
  .nav-group.collapsed .ng-items{display:none;}
  .ng-items{position:relative;padding-left:23px;} /* 展開內層往內縮 */
  .ng-items::before{content:'';position:absolute;left:14px;top:1px;bottom:1px;width:1px;background:var(--line);}
  .nav-item{display:flex;align-items:center;gap:8px;width:100%;text-align:left;border:none;background:transparent;
    color:var(--muted);font-family:var(--font-sans);font-size:13.5px;font-weight:600;padding:7px 10px;border-radius:8px;cursor:pointer;transition:.12s;}
  .nav-item:hover{background:var(--canvas);}
  .nav-item[aria-current="true"]{background:var(--i-primary-tint);color:var(--accent);} /* 當前頁淺藍底 */
  .nav-item .nm{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .nav-item .dot{margin-left:auto;width:7px;height:7px;border-radius:999px;flex:0 0 auto;background:var(--line-strong);} /* 建立狀態＝色圈 */
  .nav-item .dot.st-ready{background:var(--ok);}
  .nav-item .dot.st-partial{background:var(--warn);}

  /* ---------- headings / spec ---------- */
  .eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--accent);font-weight:600;margin:0 0 10px;}
  h1{font-size:28px;line-height:1.15;letter-spacing:-.02em;margin:0 0 10px;text-wrap:balance;font-weight:680;}
  .lede{color:var(--muted);max-width:62ch;margin:0;font-size:14.5px;}
  .lede b{color:var(--ink);} .lede code{font-family:var(--font-mono);font-size:12.5px;background:var(--panel-2);padding:1px 6px;border-radius:5px;}

  .spec{margin:26px 0 8px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:20px 22px;display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:18px 26px;}
  .spec .cell .k{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-bottom:6px;}
  .spec .cell .v{font-size:13.5px;color:var(--ink);}
  .spec .cell .v code{font-family:var(--font-mono);font-size:12px;background:var(--panel-2);padding:1px 6px;border-radius:5px;color:var(--muted);}

  /* ---------- dial ---------- */
  .dial{margin:22px 0 34px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:22px;}
  .dial .head{display:flex;justify-content:space-between;align-items:baseline;gap:16px;flex-wrap:wrap;margin-bottom:4px;}
  .dial h2{font-size:15px;margin:0;font-weight:640;}
  .dial .hint{color:var(--muted);font-size:13px;margin:2px 0 18px;}
  .count{font-family:var(--font-mono);font-size:13px;color:var(--muted);font-variant-numeric:tabular-nums;}
  .count b{color:var(--accent);font-size:15px;} .count .full{color:var(--faint);}
  .axes{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px 16px;}
  .axis .name{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-bottom:8px;}
  /* 複雜度轉盤：勾選清單（每個軸值一列，前面 checkbox）*/
  .chk-list{display:flex;flex-direction:column;gap:1px;}
  .chk-list .chk-row{display:flex;align-items:center;gap:9px;padding:6px 8px;border-radius:7px;cursor:pointer;
    font-family:var(--font-mono);font-size:12.5px;color:var(--muted);user-select:none;transition:background .12s,color .12s;}
  .chk-list .chk-row:hover{background:var(--panel-2);color:var(--ink);}
  .chk-list .chk-row input{accent-color:var(--accent);width:16px;height:16px;flex:0 0 auto;cursor:pointer;margin:0;}
  .chk-list .chk-row.off{color:var(--faint);}
  .chips{display:flex;flex-wrap:wrap;gap:6px;}
  /* tab-button 樣式：active 實色填滿、inactive 灰階 */
  .chip{display:inline-flex;align-items:center;border:1px solid var(--line-strong);background:var(--panel-2);
    color:var(--faint);border-radius:999px;padding:7px 14px;font-size:12px;cursor:pointer;user-select:none;
    transition:.13s;font-family:var(--font-mono);filter:grayscale(1);}
  .chip:hover{border-color:var(--accent);color:var(--muted);}
  .chip[aria-pressed="true"]{background:var(--accent);border-color:var(--accent);color:#fff;filter:none;
    box-shadow:0 1px 3px rgba(0,0,0,.14);}
  .chip[aria-pressed="true"]:hover{color:#fff;}

  /* ---------- blocks ---------- */
  section.block{margin:44px 0 0;}
  .block > h2{font-size:13px;font-family:var(--font-mono);letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:0 0 4px;font-weight:600;}
  .block > .sub{color:var(--faint);font-size:13px;margin:0 0 20px;} .block > .sub code{font-family:var(--font-mono);background:var(--panel-2);padding:1px 5px;border-radius:4px;}

  .panels{display:flex;flex-direction:column;gap:18px;}
  .vpanel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;}
  .vpanel .vtitle{display:flex;align-items:center;gap:10px;padding:14px 20px;border-bottom:1px solid var(--line);background:var(--panel-2);}
  .vpanel .vtitle .badge{font-family:var(--font-mono);font-size:11px;color:var(--accent);border:1px solid var(--line-strong);border-radius:6px;padding:2px 8px;letter-spacing:.04em;}
  .vpanel .vtitle .vname{font-size:14px;font-weight:620;}
  .vpanel .vtitle .vdesc{font-size:12.5px;color:var(--faint);margin-left:auto;}
  .grid-scroll{overflow-x:auto;}
  .mgrid{display:grid;gap:0;}
  .mgrid .corner,.mgrid .colhead,.mgrid .rowhead,.mgrid .mcell{padding:14px 16px;border-bottom:1px solid var(--line);border-right:1px solid var(--line);display:flex;align-items:center;}
  .mgrid .colhead{justify-content:center;flex-direction:column;gap:2px;background:var(--panel);}
  .mgrid .colhead .zh{font-size:12.5px;color:var(--muted);font-weight:600;}
  .mgrid .colhead .en{font-family:var(--font-mono);font-size:10px;color:var(--faint);letter-spacing:.06em;text-transform:uppercase;}
  .mgrid .rowhead{flex-direction:column;align-items:flex-start;gap:2px;background:var(--panel);}
  .mgrid .rowhead .zh{font-size:12.5px;color:var(--muted);font-weight:600;}
  .mgrid .rowhead .en{font-family:var(--font-mono);font-size:10px;color:var(--faint);letter-spacing:.06em;text-transform:uppercase;}
  .mgrid .mcell{justify-content:center;}
  .mgrid .colhead.lastcol,.mgrid .mcell.lastcol{border-right:none;}

  /* ---------- button ---------- */
  .btn{--fill:var(--i-primary);--fill-h:var(--i-primary-h);--fill-p:var(--i-primary-p);--on:var(--primary-on);
    --edge:var(--i-primary);--fg:var(--i-primary);--tint:var(--i-primary-tint);--tint2:var(--i-primary-tint2);
    display:inline-flex;align-items:center;justify-content:center;gap:.5em;font-family:var(--font-sans);font-weight:600;
    line-height:1;border:0.75px solid transparent;border-radius:8px;cursor:pointer;white-space:nowrap;
    transition:background .13s,border-color .13s,transform .06s,box-shadow .13s;}
  .btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
  .btn svg{width:1.15em;height:1.15em;flex:0 0 auto;}
  .sz-s{height:32px;padding:0 12px;font-size:13px;border-radius:7px;}
  .sz-m{height:40px;padding:0 16px;font-size:14px;border-radius:8px;}
  .sz-l{height:48px;padding:0 20px;font-size:15.5px;border-radius:10px;}
  .btn.icon-only{padding:0;aspect-ratio:1;} .sz-s.icon-only{width:32px} .sz-m.icon-only{width:40px} .sz-l.icon-only{width:48px}
  .i-primary{--fill:var(--i-primary);--fill-h:var(--i-primary-h);--fill-p:var(--i-primary-p);--on:var(--primary-on);--edge:var(--i-primary);--fg:var(--i-primary);--tint:var(--i-primary-tint);--tint2:var(--i-primary-tint2);}
  .i-danger{--fill:var(--i-danger);--fill-h:var(--i-danger-h);--fill-p:var(--i-danger-p);--on:var(--danger-on);--edge:var(--i-danger);--fg:var(--i-danger);--tint:var(--i-danger-tint);--tint2:var(--i-danger-tint2);}
  .i-secondary{--fill:var(--i-sec-fill);--fill-h:var(--i-sec-fill-h);--fill-p:var(--i-sec-fill-p);--on:var(--i-sec-on);--edge:var(--i-sec-edge);--fg:var(--i-sec-fg);--tint:var(--i-sec-tint);--tint2:var(--i-sec-tint2);}
  .v-solid{background:var(--fill);color:var(--on);border-color:var(--fill);}
  .v-solid.st-hover{background:var(--fill-h);border-color:var(--fill-h);}
  .v-solid.st-pressed{background:var(--fill-p);border-color:var(--fill-p);transform:translateY(1px);}
  .v-outline{background:transparent;color:var(--fg);border-color:var(--edge);}
  .v-outline.st-hover{background:var(--tint);}
  .v-outline.st-pressed{background:var(--tint2);transform:translateY(1px);}
  .v-text{background:transparent;color:var(--fg);border-color:transparent;}
  .v-text.st-hover{background:var(--tint);}
  .v-text.st-pressed{background:var(--tint2);transform:translateY(1px);}
  .st-disabled{opacity:.42;cursor:not-allowed;transform:none !important;}
  /* live real interaction */
  .v-solid.live:hover:not(:disabled){background:var(--fill-h);border-color:var(--fill-h);}
  .v-solid.live:active:not(:disabled){background:var(--fill-p);border-color:var(--fill-p);transform:translateY(1px);}
  .v-outline.live:hover:not(:disabled){background:var(--tint);}
  .v-outline.live:active:not(:disabled){background:var(--tint2);transform:translateY(1px);}
  .v-text.live:hover:not(:disabled){background:var(--tint);}
  .v-text.live:active:not(:disabled){background:var(--tint2);transform:translateY(1px);}

  /* ---------- demo rows ---------- */
  .row-demo{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:26px;display:flex;flex-wrap:wrap;gap:30px;align-items:flex-end;}
  .demo-item{display:flex;flex-direction:column;align-items:flex-start;gap:12px;}
  .demo-item .cap{font-family:var(--font-mono);font-size:11px;color:var(--faint);letter-spacing:.05em;} .demo-item .cap b{color:var(--muted);font-weight:600;}

  /* ---------- live section ---------- */
  .livewrap{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:24px;}
  .ctl-row{display:flex;flex-wrap:wrap;gap:20px 30px;align-items:flex-start;margin-bottom:22px;}
  .ctl{display:flex;flex-direction:column;gap:8px;}
  .ctl .lab{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);}
  .seg{display:inline-flex;background:var(--panel-2);border:1px solid var(--line-strong);border-radius:9px;padding:3px;gap:2px;}
  .seg button{border:none;background:transparent;color:var(--muted);font-family:var(--font-mono);font-size:12px;padding:6px 12px;border-radius:6px;cursor:pointer;transition:.12s;}
  .seg button[aria-pressed="true"]{background:var(--panel);color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.07);}
  .checks{display:flex;gap:18px;flex-wrap:wrap;padding-top:2px;}
  .chk{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;color:var(--muted);cursor:pointer;font-family:var(--font-mono);}
  .chk input{accent-color:var(--accent);width:15px;height:15px;}
  .live-stage{background:var(--panel);border:1px dashed var(--line-strong);border-radius:12px;padding:44px;display:flex;justify-content:center;align-items:center;min-height:118px;}
  .live-note{font-family:var(--font-mono);font-size:11.5px;color:var(--faint);margin:16px 0 8px;}
  .live-free{display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end;}
  /* live 可輸入欄位（裸 input 嵌在 .field 容器內，hover/focus 為真）*/
  .field.live-field{cursor:text;}
  .field .bare{border:none;background:transparent;outline:none;flex:1;min-width:40px;font:inherit;color:var(--ink);padding:0;}
  .field .bare::placeholder{color:var(--faint);}
  .field.live-field:hover{border-color:var(--muted);}
  .field.v-filled.live-field:hover{background:var(--panel-3);border-color:transparent;}
  .field.live-field:focus-within{border-color:var(--accent);}
  .field.v-filled.live-field:focus-within{border-color:var(--accent);background:var(--panel-2);}

  /* ---------- placeholder ---------- */
  .placeholder{border:1px dashed var(--line-strong);border-radius:var(--radius);padding:60px 40px;text-align:center;background:var(--panel);}
  .placeholder .em{font-size:30px;margin-bottom:10px;}
  .placeholder h2{color:var(--ink);font-size:20px;margin:0 0 8px;}
  .placeholder p{color:var(--muted);max-width:46ch;margin:0 auto;font-size:14px;}
  .placeholder .axhint{font-family:var(--font-mono);font-size:12px;color:var(--faint);margin-top:16px;}

  /* ---------- 家族子區塊小標 ---------- */
  .famhead{display:flex;align-items:baseline;gap:10px;margin:46px 0 6px;padding-top:24px;border-top:1px solid var(--line-strong);}
  .famhead:first-child{margin-top:24px;}
  .famhead .fz{font-size:16px;font-weight:680;color:var(--ink);letter-spacing:-.01em;}
  .famhead .fe{font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);}

  /* ---------- 側邊欄置頂：複雜度確認（與其他頁同一套 current 高亮邏輯）---------- */
  .nav-pin{margin-bottom:2px;}

  /* ---------- 複雜度確認總覽 ---------- */
  .sum-top{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
  .sum-top .sum-head{min-width:0;} .sum-top .copybtn{flex:0 0 auto;}
  .sum-actions{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin:22px 0 20px;}
  .sum-actions .spacer{flex:1;}
  .sumtotal{font-family:var(--font-mono);font-size:13.5px;color:var(--muted);font-variant-numeric:tabular-nums;}
  .sumtotal b{color:var(--accent);font-size:16px;} .sumtotal .full{color:var(--faint);}
  .aitoggle{display:inline-flex;align-items:center;gap:9px;height:38px;padding:0 8px 0 14px;border-radius:999px;border:1px solid var(--line-strong);
    background:var(--panel-2);color:var(--muted);font-family:var(--font-sans);font-size:13.5px;font-weight:600;cursor:pointer;transition:.15s;}
  .aitoggle:hover{border-color:var(--accent);color:var(--ink);}
  .aitoggle svg{width:16px;height:16px;flex:0 0 auto;}
  .aitoggle .sw{position:relative;width:34px;height:20px;border-radius:999px;background:var(--line-strong);transition:background .18s;flex:0 0 auto;}
  .aitoggle .sw::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:999px;background:#fff;transition:transform .2s;box-shadow:0 1px 2px rgba(0,0,0,.2);}
  .aitoggle.on{background:var(--i-primary-tint);border-color:transparent;color:var(--accent);}
  .aitoggle.on .sw{background:var(--accent);}
  .aitoggle.on .sw::after{transform:translateX(14px);}
  .copybtn{height:38px;padding:0 16px;border-radius:8px;border:1px solid var(--accent);background:var(--accent);color:#fff;
    font-family:var(--font-sans);font-size:13.5px;font-weight:600;cursor:pointer;transition:.13s;}
  .copybtn:hover{filter:brightness(1.06);}
  .sumcard{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;transition:opacity .15s,border-color .13s;}
  .sumcard.unpicked{opacity:.5;}
  .sc-head{display:flex;align-items:center;gap:13px;padding:15px 20px;cursor:pointer;}
  .sc-head:hover{background:var(--canvas);}
  .sc-check{display:inline-flex;flex:0 0 auto;align-items:center;}
  .sc-check input{width:17px;height:17px;accent-color:var(--accent);cursor:pointer;margin:0;}
  .sc-name{font-size:15px;font-weight:640;flex:1;min-width:0;}
  .sc-count{font-family:var(--font-mono);font-size:12.5px;color:var(--muted);font-variant-numeric:tabular-nums;flex:0 0 auto;} .sc-count b{color:var(--accent);} .sc-count .full{color:var(--faint);}
  .sc-chevron{display:inline-flex;color:var(--faint);transition:transform .18s;flex:0 0 auto;}
  .sc-chevron svg{width:14px;height:14px;display:block;}
  .sumcard.collapsed .sc-chevron{transform:rotate(-90deg);}
  .sc-body{padding:4px 20px 20px;border-top:1px solid var(--line);}
  .sumcard.collapsed .sc-body{display:none;}
  .sc-sub{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.09em;text-transform:uppercase;color:var(--faint);margin:18px 0 10px;}
  .sc-foot{display:flex;justify-content:flex-end;margin-top:18px;padding-top:16px;border-top:1px solid var(--line);}
  .adjustbtn{display:inline-flex;align-items:center;gap:7px;height:34px;padding:0 14px;border-radius:8px;border:1px solid var(--line-strong);
    background:transparent;color:var(--muted);font-family:var(--font-sans);font-size:13px;font-weight:600;cursor:pointer;transition:.13s;}
  .adjustbtn:hover{border-color:var(--accent);color:var(--accent);}
  .adjustbtn svg{width:14px;height:14px;flex:0 0 auto;}
  .sum-axis{display:flex;align-items:baseline;gap:12px;padding:6px 0;}
  .sum-axis .sa-name{flex:0 0 110px;font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);padding-top:3px;}
  .sum-axis .sa-chips{flex:1;display:flex;flex-wrap:wrap;gap:6px;}
  .sum-axis .sa-n{flex:0 0 auto;font-family:var(--font-mono);font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums;}
  .sum-chip{display:inline-flex;font-family:var(--font-mono);font-size:11.5px;padding:3px 9px;border-radius:999px;border:1px solid var(--line-strong);}
  .sum-chip.on{background:var(--i-primary-tint);color:var(--accent);border-color:transparent;}
  .sum-chip.off{color:var(--faint);text-decoration:line-through;opacity:.6;}

  /* ===== extra semantic tokens ===== */
  :root{--ok:#2E9E6B;--ok-tint:rgba(46,158,107,.12);--warn:#C08A2E;}
  @media(prefers-color-scheme:dark){:root{--ok:#4FB88A;--ok-tint:rgba(79,184,138,.16);--warn:#D8A54A;}}
  :root[data-theme="dark"]{--ok:#4FB88A;--ok-tint:rgba(79,184,138,.16);--warn:#D8A54A;}
  :root[data-theme="light"]{--ok:#2E9E6B;--ok-tint:rgba(46,158,107,.12);--warn:#C08A2E;}

  /* ===== input ===== */
  .field{display:inline-flex;align-items:center;gap:8px;height:40px;padding:0 12px;border-radius:8px;
    border:0.75px solid var(--i-sec-edge);background:var(--panel);color:var(--ink);font-size:14px;min-width:220px;
    font-family:var(--font-sans);transition:border-color .13s,box-shadow .13s,background .13s;}
  .field .ph{color:var(--faint);flex:1;} .field .val{color:var(--ink);flex:1;}
  .field svg{width:17px;height:17px;color:var(--muted);flex:0 0 auto;}
  .field .fieldclear{display:inline-flex;cursor:pointer;flex:0 0 auto;}
  .field .fieldclear svg{color:var(--faint);}
  .field .fieldclear:hover svg{color:var(--muted);}
  .field.v-filled{background:var(--panel-2);border-color:transparent;}
  .field.st-hover{border-color:var(--muted);}                       /* outline hover：換邊框色 */
  .field.v-filled.st-hover{background:var(--panel-3);border-color:transparent;} /* filled hover：加深底色、不加框 */
  .field.st-focus{border-color:var(--accent);}
  .field.st-disabled{opacity:.5;cursor:not-allowed;}
  .field.st-error{border-color:var(--i-danger);}                    /* error：只描紅框、無外陰影 */
  /* 真實互動 hover（live 欄位）*/
  input.field{outline:none;}
  input.field:hover:not(:focus){border-color:var(--muted);}
  input.field.v-filled:hover:not(:focus){background:var(--panel-3);border-color:transparent;}
  input.field:focus{border-color:var(--accent);}
  .fieldwrap{display:flex;flex-direction:column;gap:6px;min-width:240px;}
  .fieldwrap .fl{font-size:12.5px;color:var(--muted);font-weight:600;}
  .fieldwrap .fl .req{color:var(--i-danger);margin-left:1px;}
  .fieldwrap .fh{font-size:11.5px;color:var(--faint);} .fieldwrap .fh.err{color:var(--i-danger);}

  /* ===== textarea 多行輸入 ===== */
  .tarea{display:flex;align-items:flex-start;min-height:80px;padding:10px 12px;border-radius:8px;border:0.75px solid var(--i-sec-edge);
    background:var(--panel);color:var(--ink);font-size:14px;min-width:260px;font-family:var(--font-sans);line-height:1.5;transition:border-color .13s,background .13s;}
  .tarea .ph{color:var(--faint);} .tarea .val{color:var(--ink);}
  .tarea.v-filled{background:var(--panel-2);border-color:transparent;}
  .tarea.st-hover{border-color:var(--muted);} .tarea.v-filled.st-hover{background:var(--panel-3);border-color:transparent;}
  .tarea.st-focus{border-color:var(--accent);}
  .tarea.st-disabled{opacity:.5;} .tarea.st-error{border-color:var(--i-danger);}
  textarea.tarea{outline:none;resize:vertical;width:100%;color:var(--ink);}
  textarea.tarea::placeholder{color:var(--faint);}
  textarea.tarea:hover:not(:focus){border-color:var(--muted);}
  textarea.tarea.v-filled:hover:not(:focus){background:var(--panel-3);border-color:transparent;}
  textarea.tarea:focus{border-color:var(--accent);}

  /* ===== file 檔案上傳 ===== */
  .filefield{display:inline-flex;align-items:center;gap:10px;padding:0 10px;height:40px;border-radius:8px;
    border:0.75px solid var(--i-sec-edge);background:var(--panel);min-width:260px;font-size:13.5px;color:var(--muted);transition:.13s;}
  .filefield.has-file{color:var(--ink);}
  /* file variant：外框／實色 對齊 input（外框＝白底實線、實色＝panel-2 填色）*/
  .filefield.v-solid{background:var(--panel-2);border-color:transparent;color:var(--ink);}
  .filefield.v-solid.st-hover{background:var(--panel-3);border-color:transparent;}
  .live-stage .filefield.v-solid:not(.st-disabled):hover{background:var(--panel-3);border-color:transparent;}
  .filefield.st-hover{border-color:var(--accent);color:var(--ink);}
  .filefield.st-focus{border-color:var(--accent);}
  .filefield.st-disabled{opacity:.5;}
  .filefield.st-error{border-color:var(--i-danger);}
  .filefield .fname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .filefield svg{width:16px;height:16px;flex:0 0 auto;color:var(--muted);}
  .filebtn{display:inline-flex;align-items:center;gap:6px;height:28px;padding:0 12px;border-radius:6px;
    background:var(--i-sec-fill);color:var(--i-sec-on);font-size:12.5px;font-weight:600;border:none;cursor:pointer;flex:0 0 auto;}
  .filebtn svg{color:var(--i-sec-on);}
  .filefield .fieldclear{display:inline-flex;cursor:pointer;flex:0 0 auto;}
  .filefield .fieldclear svg{color:var(--faint);}
  .filefield .fieldclear:hover svg{color:var(--muted);}
  /* file live 真實 hover（只作用在 Live 預覽，不影響狀態列）*/
  .live-stage .filefield:not(.st-disabled):hover{border-color:var(--accent);color:var(--ink);}
  .live-stage .filefield:not(.st-disabled) .filebtn:hover{background:var(--i-sec-fill-h);}

  /* ===== dropdown 下拉 ===== */
  .field.dd{cursor:pointer;}
  .field.st-open{border-color:var(--accent);}
  .field.v-filled.st-open{border-color:var(--accent);background:var(--panel-2);}
  .ddcaret{display:inline-flex;color:var(--muted);flex:0 0 auto;transition:transform .15s;}
  .ddcaret.up{transform:rotate(180deg);}
  .ddwrap{position:relative;display:inline-block;min-width:260px;}
  .ddmenu{position:absolute;left:0;right:0;top:calc(100% + 6px);z-index:20;background:var(--panel);border:1px solid var(--line-strong);
    border-radius:8px;box-shadow:0 10px 30px rgba(0,0,0,.16);padding:5px;max-height:240px;overflow-y:auto;}
  .ddopt{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:6px;font-size:13.5px;color:var(--ink);cursor:pointer;}
  .ddopt:hover{background:var(--i-primary-tint);color:var(--accent);}
  .ddopt.sel{color:var(--accent);font-weight:600;}
  .ddsearch{width:100%;box-sizing:border-box;height:34px;padding:0 10px;margin-bottom:4px;border:1px solid var(--i-sec-edge);
    border-radius:6px;background:var(--panel-2);color:var(--ink);font-size:13px;outline:none;}
  .ddsearch:focus{border-color:var(--accent);}
  /* 多選 dropdown：trigger 內 chip + 選項勾選框 */
  .dd-body{flex:1;display:flex;flex-wrap:wrap;gap:4px;align-items:center;min-width:0;}
  .field.dd.multi{height:auto;min-height:40px;padding-top:5px;padding-bottom:5px;}
  .ddchip{display:inline-flex;align-items:center;gap:4px;height:22px;padding:0 4px 0 9px;border-radius:6px;
    background:var(--i-primary-tint);color:var(--accent);font-size:12px;font-weight:600;}
  .ddchip .x{display:inline-flex;cursor:pointer;opacity:.7;} .ddchip .x:hover{opacity:1;} .ddchip svg{width:12px;height:12px;}
  .ddcheck{width:16px;height:16px;border:1.5px solid var(--i-sec-edge);border-radius:4px;display:inline-flex;
    align-items:center;justify-content:center;color:#fff;flex:0 0 auto;}
  .ddopt.on .ddcheck{background:var(--accent);border-color:var(--accent);}
  .ddcheck svg{width:12px;height:12px;}

  /* ===== checkbox / radio ===== */
  .cbx{border:1.5px solid var(--i-sec-edge);background:var(--panel);border-radius:6px;display:inline-flex;box-sizing:border-box;padding:0;flex:0 0 auto;
    align-items:center;justify-content:center;color:#fff;transition:.12s;cursor:pointer;}
  .cbx svg{width:14px;height:14px;flex:0 0 auto;}
  .cbx.sz-s{width:16px;height:16px;border-radius:5px;} .cbx.sz-m{width:20px;height:20px;} .cbx.sz-l{width:24px;height:24px;border-radius:7px;}
  .cbx.sz-s svg{width:11px;height:11px;} .cbx.sz-l svg{width:16px;height:16px;}
  .cbx.st-hover{border-color:var(--accent);}
  .cbx.st-checked,.cbx.st-indeterminate{background:var(--accent);border-color:var(--accent);}
  .cbx.st-focus{border-color:var(--accent);}
  .cbx.st-disabled{opacity:.45;cursor:not-allowed;}
  .cbx .dash{width:60%;height:2px;background:#fff;border-radius:2px;}
  .rdo{border:1.5px solid var(--i-sec-edge);background:var(--panel);border-radius:999px;display:inline-flex;box-sizing:border-box;padding:0;flex:0 0 auto;
    align-items:center;justify-content:center;transition:.12s;cursor:pointer;}
  .rdo.sz-s{width:16px;height:16px;} .rdo.sz-m{width:20px;height:20px;} .rdo.sz-l{width:24px;height:24px;}
  .rdo .dot{width:0;height:0;border-radius:999px;background:var(--accent);transition:.12s;}
  .rdo.st-hover{border-color:var(--accent);}
  .rdo.st-checked{border-color:var(--accent);} .rdo.st-checked .dot{width:50%;height:50%;}
  .rdo.st-focus{border-color:var(--accent);}
  .rdo.st-disabled{opacity:.45;cursor:not-allowed;}
  .optrow{display:inline-flex;align-items:center;gap:9px;cursor:pointer;} .optrow .oplab{font-size:13.5px;color:var(--ink);}

  /* ===== tag ===== */
  .tg{display:inline-flex;align-items:center;gap:5px;height:22px;padding:0 8px;border-radius:999px;font-size:11px;
    font-weight:600;border:0.75px solid transparent;font-family:var(--font-sans);cursor:default;transition:.12s;}
  .tg.c-round{border-radius:999px;} .tg.c-rect{border-radius:5px;}
  .tg.i-brand{--tfill:var(--accent);--tc:var(--accent);--tedge:var(--accent);--ton:#fff;--ttint:var(--i-primary-tint);--ttint2:var(--i-primary-tint2);}
  .tg.i-neutral{--tfill:var(--i-sec-fill);--tc:var(--i-sec-fg);--tedge:var(--i-sec-edge);--ton:var(--i-sec-on);--ttint:var(--i-sec-tint);--ttint2:var(--i-sec-tint2);}
  .tg.v-solid{background:var(--tfill);color:var(--ton);border-color:var(--tfill);}
  .tg.v-outline{background:transparent;color:var(--tc);border-color:var(--tedge);}
  .tg.v-soft{background:var(--ttint);color:var(--tc);border-color:transparent;}
  .tg.st-hover.v-solid{filter:brightness(.94);}
  .tg.st-hover.v-outline,.tg.st-hover.v-soft{background:var(--ttint2);}
  .tg.st-disabled{opacity:.45;}
  .tg .x{display:inline-flex;cursor:pointer;opacity:.7;margin-right:-3px;} .tg .x:hover{opacity:1;}
  .tg svg{width:12px;height:12px;}

  /* ===== tab ===== */
  .tabbar{display:inline-flex;align-items:stretch;gap:2px;}
  .tabbar.v-line{gap:0;border-bottom:1px solid var(--line);}
  .tabbar.v-contained{gap:6px;} .tabbar.v-pill{gap:4px;background:var(--panel-2);padding:4px;border-radius:999px;}
  .tabi{display:inline-flex;align-items:center;gap:7px;height:38px;padding:0 16px;font-size:13.5px;font-weight:600;
    color:var(--muted);cursor:pointer;border:1px solid transparent;background:transparent;font-family:var(--font-sans);transition:.12s;white-space:nowrap;}
  .v-line .tabi{border-radius:0;margin-bottom:-1px;box-shadow:inset 0 -2px 0 transparent;}
  .v-line .tabi.st-hover{color:var(--ink);}
  .v-line .tabi.st-active{color:var(--accent);box-shadow:inset 0 -2px 0 var(--accent);}
  .v-contained .tabi{border:1px solid var(--line);border-radius:999px;} /* 容器 variant：全圓角 */
  .v-contained .tabi.st-hover{background:var(--panel-2);color:var(--ink);}
  .v-contained .tabi.st-active{background:var(--accent);color:#fff;border-color:var(--accent);}
  .v-pill .tabi{border-radius:999px;}
  .v-pill .tabi.st-hover{color:var(--ink);}
  .v-pill .tabi.st-active{background:var(--panel);color:var(--accent);box-shadow:0 1px 2px rgba(0,0,0,.08);}
  .tabi.st-disabled{opacity:.4;cursor:not-allowed;}
  /* size：sz-m 為標準（base 值），sz-s 較小 */
  .tabi.sz-s{height:30px;padding:0 12px;font-size:12.5px;gap:5px;}
  /* tab-item 內容零件：leading icon／count badge */
  .tabi .ticon{display:inline-flex;flex:0 0 auto;}
  .tabi .ticon svg{width:16px;height:16px;}
  .tabi.sz-s .ticon svg{width:14px;height:14px;}
  .tabi .tcount{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;border-radius:999px;
    background:var(--panel-2);color:var(--muted);font-size:11px;font-weight:700;font-family:var(--font-mono);box-sizing:border-box;}
  .tabi.sz-s .tcount{min-width:16px;height:16px;padding:0 4px;font-size:10px;}
  .tabi.st-active .tcount{background:var(--i-primary-tint);color:var(--accent);}
  .v-contained .tabi.st-active .tcount{background:rgba(255,255,255,.28);color:#fff;}

  /* ===== toggle 開關（tab 家族 atom）===== */
  .switchrow{display:inline-flex;align-items:center;gap:11px;}
  .switch{position:relative;width:44px;height:24px;border-radius:999px;background:var(--line-strong);cursor:pointer;
    transition:background .18s;flex:0 0 auto;box-sizing:border-box;border:none;padding:0;}
  .switch::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:999px;background:#fff;
    box-shadow:0 1px 2px rgba(0,0,0,.28);transition:transform .2s;}
  .switch.on{background:var(--accent);}
  .switch.on::after{transform:translateX(20px);}
  .switch.st-disabled{opacity:.4;cursor:not-allowed;}
  .switch-label{font-size:13.5px;color:var(--ink);font-weight:500;}

  /* ===== live 真實 hover（只作用在互動 demo，不影響 matrix 靜態格）===== */
  .optrow:hover .cbx:not(.st-disabled){border-color:var(--accent);}
  .optrow:hover .rdo:not(.st-disabled){border-color:var(--accent);}
  .row-demo .tg.v-solid:hover{filter:brightness(.94);}
  .row-demo .tg.v-outline:hover,.row-demo .tg.v-soft:hover{background:var(--ttint2);}
  .row-demo .v-line .tabi:hover:not(.st-active){color:var(--ink);}
  .row-demo .v-contained .tabi:hover:not(.st-active){background:var(--panel-2);color:var(--ink);}
  .row-demo .v-pill .tabi:hover:not(.st-active){color:var(--ink);}

  /* ===== 複雜度轉盤 collapsible card ===== */
  .dcard{margin:0 0 26px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;}
  .dcard-head{width:100%;display:flex;align-items:center;gap:12px;padding:15px 20px;background:var(--panel-2);
    border:none;border-bottom:1px solid var(--line);cursor:pointer;font-family:var(--font-sans);text-align:left;color:var(--ink);transition:.13s;}
  .dcard.collapsed .dcard-head{border-bottom-color:transparent;}
  .dcard-head:hover{background:var(--panel-3);}
  .dcard-head .dh-title{font-size:14px;font-weight:640;}
  .dcard-head .dh-count{font-family:var(--font-mono);font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums;}
  .dcard-head .dh-count b{color:var(--accent);}
  .dcard-head .dh-chevron{margin-left:auto;color:var(--faint);transition:transform .18s;display:inline-flex;}
  .dcard-head .dh-chevron svg{width:16px;height:16px;display:block;}
  .dcard.collapsed .dh-chevron{transform:rotate(-90deg);}
  .dcard-body{padding:20px;}
  .dcard.collapsed .dcard-body{display:none;}
  .dcard-body .hint{color:var(--muted);font-size:13px;margin:0 0 16px;}

  footer{margin-top:56px;padding-top:22px;border-top:1px solid var(--line);color:var(--faint);font-size:12px;display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;font-family:var(--font-mono);}
  .site-footer{justify-content:center;text-align:center;margin-top:44px;padding:20px 0 6px;letter-spacing:.02em;}

  .scrim{display:none;}
  /* 平板 / 手機：側邊欄改抽屜式覆蓋，漢堡控制收合 */
  @media (max-width:900px){
    .hamb{display:inline-flex;}
    .layout{grid-template-columns:1fr;background:none;} /* 抽屜模式關掉左欄漸層 */
    .sidebar{position:fixed;top:58px;left:0;bottom:0;height:auto;width:min(84vw,300px);z-index:40;
      transform:translateX(-100%);transition:transform .22s ease;border-right:1px solid var(--line-strong);}
    .shell.nav-open .sidebar{transform:translateX(0);}
    .shell.nav-open .scrim{display:block;position:fixed;inset:58px 0 0 0;background:rgba(0,0,0,.42);z-index:35;}
    .main{padding:26px 18px 80px;}

  @media (prefers-reduced-motion:reduce){*{transition:none !important;}}

  /* ===== 回饋+載入批次（alert/tooltip/notification/skeleton/loader）2026-07-14 平行產出 ===== */
/* ===== Tooltip 提示（前綴 tt-）===== */
/* solid 提示泡泡：深底白字，用 --ink/--canvas 反相 → 深淺色自動可讀，不需 feedback hex。
   TODO: 待接 semantic.*.tooltip.surface / .text token 後改綁 token */
.tt-tip{position:relative;display:inline-block;max-width:220px;background:var(--ink);color:var(--canvas);
  font-family:var(--font-sans);line-height:1.45;border-radius:8px;
  box-shadow:0 4px 14px rgba(0,0,0,.20);word-break:break-word;}
.tt-tip.tt-sz-s{font-size:11px;padding:5px 8px;border-radius:6px;letter-spacing:.01em;}
.tt-tip.tt-sz-m{font-size:13px;padding:8px 11px;}
/* 箭頭：同色小方塊旋轉 45°，依 placement 指向 trigger（tooltip 在該側，箭頭朝反向刺出）*/
.tt-tip.tt-arrow::after{content:"";position:absolute;width:9px;height:9px;background:var(--ink);border-radius:1px;}
.tt-tip.tt-arrow.tt-p-top::after{bottom:-4px;left:50%;transform:translateX(-50%) rotate(45deg);}
.tt-tip.tt-arrow.tt-p-bottom::after{top:-4px;left:50%;transform:translateX(-50%) rotate(45deg);}
.tt-tip.tt-arrow.tt-p-left::after{right:-4px;top:50%;transform:translateY(-50%) rotate(45deg);}
.tt-tip.tt-arrow.tt-p-right::after{left:-4px;top:50%;transform:translateY(-50%) rotate(45deg);}
/* ---- Live：可 hover 的 trigger ---- */
.tt-live-box{display:flex;align-items:center;justify-content:center;min-height:130px;padding:44px;}
.tt-trigwrap{position:relative;display:inline-flex;}
.tt-trig{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;
  background:var(--i-sec-fill);color:var(--i-sec-on);border:1px solid var(--i-sec-edge);
  border-radius:9px;font-family:var(--font-sans);font-size:13px;cursor:default;transition:background .14s;}
.tt-trig:hover{background:var(--i-sec-tint);}
.tt-trig svg{width:15px;height:15px;flex:0 0 auto;}
/* 浮出定位：預設隱藏，hover trigger 才顯示；nowrap 讓單行浮出 */
.tt-tip.tt-float{position:absolute;opacity:0;pointer-events:none;white-space:nowrap;max-width:260px;
  z-index:5;transition:opacity .15s ease, transform .15s ease;}
.tt-tip.tt-fp-top{bottom:calc(100% + 9px);left:50%;transform:translateX(-50%) translateY(4px);}
.tt-tip.tt-fp-bottom{top:calc(100% + 9px);left:50%;transform:translateX(-50%) translateY(-4px);}
.tt-tip.tt-fp-left{right:calc(100% + 9px);top:50%;transform:translateY(-50%) translateX(4px);}
.tt-tip.tt-fp-right{left:calc(100% + 9px);top:50%;transform:translateY(-50%) translateX(-4px);}
.tt-trigwrap:hover .tt-tip.tt-fp-top{opacity:1;transform:translateX(-50%) translateY(0);}
.tt-trigwrap:hover .tt-tip.tt-fp-bottom{opacity:1;transform:translateX(-50%) translateY(0);}
.tt-trigwrap:hover .tt-tip.tt-fp-left{opacity:1;transform:translateY(-50%) translateX(0);}
.tt-trigwrap:hover .tt-tip.tt-fp-right{opacity:1;transform:translateY(-50%) translateX(0);}
/* ===== Notification 通知 / Toast（前綴 nt-）===== */
/* TODO: 待接 semantic.*.feedback token；下列 success/warning/info 為固定 hex（框架尚未給回饋色 token），
   已挑選在深淺色兩模式皆可讀的色階。error/info 也用固定 hex 以確保 self-contained。*/
.nt-i-success{--nt-c:#2E9E6B;--nt-solid:#278A5C;--nt-soft:rgba(46,158,107,.13);--nt-soft-edge:rgba(46,158,107,.34);}
.nt-i-warning{--nt-c:#D9930B;--nt-solid:#B9770C;--nt-soft:rgba(217,147,11,.15);--nt-soft-edge:rgba(217,147,11,.36);}
.nt-i-error{--nt-c:#E5484D;--nt-solid:#D93A3F;--nt-soft:rgba(229,72,77,.13);--nt-soft-edge:rgba(229,72,77,.34);}
.nt-i-info{--nt-c:#3B82F6;--nt-solid:#2E6FE0;--nt-soft:rgba(59,130,246,.13);--nt-soft-edge:rgba(59,130,246,.34);}

.nt-toast{position:relative;display:flex;gap:10px;align-items:flex-start;min-width:220px;max-width:360px;
  padding:12px 14px;border-radius:var(--radius);box-shadow:0 6px 20px rgba(0,0,0,.10);
  font-family:var(--font-sans);box-sizing:border-box;}
.nt-ico{flex:0 0 auto;display:inline-flex;width:20px;height:20px;margin-top:1px;color:var(--nt-c);}
.nt-ico svg{width:20px;height:20px;display:block;}
.nt-body{flex:1 1 auto;min-width:0;}
.nt-title{font-size:14px;font-weight:600;line-height:1.3;color:var(--ink);}
.nt-msg{font-size:13px;line-height:1.45;color:var(--muted);margin-top:2px;word-break:break-word;}
.nt-action{margin-top:9px;display:inline-flex;align-items:center;height:26px;padding:0 11px;
  font-size:12px;font-weight:600;border-radius:8px;background:transparent;
  border:1px solid var(--line-strong);color:var(--nt-c);cursor:pointer;font-family:inherit;}
.nt-action:hover{background:var(--nt-soft);}
.nt-close{flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;
  margin:-2px -4px 0 0;padding:0;border:0;background:transparent;color:var(--muted);cursor:pointer;border-radius:6px;}
.nt-close svg{width:15px;height:15px;display:block;}
.nt-close:hover{background:rgba(125,125,125,.16);color:var(--ink);}

/* variant：solid 填色白字 / outline 描邊 / soft 柔色底 */
.nt-v-solid{background:var(--nt-solid);border:1px solid transparent;}
.nt-v-solid .nt-title{color:#fff;}
.nt-v-solid .nt-msg{color:rgba(255,255,255,.86);}
.nt-v-solid .nt-ico{color:#fff;}
.nt-v-solid .nt-close{color:rgba(255,255,255,.82);}
.nt-v-solid .nt-close:hover{background:rgba(255,255,255,.18);color:#fff;}
.nt-v-solid .nt-action{color:#fff;border-color:rgba(255,255,255,.5);}
.nt-v-solid .nt-action:hover{background:rgba(255,255,255,.14);}
.nt-v-outline{background:var(--panel);border:1px solid var(--nt-c);}
.nt-v-soft{background:var(--nt-soft);border:1px solid var(--nt-soft-edge);}
/* dark：半透明黑（frosted），白字、icon 保留 intent 語意色 */
.nt-v-dark{background:rgba(22,24,30,.82);border:1px solid rgba(255,255,255,.10);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);}
.nt-v-dark .nt-title{color:#fff;}
.nt-v-dark .nt-msg{color:rgba(255,255,255,.72);}
.nt-v-dark .nt-ico{color:var(--nt-c);}
.nt-v-dark .nt-close{color:rgba(255,255,255,.72);}
.nt-v-dark .nt-close:hover{background:rgba(255,255,255,.16);color:#fff;}
.nt-v-dark .nt-action{color:#fff;border-color:rgba(255,255,255,.34);}
.nt-v-dark .nt-action:hover{background:rgba(255,255,255,.12);}


/* Position 示意：小螢幕 + mini toast 停靠 */
.nt-screen{position:relative;width:200px;height:130px;border:1px solid var(--line-strong);
  border-radius:10px;background:var(--panel-2);overflow:hidden;}
.nt-mini{position:absolute;display:inline-flex;align-items:center;gap:6px;height:24px;min-width:92px;
  padding:0 9px;background:var(--panel);border:1px solid var(--line-strong);border-radius:7px;
  box-shadow:0 3px 10px rgba(0,0,0,.12);}
.nt-mini .nt-dot{width:8px;height:8px;border-radius:50%;background:var(--nt-c);flex:0 0 auto;}
.nt-mini .nt-mline{height:5px;width:46px;border-radius:3px;background:var(--line-strong);flex:0 0 auto;}
.nt-pos-tr{top:10px;right:10px;}
.nt-pos-br{bottom:10px;right:10px;}
.nt-pos-bc{bottom:10px;left:50%;transform:translateX(-50%);}
/* Rect Toast 方形（置中：圓 icon badge 在上、文字在下，對齊 Figma toast/rect_*）*/
.nt-rect{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
  width:124px;height:124px;padding:16px;box-sizing:border-box;text-align:center;background:var(--panel);border-radius:8px;
  box-shadow:0 8px 16px rgba(0,0,0,.18),0 16px 32px rgba(0,0,0,.06);}
.nt-rect .nt-rect-badge{width:32px;height:32px;border-radius:50%;background:var(--nt-c);flex:0 0 auto;
  display:inline-flex;align-items:center;justify-content:center;color:#fff;}
.nt-rect .nt-rect-badge svg{width:18px;height:18px;display:block;}
.nt-rect .nt-rect-txt{font-size:14px;line-height:1.5;font-weight:600;letter-spacing:.01em;color:var(--ink);word-break:break-word;}
.nt-rect-stage{min-height:150px;display:flex;align-items:center;justify-content:center;
  border:1px dashed var(--line-strong);border-radius:12px;background:var(--panel-2);}
/* ===== Skeleton 骨架（前綴 sk-）===== */
/* 骨架佔位色走中性 token：--panel-3 疊在 --panel 之上，深淺色自動切換 */
.sk{position:relative;overflow:hidden;background:var(--panel-3);display:inline-block;vertical-align:middle;
  /* shimmer 掃過的光澤色：淺色模式用高透白、深色模式用低透白 */
  --sk-sheen:rgba(255,255,255,.55);}
@media (prefers-color-scheme:dark){.sk{--sk-sheen:rgba(255,255,255,.09);}}
:root[data-theme="dark"] .sk{--sk-sheen:rgba(255,255,255,.09);}
:root[data-theme="light"] .sk{--sk-sheen:rgba(255,255,255,.55);}

/* shape：文字列（圓角細條）／矩形（中圓角）／圓形（正圓） */
.sk-text{border-radius:4px;width:112px;max-width:100%;}
.sk-text.sk-sz-s{height:8px;}
.sk-text.sk-sz-m{height:12px;}
.sk-text.sk-sz-l{height:16px;}
.sk-rectangle{border-radius:8px;}
.sk-rectangle.sk-sz-s{width:56px;height:34px;}
.sk-rectangle.sk-sz-m{width:84px;height:52px;}
.sk-rectangle.sk-sz-l{width:112px;height:72px;}
.sk-circle{border-radius:999px;flex:0 0 auto;}
.sk-circle.sk-sz-s{width:24px;height:24px;}
.sk-circle.sk-sz-m{width:40px;height:40px;}
.sk-circle.sk-sz-l{width:56px;height:56px;}

/* 動畫 feature flag：shimmer 光澤掃過（linear-gradient 平移）*/
.sk-a-shimmer::after{content:"";position:absolute;inset:0;transform:translateX(-100%);
  background:linear-gradient(90deg,transparent 0%,var(--sk-sheen) 50%,transparent 100%);
  animation:sk-shimmer 1.5s ease-in-out infinite;}
/* 動畫 feature flag：pulse 脈衝（整體 opacity 呼吸，低能耗）*/
.sk-a-pulse{animation:sk-pulse 1.6s ease-in-out infinite;}
/* sk-a-none：靜態，不掛任何動畫 */

@keyframes sk-shimmer{100%{transform:translateX(100%);}}
@keyframes sk-pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

/* 尊重使用者「減少動態」偏好：一律停動畫、隱藏 shimmer 遮罩 */
@media (prefers-reduced-motion:reduce){
  .sk-a-shimmer::after{animation:none;display:none;}
  .sk-a-pulse{animation:none;}
}

/* ===== 組合範例容器（頭像卡／段落／媒體卡）===== */
.sk-card{display:flex;align-items:center;gap:14px;padding:16px;
  border:1px solid var(--line);border-radius:var(--radius);background:var(--panel);min-width:220px;}
.sk-lines{display:flex;flex-direction:column;gap:9px;flex:1 1 auto;min-width:0;}
.sk-lines .sk-text:first-child{width:70%;}
.sk-lines .sk-text:last-child{width:46%;}
.sk-para{display:flex;flex-direction:column;gap:9px;padding:16px;
  border:1px solid var(--line);border-radius:var(--radius);background:var(--panel);min-width:220px;}
.sk-para .sk-text{width:100%;}
.sk-para .sk-text:last-child{width:58%;}
.sk-media{display:flex;flex-direction:column;gap:10px;padding:16px;
  border:1px solid var(--line);border-radius:var(--radius);background:var(--panel);min-width:200px;}
.sk-media .sk-rectangle{width:100%;}
.sk-media .sk-text:first-of-type{width:80%;}
.sk-media .sk-text:last-child{width:55%;}
/* ===== Loader 載入器（前綴 ld-）===== */
/* NOTE: loader 只用 neutral / primary，兩者都有 token；本頁不需 feedback 色。
   TODO: 若日後 loader 要吃 success/warning/info，需先接 semantic.*.feedback token，勿寫死 hex。 */
.ld-wrap{display:inline-flex;align-items:center;gap:10px;}
.ld-wrap.ld-inline{gap:6px;vertical-align:middle;}
.ld-label{font:500 13px/1.2 var(--font-sans);color:var(--muted);white-space:nowrap;}
.ld-pct{font:600 12px/1 var(--font-mono);color:var(--muted);min-width:34px;text-align:right;}

/* circular：border + 旋轉 */
.ld-circ{box-sizing:border-box;border-radius:50%;border-style:solid;flex:0 0 auto;animation:ld-spin .7s linear infinite;}
.ld-circ.ld-sz-s{width:16px;height:16px;border-width:2px;}
.ld-circ.ld-sz-m{width:24px;height:24px;border-width:3px;}
.ld-circ.ld-sz-l{width:36px;height:36px;border-width:4px;}
.ld-circ.ld-neutral{border-color:var(--line-strong);border-top-color:var(--muted);}
.ld-circ.ld-primary{border-color:var(--i-primary-tint2);border-top-color:var(--i-primary);}

/* dots：三顆 scale 交錯跳動 */
.ld-dots{display:inline-flex;align-items:center;flex:0 0 auto;}
.ld-dots.ld-sz-s{gap:4px;}
.ld-dots.ld-sz-m{gap:5px;}
.ld-dots.ld-sz-l{gap:7px;}
.ld-dot{border-radius:50%;animation:ld-bounce 1.2s ease-in-out infinite;}
.ld-dots.ld-sz-s .ld-dot{width:5px;height:5px;}
.ld-dots.ld-sz-m .ld-dot{width:7px;height:7px;}
.ld-dots.ld-sz-l .ld-dot{width:10px;height:10px;}
.ld-dots.ld-neutral .ld-dot{background:var(--muted);}
.ld-dots.ld-primary .ld-dot{background:var(--i-primary);}
.ld-dot:nth-child(2){animation-delay:.16s;}
.ld-dot:nth-child(3){animation-delay:.32s;}

/* bar：底槽 + 內條（不定量左右滑 / 定量寬度）*/
.ld-bar{position:relative;overflow:hidden;border-radius:999px;background:var(--panel-3);flex:0 0 auto;}
.ld-bar.ld-sz-s{width:80px;height:4px;}
.ld-bar.ld-sz-m{width:120px;height:6px;}
.ld-bar.ld-sz-l{width:168px;height:8px;}
.ld-bar-fill{position:absolute;top:0;bottom:0;left:0;border-radius:999px;transition:width .25s ease;}
.ld-bar.ld-neutral .ld-bar-fill{background:var(--muted);}
.ld-bar.ld-primary .ld-bar-fill{background:var(--i-primary);}
.ld-bar-fill.ld-indet{width:40%;transition:none;animation:ld-bar 1.15s ease-in-out infinite;}

/* full-screen 遮罩示意（容器模擬）*/
.ld-screen{position:relative;width:100%;min-width:220px;height:150px;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:var(--panel-2);}
.ld-screen-sk{padding:14px;display:flex;flex-direction:column;gap:10px;}
.ld-screen-sk i{display:block;height:10px;border-radius:6px;background:var(--panel-3);}
.ld-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:color-mix(in srgb,var(--canvas) 72%,transparent);backdrop-filter:blur(1.5px);}

@keyframes ld-spin{to{transform:rotate(360deg);}}
@keyframes ld-bounce{0%,80%,100%{transform:scale(.45);opacity:.45;}40%{transform:scale(1);opacity:1;}}
@keyframes ld-bar{0%{left:-40%;}100%{left:100%;}}

/* ===== menu (mn-) ===== */
/* ===== Menu 選單 ===== */
  .mn-item{position:relative;display:inline-flex;align-items:center;gap:8px;font-family:var(--font-sans);color:var(--muted);background:transparent;border:0;border-radius:8px;cursor:pointer;white-space:nowrap;user-select:none;line-height:1.2;transition:background .12s,color .12s;}
  .mn-item--s{padding:6px 10px;font-size:13px;}
  .mn-item--m{padding:8px 14px;font-size:14px;}
  .mn-item--l{padding:11px 18px;font-size:15px;}
  .mn-item--hover{background:var(--panel-2);color:var(--ink);}
  .mn-item--active{color:var(--i-primary);font-weight:600;}
  .mn-item--focus{outline:1px solid var(--accent);outline-offset:1px;color:var(--ink);}
  .mn-item--disabled{opacity:.45;cursor:not-allowed;}
  .mn-item:not(.mn-item--active):not(.mn-item--disabled):not(.mn-item--focus):hover{background:var(--panel-2);color:var(--ink);}
  .mn-ico{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;flex:0 0 auto;}
  .mn-ico svg{width:100%;height:100%;display:block;}
  .mn-item--s .mn-ico{width:16px;height:16px;}
  .mn-item--l .mn-ico{width:20px;height:20px;}
  .mn-ind{position:absolute;background:var(--i-primary);border-radius:2px;opacity:0;pointer-events:none;}
  .mn-item--active .mn-ind{opacity:1;left:10px;right:10px;bottom:0;height:2px;}
  .mn-bar{display:flex;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);}
  .mn-bar--horizontal{flex-direction:row;align-items:center;gap:4px;padding:6px 8px;}
  .mn-bar--vertical{flex-direction:column;align-items:stretch;gap:2px;padding:8px;width:200px;}
  .mn-bar--vertical .mn-item{width:100%;justify-content:flex-start;}
  .mn-bar--vertical .mn-item--active{background:var(--i-primary-tint);}
  .mn-bar--vertical .mn-item--active .mn-ind{display:none;}
  .mn-orient{display:flex;flex-wrap:wrap;gap:24px;align-items:flex-start;}
  .mn-ocol{display:flex;flex-direction:column;gap:10px;}
  .mn-ocap{font-family:var(--font-mono);font-size:12px;color:var(--faint);}
  .mn-ocap b{color:var(--muted);font-weight:600;}
  .mn-live-box{padding:8px 0;}

/* ===== action-menu (am-) ===== */
/* ===== Action Menu 動作選單 ===== */
  .am-panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:0 10px 28px rgba(0,0,0,.16);padding:6px;display:flex;flex-direction:column;gap:2px;min-height:max-content;} /* min-height:max-content 修正：巢狀 flex column 面板在 grid 格子／flex 容器內會被算成單列高、內容溢出，撐回內容高（矩陣＋Live 兩處通用） */
  .am-panel.sz-s{min-width:132px;} .am-panel.sz-m{min-width:170px;} .am-panel.sz-l{min-width:210px;}
  .am-item{display:flex;align-items:center;gap:10px;min-width:118px;padding:8px 12px;border-radius:10px;border:1px solid transparent;font-family:var(--font-sans);font-size:14px;line-height:1.2;color:var(--ink);cursor:pointer;user-select:none;white-space:nowrap;}
  .am-item svg{width:16px;height:16px;flex:0 0 auto;color:var(--muted);}
  .am-item .am-lb{flex:1 1 auto;}
  .am-item.st-hover{background:var(--panel-2);}

/* ===== breadcrumb (bc-) ===== */

  function mountDial(host,cfg){

    const title=ce('span','dh-title');title.textContent='複雜度轉盤';

    head.append(title,countSpan,chev);
    const bodyEl=ce('div','dcard-body');
    const hint=ce('p','hint');hint.textContent='勾掉不需要的軸值，矩陣即時縮減。每軸至少保留一個。';bodyEl.appendChild(hint);
    const axesWrap=ce('div','axes');bodyEl.appendChild(axesWrap);
    const full=Object.keys(axes).reduce((a,k)=>a*axes[k].length,1);
    function updateCount(){const parts=Object.keys(axes).map(k=>[...active[k]].length);const total=parts.reduce((a,b)=>a*b,1);countSpan.innerHTML=parts.join(' × ')+' = <b>'+total+'</b> / '+full;}
    Object.keys(axes).forEach(k=>{const ax=ce('div','axis');ax.innerHTML=`<div class="name">${zh.axisName[k]}</div>`;const list=ce('div','chk-list');
      axes[k].forEach(val=>{const row=ce('label','chk-row'+(active[k].has(val)?'':' off'));
        const box=document.createElement('input');box.type='checkbox';box.checked=active[k].has(val);
        const txt=document.createElement('span');txt.textContent=(zh[k][val]||val).replace(/\s.*/,'')+'·'+val;
        box.onchange=()=>{if(!box.checked){if(active[k].size===1){box.checked=true;return;}active[k].delete(val);}else active[k].add(val);
          row.classList.toggle('off',!box.checked);onRender();updateCount();};
        row.append(box,txt);list.appendChild(row);});
      ax.appendChild(list);axesWrap.appendChild(ax);});
    card.append(head,bodyEl);host.appendChild(card);updateCount();
  }

  /* ---- 共用：實際互動 Live 控制面板（segmented 控制 + boolean 勾選 + 即時預覽）---- */
  function mountLive(host,cfg){
    const state=Object.assign({},cfg.initial||{});
    const wrap=ce('div','livewrap');
    const ctlRow=ce('div','ctl-row');
    const stage=ce('div','live-stage');
    function rerender(){stage.innerHTML='';stage.appendChild(cfg.render(state));}
    (cfg.segs||[]).forEach(s=>{
      const c=ce('div','ctl');c.innerHTML=`<span class="lab">${s.label}</span>`;
      const seg=ce('div','seg');
      s.options.forEach((o,i)=>{const b=document.createElement('button');b.textContent=s.labels?s.labels[i]:o;
        b.setAttribute('aria-pressed',state[s.key]===o);
        b.onclick=()=>{state[s.key]=o;[...seg.children].forEach(x=>x.setAttribute('aria-pressed','false'));b.setAttribute('aria-pressed','true');rerender();};
        seg.appendChild(b);});
      c.appendChild(seg);ctlRow.appendChild(c);});
    if((cfg.bools||[]).length){
      const c=ce('div','ctl');c.innerHTML=`<span class="lab">${cfg.boolLabel||'Content'}</span>`;
      const checks=ce('div','checks');
      cfg.bools.forEach(bo=>{const l=ce('label','chk');const i=document.createElement('input');i.type='checkbox';i.checked=!!state[bo.key];
        i.onchange=()=>{state[bo.key]=i.checked;rerender();};l.append(i,document.createTextNode(bo.label));checks.appendChild(l);});
      c.appendChild(checks);ctlRow.appendChild(c);}

  /* 消失後自動復原（示意用，可反覆看）；after 用於 auto-dismiss 消失後重新計時 */
  function ntDismiss(t,after){t.style.transition='opacity .3s ease, transform .3s ease';t.style.opacity='0';t.style.transform='translateX(14px)';

  function ntEl(variant,intent,opts){opts=opts||{};

    if(opts.icon!==false){const ic=ce('span','nt-ico');ic.innerHTML=NT_ICON[intent];t.appendChild(ic);}
    const bd=ce('div','nt-body');
    const ti=ce('div','nt-title');ti.textContent=NT_TITLE[intent];

    if(opts.desc!==false){const ms=ce('div','nt-msg');ms.textContent=NT_MSG[intent];bd.appendChild(ms);} // 說明文字可用 boolean 關閉，只留標題
    if(opts.action){const a=ce('button','nt-action');a.textContent='立即查看';bd.appendChild(a);}
    t.appendChild(bd);
    if(opts.close){const x=ce('button','nt-close');x.innerHTML=ICON_CLOSE;x.setAttribute('aria-label','關閉');
      x.onclick=e=>{e.stopPropagation();ntDismiss(t);};t.appendChild(x);}
    if(opts.timer){const arm=()=>{t._ntTimer=setTimeout(()=>{if(t.isConnected)ntDismiss(t,arm);},3000);};arm();} // auto-dismiss：3 秒後直接消失（無進度條）

  /* ---- SKELETON 骨架 ---- */
/* 單一骨架 atom：shape=text|rectangle|circle；size=s|m|l；anim=shimmer|pulse|none */
function skelEl(shape,size,anim){
  return ce('div',`sk sk-${shape} sk-sz-${size} sk-a-${anim||'shimmer'}`);
}
/* 組合範例：頭像卡（circle 頭像 + 兩行 text，模擬一張卡片載入中） */
function skelCard(anim){
  const card=ce('div','sk-card');
  const av=skelEl('circle','l',anim);
  const lines=ce('div','sk-lines');
  lines.appendChild(skelEl('text','m',anim)); // 標題行
  lines.appendChild(skelEl('text','s',anim)); // 副標行
  card.append(av,lines);return card;
}
/* 組合範例：段落（三行文字，末行留白） */
function skelPara(anim){
  const p=ce('div','sk-para');
  p.appendChild(skelEl('text','m',anim));
  p.appendChild(skelEl('text','m',anim));
  p.appendChild(skelEl('text','m',anim));
  return p;
}
/* 組合範例：媒體卡（矩形縮圖 + 標題／副標） */
function skelMedia(anim){
  const m=ce('div','sk-media');
  m.appendChild(skelEl('rectangle','l',anim));
  m.appendChild(skelEl('text','m',anim));
  m.appendChild(skelEl('text','s',anim));
  return m;
}

    const ind=ce('span','mn-ind');it.appendChild(ind);

  function mnBar(variant,size,o){
    o=o||{};
    const items=o.items||[];
    const bar=ce('div','mn-bar mn-bar--'+variant);
    bar.setAttribute('role','navigation');
    let cur=(o.activeIndex==null?0:o.activeIndex);
    const nodes=[];
    items.forEach((label,i)=>{
      const it=mnItem(i===cur?'active':'default',size,{label:label,icon:o.icon?MN_ICONS[i%MN_ICONS.length]:false});
      if(i===cur)it.setAttribute('aria-current','page');
      if(o.clickable!==false){it.onclick=()=>{cur=i;nodes.forEach((n,j)=>{const on=(j===i);n.classList.toggle('mn-item--active',on);if(on)n.setAttribute('aria-current','page');else n.removeAttribute('aria-current');});};}
      nodes.push(it);bar.appendChild(it);
    });
    return bar;
  }

  const bcChevron='<svg viewBox="0 0 256 256" fill="currentColor"><path d="M181.66,133.66l-80,80a8,8,0,0,1-11.32-11.32L164.69,128,90.34,53.66a8,8,0,0,1,11.32-11.32l80,80A8,8,0,0,1,181.66,133.66Z"/></svg>';
  function bcSep(kind){

  function bcTrail(items,o){

    const wrap=ce('div','bc-trail');

    if(o.collapsed && items.length>3){                 // 省略中段：保留首＋末兩層

  const pgArrowL='<svg viewBox="0 0 256 256" fill="currentColor"><path d="M165.66,202.34a8,8,0,0,1-11.32,11.32l-80-80a8,8,0,0,1,0-11.32l80-80a8,8,0,0,1,11.32,11.32L91.31,128Z"/></svg>';
  const pgArrowR='<svg viewBox="0 0 256 256" fill="currentColor"><path d="M181.66,133.66l-80,80a8,8,0,0,1-11.32-11.32L154.69,128,90.34,53.66a8,8,0,0,1,11.32-11.32l80,80A8,8,0,0,1,181.66,133.66Z"/></svg>';
  // 單顆頁碼／箭頭方鈕：state 控外觀、size 控邊長、current=當前頁高亮、arrow=left/right 放箭頭
  function pgBtn(state,size,o){
    const opt=o||{};
    const b=document.createElement('button');
    b.className='pg-btn pg-sz-'+size+' pg-st-'+state+(opt.current?' pg-cur':'')+(opt.arrow?' pg-arw':'');
    if(state==='disabled')b.disabled=true;
    if(opt.arrow==='left')b.innerHTML=pgArrowL;
    else if(opt.arrow==='right')b.innerHTML=pgArrowR;
    else b.textContent=opt.label;
    return b;
  }
  // 完整分頁器：numbered=數字頁碼＋雙邊箭頭（gap>1 才插省略號）；prev-next=前後翻頁＋頁次資訊
  function pgBar(variant,size,o){
    const opt=o||{},total=opt.total,current=opt.current;
    const bar=ce('div','pg-bar pg-bar-'+size);
    if(variant==='prev-next'){
      const prev=pgBtn(current<=1?'disabled':'default',size,{arrow:'left'});
      const info=ce('span','pg-info');info.textContent='第 '+current+' / '+total+' 頁';
      const next=pgBtn(current>=total?'disabled':'default',size,{arrow:'right'});
      if(opt.onNav){if(current>1)prev.onclick=()=>opt.onNav(current-1);if(current<total)next.onclick=()=>opt.onNav(current+1);}
      bar.append(prev,info,next);return bar;
    }
    // numbered：‹ 1 … (c-1)[c](c+1) … total ›
    const prev=pgBtn(current<=1?'disabled':'default',size,{arrow:'left'});
    if(opt.onNav&&current>1)prev.onclick=()=>opt.onNav(current-1);
    bar.appendChild(prev);
    const set=[]; [1,total,current-1,current,current+1].forEach(n=>{if(n>=1&&n<=total&&set.indexOf(n)<0)set.push(n);});
    set.sort((a,b)=>a-b);
    let last=0;
    set.forEach(n=>{
      if(last&&n-last>1){const e=ce('span','pg-ellip');e.textContent='…';bar.appendChild(e);}
      const nb=pgBtn(n===current?'active':'default',size,{label:n,current:n===current});
      if(opt.onNav&&n!==current)nb.onclick=()=>opt.onNav(n);
      bar.appendChild(nb);last=n;
    });
    const next=pgBtn(current>=total?'disabled':'default',size,{arrow:'right'});
    if(opt.onNav&&current<total)next.onclick=()=>opt.onNav(current+1);
    bar.appendChild(next);return bar;
  }
  LIVE.pagination=(host)=>{
    let cur=3; const total=10;                          // 當前頁次以 closure 保存，切 variant／size 不重置

  function choiceReport(){

    Object.keys(DIAL_SPECS).forEach(id=>{const spec=DIAL_SPECS[id],act=CHOICE[id].active;const rec={};let c=1,f=1;
      spec.order.forEach(k=>{const sel=spec.axes[k].filter(v=>act[k].has(v));rec[k]=sel;c*=sel.length;f*=spec.axes[k].length;});
      rec.count=c;rec.full=f;out[id]=rec;total+=c;full+=f;});

  const ICON_SPARK='<svg viewBox="0 0 256 256" fill="currentColor"><path d="M208,144a15.78,15.78,0,0,1-10.42,14.94l-51.65,19-19,51.66a15.94,15.94,0,0,1-29.88,0L78,178l-51.62-19a15.94,15.94,0,0,1,0-29.88l51.65-19,19-51.66a15.94,15.94,0,0,1,29.88,0l19,51.65,51.66,19A15.78,15.78,0,0,1,208,144ZM152,48h16V64a8,8,0,0,0,16,0V48h16a8,8,0,0,0,0-16H184V16a8,8,0,0,0-16,0V32H152a8,8,0,0,0,0,16Zm88,32h-8V72a8,8,0,0,0-16,0v8h-8a8,8,0,0,0,0,16h8v8a8,8,0,0,0,16,0V96h8a8,8,0,0,0,0-16Z"/></svg>';
